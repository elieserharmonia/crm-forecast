  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:background .25s,color .25s}
    input,select,textarea,button{font-family:inherit}
    textarea{resize:vertical}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{border-radius:3px}
    body.theme-dark{
      --bg-app:#0F1117;--bg-header:#161B27;--bg-card:#1C2333;--bg-card2:#151C2D;
      --bg-input:#0F1117;--bg-sidebar:#111827;
      --border:#2A3450;--border2:#1E2A40;
      --text-primary:#E8EDF5;--text-secondary:#8B97B0;--text-muted:#4A5568;
      --text-accent:#F87171;--text-green:#34D399;--text-blue:#60A5FA;
      --accent:#2563EB;--accent-soft:rgba(37,99,235,0.12);
      --sinuelo:#C0392B;--sinuelo-soft:rgba(192,57,43,0.12);
      --sinuelo:#8C1A1A;--sinuelo-light:rgba(140,26,26,0.25);--sinuelo-text:#FFAAAA;
      --scrollbar:#444;
    }
    body.theme-light{
      --bg-app:#F4F6F9;--bg-header:#FFFFFF;--bg-card:#FFFFFF;--bg-card2:#F8FAFB;
      --bg-input:#F4F6F9;--bg-sidebar:#1E293B;
      --border:#E2E8F0;--border2:#EEF2F7;
      --text-primary:#0F172A;--text-secondary:#64748B;--text-muted:#94A3B8;
      --text-accent:#DC2626;--text-green:#059669;--text-blue:#2563EB;
      --accent:#2563EB;--accent-soft:rgba(37,99,235,0.08);
      --sinuelo:#DC2626;--sinuelo-soft:rgba(220,38,38,0.08);
      --sinuelo:#8C1A1A;--sinuelo-light:rgba(140,26,26,0.10);--sinuelo-text:#8C1A1A;
      --scrollbar:#ccc;
    }
    body{background:var(--bg-app);color:var(--text-primary)}
    /* === NOVO DESIGN SINUELO CRM === */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * { box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    
    /* Sidebar */
    .crm-sidebar {
      width: 56px; height: 100vh; background: var(--bg-sidebar);
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 0; gap: 4px; position: fixed; left: 0; top: 0;
      z-index: 100; border-right: 1px solid rgba(255,255,255,0.06);
      overflow: hidden; transition: width .2s ease;
    }
    .crm-sidebar:hover { width: 200px; }
    .crm-sidebar .sb-logo {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px; flex-shrink: 0; overflow: hidden;
      background: rgba(255,255,255,0.08);
    }
    .crm-sidebar .sb-logo img { width: 28px; height: 28px; object-fit: contain; }
    .crm-sidebar-btn {
      width: 100%; min-height: 36px; padding: 0 10px;
      display: flex; align-items: center; gap: 10px;
      border: none; background: transparent; cursor: pointer;
      border-radius: 8px; margin: 0 6px; width: calc(100% - 12px);
      color: rgba(255,255,255,0.45); font-size: 13px; font-weight: 500;
      transition: all .15s ease; white-space: nowrap; overflow: hidden;
    }
    .crm-sidebar-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
    .crm-sidebar-btn.active { background: rgba(37,99,235,0.25); color: #60A5FA; }
    .crm-sidebar-btn svg { flex-shrink: 0; }
    .crm-sidebar-btn .sb-label { opacity: 0; transition: opacity .15s ease; pointer-events: none; font-size: 12px; }
    .crm-sidebar:hover .sb-label { opacity: 1; }
    .crm-sidebar .sb-badge {
      margin-left: auto; background: #EF4444; color: white;
      border-radius: 10px; padding: 1px 5px; font-size: 9px;
      font-weight: 700; flex-shrink: 0;
    }
    
    /* Layout wrapper */
    .crm-layout { margin-left: 56px; display: flex; flex-direction: column; min-height: 100vh; }
    
    /* Topbar */
    .crm-topbar {
      height: 54px; background: var(--bg-header); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 12px;
      position: sticky; top: 0; z-index: 50;
    }
    .crm-topbar .topbar-title { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -.01em; }
    .crm-topbar .topbar-search {
      flex: 1; max-width: 420px; height: 34px;
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-card2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0 12px; color: var(--text-muted); font-size: 12px; cursor: text;
    }
    .crm-topbar .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    
    /* Nav tabs */
    .crm-navtabs {
      background: var(--bg-header); border-bottom: 1px solid var(--border);
      padding: 0 20px; display: flex; align-items: center; gap: 2px;
      overflow-x: auto; white-space: nowrap; scroll-behavior: smooth;
    }
    .crm-navtabs::-webkit-scrollbar { height: 0; }
    .crm-navtab {
      height: 40px; padding: 0 14px; border: none; background: transparent;
      font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all .15s ease; position: relative;
      white-space: nowrap; flex-shrink: 0;
    }
    .crm-navtab:hover { color: var(--text-primary); }
    .crm-navtab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .crm-navtab .tab-badge {
      position: absolute; top: 6px; right: 6px;
      background: #EF4444; color: white; border-radius: 50%;
      width: 14px; height: 14px; font-size: 8px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    
    /* Metric bar */
    .crm-metrics {
      background: var(--bg-header); border-bottom: 1px solid var(--border);
      padding: 8px 20px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
    }
    .crm-metric { display: flex; align-items: baseline; gap: 5px; }
    .crm-metric-val { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .crm-metric-val.warn { color: #EF4444; }
    .crm-metric-lbl { font-size: 11px; color: var(--text-muted); }
    
    /* Content area */
    .crm-content { padding: 16px 20px; flex: 1; overflow-y: auto; }
    
    /* Cards */
    .crm-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    
    /* Kanban column header */
    .kanban-stage-header {
      padding: 10px 12px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border2);
    }
    
    /* Opp card */
    .opp-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 13px; cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
      border-left-width: 3px;
    }
    .opp-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); border-color: var(--accent); }
    
    /* Buttons */
    .btn-primary {
      height: 34px; padding: 0 14px; border: none; border-radius: 8px;
      background: var(--sinuelo); color: white; font-size: 12px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-secondary {
      height: 34px; padding: 0 12px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-card); color: var(--text-secondary); font-size: 12px;
      cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap;
      transition: all .15s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* Toggle SIM/NAO */
    .radar-toggle {
      width: 36px; height: 20px; border-radius: 10px; border: none; cursor: pointer;
      position: relative; transition: background .2s; flex-shrink: 0;
    }
    .radar-toggle::after {
      content: ''; position: absolute; top: 2px; width: 16px; height: 16px;
      border-radius: 50%; background: white; transition: left .2s;
    }
    .radar-toggle.on { background: #10B981; }
    .radar-toggle.off { background: #CBD5E1; }
    .radar-toggle.on::after { left: 18px; }
    .radar-toggle.off::after { left: 2px; }
    
    /* Score badge */
    .score-badge {
      font-size: 12px; font-weight: 700; padding: 2px 7px; border-radius: 6px;
    }
    .score-pos { color: #059669; background: rgba(5,150,105,.1); }
    .score-neg { color: #DC2626; background: rgba(220,38,38,.1); }
    .score-neu { color: var(--text-muted); background: var(--bg-card2); }
    
    /* Freq badge */
    .freq-semanal    { background: rgba(5,150,105,.1);  color: #059669; }
    .freq-quinzenal  { background: rgba(37,99,235,.1);  color: #2563EB; }
    .freq-mensal     { background: rgba(245,158,11,.1); color: #D97706; }
    .freq-bimestral  { background: rgba(239,68,68,.1);  color: #DC2626; }
    
    @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: translateY(0); } }
    .fade-in { animation: fadeIn .2s ease; }

    ::-webkit-scrollbar-thumb{background:var(--scrollbar)}
  </style>

Use a ferramenta web_search para pesquisar notícias recentes (últimos 30-90 dias) sobre cada cliente listado abaixo.

    try{

      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": cleanKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:8000,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:promptAnalysis}]
        })
      });

      if(!res.ok){
        const err = await res.json().catch(()=>({error:{message:res.statusText}}));
        throw new Error(`Anthropic API: ${res.status} — ${err?.error?.message||res.statusText}`);
      }

      const data = await res.json();

      // Processar resposta — pode ter múltiplos blocos (tool_use + text)
      const textBlocks = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text||"");
      let text = textBlocks.join("");

      // Se não retornou texto final ainda (stop_reason=tool_use), fazer segundo turno
      if(data.stop_reason==="tool_use" || text.trim()===""){
        // Construir histórico de mensagens com os resultados das buscas
        const messages = [{role:"user",content:promptAnalysis}];
        messages.push({role:"assistant",content:data.content});
        // Adicionar resultados das tool calls como tool_result
        const toolResults = (data.content||[])
          .filter(b=>b.type==="tool_use")
          .map(b=>({type:"tool_result",tool_use_id:b.id,content:JSON.stringify(b.input||{})}));
        if(toolResults.length>0){
          messages.push({role:"user",content:toolResults});
        }
        messages.push({role:"user",content:"Agora gere o JSON completo do relatório com base em todas as buscas realizadas. Retorne APENAS o JSON, sem markdown."});

        const res2 = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",

            "Content-Type":"application/json",
            "x-api-key": cleanKey,
            "anthropic-version":"2023-06-01",

      // Extrair JSON da resposta (pode estar entre ```json ... ``` ou direto)
      let jsonStr = text.trim();
      const jsonMatch = jsonStr.match(/```(?:json)?\s*([\s\S]*?)```/) || jsonStr.match(/(\{[\s\S]*\})/);
      if(!jsonMatch) throw new Error("Claude não retornou JSON válido. Resposta: "+text.slice(0,200));

  async function importClientsXLSX(e) {
    const file = e.target.files[0];
    if (!file) return;
    const XLSX = window.XLSX;
    if (!XLSX) { alert("Aguarde o carregamento do leitor de planilhas."); return; }
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1});
    // Header: CNPJ(0) CNPJ2(1) IE(2) CLIENTE(3) APELIDO(4) ENDEREÇO(5) CEP(6) CIDADE(7) ESTADO(8) REGIOES(9) SEGMENTO(10) VENDEDOR(11) CONTATO(12) DEPT(13) TEL(14) CEL(15) EMAIL(16)
    const dict = {};
    for (let i=1; i<rows.length; i++) {
      const row = rows[i];
      if (!row || !row.length) continue;
      const cnpj=String(row[0]||"").trim(), cnpj2=String(row[1]||"").trim(), ie=String(row[2]||"").trim();
      const cliente=String(row[3]||"").trim(), apelido=String(row[4]||"").trim()||cliente;
      const endereco=String(row[5]||"").trim(), cep=String(row[6]||"").trim();
      const cidade=String(row[7]||"").trim(), estado=String(row[8]||"").trim();
      const regiao=String(row[9]||"").trim(), segmento=String(row[10]||"").trim();
      const contato=String(row[12]||"").trim(), dept=String(row[13]||"").trim();
      const tel=String(row[14]||"").trim(), cel=String(row[15]||"").trim(), email=String(row[16]||"").trim();
      if (!apelido) continue;
      if (!dict[apelido]) dict[apelido]={alias:apelido,name:cliente,cnpj,cnpj2,ie,address:endereco,cep,city:cidade,state:estado,region:regiao,segment:segmento,contacts:[]};
      if (contato) dict[apelido].contacts.push({name:contato,role:dept,tel,cel,email});
    }
    const list = Object.values(dict);
    saveClients(list);
    alert(`${list.length} clientes importados com sucesso!`);
    e.target.value="";
  }

  // IMPORTAR ORÇAMENTO VIA XLSX
  async function importOrcamentoXLSX(e) {
    const file = e.target.files[0];
    if (!file) return;
    const XLSX = window.XLSX;
    if (!XLSX) { alert("Aguarde o carregamento do leitor de planilhas."); return; }
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true});

    // Estrutura da planilha Sinuelo:
    // Linha 14 (idx 13): cabeçalhos de grupo
    // Linha 15 (idx 14): cabeçalhos de coluna
    // Linhas 17+ (idx 16+): itens (col A=item, E=qtd, F=desc, G=codigo, H=sigma, J=entrega, L=preco_unit, T=val_liq_unit)
    // Linha TOTAL: L="Valor total com ICMS", M=valor

    // Detectar itens (coluna A = número sequencial)
    const items = [];
    let totalComICMS = 0;
    let totalComIPI  = 0;
    let foundTotal   = false;

    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      if (!row || !row.length) continue;

      // Linha de item: col A é número 1-99
      const itemNum = row[0];
      if (typeof itemNum === 'number' && itemNum >= 1 && itemNum <= 99) {
        const qtd         = Number(row[4])  || 1;
        const desc        = String(row[5]  || '').trim();
        const codigo      = String(row[6]  || '').trim();
        const sigma       = String(row[7]  || '').trim();
        const entrega     = String(row[9]  || '').trim();
        const preco_unit  = Number(row[11]) || 0;
        const val_liq_unit= Number(row[19]) || 0;  // coluna T (índice 19)
        const total_liq   = val_liq_unit * qtd;
        items.push({item:itemNum, qtd, desc, codigo, sigma, entrega, preco_unit:+preco_unit.toFixed(2), val_liq_unit:+val_liq_unit.toFixed(2), total_liq:+total_liq.toFixed(2)});
      }

      // Linha de totais: col L = "Valor total com ICMS"
      const colL = String(row[11] || '').toLowerCase();
      if (colL.includes('valor total com icms')) {
        totalComICMS = Number(row[12]) || 0;
        foundTotal = true;
      }
      if (colL.includes('valor total com ipi') && !colL.includes('difal')) {
        totalComIPI = Number(row[12]) || 0;
      }
      // Também captura totais das colunas W/X (índices 22/23)
      if (typeof row[22] === 'number' && row[22] > 0 && !totalComIPI) totalComIPI  = row[22];
      if (typeof row[23] === 'number' && row[23] > 0) totalComIPI = Math.max(totalComIPI, row[23]);
    }

    if (items.length === 0) {
      alert("Nenhum item encontrado na planilha. Verifique se o formato é o padrão Sinuelo.");
      e.target.value = "";
      return;
    }

    // Usar valor com ICMS como valor do pipeline (célula amarela padrão)
    const valorPipeline = totalComICMS || items.reduce((s,it)=>s+(it.total_liq||0),0);

    // Extrair número do orçamento do nome do arquivo
    // Ex: MO_JACTO5LUCAS_SIQUEIRA_MO21790_26EF.xlsx → MO21790_26EF
    const fname = file.name.replace('.xlsx','').replace('.xls','');
    const orcNum = fname.split('_').slice(-2).join('_') || fname;

    // Tentar deduzir cliente e contato do nome do arquivo
    // Formato: MO_CLIENTE_CONTATO_NUMERO.xlsx
    const parts = fname.split('_');
    const clienteGuess = parts[1] || '';
    const contatoGuess = parts.slice(2, parts.length-2).join(' ') || '';

    const newOrc = {
      id: Date.now().toString(),
      number: orcNum,
      client: clienteGuess,
      contact: contatoGuess,
      supplier: 'Momento',
      value: +valorPipeline.toFixed(2),
      valueComIPI: +totalComIPI.toFixed(2),
      valueComICMS: +totalComICMS.toFixed(2),
      date: new Date().toISOString().slice(0,10),
      status: 'aberto',
      oppId: '',
      notes: `${items.length} itens importados. Valor pipeline = R$ ${valorPipeline.toLocaleString('pt-BR',{minimumFractionDigits:2})} (com ICMS).`,
      fileName: file.name,
      items
    };

    // Abrir modal pré-preenchido para o usuário confirmar/ajustar antes de salvar
    setOrcForm(newOrc);
    setOrcModal(true);
    e.target.value = "";
  }

  function saveVisita(){

  // RELATÓRIO POR OPORTUNIDADE
  const [relSelected, setRelSelected] = useState([]);

  // Seleção única — se já estiver selecionada, desmarca; caso contrário substitui
  function toggleRelOpp(id){ setRelSelected(s=>s.includes(id)?[]:[id]); setRelText(""); }

  // ===== FOLLOW-UPS =====
  // Detecta se uma linha começa com data DD.MM.YY (ou DD/MM/YY ou DD-MM-YY)
  const FOLLOWUP_DATE_RE = /^\s*(\d{2}[.\/\-]\d{2}[.\/\-]\d{2,4})\b/;

  // Migra uma string de notes para array de followUps
  function parseFollowUpsFromNotes(notes){
    if(!notes) return [];
    const lines = String(notes).split(/\r?\n/);
    const out = [];
    let cur = null;
    for(const ln of lines){
      const m = ln.match(FOLLOWUP_DATE_RE);
      if(m){
        if(cur) out.push(cur);
        const date = m[1].replace(/\//g,".").replace(/-/g,".");
        const text = ln.replace(FOLLOWUP_DATE_RE,"").replace(/^\s*[-–—:]\s*/,"").trim();
        cur = {id:Date.now()+Math.random(), date, text};
      } else if(ln.trim() && cur){
        // continuação da linha anterior — concatena (até 60 chars total da entrada incluindo data)
        cur.text = (cur.text + " " + ln.trim()).trim();
      } else if(ln.trim() && !cur){
        // linha sem data no início — cria entrada sem data
        cur = {id:Date.now()+Math.random(), date:"", text:ln.trim()};
      }
    }
    if(cur) out.push(cur);
    return out;
  }

  // Retorna a lista de follow-ups de uma oportunidade (migrando se necessário)
  function getFollowUps(opp){
    if(Array.isArray(opp.followUps)) return opp.followUps;
    return parseFollowUpsFromNotes(opp.notes);
  }

  // Formata a lista como texto (para exibição em relatório/exports)
  function formatFollowUpsAsText(list){
    if(!list || !list.length) return "—";
    return list.map(f=>f.date?`${f.date} - ${f.text}`:f.text).join("\n");
  }

  // Estado do modal de novo follow-up
  const [fupModal, setFupModal] = useState(false);
  const [fupForm, setFupForm] = useState({date:"", text:""});

  // Converte data ISO (YYYY-MM-DD) para formato BR (DD.MM.YY)
  function dateBR(iso){
    if(!iso) return "";
    const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(!m) return iso;
    return `${m[3]}.${m[2]}.${m[1].slice(2)}`;
  }
  function todayBR(){ return dateBR(new Date().toISOString().slice(0,10)); }

  // Abre modal pré-preenchido com hoje

  // Salva nova entrada de follow-up em nextAction
  function saveFollowUp(){
    if(!sel) return;
    const date = (fupForm.date||"").trim();
    const text = (fupForm.text||"").trim();
    if(!text) return;
    const fullLine = date ? `${date} - ${text}` : text;
    if(fullLine.length > 60){
      alert(`Limite de 60 caracteres excedido (atual: ${fullLine.length}). Encurte o texto.`);
      return;
    }
    // Pegar lista atual do nextAction
    const rawLines = (sel.nextAction||"").split("\n").filter(l=>l.trim());
    const newLines = [fullLine, ...rawLines]; // mais recente primeiro
    const newNextAction = newLines.join("\n");
    // Também limpar followUps array pois nextAction é a fonte de verdade
    updateOpp({...sel, nextAction: newNextAction, followUps: undefined});
    setFupForm({date:"", text:""});
    setFupModal(false);
  }

  // Remove uma entrada do nextAction por índice
  function deleteFollowUp(idx){
    if(!sel) return;
    const rawLines = (sel.nextAction||"").split("\n").filter(l=>l.trim());
    const updated = rawLines.filter((_,i)=>i!==idx);
    updateOpp({...sel, nextAction: updated.join("\n"), followUps: undefined});
  }

  // Helper: monta o objeto de relatório a partir de uma oportunidade
  function buildRelatorioData(opp){
    const stage = STAGES.find(s=>s.id===opp.stage);
    const stageLabel = stage?.label || opp.stage;
    const stageTag   = stage?.tag   || "";
    const negType    = opp.negType||"D";
    const resp       = opp.resp||"EF";
    const supplier   = opp.supplier||"—";
    const valor      = opp.value?`R$ ${(opp.value).toLocaleString("pt-BR")}`:"—";
    const confPct    = opp.stage==="fechado"?"100%":opp.stage==="po_recebido"?"90%":opp.stage==="neg"||opp.stage==="negociacao"?"80%":opp.stage==="proposta"?"50%":opp.stage==="diagnostico"?"30%":"10%";
    const months     = opp.months||{};
    const now = new Date();
    const MONTH_PT = ["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
    const semLabel = now.getMonth()<6 ? `1S/${now.getFullYear()}` : `2S/${now.getFullYear()}`;
    const timeCols = [
      { key:"m0",  label: MONTH_PT[now.getMonth()]            },
      { key:"m1",  label: MONTH_PT[(now.getMonth()+1)%12]     },
      { key:"m2",  label: MONTH_PT[(now.getMonth()+2)%12]     },
      { key:"sem", label: semLabel                            },
    ];
    const monthsMarked = timeCols.map(tc=>({label:tc.label, marked: !!months[tc.key]}));
    return {opp, stageLabel, stageTag, negType, resp, supplier, valor, confPct, monthsMarked};
  }

  // Gera texto do relatório no layout solicitado
  function buildRelatorioTexto(opp){
    const d = buildRelatorioData(opp);
    const linha = "─".repeat(70);
    const monthsTxt = d.monthsMarked.map(m=>`${m.label}${m.marked?"[X]":"[ ]"}`).join("  ");
    const forecastLine = [
      `NEG: ${d.negType}`,
      `RESP: ${d.resp}`,
      `CUSTOMER: ${opp.company||"—"}`,
      `SUPPLIER: ${d.supplier}`,
      `DESCRIPTION: ${opp.title||"—"}`,
      `AMOUNT: ${d.valor}`,
      `CONF: ${d.confPct}`,
      `PREVISÃO: ${monthsTxt}`
    ].join("  |  ");

    const hist = Array.isArray(opp.visitHistory)?opp.visitHistory:[];
    const histTxt = hist.length
      ? hist.slice().reverse().map((h,i)=>{
          const data = h.date||h.createdAt||"—";
          const partes = [];
          if(h.summary) partes.push(`Resumo: ${h.summary}`);
          if(h.what)    partes.push(`O quê: ${h.what}`);
          if(h.why)     partes.push(`Por quê: ${h.why}`);
          if(h.who)     partes.push(`Quem: ${h.who}`);
          if(h.where)   partes.push(`Onde: ${h.where}`);
          if(h.when)    partes.push(`Quando: ${h.when}`);
          if(h.how)     partes.push(`Como: ${h.how}`);
          if(h.howMuch) partes.push(`Quanto: ${h.howMuch}`);
          if(h.nextStep) partes.push(`Próximo passo: ${h.nextStep}`);
          return `[${data}]\n  ${partes.join("\n  ")}`;
        }).join("\n\n")
      : "Sem visitas registradas.";

    return [
      `${opp.company||"—"}`,
      `OPORTUNIDADE: ${opp.title||"—"}`,
      `RESPONSÁVEL: ${opp.contact||"—"}`,
      "",
      linha,
      "",
      "FORECAST:",
      forecastLine,
      "",
      linha,
      "",
      `HISTÓRICO:`,
      histTxt,
      "",
      linha,
      "",
      `FOLLOW-UP:`,
      formatFollowUpsAsText(getFollowUps(opp)),
      "",
      linha,
      "",
      `PRÓXIMA AÇÃO:`,
      opp.nextAction||"—",
    ].join("\n");
  }

      doc.autoTable({
        startY: y,
        head: [headerRow],
        body: [dataRow],
        theme: "grid",

        headStyles: {fillColor:[200,200,200], textColor:[40,40,40], fontStyle:"bold"},
        bodyStyles: {textColor:[140,26,26], fontStyle:"bold"},
        margin: {left:M, right:M},
        tableWidth: W-2*M
      });
      y = doc.lastAutoTable.finalY + 14;

      // Linha
      doc.setDrawColor(140,26,26); doc.line(M, y, W-M, y); y += 18;

      // HISTÓRICO
      doc.setFont("helvetica","bold"); doc.setFontSize(11);
      doc.text("HISTÓRICO:", M, y); y += 14;
      doc.setFont("helvetica","normal"); doc.setFontSize(9);
      const hist = (opp.visitHistory||[]).slice().reverse();
      if(hist.length===0){
        doc.text("Sem visitas registradas.", M, y); y += 14;
      } else {
        hist.forEach(h=>{
          if(y > 780){ doc.addPage(); y = M; }
          const data = h.date||h.createdAt||"—";
          doc.setFont("helvetica","bold");
          doc.text(`[${data}]`, M, y); y += 12;
          doc.setFont("helvetica","normal");
          const fields = [
            ["Resumo", h.summary],
            ["O quê", h.what],["Por quê", h.why],
            ["Quem", h.who],["Onde", h.where],["Quando", h.when],
            ["Como", h.how],["Quanto", h.howMuch],
            ["Próximo passo", h.nextStep],
          ];
          fields.forEach(([k,v])=>{
            if(!v) return;
            const line = doc.splitTextToSize(`${k}: ${v}`, W-2*M-12);

  // ========= EXPORT DOCX =========
  async function exportRelDOCX(){
    if(relSelected.length!==1) return;

  function move(id, dir) {
    const opp = opps.find(o=>o.id===id);
    const idx = STAGES.findIndex(s=>s.id===opp.stage);
    const ni  = idx+dir;
    if (ni<0||ni>=STAGES.length) return;
    const u = {...opp, stage:STAGES[ni].id};
    setAndSave(opps.map(o=>o.id===id?u:o));
    setSel(u);
  }

    a.href=url; a.download="crm-backup.json"; a.click();

  async function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const XLSX = window.XLSX;
    if (!XLSX) { alert("Aguarde o carregamento do leitor de planilhas."); return; }
    const fname = file.name.toLowerCase();
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const sheetName = wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true});

    // Detectar tipo de planilha pelo nome do arquivo e conteúdo
    const isClientes = fname.includes("cadastro") || fname.includes("cliente") || sheetName.toLowerCase().includes("cliente");
    const isForecast = fname.includes("forecast") || sheetName.toLowerCase().includes("forecast") || sheetName.toLowerCase().includes("pipeline");
    const isBudget   = fname.includes("budget") || sheetName.toLowerCase().includes("budget");

    if (isClientes) {
      // Importar clientes — mesmo parser do botão dedicado
      const dict = {};
      for (let i=1; i<rows.length; i++) {
        const row = rows[i]; if (!row || !row.length) continue;
        const cliente=String(row[3]||"").trim(), apelido=String(row[4]||"").trim()||cliente;
        if (!apelido) continue;
        if (!dict[apelido]) dict[apelido]={alias:apelido,name:cliente,cnpj:String(row[0]||"").trim(),address:String(row[5]||"").trim(),cep:String(row[6]||"").trim(),city:String(row[7]||"").trim(),state:String(row[8]||"").trim(),region:String(row[9]||"").trim(),segment:String(row[10]||"").trim(),contacts:[]};
        const contato=String(row[12]||"").trim();
        if(contato) dict[apelido].contacts.push({name:contato,role:String(row[13]||"").trim(),tel:String(row[14]||"").trim(),cel:String(row[15]||"").trim(),email:String(row[16]||"").trim()});
      }
      const list = Object.values(dict);
      saveClients(list);
      alert(list.length+" clientes importados com sucesso!");
    } else if (isForecast) {
      // Importar forecast — colunas: NEGOCIAÇÃO|RESP.|CUSTOMER|SUPPLIER|DESCRIPTION|AMOUNT|UF|Confidence|...
      const newOpps = [];
      for (let i=1; i<rows.length; i++) {
        const row = rows[i]; if (!row || !row.length || !row[2]) continue;
        newOpps.push({
          id: Date.now().toString()+i,
          negType: String(row[0]||"D").trim(),
          resp: String(row[1]||"").trim(),
          company: String(row[2]||"").trim(),
          supplier: String(row[3]||"").trim(),
          title: String(row[4]||"").trim(),
          value: Number(row[5])||0,
          stage: "qualificacao",
          priority: "media",
          forecastColor: "none",
          nextAction: String(row[12]||"").trim(),
          nextDate: "", nextTime: "",
          contact: String(row[13]||"").trim(),
          notes: "",
          months: {},
          history: [], visitHistory: [],
          createdAt: new Date().toISOString().slice(0,10)
        });
      }
      if(window.confirm("Importar "+newOpps.length+" oportunidades? Isso substituirá o pipeline atual.")) {
        setAndSave(newOpps);
        alert(newOpps.length+" oportunidades importadas!");
      }
    } else {
      alert("Planilha nao reconhecida. Nomeie com clientes, forecast ou budget. Arquivo: "+file.name);
    }
    e.target.value="";
  }

  async function chat(msg) {
    const m = msg||aiInput;
    if (!m.trim()||aiLoading) return;
    if (!apiKey) { setKeyDraft(""); setShowKey(true); return; }
    const ctx = sel
      ? `Oportunidade: "${sel.title}" | Empresa: ${sel.company} | Etapa: ${STAGES.find(s=>s.id===sel.stage)?.label} | Valor: R$ ${(sel.value||0).toLocaleString("pt-BR")} | Próxima ação: ${sel.nextAction} | Notas: ${sel.notes}`
      : "Nenhuma oportunidade selecionada.";
    const msgs = [...aiMsgs, {role:"user",content:m}];
    setAiMsgs(msgs);
    setAiInput("");
    setAiLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":(apiKey||"").trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:SYS_PROMPT,
          messages:[...msgs.slice(0,-1),{role:"user",content:`${m}\n\nContexto: ${ctx}`}]
        })
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error.message);
      const reply = d.content?.map(c=>c.text||"").join("")||"Sem resposta.";
      setAiMsgs([...msgs,{role:"assistant",content:reply}]);
    } catch(err) {
      setAiMsgs([...msgs,{role:"assistant",content:`Erro: ${err.message}`}]);
    }
    setAiLoading(false);
  }

        {[["kanban","🗂","Pipeline"],["tasks","✓","Tarefas"],["clients","👥","Clientes"],["relatorio","📋","Relatório"],["posvendas","✅","Pós-venda"],["budget","💰","Budget"],["orcamentos","📝","Orçamentos"],["projetos","⚙","Projetos"],["intel","🧠","Radar"]].map(([v,icon,label])=>(
          <button key={v} className={`crm-sidebar-btn${view===v?" active":""}`} onClick={()=>{setView(v);if(v!=="kanban")setSel(null);}}>
            <span style={{fontSize:"15px",flexShrink:0,lineHeight:1}}>{icon}</span>
            <span className="sb-label">{label}</span>
            {v==="tasks"&&tasks.filter(t=>!t.done&&t.date===today).length>0&&<span className="sb-badge">{tasks.filter(t=>!t.done&&t.date===today).length}</span>}
            {v==="intel"&&clientsData.filter(c=>c.monitorar_pesquisa==="SIM").length>0&&<span className="sb-badge" style={{background:"#2563EB"}}>{clientsData.filter(c=>c.monitorar_pesquisa==="SIM").length}</span>}
          </button>
        ))}
        <div style={{flex:1}}/>
        <button className="crm-sidebar-btn" onClick={()=>setShowSettings(true)}>
          <span style={{fontSize:"15px",flexShrink:0}}>⚙</span>
          <span className="sb-label">Configurações</span>
        </button>
        <button className="crm-sidebar-btn" onClick={()=>setShowProfile(true)} style={{marginBottom:"4px"}}>
          <div style={{width:"26px",height:"26px",borderRadius:"50%",background:"var(--sinuelo)",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {profile.photo?<img src={profile.photo} style={{width:"26px",height:"26px",objectFit:"cover"}} alt=""/>
            :<span style={{fontSize:"9px",fontWeight:700,color:"#fff"}}>{(profile.userName||"EF").split(" ").map(w=>w[0]).slice(0,2).join("")}</span>}
          </div>
          <span className="sb-label">{profile.userName||"Usuário"}</span>
        </button>
      </div>

      {/* LAYOUT WRAPPER */}
      <div className="crm-layout">

      {/* MÉTRICAS */}
      <div className="crm-metrics">
        {[
          {l:"Pipeline total", v:`R$ ${(totalVal/1000).toFixed(0)}k`},
          {l:"Pós-venda",      v:`R$ ${(wonVal/1000).toFixed(0)}k`},
          {l:"Oportunidades",  v:opps.length},
          {l:"Alta prioridade",v:highPri, warn:highPri>0},
          {l:"Atrasados",      v:overdue, warn:overdue>0},
        ].map((m,i)=>(
          <div key={i} className="crm-metric">
            <span className={`crm-metric-val${m.warn?" warn":""}`}>{m.v}</span>
            <span className="crm-metric-lbl">{m.l}</span>
          </div>
        ))}
      </div>

      {/* BARRA DE TÍTULO DA ABA */}
      <div style={{position:"relative",borderBottom:"1px solid var(--border)",background:"var(--bg-header)",padding:"8px 20px",display:"flex",alignItems:"center",justifyContent:"center",minHeight:"38px"}}>
        <span style={{fontSize:"13px",fontWeight:700,letterSpacing:".12em",color:"var(--text-primary)",textTransform:"uppercase",textAlign:"center"}}>
          {{"kanban":"Pipeline / Kanban","tasks":"Tarefas","clients":"Clientes","relatorio":"Relatório","posvendas":"Pós-venda","budget":"Budget / Metas","orcamentos":"Orçamentos","projetos":"Projetos","intel":"🧠 Radar de Mercado"}[view]||view.toUpperCase()}
        </span>
        <span style={{position:"absolute",right:"20px",fontSize:"13px",fontWeight:700,letterSpacing:".08em",color:"var(--text-primary)",opacity:.18,userSelect:"none",pointerEvents:"none"}}>
          CRM-FORECAST
        </span>
      </div>

      {/* CONTENT */}
      <div className="crm-content">
      {/* CORPO (mantido para compatibilidade) */}
      <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>

        {/* KANBAN */}
        {view==="kanban" && (
          <div style={{flex:1,minWidth:0}}>
            {/* Toolbar: toggle kanban/linhas + filtros */}
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"10px",flexWrap:"wrap"}}>
              <div style={{display:"flex",gap:"2px",background:"rgba(128,128,128,0.12)",borderRadius:"8px",padding:"3px"}}>
                {[["kanban","⊞ Kanban"],["lines","≡ Linhas"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setPipeView(v)} style={{padding:"4px 12px",fontSize:"11px",borderRadius:"6px",border:"none",cursor:"pointer",background:pipelineView===v?"#8C1A1A":"transparent",color:pipelineView===v?"#fff":"var(--text-secondary)",fontWeight:pipelineView===v?700:400,transition:"all .15s"}}>{l}</button>
                ))}
              </div>
              {pipelineView==="lines" && (
                <>
                  <select value={forecastFilter} onChange={e=>setForecastFilter(e.target.value)} style={{fontSize:"11px",padding:"4px 8px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-input)",color:"var(--text-primary)",cursor:"pointer"}}>
                    <option value="todos">Todas etapas</option>
                    {STAGES.map(s=><option key={s.id} value={s.id}>{s.tag} {s.label}</option>)}
                    <option value="yellow">🟡 Devemos ao cliente</option>
                    <option value="red">🔴 Em negociação ativa</option>
                    <option value="gray">⚫ Perdidos</option>
                  </select>
                  <span style={{fontSize:"11px",color:"var(--text-muted)",marginLeft:"4px"}}>
                    {(()=>{
                      const filtered = opps.filter(o=>forecastFilter==="todos"||o.stage===forecastFilter||o.forecastColor===forecastFilter);
                      const tot = filtered.reduce((s,o)=>s+(o.value||0),0);
                      return `${filtered.length} opp · R$ ${tot.toLocaleString("pt-BR")}`;
                    })()}
                  </span>
                </>
              )}
            </div>

            {/* KANBAN */}
            {pipelineView==="kanban" && (
              <div style={{overflowX:"auto"}}>
                <div style={{display:"flex",gap:"8px",paddingBottom:"8px",minWidth:"max-content"}}>
                  {STAGES.map(stage=>{
                    const cols   = visibleOpps.filter(o=>o.stage===stage.id);
                    const colVal = cols.reduce((s,o)=>s+(o.value||0),0);
                    return (
                      <div key={stage.id} style={{width:"196px",flexShrink:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"6px"}}>
                          <span style={{fontSize:"10px",fontWeight:700,padding:"2px 8px",borderRadius:"10px",background:stage.color+"20",color:stage.color}}>{stage.tag}</span>
                          <span style={{fontSize:"12px",fontWeight:600,flex:1,color:"var(--text-primary)",letterSpacing:"-.01em"}}>{stage.label}</span>
                          <span style={{fontSize:"11px",color:"var(--text-muted)",fontWeight:500}}>{cols.length}</span>
                        </div>
                        {colVal>0 && <div style={{fontSize:"11px",color:"var(--text-muted)",marginBottom:"5px"}}>R$ {(colVal/1000).toFixed(0)}k</div>}
                        <div style={{display:"flex",flexDirection:"column",gap:"6px",minHeight:"60px"}}>
                          {cols.map(opp=>{
                            const fc = opp.forecastColor;
                            const cardBg = fc==="yellow"?"rgba(255,255,153,0.35)":fc==="red"?"rgba(255,0,0,0.18)":fc==="gray"?"rgba(217,217,217,0.35)":"var(--bg-header)";
                            const cardBorder = fc==="yellow"?"#FFFF99":fc==="red"?"#FF0000":fc==="gray"?"#D9D9D9":stage.color;
                            return (
                            <div key={opp.id} onClick={()=>setSel(opp===sel?null:opp)}
                              style={{background:sel?.id===opp.id?"var(--accent-soft)":cardBg,border:`1px solid ${sel?.id===opp.id?"var(--accent)":fc!=="none"?cardBorder:"var(--border)"}`,borderLeft:`3px solid ${cardBorder}`,borderRadius:"0 8px 8px 0",padding:"10px 11px 10px 10px",cursor:"pointer",transition:"box-shadow .15s,border-color .15s"}}
                              onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,.08)"}
                              onMouseLeave={e=>e.currentTarget.style.boxShadow=""}>
                              {/* Título */}
                              <div style={{fontSize:"12px",fontWeight:600,marginBottom:"2px",lineHeight:1.3,color:"var(--text-primary)"}}>{opp.title.slice(0,55)}{opp.title.length>55?"…":""}</div>
                              {/* Cliente */}
                              <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-secondary)",marginBottom:"6px"}}>{opp.company}</div>
                              {/* Tags */}
                              <div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"7px"}}>
                                {opp.supplier&&<span style={{fontSize:"9px",padding:"1px 6px",borderRadius:"5px",background:"var(--bg-card2)",color:"var(--text-muted)",border:"1px solid var(--border2)"}}>{opp.supplier.slice(0,12)}</span>}
                                {opp.negType&&opp.negType!=="D"&&<span style={{fontSize:"9px",padding:"1px 6px",borderRadius:"5px",background:opp.negType==="S"?"rgba(37,99,235,.1)":"rgba(220,38,38,.1)",color:opp.negType==="S"?"var(--accent)":"var(--sinuelo)",border:"none",fontWeight:600}}>{opp.negType==="S"?"Serviço":"Revenda"}</span>}
                              </div>
                              {/* Rodapé: valor + data + responsável */}
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:"6px"}}>
                                <span style={{fontSize:"12px",fontWeight:700,color:opp.value>0?"var(--text-primary)":"var(--text-muted)"}}>
                                  {opp.value>0?`R$ ${(opp.value/1000).toFixed(0)}k`:"—"}
                                </span>
                                <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                                  {opp.nextDate&&<span style={{fontSize:"9px",color:opp.nextDate<today?"#EF4444":"var(--text-muted)"}}>📅 {opp.nextDate.slice(5).split("-").reverse().join("/")}</span>}
                                  <div style={{width:"20px",height:"20px",borderRadius:"50%",background:`hsl(${(opp.resp||"EF").charCodeAt(0)*7%360},50%,45%)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} title={opp.resp}>
                                    <span style={{fontSize:"8px",fontWeight:700,color:"#fff"}}>{(opp.resp||"EF").slice(0,2).toUpperCase()}</span>
                                  </div>
                                </div>
                              </div>
                              {opp.nextDate&&opp.nextDate<today && <div style={{fontSize:"9px",color:"#EF4444",marginTop:"4px",fontWeight:600}}>⚠ Atrasado</div>}
                              {(()=>{const txt=(opp.nextAction||"").split("\n").find(l=>l.trim())||"";return txt?<div style={{fontSize:"9px",color:"var(--text-muted)",marginTop:"4px",lineHeight:1.3,borderTop:"1px solid var(--border2)",paddingTop:"4px"}}>{txt.slice(0,55)}{txt.length>55?"…":""}</div>:null;})()}
                            </div>
                          );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* LINHAS — formato Forecast planilha */}
            {pipelineView==="lines" && (
              <div style={{overflowX:"auto"}}>
                {(()=>{
                  // Gerar colunas de tempo dinâmicas: mês atual, M+1, M+2, semestre
                  const now = new Date();
                  const MONTH_PT = ["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
                  const semLabel = now.getMonth()<6 ? `1S/${now.getFullYear()}` : `2S/${now.getFullYear()}`;
                  const timeCols = [
                    { key:`m0`, label: MONTH_PT[now.getMonth()],       month: now.getMonth(),   year: now.getFullYear(),   isSem:false },
                    { key:`m1`, label: MONTH_PT[(now.getMonth()+1)%12], month:(now.getMonth()+1)%12, year: now.getMonth()===11?now.getFullYear()+1:now.getFullYear(), isSem:false },
                    { key:`m2`, label: MONTH_PT[(now.getMonth()+2)%12], month:(now.getMonth()+2)%12, year: now.getMonth()>=10?now.getFullYear()+1:now.getFullYear(), isSem:false },
                    { key:`sem`, label: semLabel, month:-1, year: now.getFullYear(), isSem:true },
                  ];
                  function toggleMonth(e, opp, key){
                    e.stopPropagation();
                    const cur = opp.months||{};
                    const isConf100 = opp.stage==="fechado"||opp.stage==="po_recebido";
                    const alreadyMarked = cur[key];
                    const countMarked = Object.values(cur).filter(Boolean).length;
                    // Se já está marcado: desmarca
                    if(alreadyMarked){ updateOpp({...opp,months:{...cur,[key]:false}}); return; }
                    // Se conf=100%: pode marcar vários
                    if(isConf100){ updateOpp({...opp,months:{...cur,[key]:true}}); return; }
                    // Caso contrário: máx 1 mês — substitui seleção anterior
                    updateOpp({...opp, months:{[key]:true}});
                  }
                  let rows = [...visibleOpps];
                  if(forecastFilter!=="todos") rows = rows.filter(o=>o.stage===forecastFilter||o.forecastColor===forecastFilter);
                  rows.sort((a,b)=>{
                    const stageOrder = ["prospeccao","qualificacao","diagnostico","proposta","neg","po_recebido","fechado"];
                    let av,bv;
                    if(sortCol==="stage") { av=stageOrder.indexOf(a.stage); bv=stageOrder.indexOf(b.stage); }
                    else if(sortCol==="value") { av=a.value||0; bv=b.value||0; }
                    else if(sortCol==="confidence") { av=a.confidence||0; bv=b.confidence||0; }
                    else { av=(a[sortCol]||"").toString().toLowerCase(); bv=(b[sortCol]||"").toString().toLowerCase(); }
                    if(av<bv) return sortDir==="asc"?-1:1;
                    if(av>bv) return sortDir==="asc"?1:-1;
                    return 0;
                  });
                  return (
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px",minWidth:"1100px",tableLayout:"fixed"}}>
                      <thead>
                        <tr style={{background:"var(--bg-card2)",position:"sticky",top:0,zIndex:5}}>
                          {(settings.forecastCols||[]).filter(c=>c.visible&&!["notes","contact"].includes(c.key)).map(col=>(
                            <th key={col.key} onClick={()=>{ if(sortCol===col.key){setSortDir(d=>d==="asc"?"desc":"asc");}else{setSortCol(col.key);setSortDir("desc");} }}
                              style={{padding:"7px 8px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:"10px",borderBottom:`1px solid var(--border)`,cursor:"pointer",whiteSpace:"nowrap",width:col.width||"auto",userSelect:"none"}}>
                              {col.label}{sortCol===col.key?(sortDir==="asc"?" ↑":" ↓"):""}
                            </th>
                          ))}
                          {/* Colunas de tempo */}
                          {timeCols.map(tc=>(
                            <th key={tc.key} style={{padding:"7px 6px",textAlign:"center",color:tc.isSem?"#5DCAA5":"var(--text-secondary)",fontWeight:600,fontSize:"10px",borderBottom:`1px solid var(--border)`,width:"44px",whiteSpace:"nowrap",borderLeft:`1px solid var(--border2)`}}>
                              {tc.label}
                            </th>
                          ))}
                          {[["nextDate","FOLLOW-UP","180px"],["contact","CONTATOS","90px"]].map(([key,label,w])=>{
                            const col = (settings.forecastCols||[]).find(c=>c.key===key||c.key===(key==="nextDate"?"notes":key));
                            if(col && !col.visible) return null;
                            const colW = col?.width || w;
                            const colL = col?.label || label;
                            return (
                              <th key={key} onClick={()=>{ if(sortCol===key){setSortDir(d=>d==="asc"?"desc":"asc");}else{setSortCol(key);setSortDir("desc");} }}
                                style={{padding:"7px 8px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:"10px",borderBottom:`1px solid var(--border)`,cursor:"pointer",whiteSpace:"nowrap",width:colW,userSelect:"none",borderLeft:`1px solid var(--border2)`}}>
                                {colL}{sortCol===key?(sortDir==="asc"?" ↑":" ↓"):""}
                              </th>
                            );
                          })}
                          <th style={{padding:"7px 6px",width:"28px"}}></th>
                        </tr>
                        {/* Linha de totais por coluna de tempo */}
                        <tr style={{background:"var(--bg-card2)",borderBottom:`2px solid var(--border)`}}>
                          <td colSpan={7} style={{padding:"4px 8px",fontSize:"10px",color:"var(--text-muted)",fontStyle:"italic"}}>Total previsto →</td>
                          {timeCols.map(tc=>{
                            const tot = rows.filter(o=>(o.months||{})[tc.key]).reduce((s,o)=>s+(o.value||0),0);
                            const cnt = rows.filter(o=>(o.months||{})[tc.key]).length;
                            return (
                              <td key={tc.key} style={{padding:"4px 6px",textAlign:"center",fontSize:"9px",color:tc.isSem?"#5DCAA5":"var(--text-accent)",fontWeight:700,borderLeft:`1px solid var(--border2)`}}>
                                {cnt>0?<><div>{cnt} opp</div><div>R${(tot/1000).toFixed(0)}k</div></>:"—"}
                              </td>
                            );
                          })}
                          <td colSpan={3}></td>
                        </tr>
                      </thead>
                      <tbody>
                        {rows.map(opp=>{
                          const stage = STAGES.find(s=>s.id===opp.stage);
                          const rowBg = opp.forecastColor==="yellow"
                            ? "rgba(255,255,153,0.35)"
                            : opp.forecastColor==="red"
                            ? "rgba(255,0,0,0.18)"
                            : opp.forecastColor==="gray"
                            ? "rgba(217,217,217,0.3)"
                            : "transparent";
                          const dotColor = opp.forecastColor==="yellow"?"#CCCC00":opp.forecastColor==="red"?"#FF0000":opp.forecastColor==="gray"?"#D9D9D9":stage?.color||"#888";
                          const confPct = opp.stage==="fechado"?"100%":opp.stage==="po_recebido"?"90%":opp.stage==="neg"?"80%":opp.stage==="proposta"?"50%":opp.stage==="diagnostico"?"30%":opp.stage==="qualificacao"||opp.stage==="prospeccao"?"10%":"—";
                          const months = opp.months||{};
                          return (
                            <tr key={opp.id} onClick={()=>setSel(opp===sel?null:opp)}
                              style={{background:sel?.id===opp.id?"rgba(140,26,26,0.12)":rowBg,borderBottom:`2px solid var(--border)`,cursor:"pointer",transition:"background .1s"}}>
                              <td style={{padding:"6px 8px",textAlign:"center",width:(settings.forecastCols||[]).find(c=>c.key==="neg")?.width||"36px"}}>
                                <span style={{fontSize:"11px",fontWeight:700,color:dotColor,background:dotColor+"18",borderRadius:"4px",padding:"1px 5px"}}>{opp.negType||"D"}</span>
                              </td>
                              <td style={{padding:"6px 8px",color:"var(--text-secondary)",whiteSpace:"nowrap",fontSize:"11px",width:(settings.forecastCols||[]).find(c=>c.key==="resp")?.width||"52px"}}>{opp.resp||"EF"}</td>
                              <td style={{padding:"6px 8px",fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",width:(settings.forecastCols||[]).find(c=>c.key==="company")?.width||"110px"}}>{opp.company}</td>
                              <td style={{padding:"6px 8px",color:"var(--text-secondary)",whiteSpace:"nowrap",fontSize:"11px",width:(settings.forecastCols||[]).find(c=>c.key==="supplier")?.width||"80px"}}>{opp.supplier||"—"}</td>
                              <td style={{padding:"6px 8px",color:"var(--text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",width:(settings.forecastCols||[]).find(c=>c.key==="title")?.width||"150px"}}>{opp.title}</td>
                              <td style={{padding:"6px 8px",color:"var(--text-accent)",fontWeight:600,whiteSpace:"nowrap",textAlign:"right",fontSize:"11px",width:(settings.forecastCols||[]).find(c=>c.key==="value")?.width||"auto"}}>
                                {opp.value?`R$ ${opp.value.toLocaleString("pt-BR")}`:"—"}
                              </td>
                              <td style={{padding:"6px 8px",width:(settings.forecastCols||[]).find(c=>c.key==="stage")?.width||"auto"}}>
                                <span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"8px",background:(stage?.color||"#888")+"22",color:stage?.color||"#888",fontWeight:700}}>{confPct}</span>
                              </td>
                              {/* Colunas de tempo — clicáveis */}
                              {timeCols.map(tc=>{
                                const marked = !!months[tc.key];
                                return (
                                  <td key={tc.key} onClick={e=>toggleMonth(e,opp,tc.key)}
                                    style={{padding:"6px 4px",textAlign:"center",borderLeft:`1px solid var(--border2)`,cursor:"pointer"}}>
                                    {marked
                                      ? <div style={{width:"18px",height:"18px",borderRadius:"4px",background:tc.isSem?"#0F6E56":"#8C1A1A",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                          <span style={{color:"#fff",fontSize:"10px",fontWeight:700,lineHeight:1}}>x</span>
                                        </div>
                                      : <div style={{width:"18px",height:"18px",borderRadius:"4px",border:`1px solid var(--border)`,margin:"0 auto"}}/>
                                    }
                                  </td>
                                );
                              })}
                              {(settings.forecastCols||[]).find(c=>c.key==="notes")?.visible!==false&&(
                                <td style={{padding:"6px 8px",color:"var(--text-secondary)",fontSize:"11px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",borderLeft:`1px solid var(--border2)`,width:(settings.forecastCols||[]).find(c=>c.key==="notes")?.width||"220px"}}>
                                  {(()=>{const lines=(opp.nextAction||"").split("\n").filter(l=>l.trim());return lines.length?lines[0]:"—";})()}
                                </td>
                              )}
                              {(settings.forecastCols||[]).find(c=>c.key==="contact")?.visible!==false&&(
                                <td style={{padding:"6px 8px",color:"var(--text-secondary)",fontSize:"11px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",width:(settings.forecastCols||[]).find(c=>c.key==="contact")?.width||"90px"}}>{opp.contact||"—"}</td>
                              )}
                              <td style={{padding:"6px 8px"}}>
                                <div style={{display:"flex",gap:"4px"}}>
                                  <button onClick={e=>{e.stopPropagation();openVisita(opp);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-blue)",fontSize:"12px",padding:"2px"}} title="Registrar visita">📝</button>
                                  <button onClick={e=>{e.stopPropagation();openAI(opp);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"12px",padding:"2px"}} title="IA">⚡</button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  );
                })()}
                {opps.length===0 && <div style={{textAlign:"center",padding:"30px 0",color:"var(--text-muted)",fontSize:"13px"}}>Nenhuma oportunidade cadastrada</div>}
              </div>
            )}
          </div>
        )}

        {/* FUNIL */}



        {/* ===== TAREFAS ===== */}
        {view==="tasks" && (
          <div style={{flex:1,minWidth:0}}>
            {/* Toolbar */}
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"12px",flexWrap:"wrap"}}>
              <div style={{fontSize:"15px",fontWeight:700,color:"var(--text-primary)",flex:1}}>
                Tarefas
                {tasks.filter(t=>!t.done&&t.date===today).length>0&&
                  <span style={{marginLeft:"8px",fontSize:"11px",padding:"2px 8px",borderRadius:"8px",background:"rgba(226,75,74,0.15)",color:"#E24B4A",fontWeight:600}}>{tasks.filter(t=>!t.done&&t.date===today).length} para hoje</span>}
              </div>
              <input value={taskSearch} onChange={e=>setTaskSearch(e.target.value)} placeholder="Buscar tarefa..."
                style={{...inp,maxWidth:"200px"}}/>

              <button onClick={()=>{setTaskForm(emptyTask);setTaskModal(true);}} style={{padding:"5px 14px",fontSize:"12px",borderRadius:"6px",border:"1px solid #8C1A1A",background:"rgba(140,26,26,0.2)",color:"var(--text-accent)",cursor:"pointer",fontWeight:600}}>+ Nova tarefa</button>
            </div>

            {/* Alerta campaninha */}
            {bellAlert&&(
              <div style={{background:"rgba(239,159,39,0.15)",border:"1px solid #EF9F27",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"20px"}}>🔔</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"13px",fontWeight:600,color:"#EF9F27"}}>Tarefa em {notifSettings.minutesBefore} min ou menos!</div>
                  <div style={{fontSize:"12px",color:"var(--text-primary)"}}>{bellAlert.title} — {bellAlert.company} · {bellAlert.date} {bellAlert.time}</div>
                </div>
                <button onClick={()=>setBellAlert(null)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"16px"}}>✕</button>
              </div>
            )}

            {/* Configurações de notificação */}
            <div style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",gap:"16px",alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:"11px",color:"var(--text-secondary)",fontWeight:600}}>🔔 Notificações:</span>
              <label style={{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"var(--text-secondary)",cursor:"pointer"}}>
                <input type="checkbox" checked={notifSettings.bellEnabled} onChange={e=>saveNotifSettings({...notifSettings,bellEnabled:e.target.checked})}/>
                Campaninha ativa
              </label>
              <label style={{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"var(--text-secondary)"}}>
                Alertar com
                <input type="number" value={notifSettings.minutesBefore} onChange={e=>saveNotifSettings({...notifSettings,minutesBefore:Number(e.target.value)||60})}
                  style={{...inp,width:"52px",fontSize:"11px",padding:"2px 6px"}} min="5" max="1440"/>
                min de antecedência
              </label>
            </div>

            {/* Lista de tarefas */}
            {(()=>{
              const tFiltered = tasks
                .filter(t=>!taskSearch||t.title.toLowerCase().includes(taskSearch.toLowerCase())||t.company?.toLowerCase().includes(taskSearch.toLowerCase()))
                .sort((a,b)=>{
                  if(a.done!==b.done) return a.done?1:-1;
                  const da=(a.date||"9999")+(a.time||"");
                  const db=(b.date||"9999")+(b.time||"");
                  return da.localeCompare(db);
                });
              const groups = {};
              tFiltered.forEach(t=>{
                const key = t.done?"✓ Concluídas":(t.date===today?"📅 Hoje":t.date<today&&t.date?"⚠ Atrasadas":"📆 Próximas");
                if(!groups[key]) groups[key]=[];
                groups[key].push(t);
              });
              if(tFiltered.length===0) return <div style={{textAlign:"center",padding:"40px",color:"var(--text-muted)",fontSize:"13px"}}>Nenhuma tarefa cadastrada. Clique em "+ Nova tarefa" para começar.</div>;
              return Object.entries(groups).map(([grp,gtasks])=>(
                <div key={grp} style={{marginBottom:"14px"}}>
                  <div style={{fontSize:"11px",fontWeight:700,color:"var(--text-secondary)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"6px",paddingBottom:"4px",borderBottom:"1px solid var(--border2)"}}>{grp} ({gtasks.length})</div>
                  {gtasks.map(t=>{
                    const isLate = t.date&&t.date<today&&!t.done;
                    const isToday2 = t.date===today;
                    const priC = {alta:"#E24B4A",media:"#EF9F27",baixa:"#1D9E75"}[t.priority]||"#888";
                    const opp = opps.find(o=>o.id===t.oppId);
                    return (
                      <div key={t.id} style={{background:"var(--bg-card)",border:`1px solid ${isLate?"#E24B4A33":isToday2?"#EF9F2733":"var(--border)"}`,borderLeft:`3px solid ${isLate?"#E24B4A":isToday2?"#EF9F27":priC}`,borderRadius:"8px",padding:"10px 12px",marginBottom:"6px",opacity:t.done?.6:1}}>
                        <div style={{display:"flex",alignItems:"flex-start",gap:"10px"}}>
                          <input type="checkbox" checked={t.done} onChange={()=>toggleTaskDone(t.id)} style={{marginTop:"2px",cursor:"pointer",flexShrink:0}}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"2px",flexWrap:"wrap"}}>
                              <span style={{fontSize:"13px",fontWeight:600,color:t.done?"var(--text-muted)":"var(--text-primary)",textDecoration:t.done?"line-through":"none"}}>{t.title}</span>
                              <span style={{fontSize:"10px",padding:"1px 6px",borderRadius:"6px",background:priC+"22",color:priC,fontWeight:600}}>{t.priority}</span>
                              {isLate&&<span style={{fontSize:"10px",color:"#E24B4A",fontWeight:600}}>ATRASADO</span>}
                              {t.result==="concluida"&&<span style={{fontSize:"10px",padding:"1px 6px",borderRadius:"6px",background:"rgba(29,158,117,0.15)",color:"#1D9E75",fontWeight:600}}>✓ Concluída</span>}
                              {t.result==="cancelada"&&<span style={{fontSize:"10px",padding:"1px 6px",borderRadius:"6px",background:"rgba(226,75,74,0.15)",color:"#E24B4A",fontWeight:600}}>✕ Cancelada</span>}
                              {t.result==="postergada"&&<span style={{fontSize:"10px",padding:"1px 6px",borderRadius:"6px",background:"rgba(239,159,39,0.15)",color:"#EF9F27",fontWeight:600}}>⏩ Postergada{t.postponedTo?" → "+t.postponedTo:""}</span>}
                            </div>
                            <div style={{display:"flex",gap:"10px",fontSize:"11px",color:"var(--text-secondary)",flexWrap:"wrap"}}>
                              {t.company&&<span>🏭 {t.company}</span>}
                              {t.date&&<span>📅 {t.date}{t.time?" "+t.time:""}</span>}
                              {opp&&<span style={{color:"var(--text-blue)",cursor:"pointer"}} onClick={()=>{setSel(opp);setView("kanban");}}>🔗 {opp.title.slice(0,30)}</span>}
                            </div>
                            {t.notes&&<div style={{fontSize:"11px",color:"var(--text-secondary)",marginTop:"4px",lineHeight:1.4}}>{t.notes}</div>}
                            {t.cancelReason&&<div style={{fontSize:"11px",color:"#E24B4A",marginTop:"2px"}}>Motivo: {t.cancelReason}</div>}
                            {(t.history||[]).length>1&&(
                              <div style={{marginTop:"4px",borderTop:"1px solid var(--border2)",paddingTop:"3px"}}>
                                {(t.history||[]).map((h,hi)=>(
                                  <div key={hi} style={{fontSize:"10px",color:"var(--text-muted)"}}>
                                    {h.date} · <span style={{color:{concluida:"#1D9E75",cancelada:"#E24B4A",postergada:"#EF9F27"}[h.status]||"var(--text-secondary)"}}>{h.status}</span>
                                    {h.postponedTo&&` → ${h.postponedTo}`}{h.cancelReason&&` — ${h.cancelReason}`}
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                          <div style={{display:"flex",gap:"4px",flexShrink:0}}>
                            {!t.done&&<button onClick={()=>openTaskResult(t)} style={{background:"none",border:"1px solid var(--border)",borderRadius:"4px",cursor:"pointer",color:"var(--text-secondary)",fontSize:"11px",padding:"2px 7px"}} title="Registrar resultado">📋</button>}
                            <button onClick={()=>delTask(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"13px",padding:"2px"}}>✕</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ));
            })()}

            {/* MODAL NOVA TAREFA */}
            {taskModal&&(
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:60}}>
                <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"12px",padding:"20px",width:"420px",maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                    <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)"}}>Nova tarefa</div>
                    <button onClick={()=>setTaskModal(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"18px"}}>✕</button>
                  </div>
                  <div style={{marginBottom:"8px"}}>
                    <label style={lbl}>Título *</label>
                    <input value={taskForm.title} onChange={e=>setTaskForm({...taskForm,title:e.target.value})} style={inp} placeholder="Ex: Visita Caterpillar, Enviar proposta Norbar..."/>
                  </div>
                  <div style={{marginBottom:"8px"}}>
                    <label style={lbl}>Cliente / Empresa</label>
                    <input value={taskForm.company} onChange={e=>setTaskForm({...taskForm,company:e.target.value})} style={inp} placeholder="Ex: Caterpillar"/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
                    <div>
                      <label style={lbl}>Data</label>
                      <input type="date" value={taskForm.date} onChange={e=>setTaskForm({...taskForm,date:e.target.value})} style={inp}/>
                    </div>
                    <div>

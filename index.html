// ─── VIEW: BUDGET ────────────────────────────────────────────
function ViewBudget({ session, isGestor }) {
  const CLIENTS_COL = ['CATERPILLAR','HONDA','HYUNDAI','JACTO','RUMO','EMBRAER','AÇÚCAR & ÁLCOOL','IMPLEMENTOS AGRÍCOLAS'];
  const SUPPLIERS = {
    TT:  ['BOSCH IW','BOSCH PT','HS-T','LÜBBERING','MILWAUKEE','MOMENTO','NORBAR','ENERPAC','PANASONIC','STAHLWILLE','STURTEVANT','3ARM'],
    REP: ['BOSCH IW (REP)','BOSCH REXROTH','STURTEVANT (REP)','OUTROS'],
    SV:  ['SERVIÇOS','KISTLER','SCHATZ'],
  };
  const ALL_SUPPS = [].concat(SUPPLIERS.TT, SUPPLIERS.REP, SUPPLIERS.SV);

  const [budget,  setBudget]  = useState(function(){ return load(KEYS.budget, {}); });
  const [selCli,  setSelCli]  = useState(null);   // perfil do cliente
  const [editing, setEditing] = useState(null);   // {sup, cli} sendo editado
  const [editVal, setEditVal] = useState({target:'', realiz:''});
  const [selSupp, setSelSupp] = useState(null);   // supplier dentro do perfil — abre gráfico

  function saveB(b) { setBudget(b); save(KEYS.budget, b); }

  // Valor de uma célula
  function cell(sup, cli) {
    return (budget[sup] && budget[sup][cli]) ? budget[sup][cli] : {realiz:0, target:0};
  }

  function startEdit(sup, cli) {
    const c = cell(sup, cli);
    setEditing({sup, cli});
    setEditVal({target:c.target||'', realiz:c.realiz||''});
  }

  function saveEdit() {
    if (!editing) return;
    const {sup, cli} = editing;
    const nb = JSON.parse(JSON.stringify(budget));
    if (!nb[sup]) nb[sup] = {};
    nb[sup][cli] = {
      target: parseFloat(editVal.target)||0,
      realiz: parseFloat(editVal.realiz)||0,
    };
    saveB(nb);
    setEditing(null);
  }

  function importXLSX(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const wb = XLSX.read(ev.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
        const b = {};
        const cliRow = rows[2] || [];
        const cliCols = {};
        cliRow.forEach(function(v,i){ if(v&&typeof v==='string'&&v.trim()&&v.trim()!=='2026') cliCols[v.trim()]=i; });
        for (var ri=5; ri<rows.length; ri++) {
          const row = rows[ri] || [];
          const supp = String(row[1]||'').trim();
          if (!supp || supp==='TOTAL' || supp==='TOTAL D + R') continue;
          b[supp] = b[supp] || {};
          Object.keys(cliCols).forEach(function(cli){
            const ci = cliCols[cli];
            b[supp][cli] = {realiz:parseFloat(row[ci])||0, target:parseFloat(row[ci+1])||0};
          });
        }
        saveB(b);
        alert('Budget importado.');
      } catch(err) { alert('Erro: '+err.message); }
    };
    reader.readAsBinaryString(file);
    e.target.value='';
  }

  // Totais
  const totTarget = ALL_SUPPS.reduce(function(s,sup){
    return s + CLIENTS_COL.reduce(function(ss,cli){ return ss+cell(sup,cli).target; },0);
  },0);
  const totRealiz = ALL_SUPPS.reduce(function(s,sup){
    return s + CLIENTS_COL.reduce(function(ss,cli){ return ss+cell(sup,cli).realiz; },0);
  },0);
  const pctGeral = totTarget>0?Math.round(totRealiz/totTarget*100):0;

  // Para o perfil do cliente: forecast das oportunidades
  const fcOpps = load(KEYS.forecast, []);

  // Gráfico simples em SVG
  function MiniBar(props) {
    var target = props.target;
    var realiz = props.realiz;
    var forecast = props.forecast;
    var w = props.w || 280;
    var h = 120;
    var max = Math.max(target, realiz, forecast, 1);
    var pad = 32;
    var barW = 38;
    var gap  = 20;
    var bars = [
      {v:target,   label:'Target',    color:'#2563EB'},
      {v:forecast, label:'Forecast',  color:'#CA8A04'},
      {v:realiz,   label:'Realizado', color:'#16A34A'},
    ];
    var totalW = bars.length*(barW+gap);
    var startX = (w - totalW) / 2;
    return (
      <svg width={w} height={h+40} style={{overflow:'visible'}}>
        {/* Grid lines */}
        {[0,0.25,0.5,0.75,1].map(function(pct,i){
          var y = pad + (1-pct)*(h-pad);
          return (
            <g key={i}>
              <line x1={0} y1={y} x2={w} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth={1}/>
              <text x={2} y={y+3} fontSize={8} fill="rgba(255,255,255,0.25)">{fmtAmt(max*pct)}</text>
            </g>
          );
        })}
        {bars.map(function(bar,i){
          var x    = startX + i*(barW+gap);
          var barH = max>0 ? Math.max(2,(bar.v/max)*(h-pad)) : 2;
          var y    = pad + (h-pad) - barH;
          var pct  = target>0 ? Math.round(bar.v/target*100) : 0;
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={barH} rx={4} fill={bar.color} opacity={.85}/>
              <text x={x+barW/2} y={y-5} textAnchor="middle" fontSize={9} fill="#fff" fontWeight="600">{fmtAmt(bar.v)}</text>
              <text x={x+barW/2} y={h+pad+6} textAnchor="middle" fontSize={9} fill="rgba(255,255,255,0.5)">{bar.label}</text>
              {bar.label!=='Target' && <text x={x+barW/2} y={h+pad+17} textAnchor="middle" fontSize={8} fill={bar.color}>{pct}%</text>}
            </g>
          );
        })}
      </svg>
    );
  }

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,height:'100%'}}>
      {/* Métricas */}
      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <div className="metric">
          <div className="metric-val" style={{color:'#60A5FA'}}>{fmtAmt(totTarget)}</div>
          <div className="metric-lbl">Meta total {CUR_YEAR}</div>
        </div>
        <div className="metric">
          <div className="metric-val" style={{color:'#4ADE80'}}>{fmtAmt(totRealiz)}</div>
          <div className="metric-lbl">Realizado</div>
        </div>
        <div className="metric">
          <div className="metric-val" style={{color:pctGeral>=100?'#4ADE80':pctGeral>=60?'#CA8A04':'#F87171'}}>{pctGeral}%</div>
          <div className="metric-lbl">Atingimento</div>
        </div>
        <div style={{flex:1}}/>
        {isGestor && (
          <label className="btn btn-blue" style={{cursor:'pointer'}}>
            📥 Importar Excel
            <input type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importXLSX}/>
          </label>
        )}
      </div>

      {/* Clientes — cards clicáveis */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {CLIENTS_COL.map(function(cli){
          const cliTarget = ALL_SUPPS.reduce(function(s,sup){ return s+cell(sup,cli).target; },0);
          const cliRealiz = ALL_SUPPS.reduce(function(s,sup){ return s+cell(sup,cli).realiz; },0);
          const pct = cliTarget>0?Math.round(cliRealiz/cliTarget*100):0;
          const color = pct>=100?'#16A34A':pct>=60?'#CA8A04':'#DC2626';
          return (
            <div key={cli} onClick={function(){setSelCli(cli);}}
              style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',cursor:'pointer',minWidth:120,transition:'border-color .15s',borderTop:'3px solid '+color}}
              onMouseEnter={function(ev){ev.currentTarget.style.borderColor=color;}}
              onMouseLeave={function(ev){ev.currentTarget.style.borderColor='var(--border)';}}>
              <div style={{fontSize:11,fontWeight:700,marginBottom:4}}>{cli}</div>
              <div style={{fontSize:15,fontWeight:700,color:'#60A5FA'}}>{fmtAmt(cliTarget)}</div>
              <div style={{fontSize:10,color:'#4ADE80'}}>{fmtAmt(cliRealiz)} <span style={{color:color,fontWeight:700}}>({pct}%)</span></div>
            </div>
          );
        })}
      </div>

      {/* Tabela */}
      {Object.keys(budget).length===0 ? (
        <div className="card" style={{textAlign:'center',padding:'60px 20px',color:'var(--text3)'}}>
          <div style={{fontSize:32,marginBottom:12}}>💰</div>
          <div style={{fontWeight:600,marginBottom:6}}>Nenhum budget carregado</div>
          <div>Importe o arquivo <b>BUDGET_2026_EF.xlsx</b> ou edite os valores clicando nas células.</div>
        </div>
      ) : (
        <div className="tbl-wrap" style={{flex:1,overflowX:'auto',overflowY:'auto'}}>
          <table className="tbl" style={{minWidth:900}}>
            <thead>
              <tr>
                <th style={{width:24}}></th>
                <th style={{minWidth:140}}>SUPPLIER</th>
                {CLIENTS_COL.map(function(c){ return <th key={c} style={{textAlign:'right',minWidth:100,fontSize:9}}>{c}</th>; })}
                <th style={{textAlign:'right',minWidth:80}}>TOTAL</th>
              </tr>
            </thead>
            <tbody>
              {Object.entries(SUPPLIERS).map(function(entry){
                const grupo = entry[0];
                const supps = entry[1];
                const grupoLabel = grupo==='TT'?'TORQUE TOOLS':grupo==='REP'?'REPRESENTAÇÃO':'SERVIÇOS';
                return [
                  <tr key={'g_'+grupo}>
                    <td colSpan={2+CLIENTS_COL.length+1} style={{background:'var(--bg3)',fontSize:10,fontWeight:700,color:'var(--text3)',padding:'6px 10px',letterSpacing:'.07em'}}>{grupoLabel}</td>
                  </tr>,
                  supps.map(function(sup){
                    const rowTotal = CLIENTS_COL.reduce(function(s,c){ return s+cell(sup,c).target; },0);
                    return (
                      <tr key={sup}>
                        <td></td>
                        <td style={{fontWeight:500}}>{sup}</td>
                        {CLIENTS_COL.map(function(cli){
                          const c = cell(sup, cli);
                          const isEditing = editing && editing.sup===sup && editing.cli===cli;
                          const pct = c.target>0?Math.round(c.realiz/c.target*100):0;
                          return (
                            <td key={cli} style={{textAlign:'right',padding:'4px 8px'}}>
                              {isEditing ? (
                                <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:90}}>
                                  <input value={editVal.target} onChange={function(e){setEditVal(Object.assign({},editVal,{target:e.target.value}));}}
                                    placeholder="Target" type="number" style={{width:'100%',padding:'3px 6px',fontSize:10,textAlign:'right'}} autoFocus/>
                                  <input value={editVal.realiz} onChange={function(e){setEditVal(Object.assign({},editVal,{realiz:e.target.value}));}}
                                    placeholder="Realizado" type="number" style={{width:'100%',padding:'3px 6px',fontSize:10,textAlign:'right'}}/>
                                  <div style={{display:'flex',gap:3}}>
                                    <button onClick={saveEdit} style={{flex:1,padding:'2px 0',fontSize:9,background:'var(--accent)',color:'#FFD0D0',border:'none',borderRadius:4,cursor:'pointer'}}>✓</button>
                                    <button onClick={function(){setEditing(null);}} style={{flex:1,padding:'2px 0',fontSize:9,background:'var(--bg3)',color:'var(--text3)',border:'1px solid var(--border)',borderRadius:4,cursor:'pointer'}}>✕</button>
                                  </div>
                                </div>
                              ) : (
                                <div onClick={function(){if(isGestor)startEdit(sup,cli);}}
                                  style={{cursor:isGestor?'pointer':'default',borderRadius:4,padding:'3px 5px',transition:'background .1s'}}
                                  onMouseEnter={function(ev){if(isGestor)ev.currentTarget.style.background='rgba(255,255,255,0.05)';}}
                                  onMouseLeave={function(ev){ev.currentTarget.style.background='transparent';}}>
                                  {c.target>0 ? (
                                    <div>
                                      <div style={{fontSize:11,fontWeight:600,color:'var(--text)'}}>{fmtAmt(c.target)}</div>
                                      {c.realiz>0 && <div style={{fontSize:9,color:'#4ADE80'}}>{fmtAmt(c.realiz)} <span style={{color:pct>=100?'#4ADE80':pct>=60?'#CA8A04':'#F87171',fontWeight:700}}>({pct}%)</span></div>}
                                    </div>
                                  ) : (
                                    <span style={{color:'var(--border)',fontSize:11}}>{isGestor?'+ meta':'—'}</span>
                                  )}
                                </div>
                              )}
                            </td>
                          );
                        })}
                        <td style={{textAlign:'right',fontWeight:700,color:'#60A5FA'}}>{rowTotal>0?fmtAmt(rowTotal):'—'}</td>
                      </tr>
                    );
                  })
                ];
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* MODAL PERFIL DO CLIENTE */}
      {selCli && (
        <div className="modal-bg" onClick={function(){setSelCli(null);setSelSupp(null);}}>
          <div className="modal" style={{maxWidth:780}} onClick={function(e){e.stopPropagation();}}>
            <div className="modal-hd">
              <div>
                <h2>{selCli}</h2>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Budget {CUR_YEAR} — metas por fornecedor</div>
              </div>
              <button className="modal-close" onClick={function(){setSelCli(null);setSelSupp(null);}}>✕</button>
            </div>

            {/* Totais do cliente */}
            {(function(){
              const cliTarget = ALL_SUPPS.reduce(function(s,sup){ return s+cell(sup,selCli).target; },0);
              const cliRealiz = ALL_SUPPS.reduce(function(s,sup){ return s+cell(sup,selCli).realiz; },0);
              const cliFc     = fcOpps.filter(function(o){ return o.customer&&o.customer.toUpperCase().includes(selCli.split(' ')[0].toUpperCase()); })
                .reduce(function(s,o){ return s+amtNum(o.amount)*parseFloat(o.confidence||0); },0);
              const pct = cliTarget>0?Math.round(cliRealiz/cliTarget*100):0;
              return (
                <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
                  {[
                    {l:'Meta total', v:fmtAmt(cliTarget), c:'#60A5FA'},
                    {l:'Realizado',  v:fmtAmt(cliRealiz), c:'#4ADE80'},
                    {l:'Atingimento',v:pct+'%', c:pct>=100?'#4ADE80':pct>=60?'#CA8A04':'#F87171'},
                    {l:'Forecast pond.',v:fmtAmt(cliFc), c:'#FBBF24'},
                  ].map(function(m,i){
                    return (
                      <div key={i} className="metric" style={{flex:1,minWidth:100}}>
                        <div className="metric-val" style={{color:m.c}}>{m.v}</div>
                        <div className="metric-lbl">{m.l}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* Lista de suppliers */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:8,marginBottom:selSupp?12:0}}>
              {ALL_SUPPS.filter(function(sup){ return cell(sup,selCli).target>0||cell(sup,selCli).realiz>0; }).map(function(sup){
                const c = cell(sup, selCli);
                const oppsFc = fcOpps.filter(function(o){
                  return o.supplier&&o.supplier.toUpperCase()===sup.toUpperCase()&&o.customer&&o.customer.toUpperCase().includes(selCli.split(' ')[0].toUpperCase());
                });
                const fcVal = oppsFc.reduce(function(s,o){ return s+amtNum(o.amount)*parseFloat(o.confidence||0); },0);
                const pct = c.target>0?Math.round(c.realiz/c.target*100):0;
                const color = pct>=100?'#16A34A':pct>=60?'#CA8A04':'#DC2626';
                const isSelected = selSupp===sup;
                return (
                  <div key={sup} onClick={function(){ setSelSupp(isSelected?null:sup); }}
                    style={{background:isSelected?'rgba(37,99,235,0.15)':'var(--bg3)',border:'1px solid '+(isSelected?'#2563EB':'var(--border)'),borderRadius:8,padding:'10px 12px',cursor:'pointer',borderLeft:'3px solid '+color,transition:'all .15s'}}>
                    <div style={{fontSize:11,fontWeight:700,marginBottom:5,color:isSelected?'#60A5FA':'var(--text)'}}>{sup}</div>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{fmtAmt(c.target)}</div>
                    <div style={{fontSize:10,color:'#4ADE80',marginTop:2}}>{fmtAmt(c.realiz)} <span style={{color,fontWeight:700}}>({pct}%)</span></div>
                    {fcVal>0 && <div style={{fontSize:9,color:'#FBBF24',marginTop:2}}>FC: {fmtAmt(fcVal)}</div>}
                  </div>
                );
              })}
            </div>

            {/* Card com gráfico quando supplier selecionado */}
            {selSupp && (function(){
              const c = cell(selSupp, selCli);
              const oppsFc = fcOpps.filter(function(o){
                return o.supplier&&o.supplier.toUpperCase()===selSupp.toUpperCase()&&o.customer&&o.customer.toUpperCase().includes(selCli.split(' ')[0].toUpperCase());
              });
              const fcVal = oppsFc.reduce(function(s,o){ return s+amtNum(o.amount)*parseFloat(o.confidence||0); },0);
              const pct = c.target>0?Math.round(c.realiz/c.target*100):0;
              const pctFc = c.target>0?Math.round(fcVal/c.target*100):0;
              return (
                <div className="card" style={{borderTop:'2px solid #2563EB'}}>
                  <div style={{display:'flex',gap:16,alignItems:'flex-start',flexWrap:'wrap'}}>
                    <div style={{flex:'0 0 auto'}}>
                      <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>{selSupp} × {selCli}</div>
                      <MiniBar target={c.target} realiz={c.realiz} forecast={fcVal} w={300}/>
                    </div>
                    <div style={{flex:1,minWidth:180}}>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
                        {[
                          {l:'Target',    v:fmtAmt(c.target),   c:'#60A5FA'},
                          {l:'Realizado', v:fmtAmt(c.realiz),   c:'#4ADE80'},
                          {l:'Ating.',    v:pct+'%',             c:pct>=100?'#4ADE80':pct>=60?'#CA8A04':'#F87171'},
                          {l:'Forecast',  v:fmtAmt(fcVal),      c:'#FBBF24'},
                          {l:'FC/Target', v:pctFc+'%',          c:pctFc>=100?'#4ADE80':pctFc>=60?'#CA8A04':'#F87171'},
                        ].map(function(m,i){
                          return (
                            <div key={i} style={{background:'var(--bg3)',borderRadius:6,padding:'7px 10px'}}>
                              <div style={{fontSize:9,color:'var(--text3)',marginBottom:2,textTransform:'uppercase',letterSpacing:'.05em'}}>{m.l}</div>
                              <div style={{fontSize:14,fontWeight:700,color:m.c}}>{m.v}</div>
                            </div>
                          );
                        })}
                      </div>
                      {/* Oportunidades no Forecast */}
                      {oppsFc.length>0 && (
                        <div>
                          <div style={{fontSize:10,fontWeight:600,color:'var(--text2)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>Oportunidades no Forecast</div>
                          {oppsFc.map(function(o,i){
                            return (
                              <div key={i} style={{background:'var(--bg3)',borderRadius:5,padding:'5px 8px',marginBottom:4,fontSize:10}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                                  <span style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.description}</span>
                                  <span style={{color:confColor(o.confidence),fontWeight:700,flexShrink:0}}>{fmtConf(o.confidence)}</span>
                                </div>
                                <div style={{color:'var(--text3)',marginTop:2}}>{fmtAmt(amtNum(o.amount))} pond. → {fmtAmt(amtNum(o.amount)*parseFloat(o.confidence||0))}</div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── VIEW: CONFIGURAÇÕES ─────────────────────────────────────
function ViewSettings({ session, isGestor, onClose }) {
  const [users,    setUsers]    = useState(function(){ return load(KEYS.users, DEFAULT_USERS); });
  const [tab,      setTab]      = useState('usuarios');
  const [settings, setSettings] = useState(function(){ return load(KEYS.settings, {specialistLabel:'Especialista'}); });
  const [newUser,  setNewUser]  = useState({name:'',code:'',email:'',password:'',role:'vendedor'});
  const [showNewPw,setShowNewPw]= useState(false);
  const [editUID,  setEditUID]  = useState(null);
  const [editData, setEditData] = useState(null);
  const [showEditPw,setShowEditPw]=useState(false);

  function saveUsers(list) { setUsers(list); save(KEYS.users, list); }
  function saveSettings(s) { setSettings(s); save(KEYS.settings, s); }

  function addUser() {
    if (!newUser.name||!newUser.email||!newUser.password) { alert('Preencha nome, e-mail e senha.'); return; }
    if (users.find(function(u){return u.email===newUser.email;})) { alert('E-mail já cadastrado.'); return; }
    const u = Object.assign({}, newUser, {id:'u_'+Date.now(), active:true, pending:false});
    saveUsers([...users, u]);
    setNewUser({name:'',code:'',email:'',password:'',role:'vendedor'});
  }

  function toggleActive(id) {
    saveUsers(users.map(function(u){ return u.id===id?Object.assign({},u,{active:!u.active}):u; }));
  }

  function startEdit(u){
    setEditUID(u.id);
    setEditData({name:u.name,code:u.code,email:u.email,password:u.password,role:u.role});
    setShowEditPw(false);
  }

  function saveEdit(){
    if(!editData.name.trim()||!editData.email.trim()){ alert('Nome e e-mail obrigatórios.'); return; }
    if(editData.password&&editData.password.length<4){ alert('Senha deve ter ao menos 4 caracteres.'); return; }
    saveUsers(users.map(function(u){ return u.id===editUID?Object.assign({},u,editData):u; }));
    setEditUID(null); setEditData(null);
  }

  const roleColors = {gestor:'#8C1A1A',consultor:'#1D4ED8',vendedor:'#15803D',especialista:'#7C3AED'};

  return (
    <div className="modal-bg">
      <div className="modal" style={{maxWidth:720}}>
        <div className="modal-hd">
          <h2>⚙ Configurações</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {/* Tabs */}
        <div style={{display:'flex',gap:4,marginBottom:16,borderBottom:'1px solid var(--border)',paddingBottom:8}}>
          {[['usuarios','👥 Usuários'],['sistema','🔧 Sistema']].map(function(t){
            return (
              <button key={t[0]} onClick={function(){setTab(t[0]);}}
                style={{padding:'5px 14px',borderRadius:6,border:'none',background:tab===t[0]?'var(--bg3)':'transparent',color:tab===t[0]?'var(--text)':'var(--text3)',cursor:'pointer',fontWeight:tab===t[0]?600:400,fontSize:12}}>
                {t[1]}
              </button>
            );
          })}
        </div>

        {tab==='usuarios' && (
          <div>
            {/* Lista de usuários */}
            <table className="tbl" style={{marginBottom:14}}>
              <thead>
                <tr><th>NOME</th><th>CÓDIGO</th><th>E-MAIL</th><th>PERFIL</th><th>STATUS</th><th style={{width:100}}></th></tr>
              </thead>
              <tbody>
                {users.map(function(u){
                  var isEditing = editUID===u.id;
                  return (
                    <tr key={u.id} style={{background:isEditing?'rgba(37,99,235,.06)':''}}>
                      {isEditing && editData ? (
                        <td colSpan={6} style={{padding:'10px 8px'}}>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 70px 1fr 1fr',gap:6,marginBottom:8}}>
                            <div>
                              <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>NOME</div>
                              <input value={editData.name} onChange={function(e){setEditData(Object.assign({},editData,{name:e.target.value}));}} style={{width:'100%',padding:'4px 7px',fontSize:11}}/>
                            </div>
                            <div>
                              <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>CÓDIGO</div>
                              <input value={editData.code} onChange={function(e){setEditData(Object.assign({},editData,{code:e.target.value}));}} style={{width:'100%',padding:'4px 7px',fontSize:11}}/>
                            </div>
                            <div>
                              <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>E-MAIL</div>
                              <input value={editData.email} onChange={function(e){setEditData(Object.assign({},editData,{email:e.target.value}));}} style={{width:'100%',padding:'4px 7px',fontSize:11}}/>
                            </div>
                            <div>
                              <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>NOVA SENHA (deixe em branco para manter)</div>
                              <div style={{position:'relative'}}>
                                <input type={showEditPw?'text':'password'} value={editData.password} onChange={function(e){setEditData(Object.assign({},editData,{password:e.target.value}));}} style={{width:'100%',padding:'4px 28px 4px 7px',fontSize:11}} placeholder="Nova senha..."/>
                                <button onClick={function(){setShowEditPw(function(v){return !v;});}} style={{position:'absolute',right:5,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:12,color:'var(--text3)',padding:0}}>{showEditPw?'🙈':'👁'}</button>
                              </div>
                            </div>
                          </div>
                          <div style={{display:'flex',gap:6,alignItems:'center'}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>PERFIL</div>
                              <select value={editData.role} onChange={function(e){setEditData(Object.assign({},editData,{role:e.target.value}));}} style={{padding:'4px 7px',fontSize:11}}>
                                <option value="vendedor">Vendedor</option>
                                <option value="gestor">Gestor</option>
                                <option value="consultor">Consultor</option>
                                <option value="especialista">{settings.specialistLabel||'Especialista'}</option>
                              </select>
                            </div>
                            <button className="btn btn-primary" style={{padding:'5px 12px',fontSize:11}} onClick={saveEdit}>✓ Salvar</button>
                            <button className="btn btn-secondary" style={{padding:'5px 12px',fontSize:11}} onClick={function(){setEditUID(null);setEditData(null);}}>Cancelar</button>
                          </div>
                        </td>
                      ) : (
                        <React.Fragment>
                          <td style={{fontWeight:600}}>{u.name}</td>
                          <td style={{color:'var(--text3)',fontSize:10}}>{u.code}</td>
                          <td style={{color:'var(--text3)',fontSize:10}}>{u.email}</td>
                          <td>
                            <span className="badge" style={{background:ROLES[u.role]?ROLES[u.role].color+'22':'rgba(100,100,100,.2)',color:ROLES[u.role]?ROLES[u.role].color:'var(--text3)'}}>
                              {u.role==='especialista'?settings.specialistLabel:(ROLES[u.role]?ROLES[u.role].label:u.role)}
                            </span>
                          </td>
                          <td>
                            {u.pending
                              ? <span style={{color:'#CA8A04',fontSize:11}}>⏳ Pendente</span>
                              : u.active
                                ? <span style={{color:'#4ADE80',fontSize:11}}>✅ Ativo</span>
                                : <span style={{color:'var(--text3)',fontSize:11}}>❌ Inativo</span>}
                          </td>
                          <td>
                            <div style={{display:'flex',gap:4}}>
                              {isGestor && (
                                <button onClick={function(){startEdit(u);}} className="btn btn-secondary" style={{padding:'3px 8px',fontSize:10}}>✏️</button>
                              )}
                              {isGestor && u.id!==session.id && (
                                <button onClick={function(){toggleActive(u.id);}} className="btn btn-secondary" style={{padding:'3px 8px',fontSize:10}}>
                                  {u.active?'Desativar':'Ativar'}
                                </button>
                              )}
                            </div>
                          </td>
                        </React.Fragment>
                      )}
                    </tr>
                  );
                })}
              </tbody>
            </table>

            {/* Adicionar usuário */}
            {isGestor && (
              <div style={{background:'var(--bg3)',borderRadius:8,padding:12,border:'1px solid var(--border)'}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:10}}>Novo usuário</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 80px 1fr 1fr',gap:8,marginBottom:8}}>
                  {[
                    {k:'name',     l:'Nome completo', ph:'João Silva'},
                    {k:'code',     l:'Código',        ph:'JS'},
                    {k:'email',    l:'E-mail',        ph:'joao@empresa.com'},
                    {k:'password', l:'Senha inicial', ph:'••••••', isPass:true},
                  ].map(function(f){
                    return (
                      <div key={f.k}>
                        <label style={{display:'block',fontSize:9,color:'var(--text3)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}}>{f.l}</label>
                        {f.isPass ? (
                          <div style={{position:'relative'}}>
                            <input type={showNewPw?'text':'password'} value={newUser[f.k]||''} onChange={function(e){setNewUser(Object.assign({},newUser,{[f.k]:e.target.value}));}} placeholder={f.ph} style={{width:'100%',padding:'6px 28px 6px 8px',fontSize:11}}/>
                            <button onClick={function(){setShowNewPw(function(v){return !v;});}} style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:12,color:'var(--text3)',padding:0}}>{showNewPw?'🙈':'👁'}</button>
                          </div>
                        ) : (
                          <input value={newUser[f.k]||''} onChange={function(e){setNewUser(Object.assign({},newUser,{[f.k]:e.target.value}));}} placeholder={f.ph} type="text" style={{width:'100%',padding:'6px 8px',fontSize:11}}/>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
                  <div style={{flex:1}}>
                    <label style={{display:'block',fontSize:9,color:'var(--text3)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}}>Perfil</label>
                    <select value={newUser.role} onChange={function(e){setNewUser(Object.assign({},newUser,{role:e.target.value}));}} style={{width:'100%',padding:'6px 8px',fontSize:11}}>
                      <option value="vendedor">Vendedor</option>
                      <option value="gestor">Gestor Comercial</option>
                      <option value="consultor">Consultor</option>
                      <option value="especialista">{settings.specialistLabel}</option>
                    </select>
                  </div>
                  <button className="btn btn-primary" onClick={addUser}>Adicionar</button>
                </div>
              </div>
            )}
          </div>
        )}

        {tab==='sistema' && (
          <div>
            <div className="field">
              <label>Nome do perfil "Especialista"</label>
              <input value={settings.specialistLabel||'Especialista'} onChange={function(e){saveSettings(Object.assign({},settings,{specialistLabel:e.target.value}));}}
                placeholder="Engenheiro de Aplicação"/>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Este é o nome exibido para o perfil de especialista técnico em toda a plataforma.</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MODAL PERFIL DO USUÁRIO ──────────────────────────────────
function ModalPerfil({ session, onClose, onLogout }) {
  const settings  = load(KEYS.settings, {specialistLabel:'Especialista'});
  const roleLabel = session.role==='especialista'
    ? settings.specialistLabel
    : (ROLES[session.role]?ROLES[session.role].label:session.role);

  const PROF_KEY = 'crm_profile_'+session.id;
  const [prof,    setProf]    = useState(function(){ return load(PROF_KEY, {}); });
  const [editing, setEditing] = useState(false);
  const [draft,   setDraft]   = useState(null);

  function openEdit(){ setDraft(Object.assign({},prof)); setEditing(true); }
  function saveEdit(){
    setProf(draft);
    save(PROF_KEY, draft);
    // Atualizar foto no session também
    var users = load(KEYS.users, []);
    var updated = users.map(function(u){ return u.id===session.id?Object.assign({},u,{photo:draft.photo}):u; });
    save(KEYS.users, updated);
    setEditing(false);
  }

  function handlePhoto(e){
    var file = e.target.files[0]; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){ setDraft(Object.assign({},draft,{photo:ev.target.result})); };
    reader.readAsDataURL(file);
    e.target.value='';
  }

  var photo = prof.photo || null;

  var CAMPOS = [
    {k:'nome',     l:'Nome completo',    ph:'João Silva',          type:'text'},
    {k:'empresa',  l:'Empresa',          ph:'Sinuelo',             type:'text'},
    {k:'cargo',    l:'Cargo / Função',   ph:'Engenheiro de Vendas',type:'text'},
    {k:'telefone', l:'Telefone / Cel.',  ph:'+55 11 99999-9999',   type:'tel'},
    {k:'email',    l:'E-mail',           ph:'joao@empresa.com',    type:'email'},
    {k:'cidade',   l:'Cidade / UF',      ph:'São Paulo / SP',      type:'text'},
    {k:'linkedin', l:'LinkedIn',         ph:'linkedin.com/in/joao',type:'url'},
    {k:'creci',    l:'CREA / CRQ / Reg.',ph:'CREA-SP 123456',      type:'text'},
    {k:'bio',      l:'Sobre / Bio',      ph:'Especialista em aperto industrial...', type:'textarea'},
  ];

  return (
    <div className="modal-bg" onClick={function(e){ if(!editing) onClose(); }}>
      <div className="modal" style={{maxWidth:520,marginTop:40}} onClick={function(e){e.stopPropagation();}}>

        {/* Header */}
        <div className="modal-hd">
          <h2>👤 Meu Perfil</h2>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {!editing && <button className="btn btn-secondary" style={{fontSize:11,padding:'5px 10px'}} onClick={openEdit}>✏️ Editar</button>}
            <button className="modal-close" onClick={onClose}>✕</button>
          </div>
        </div>

        {!editing ? (
          /* ── MODO VISUALIZAÇÃO ── */

            {/* Avatar + info principal */}

                {photo
                  ? <img src={photo} style={{width:72,height:72,borderRadius:'50%',objectFit:'cover',border:'2px solid var(--border)'}} alt="foto"/>
                  : <div style={{width:72,height:72,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,fontWeight:700,color:'#FFD0D0'}}>{initials(session.name)}</div>
                }
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:16,fontWeight:700,marginBottom:3}}>{prof.nome||session.name}</div>
                <div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>{prof.cargo||roleLabel}</div>
                {prof.empresa && <div style={{fontSize:12,color:'var(--text2)'}}>{prof.empresa}</div>}
                <span className="badge" style={{marginTop:6,background:ROLES[session.role]?ROLES[session.role].color+'22':'rgba(100,100,100,.2)',color:ROLES[session.role]?ROLES[session.role].color:'var(--text3)'}}>
                  {roleLabel}

                {icon:'🏙', v:prof.cidade,   l:'Cidade'},
                {icon:'🏢', v:prof.empresa,  l:'Empresa'},
                {icon:'🪪', v:prof.creci,    l:'Registro'},

                  </div>

                <div style={{fontSize:9,color:'var(--text3)',marginBottom:4}}>SOBRE</div>
                <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.6}}>{prof.bio}</div>
              </div>
            )}

            {/* Ações */}
            <div style={{borderTop:'1px solid var(--border)',paddingTop:12,display:'flex',gap:8}}>
              <button className="btn btn-secondary" onClick={onClose} style={{flex:1}}>Fechar</button>
              <button onClick={onLogout} style={{flex:1,padding:'7px 14px',borderRadius:'var(--radius)',border:'1px solid #DC2626',background:'rgba(220,38,38,.08)',color:'#FCA5A5',fontWeight:600,fontSize:12}}>
                🚪 Sair
              </button>
            </div>
          </div>
        ) : (
          /* ── MODO EDIÇÃO ── */
          <div>
            {/* Foto */}
            <div style={{display:'flex',gap:14,alignItems:'center',marginBottom:14}}>
              <div style={{position:'relative',flexShrink:0}}>
                {draft.photo
                  ? <img src={draft.photo} style={{width:68,height:68,borderRadius:'50%',objectFit:'cover',border:'2px solid var(--blue)'}} alt="foto"/>
                  : <div style={{width:68,height:68,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,fontWeight:700,color:'#FFD0D0'}}>{initials(session.name)}</div>
                }
                <label style={{position:'absolute',bottom:-2,right:-2,width:22,height:22,borderRadius:'50%',background:'var(--blue)',border:'2px solid var(--card)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11}}>
                  📷
                  <input type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
                </label>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,marginBottom:2}}>{session.name}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{session.email} · {roleLabel}</div>
                {draft.photo && <button onClick={function(){setDraft(Object.assign({},draft,{photo:null}));}} style={{background:'none',border:'none',color:'#F87171',cursor:'pointer',fontSize:10,marginTop:4,padding:0}}>✕ Remover foto</button>}
              </div>
            </div>

            {/* Campos */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
              {CAMPOS.filter(function(f){return f.type!=='textarea';}).map(function(f){
                return (
                  <div key={f.k} className="field" style={{marginBottom:0}}>
                    <label>{f.l}</label>
                    <input type={f.type} value={draft[f.k]||''} onChange={function(e){setDraft(Object.assign({},draft,{[f.k]:e.target.value}));}} placeholder={f.ph} style={{width:'100%',fontSize:11,padding:'6px 8px'}}/>
                  </div>
                );
              })}
            </div>
            <div className="field" style={{marginBottom:14}}>
              <label>Sobre / Bio</label>
              <textarea value={draft.bio||''} onChange={function(e){setDraft(Object.assign({},draft,{bio:e.target.value}));}}
                placeholder="Especialista em aperto industrial, torque e automação..."
                style={{width:'100%',height:60,resize:'vertical',fontSize:11}}/>
            </div>

            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={saveEdit} style={{flex:1}}>💾 Salvar perfil</button>
              <button className="btn btn-secondary" onClick={function(){setEditing(false);}}>Cancelar</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── VIEW: DEMONSTRAÇÃO ──────────────────────────────────────
function ViewDemo({ session, isGestor, isEspecialista }) {
  const [demos,       setDemos]      = useState(function(){ return load(KEYS.demo, []); });
  const [estDemo,     setEstDemo]    = useState(function(){ return load(KEYS.estoque+'_demo', []); });
  const [modal,       setModal]      = useState(false);
  const [form,        setForm]       = useState(null);
  const [search,      setSearch]     = useState('');
  // Autocomplete estados (nível correto — fora do IIFE)
  const [cliSearch,   setCliSearch]  = useState('');
  const [showCliList, setShowCliList]= useState(false);
  const [contatoSel,  setContatoSel] = useState('');
  const settings = load(KEYS.settings, {});

  const EMPTY_DEMO = {
    id:'', codVend: session.code||'', seq:'001', ano:String(CUR_YEAR),
    cliente:'', projeto:'', cnpj:'', endereco:'', cep:'', cidadeUf:'', dpto:'',
    contato:'', fone:'', email:'', engenheiro:'', dataDemo:'', dataRetorno:'', movimentacao:'',
    nf:'', numDemo:'',
    itens: [{sigma:'',descricao:'',modelo:'',marca:'',qtd:1,obs:''}],
    soquetes:[{consumoAnual:'',concorrentes:'',potencial:'',aplicacao:'',comentarios:''}],
    testes:  [{range:'',operacao:'',linha:'',posto:''}],
    resultados:[{inicio:'',fim:'',homologado:false,naoHomologado:false,consideracao:''}],
  };

  function saveDemos(list){ setDemos(list); save(KEYS.demo, list); }

  function openNew(){
    const seq = String(demos.length+1).padStart(3,'0');
    setForm(Object.assign({}, EMPTY_DEMO, {id:'demo_'+Date.now(), seq}));
    setCliSearch(''); setShowCliList(false); setContatoSel('');
    setModal(true);
  }
  function openEdit(d){
    setForm(Object.assign({},d));
    setCliSearch(''); setShowCliList(false); setContatoSel(d.contato||'');
    setModal(true);
  }

  function saveForm(){
    var erros = [];
    if(!form.cliente.trim())       erros.push('• Cliente obrigatório');
    if(!form.projeto.trim())       erros.push('• Projeto / Oportunidade obrigatório');
    if(!form.contato.trim())       erros.push('• Contato obrigatório');
    if(!form.dataDemo)             erros.push('• Data da demonstração obrigatória');
    if(form.itens.filter(function(it){return it.descricao.trim();}).length===0)
      erros.push('• Informe ao menos 1 item com descrição');
    if(erros.length>0){ alert('Preencha os campos obrigatórios:\n\n'+erros.join('\n')); return; }
    const exists = demos.find(function(d){ return d.id===form.id; });
    if(exists){ saveDemos(demos.map(function(d){ return d.id===form.id?form:d; })); }
    else { saveDemos([form,...demos]); }
    setModal(false);
  }

  function deleteDemo(id){ if(confirm('Excluir?')) saveDemos(demos.filter(function(d){ return d.id!==id; })); }

  function nomeArquivo(d){
    const cli = (d.cliente||'CLIENTE').replace(/\s+/g,'-').replace(/[^A-Za-z0-9-]/g,'').toUpperCase().slice(0,20);
    const prj = (d.projeto||'DEMO').replace(/\s+/g,'-').replace(/[^A-Za-z0-9-]/g,'').toUpperCase().slice(0,15);
    return (d.codVend||'XXXX')+'-'+(d.seq||'001')+'-'+(d.ano||CUR_YEAR)+'-'+cli+'-'+prj;
  }

  // Busca no estoque de demo por SIGMA
  function buscaEstDemo(q){
    const s = String(q||'').toLowerCase();
    if(!s) return null;
    return estDemo.find(function(it){
      return String(it.sigma||'').toLowerCase().includes(s)
        ||String(it.descricao||'').toLowerCase().includes(s)
        ||String(it.codigo||'').toLowerCase().includes(s)
        ||String(it.desc1||'').toLowerCase().includes(s);
    });
  }

  function searchEstDemo(q){
    const s = String(q||'').toLowerCase().trim();
    if(s.length<2) return [];
    return estDemo.filter(function(it){
      return String(it.sigma||'').toLowerCase().includes(s)
        ||String(it.descricao||'').toLowerCase().includes(s)
        ||String(it.codigo||'').toLowerCase().includes(s);
    }).slice(0,12);
  }

  function importEstDemo(e){
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      try{
        const wb = XLSX.read(ev.target.result,{type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
        const items = [];
        for(var ri=1;ri<rows.length;ri++){
          const row = rows[ri];
          if(!row||!row[0]) continue;
          items.push({
            sigma: String(row[0]||'').trim(),
            descricao: String(row[1]||'').trim(),
            desc1: String(row[2]||'').trim(),
            desc2: String(row[3]||'').trim(),
            saldo: parseFloat(row[4])||0,
          });
        }
        setEstDemo(items);
        save(KEYS.estoque+'_demo', items);
        alert(items.length+' itens de demonstração carregados.');
      }catch(err){ alert('Erro: '+err.message); }
    };
    reader.readAsBinaryString(file);
    e.target.value='';
  }

  // Exportar PDF — usa window.print com layout dedicado
  function exportPDF(d){
    const nome = nomeArquivo(d);
    const itensHTML = d.itens.map(function(it,i){
      return '<tr><td>'+(i+1)+'</td><td>'+it.qtd+'</td><td>'+(it.marca||'')+'</td><td colspan="3">'+(it.descricao||'')+'</td><td>'+(it.modelo||'')+'</td><td>'+(it.sigma||'')+'</td><td></td></tr>';
    }).join('');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${nome}</title>
<style>
body{font-family:Arial,sans-serif;font-size:9pt;margin:10mm;}
h2{text-align:center;font-size:13pt;margin-bottom:6px;}
table{width:100%;border-collapse:collapse;font-size:8pt;}
td,th{border:1px solid #999;padding:3px 5px;}
th{background:#ddd;font-weight:bold;font-size:7.5pt;}
.lbl{font-size:7pt;color:#555;font-weight:bold;}
.hdr{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;}
.field{border:1px solid #ccc;padding:4px 6px;}
.field .l{font-size:7pt;color:#777;}
.section{background:#eee;font-weight:bold;font-size:8pt;padding:3px 6px;margin:8px 0 4px;}
.footer{margin-top:20px;font-size:7.5pt;border-top:1px solid #ccc;padding-top:6px;text-align:center;}
.sig{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:30px;}
.sig-line{border-top:1px solid #333;padding-top:4px;text-align:center;font-size:8pt;}
@media print{body{margin:5mm;}}
</style></head><body>
<h2>FORMULÁRIO PEDIDO DEMONSTRAÇÃO</h2>
<div class="hdr">
  <div class="field"><div class="l">NÚMERO NF:</div>${d.nf||''}</div>
  <div class="field"><div class="l">NUMERO DEMO:</div>${d.numDemo||nomeArquivo(d)}</div>
  <div class="field"><div class="l">REPRESENTANTE:</div>${d.contato||session.name}</div>
  <div class="field"><div class="l">DATA SOLICITAÇÃO:</div>${new Date().toLocaleDateString('pt-BR')}</div>
  <div class="field"><div class="l">NOME CLIENTE:</div>${d.cliente||''}</div>
  <div class="field"><div class="l">CPF/CNPJ:</div>${d.cnpj||''}</div>
  <div class="field" style="grid-column:1/3"><div class="l">ENDEREÇO:</div>${d.endereco||''}</div>
  <div class="field"><div class="l">CIDADE/UF:</div>${d.cidadeUf||''}</div>
  <div class="field"><div class="l">CEP:</div>${d.cep||''}</div>
  <div class="field"><div class="l">CONTATO:</div>${d.contato||''}</div>
  <div class="field"><div class="l">FONE:</div>${d.fone||''}</div>
  <div class="field"><div class="l">E-MAIL:</div>${d.email||''}</div>
  <div class="field"><div class="l">ENGENHEIRO DE APLICAÇÃO:</div>${d.engenheiro||''}</div>
  <div class="field"><div class="l">DATA DEMONSTRAÇÃO:</div>${d.dataDemo||''}</div>
  <div class="field"><div class="l">DATA PREVISÃO RETORNO:</div>${d.dataRetorno||''}</div>
  <div class="field" style="grid-column:1/3"><div class="l">MOVIMENTAÇÃO:</div>${d.movimentacao||''}</div>
</div>
<div class="section">RELAÇÃO DE ITENS</div>
<table><thead><tr><th>ITEM</th><th>QTD</th><th>MARCA</th><th colspan="3">DESCRIÇÃO</th><th>MODELO</th><th>SIGMA</th><th>ESTOQUE</th></tr></thead>
<tbody>${itensHTML}</tbody></table>
${d.soquetes&&d.soquetes.some(function(s){return s.consumoAnual||s.concorrentes;})? '<div class="section">DEMONSTRAÇÃO DE SOQUETES</div><table><thead><tr><th>CONSUMO ANUAL</th><th>CONCORRENTES</th><th>POTENCIAL</th><th>APLICAÇÃO</th><th>COMENTÁRIOS</th></tr></thead><tbody>'+d.soquetes.map(function(s){ return '<tr><td>'+(s.consumoAnual||'')+'</td><td>'+(s.concorrentes||'')+'</td><td>'+(s.potencial||'')+'</td><td>'+(s.aplicacao||'')+'</td><td>'+(s.comentarios||'')+'</td></tr>'; }).join('')+'</tbody></table>':''}
${d.testes&&d.testes.some(function(t){return t.operacao;})? '<div class="section">TESTES REALIZADOS</div><table><thead><tr><th>ITEM</th><th>RANGE</th><th colspan="4">OPERAÇÃO</th><th>LINHA</th><th>POSTO</th></tr></thead><tbody>'+d.testes.map(function(t,i){ return '<tr><td>'+(i+1)+'</td><td>'+(t.range||'')+'</td><td colspan="4">'+(t.operacao||'')+'</td><td>'+(t.linha||'')+'</td><td>'+(t.posto||'')+'</td></tr>'; }).join('')+'</tbody></table>':''}
${d.resultados&&d.resultados.some(function(r){return r.inicio;})? '<div class="section">PERÍODO DE TESTE / RESULTADOS</div><table><thead><tr><th>ITEM</th><th>INÍCIO</th><th>FIM</th><th>HOMOLOGADO</th><th>NÃO HOMOLOGADO</th><th>CONSIDERAÇÃO</th></tr></thead><tbody>'+d.resultados.map(function(r,i){ return '<tr><td>'+(i+1)+'</td><td>'+(r.inicio||'')+'</td><td>'+(r.fim||'')+'</td><td style="text-align:center">'+(r.homologado?'✓':'')+'</td><td style="text-align:center">'+(r.naoHomologado?'✓':'')+'</td><td>'+(r.consideracao||'')+'</td></tr>'; }).join('')+'</tbody></table>':''}
<div class="sig">
  <div class="sig-line">Assinatura Cliente</div>
  <div class="sig-line">Assinatura Vendedor</div>
</div>
<div class="footer">FORGE B2B — <br>forge@forgeb2b.com.br | www.forgeb2b.com.br</div>
</body></html>`;
    const win = window.open('','_blank','width=900,height=700');
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(function(){ win.print(); }, 400);
  }

  const filtered = demos.filter(function(d){
    if(!search.trim()) return true;
    const q = search.toLowerCase();
    return (d.cliente&&d.cliente.toLowerCase().includes(q))||(d.projeto&&d.projeto.toLowerCase().includes(q));
  });

  const inp = {width:'100%'};

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,height:'100%'}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Buscar cliente ou projeto..." style={{flex:1,minWidth:180}}/>
        <button className="btn btn-primary" onClick={openNew}>+ Nova solicitação</button>
        <label className="btn btn-blue" style={{cursor:'pointer'}} title="Estoque de demonstração">
          📦 Estoque demo
          <input type="file" accept=".xls,.xlsx" style={{display:'none'}} onChange={importEstDemo}/>
        </label>
        {estDemo.length>0 && <span style={{fontSize:10,color:'var(--text3)'}}>{estDemo.length} itens</span>}
      </div>

      {demos.length===0 ? (
        <div className="card" style={{textAlign:'center',padding:'60px 20px',color:'var(--text3)'}}>
          <div style={{fontSize:32,marginBottom:12}}>🔧</div>
          <div style={{fontWeight:600,marginBottom:6}}>Nenhuma solicitação de demonstração</div>
          <div>Clique em <b>+ Nova solicitação</b> para criar</div>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {filtered.map(function(d){
            return (
              <div key={d.id} className="card" style={{display:'flex',gap:12,alignItems:'center'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:10,alignItems:'baseline',flexWrap:'wrap'}}>
                    <span style={{fontWeight:700,fontSize:13}}>{d.cliente}</span>
                    <span style={{fontSize:11,color:'var(--text3)'}}>·</span>
                    <span style={{fontSize:11,color:'var(--text2)'}}>{d.projeto}</span>
                    <span style={{fontSize:10,padding:'1px 7px',borderRadius:5,background:'rgba(37,99,235,0.15)',color:'#60A5FA',fontWeight:600}}>{nomeArquivo(d)}</span>
                  </div>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>
                    {d.dataDemo&&'Demo: '+d.dataDemo+' · '}
                    {d.itens.filter(function(i){return i.sigma;}).length} itens ·
                    {d.contato&&' '+d.contato}
                  </div>
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  <button className="btn btn-secondary" style={{padding:'5px 10px',fontSize:11}} onClick={function(){openEdit(d);}}>✏️ Editar</button>
                  <button className="btn btn-green" style={{padding:'5px 10px',fontSize:11}} onClick={function(){exportPDF(d);}}>📄 PDF</button>
                  <button onClick={function(){deleteDemo(d.id);}} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:13,opacity:.4}} onMouseEnter={function(ev){ev.target.style.opacity=1;}} onMouseLeave={function(ev){ev.target.style.opacity=.4;}}>✕</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* MODAL FORMULÁRIO */}
      {modal && form && (
        <div className="modal-bg">
          <div className="modal" style={{maxWidth:800}}>
            <div className="modal-hd">
              <h2>🔧 Solicitação de Demonstração</h2>
              <button className="modal-close" onClick={function(){setModal(false);}}>✕</button>
            </div>
            {/* Nome do arquivo */}
            <div style={{background:'rgba(37,99,235,0.08)',border:'1px solid rgba(37,99,235,0.2)',borderRadius:6,padding:'6px 12px',marginBottom:12,fontSize:11,color:'#60A5FA',fontFamily:'monospace'}}>
              📁 {nomeArquivo(form)}.pdf
            </div>

            {/* Cabeçalho */}
            <div className="grid-4" style={{marginBottom:10}}>
              <div className="field"><label>Cód. Vendedor</label><input value={form.codVend||''} onChange={function(e){setForm(Object.assign({},form,{codVend:e.target.value}));}} style={inp} placeholder="EF"/></div>
              <div className="field"><label>Seq.</label><input value={form.seq||''} onChange={function(e){setForm(Object.assign({},form,{seq:e.target.value}));}} style={inp} placeholder="001"/></div>
              <div className="field"><label>Nº NF</label><input value={form.nf||''} onChange={function(e){setForm(Object.assign({},form,{nf:e.target.value}));}} style={inp}/></div>
              <div className="field"><label>Nº Demo</label><input value={form.numDemo||''} onChange={function(e){setForm(Object.assign({},form,{numDemo:e.target.value}));}} style={inp}/></div>
            </div>

            {/* Seleção de cliente com autocomplete */}
            {(function(){
              var clientsData = load(KEYS.clients, []);

              var cliFiltered = cliSearch.length >= 1
                ? clientsData.filter(function(c){
                    var q = cliSearch.toLowerCase();
                    return (c.apelido&&c.apelido.toLowerCase().includes(q))||(c.nome&&c.nome.toLowerCase().includes(q));
                  }).slice(0,8)
                : [];

              var cliSel = clientsData.find(function(c){ return form && c.apelido===form._cliApelido; });
              var contatos = cliSel ? (cliSel.contatos||[]) : [];

              function selectCliente(c){
                setCliSearch('');
                setShowCliList(false);
                setContatoSel('');
                setForm(Object.assign({},form,{
                  _cliApelido: c.apelido,
                  cliente:     c.apelido,
                  cnpj:        c.cnpj||'',
                  cidadeUf:    (c.cidade&&c.estado?c.cidade+' / '+c.estado:c.cidade||c.estado||''),
                  cep:         c.cep||'',
                  endereco:    c.endereco||'',
                  // limpar contato ao trocar cliente
                  contato:'', fone:'', email:'', dpto:'',
                }));
              }

              function selectContato(ct){
                setContatoSel(ct.nome);
                setForm(Object.assign({},form,{
                  contato: ct.nome||'',
                  dpto:    ct.dpto||'',
                  fone:    ct.tel||ct.cel||'',
                  email:   ct.email||'',
                }));
              }

              return (
                <div>
                  <div className="grid-2" style={{marginBottom:10}}>
                    {/* Campo empresa com dropdown */}
                    <div className="field" style={{position:'relative'}}>

                        <div>
                          <input
                            value={cliSearch}

                            onFocus={function(){ setShowCliList(true); }}
                            placeholder="Digite para buscar empresa..."

                              {cliFiltered.map(function(c){
                                return (
                                  <div key={c.id||c.apelido}

                                    style={{padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--border2)'}}
                                    onMouseEnter={function(ev){ev.currentTarget.style.background='rgba(37,99,235,0.15)';}}
                                    onMouseLeave={function(ev){ev.currentTarget.style.background='transparent';}}>
                                    <div style={{fontWeight:600,fontSize:12}}>{c.apelido}</div>
                                    <div style={{fontSize:10,color:'var(--text3)'}}>{c.nome} {c.cidade?' · '+c.cidade:''}</div>
                                  </div>
                                );
                              })}
                            </div>
                          )}
                          {showCliList && cliSearch.length>0 && cliFiltered.length===0 && (
                            <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:50,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'0 0 8px 8px',padding:'10px 12px',fontSize:11,color:'var(--text3)'}}>
                              Nenhum cliente encontrado — <button onClick={function(){setForm(Object.assign({},form,{cliente:cliSearch}));setShowCliList(false);}} style={{background:'none',border:'none',color:'#60A5FA',cursor:'pointer',fontSize:11,padding:0}}>usar "{cliSearch}" mesmo assim</button>
                            </div>
                          )}
                        </div>

              );
            })()}
            <div className="grid-3" style={{marginBottom:12}}>

            {/* Itens */}
            <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>Relação de Itens</div>
            <table className="tbl" style={{marginBottom:8}}>
              <thead><tr><th style={{width:45}}>QTD</th><th style={{width:90}}>MARCA</th><th style={{minWidth:180}}>BUSCA (descrição, SIGMA ou código)</th><th style={{minWidth:140}}>DESCRIÇÃO</th><th style={{width:100}}>MODELO</th><th style={{width:60}}>OBS</th><th style={{width:24}}></th></tr></thead>

                      <td style={{position:'relative',minWidth:180}}>
                        <input value={it._busca!==undefined?it._busca:(it.sigma||'')} onChange={function(e){

// ─── VIEW: ESTOQUE ───────────────────────────────────────────
function ViewEstoque({ session }) {
  const [estoque,   setEstoque]   = useState(function(){ return load(KEYS.estoque, []); });
  const [search,    setSearch]    = useState('');
  const [selected,  setSelected]  = useState({});
  const [loading,   setLoading]   = useState(false);
  const [sortCol,   setSortCol]   = useState('');       // 'sd'|'descricao'|'codigo'|'sigma'
  const [sortDir,   setSortDir]   = useState('asc');    // 'asc'|'desc'
  const [filterQtd, setFilterQtd] = useState('todos');  // 'todos'|'disponivel'|'zerado'

  function saveEst(list){ setEstoque(list); save(KEYS.estoque, list); }

  function toggleSort(col){
    if(sortCol===col) setSortDir(function(d){ return d==='asc'?'desc':'asc'; });
    else { setSortCol(col); setSortDir('asc'); }
  }

  function SortIcon(props){
    var col = props.col;
    if(sortCol!==col) return <span style={{opacity:.25,fontSize:9,marginLeft:3}}>⇅</span>;
    return <span style={{fontSize:9,marginLeft:3,color:'#60A5FA'}}>{sortDir==='asc'?'▲':'▼'}</span>;
  }

  function importXLSX(e){
    const file = e.target.files[0]; if(!file) return;
    setLoading(true);
    const reader = new FileReader();
    reader.onload = function(ev){
      try{
        const wb = XLSX.read(ev.target.result,{type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
        const items = [];
        var grupoAtual = '';
        for(var ri=0;ri<rows.length;ri++){
          const row = rows[ri];
          if(!row||!row.some(function(c){return c!==null&&c!=='';})) continue;
          const r = row.map(function(c){return c!==null?String(c).trim():'';});
          const sigma = r[0]||'';
          const desc  = r[1]||'';
          const cod   = r[2]||'';
          // Linha de grupo: SIGMA curto (<=5 dígitos) sem código
          if(sigma && /^\d+$/.test(sigma) && sigma.length<=5 && desc && !cod){
            grupoAtual = desc;
          } else if(sigma && sigma.length>=6 && desc && sigma!=='11/05/2026'){
            // Col A=SIGMA, col B=DESCRIÇÃO, col C=CÓDIGO FABRICANTE, col G(idx6)=Qtd disponível
            const sd = parseFloat(r[6])||0;
            items.push({
              sigma,
              descricao: desc,
              codigo: cod,
              grupo: grupoAtual,
              sd: Math.round(sd),
            });
          }
        }
        saveEst(items);
        setLoading(false);
        alert(items.length+' itens importados.');
      }catch(err){ setLoading(false); alert('Erro: '+err.message); }
    };
    reader.readAsBinaryString(file);
    e.target.value='';
  }

  const q = search.trim().toLowerCase();

  // Normalização: remove acentos, ç→c, ã→a, etc.
  function norm(str){
    return String(str||'').toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/ç/g,'c').replace(/[^a-z0-9\s]/g,' ');
  }

  function matchToken(token, text){
    if(text.includes(token)) return true;
    if(token.length<=2) return false;
    var tlen = token.length;
    for(var i=0; i<=text.length-tlen; i++){
      var sub = text.slice(i, i+tlen);
      var diffs = 0;
      for(var j=0; j<tlen; j++){
        if(sub[j]!==token[j]) diffs++;
        if(diffs>1) break;
      }
      if(diffs<=1) return true;
    }
    return false;
  }

  function fuzzyMatch(query, item){
    var tokens = norm(query).split(/\s+/).filter(function(t){ return t.length>0; });
    if(!tokens.length) return false;
    var full = norm(item.descricao)+' '+norm(item.codigo)+' '+norm(item.sigma);
    return tokens.every(function(token){ return matchToken(token, full); });
  }

  // Aplicar filtro de quantidade
  var base = estoque.filter(function(it){
    if(filterQtd==='disponivel') return it.sd>0;
    if(filterQtd==='zerado')     return it.sd<=0;
    return true;
  });

  // Aplicar busca
  var afterSearch = q.length<2
    ? base.slice(0,500)
    : base.filter(function(it){ return fuzzyMatch(q, it); }).slice(0,500);

  // Aplicar ordenação
  var filtered = afterSearch.slice().sort(function(a,b){
    if(!sortCol) return 0;
    var av, bv;
    if(sortCol==='sd')       { av=a.sd||0;        bv=b.sd||0;        return sortDir==='asc'?av-bv:bv-av; }
    if(sortCol==='descricao'){ av=a.descricao||''; bv=b.descricao||''; }
    if(sortCol==='codigo')   { av=a.codigo||'';    bv=b.codigo||'';    }
    if(sortCol==='sigma')    { av=a.sigma||'';     bv=b.sigma||'';     }
    av=String(av||'').toLowerCase(); bv=String(bv||'').toLowerCase();
    if(av<bv) return sortDir==='asc'?-1:1;
    if(av>bv) return sortDir==='asc'?1:-1;
    return 0;
  });

  const selList = estoque.filter(function(it){ return selected[it.sigma]; });

  function toggleSel(sigma){ setSelected(function(prev){ var n=Object.assign({},prev); if(n[sigma]) delete n[sigma]; else n[sigma]=true; return n; }); }
  function clearSel(){ setSelected({}); }

  function exportSel(){
    const XLSX2 = window.XLSX;
    const header = ['QUANTIDADE','DESCRIÇÃO','CÓDIGO DO FORNECEDOR','SIGMA'];
    const rows = selList.map(function(it){ return [it.sd, it.descricao, it.codigo, it.sigma]; });
    const ws = XLSX2.utils.aoa_to_sheet([header,...rows]);
    ws['!cols']=[{wch:12},{wch:55},{wch:18},{wch:14}];
    const wb = XLSX2.utils.book_new();
    XLSX2.utils.book_append_sheet(wb,ws,'Estoque Selecionado');
    XLSX2.writeFile(wb,'estoque_selecionado_'+new Date().toISOString().slice(0,10)+'.xlsx');
  }

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,height:'100%'}}>
      {/* Controles */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}}
          placeholder="Buscar por palavra-chave, código do fornecedor ou SIGMA..."
          style={{flex:1,minWidth:220}}/>
        {/* Filtro de disponibilidade */}
        <div style={{display:'flex',gap:2,background:'var(--bg3)',borderRadius:7,padding:2,border:'1px solid var(--border)'}}>
          {[['todos','Todos'],['disponivel','Disponível'],['zerado','Zerado']].map(function(f){
            var sel = filterQtd===f[0];
            return (
              <button key={f[0]} onClick={function(){setFilterQtd(f[0]);}}
                style={{padding:'4px 10px',fontSize:10,fontWeight:sel?700:400,borderRadius:5,border:'none',
                  background:sel?'var(--card)':'transparent',
                  color:sel?'var(--text)':'var(--text3)',cursor:'pointer',whiteSpace:'nowrap'}}>
                {f[1]}
              </button>
            );
          })}
        </div>
        {selList.length>0 && (
          <button className="btn btn-green" onClick={exportSel}>📊 Exportar {selList.length}</button>
        )}
        {selList.length>0 && <button className="btn btn-secondary" onClick={clearSel}>Limpar</button>}
        <label className="btn btn-blue" style={{cursor:'pointer'}}>
          {loading?'Importando...':'📥 Importar'}
          <input type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importXLSX}/>
        </label>
      </div>

      {/* Info */}
      <div style={{display:'flex',gap:10,alignItems:'center',fontSize:11,color:'var(--text3)'}}>
        <span>{estoque.length.toLocaleString()} itens no estoque</span>
        {(q.length>=2||filterQtd!=='todos') && <span>· {filtered.length} resultado(s)</span>}
        {q.length<2&&filterQtd==='todos'&&estoque.length>500 && <span>· exibindo 500 — busque para filtrar</span>}
        {selList.length>0 && <span style={{color:'#4ADE80'}}>· {selList.length} selecionado(s)</span>}
        {sortCol && <span style={{color:'#60A5FA'}}>· ordenado por {sortCol==='sd'?'Quantidade':sortCol==='descricao'?'Descrição':sortCol==='codigo'?'Código':'SIGMA'} {sortDir==='asc'?'▲':'▼'}</span>}
      </div>

      {estoque.length===0 ? (
        <div className="card" style={{textAlign:'center',padding:'60px 20px',color:'var(--text3)'}}>
          <div style={{fontSize:32,marginBottom:12}}>📦</div>
          <div style={{fontWeight:600,marginBottom:6}}>Estoque não carregado</div>
          <div>Importe o arquivo <b>estoque.xlsx</b></div>
        </div>
      ) : (
        <div className="tbl-wrap" style={{flex:1,overflowY:'auto'}}>
          <table className="tbl">
            <thead style={{position:'sticky',top:0,zIndex:2,background:'var(--bg3)'}}>
              <tr>
                <th style={{width:28}}>
                  <input type="checkbox" onChange={function(e){
                    if(e.target.checked){ var ns={}; filtered.forEach(function(it){ns[it.sigma]=true;}); setSelected(ns); }
                    else clearSel();
                  }} checked={filtered.length>0&&filtered.every(function(it){return selected[it.sigma];})}/>
                </th>
                <th style={{width:90,textAlign:'center',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}}
                  onClick={function(){toggleSort('sd');}}>
                  QUANTIDADE <SortIcon col="sd"/>
                </th>
                <th style={{cursor:'pointer',userSelect:'none'}} onClick={function(){toggleSort('descricao');}}>
                  DESCRIÇÃO <SortIcon col="descricao"/>
                </th>
                <th style={{width:150,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}} onClick={function(){toggleSort('codigo');}}>
                  CÓDIGO FORNECEDOR <SortIcon col="codigo"/>
                </th>
                <th style={{width:120,cursor:'pointer',userSelect:'none'}} onClick={function(){toggleSort('sigma');}}>
                  SIGMA <SortIcon col="sigma"/>
                </th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(function(it,i){
                const isSel = selected[it.sigma];
                return (
                  <tr key={it.sigma+i} onClick={function(){toggleSel(it.sigma);}} style={{cursor:'pointer',background:isSel?'rgba(37,99,235,0.1)':'',borderLeft:isSel?'2px solid #2563EB':'2px solid transparent'}}>
                    <td style={{textAlign:'center'}}><input type="checkbox" checked={!!isSel} onChange={function(){}} onClick={function(e){e.stopPropagation();toggleSel(it.sigma);}}/></td>
                    <td style={{textAlign:'center',fontWeight:700,color:it.sd>0?'#4ADE80':'#F87171'}}>{it.sd}</td>
                    <td style={{fontWeight:500}} title={it.grupo}>{it.descricao}</td>
                    <td style={{fontFamily:'monospace',fontSize:11,color:'#60A5FA'}}>{it.codigo}</td>
                    <td style={{fontFamily:'monospace',fontSize:11,color:'var(--text2)'}}>{it.sigma}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

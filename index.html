    montagem:'bottom',
    // LÜBBERING
    lubTorque:'', lubPrecisao:'', lubSocket:'', lubOutput:'', lubAdaptacao:'',
    lubMinMax:'min',
    // GENÉRICO
    descProcesso:'', volumeProd:'', cicloMin:'', ergonomia:'', risco:'',
  };

  function openNew(){ setForm(Object.assign({},EMPTY_PROJ,{id:'prj_'+Date.now()})); setModal(true); }
  function openEdit(p){ setForm(Object.assign({},p)); setModal(true); }

  function saveForm(){
    if(!form.cliente.trim()||!form.projeto.trim()){ alert('Cliente e Projeto são obrigatórios.'); return; }
    const exists = projetos.find(function(p){ return p.id===form.id; });
    if(exists) saveProjs(projetos.map(function(p){ return p.id===form.id?form:p; }));
    else saveProjs([form,...projetos]);
    setModal(false);
  }

  function deleteProj(id){ if(confirm('Excluir?')) saveProjs(projetos.filter(function(p){ return p.id!==id; })); }

  function handleImages(e){
    const files = Array.from(e.target.files);
    const readers = files.map(function(file){
      return new Promise(function(resolve){
        const r = new FileReader();
        r.onload = function(ev){ resolve({name:file.name,type:file.type,data:ev.target.result}); };
        if(file.type.startsWith('video/')) r.readAsDataURL(file);
        else r.readAsDataURL(file);
      });
    });
    Promise.all(readers).then(function(imgs){
      setForm(function(f){ return Object.assign({},f,{imagens:[...(f.imagens||[]),...imgs]}); });
    });
    e.target.value='';
  }

  function removeImagem(idx){
    setForm(function(f){ return Object.assign({},f,{imagens:f.imagens.filter(function(_,i){return i!==idx;})}); });
  }

  const statusColor = {em_andamento:'#CA8A04',aprovado:'#16A34A',reprovado:'#DC2626',aguardando:'#2563EB'};
  const statusLabel = {em_andamento:'Em andamento',aprovado:'Aprovado',reprovado:'Reprovado',aguardando:'Aguardando'};

  const filtered = projetos.filter(function(p){
    if(!search.trim()) return true;
    const q=search.toLowerCase();
    return (p.cliente&&p.cliente.toLowerCase().includes(q))||(p.fornecedor&&p.fornecedor.toLowerCase().includes(q))||(p.projeto&&p.projeto.toLowerCase().includes(q));
  });

  const inp = {width:'100%'};
  const is3arm = form && form.fornecedor==='3ARM';
  const isLub  = form && form.fornecedor==='LÜBBERING';

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,height:'100%'}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Buscar projeto, cliente, fornecedor..." style={{flex:1,minWidth:180}}/>
        <button className="btn btn-primary" onClick={openNew}>+ Novo projeto</button>
      </div>

      {projetos.length===0 ? (
        <div className="card" style={{textAlign:'center',padding:'60px 20px',color:'var(--text3)'}}>
          <div style={{fontSize:32,marginBottom:12}}>⚙</div>
          <div style={{fontWeight:600,marginBottom:6}}>Nenhum projeto de aplicação</div>
          <div>Clique em <b>+ Novo projeto</b> para criar um inquiry form</div>
          <div style={{marginTop:8,fontSize:11,color:'var(--text3)'}}>Fornecedores: {INQUIRY_SUPPS.join(' · ')}</div>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {filtered.map(function(p){
            const sc = statusColor[p.status]||'#888';
            const sl = statusLabel[p.status]||p.status;
            return (
              <div key={p.id} className="card" style={{display:'flex',gap:12,alignItems:'center',borderLeft:'3px solid '+sc}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:8,alignItems:'baseline',flexWrap:'wrap',marginBottom:3}}>
                    <span style={{fontWeight:700,fontSize:13}}>{p.cliente}</span>
                    <span style={{fontSize:11,color:'#60A5FA',fontWeight:600,padding:'1px 7px',borderRadius:5,background:'rgba(37,99,235,0.15)'}}>{p.fornecedor}</span>
                    <span style={{fontSize:11,color:'var(--text2)'}}>{p.projeto}</span>
                    <span style={{fontSize:10,padding:'1px 7px',borderRadius:5,background:sc+'22',color:sc,fontWeight:600}}>{sl}</span>
                  </div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>
                    {p.responsavel&&'Resp: '+p.responsavel+' · '}
                    {p.imagens&&p.imagens.length>0&&p.imagens.length+' mídia(s) · '}
                    {p.contato&&p.contato}
                  </div>
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  {(isGestor||isEspecialista) && (
                    <button className="btn btn-secondary" style={{padding:'5px 10px',fontSize:11}} onClick={function(){setViewProj(p);}}>🖼 Mídias</button>
                  )}
                  <button className="btn btn-secondary" style={{padding:'5px 10px',fontSize:11}} onClick={function(){openEdit(p);}}>✏️</button>
                  <button onClick={function(){deleteProj(p.id);}} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:13,opacity:.4}} onMouseEnter={function(ev){ev.target.style.opacity=1;}} onMouseLeave={function(ev){ev.target.style.opacity=.4;}}>✕</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* MODAL VIEWER DE MÍDIAS (gestor/especialista) */}
      {viewProj && (
        <div className="modal-bg" onClick={function(){setViewProj(null);}}>
          <div className="modal" style={{maxWidth:800}} onClick={function(e){e.stopPropagation();}}>
            <div className="modal-hd">
              <div>
                <h2>🖼 Mídias — {viewProj.cliente}</h2>
                <div style={{fontSize:11,color:'var(--text3)'}}>{viewProj.fornecedor} · {viewProj.projeto}</div>
              </div>
              <button className="modal-close" onClick={function(){setViewProj(null);}}>✕</button>
            </div>
            {(!viewProj.imagens||viewProj.imagens.length===0) ? (
              <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}}>Nenhuma mídia enviada para este projeto.</div>
            ) : (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10}}>
                {viewProj.imagens.map(function(img,i){
                  const isVid = img.type&&img.type.startsWith('video/');
                  return (
                    <div key={i} style={{borderRadius:8,overflow:'hidden',border:'1px solid var(--border)',background:'var(--bg3)'}}>
                      {isVid
                        ? <video src={img.data} controls style={{width:'100%',maxHeight:140,objectFit:'cover'}}/>
                        : <img src={img.data} alt={img.name} style={{width:'100%',maxHeight:140,objectFit:'cover',display:'block'}}/>}
                      <div style={{padding:'4px 8px',fontSize:9,color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={img.name}>{img.name}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {/* MODAL FORMULÁRIO */}
      {modal && form && (
        <div className="modal-bg">
          <div className="modal" style={{maxWidth:760}}>
            <div className="modal-hd">
              <h2>⚙ Inquiry Form — {form.fornecedor}</h2>
              <button className="modal-close" onClick={function(){setModal(false);}}>✕</button>
            </div>

            {/* Fornecedor */}
            <div className="grid-3" style={{marginBottom:10}}>
              <div className="field">
                <label>Fornecedor</label>
                <select value={form.fornecedor} onChange={function(e){setForm(Object.assign({},form,{fornecedor:e.target.value}));}} style={inp}>
                  {INQUIRY_SUPPS.map(function(s){ return <option key={s} value={s}>{s}</option>; })}
                </select>
              </div>
              <div className="field">
                <label>Status</label>
                <select value={form.status} onChange={function(e){setForm(Object.assign({},form,{status:e.target.value}));}} style={inp}>
                  <option value="em_andamento">Em andamento</option>
                  <option value="aguardando">Aguardando</option>
                  <option value="aprovado">Aprovado</option>
                  <option value="reprovado">Reprovado</option>
                </select>
              </div>
              <div className="field"><label>Responsável</label><input value={form.responsavel||''} onChange={function(e){setForm(Object.assign({},form,{responsavel:e.target.value}));}} style={inp}/></div>
            </div>

            {/* Dados do cliente */}
            <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>Dados do Cliente (Contact Details)</div>
            <div className="grid-3" style={{marginBottom:10}}>
              <div className="field"><label>Cliente / Empresa *</label><input value={form.cliente||''} onChange={function(e){setForm(Object.assign({},form,{cliente:e.target.value}));}} style={inp} autoFocus/></div>
              <div className="field"><label>Nome do Contato</label><input value={form.contato||''} onChange={function(e){setForm(Object.assign({},form,{contato:e.target.value}));}} style={inp}/></div>
              <div className="field"><label>Telefone</label><input value={form.telefone||''} onChange={function(e){setForm(Object.assign({},form,{telefone:e.target.value}));}} style={inp}/></div>
            </div>
            <div className="grid-2" style={{marginBottom:10}}>
              <div className="field"><label>E-mail</label><input value={form.email||''} onChange={function(e){setForm(Object.assign({},form,{email:e.target.value}));}} style={inp}/></div>
              <div className="field"><label>Projeto / Aplicação *</label><input value={form.projeto||''} onChange={function(e){setForm(Object.assign({},form,{projeto:e.target.value}));}} style={inp}/></div>
            </div>

            {/* Campos específicos 3ARM */}
            {is3arm && (
              <div>
                <div style={{fontSize:10,fontWeight:700,color:'#60A5FA',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>3ARM — Kind of Tool</div>
                <div className="grid-3" style={{marginBottom:8}}>
                  <div className="field"><label>Marca da ferramenta</label><input value={form.marca||''} onChange={function(e){setForm(Object.assign({},form,{marca:e.target.value}));}} style={inp} placeholder="Ex: Bosch, Milwaukee"/></div>
                  <div className="field"><label>Peso máx. (kg)</label><input type="number" value={form.peso||''} onChange={function(e){setForm(Object.assign({},form,{peso:e.target.value}));}} style={inp}/></div>
                  <div className="field"><label>Torque máx. (Nm)</label><input type="number" value={form.torqueMax||''} onChange={function(e){setForm(Object.assign({},form,{torqueMax:e.target.value}));}} style={inp}/></div>
                </div>
                <div style={{marginBottom:8}}>
                  <label style={{display:'block',fontSize:10,fontWeight:600,color:'var(--text2)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.05em'}}>Tipo de ferramenta</label>
                  <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                    {['Esmerilhadeira','Furadeira','Furadeira magnética','Chave de impacto','Ferramenta de aperto'].map(function(t){
                      const arr = form.tipoFerramenta||[];
                      const on  = arr.includes(t);
                      return <label key={t} style={{display:'flex',gap:5,alignItems:'center',fontSize:11,cursor:'pointer'}}>
                        <input type="checkbox" checked={on} onChange={function(){
                          setForm(Object.assign({},form,{tipoFerramenta:on?arr.filter(function(x){return x!==t;}):[...arr,t]}));
                        }}/>{t}</label>;
                    })}
                  </div>
                </div>
                <div style={{fontSize:10,fontWeight:700,color:'#60A5FA',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>Working Conditions</div>
                <div style={{display:'flex',gap:16,flexWrap:'wrap',marginBottom:8}}>
                  {[['Vertical','vertical'],['Horizontal','horizontal'],['Qualquer ângulo','qualquer']].map(function(p){
                    const arr=form.posicao||[];
                    const on=arr.includes(p[1]);
                    return <label key={p[1]} style={{display:'flex',gap:5,alignItems:'center',fontSize:11,cursor:'pointer'}}>
                      <input type="checkbox" checked={on} onChange={function(){ setForm(Object.assign({},form,{posicao:on?arr.filter(function(x){return x!==p[1];}):[...arr,p[1]]})); }}/>{p[0]}</label>;
                  })}
                  <label style={{display:'flex',gap:5,alignItems:'center',fontSize:11,cursor:'pointer'}}>
                    <input type="checkbox" checked={!!form.reacaoBar} onChange={function(){setForm(Object.assign({},form,{reacaoBar:!form.reacaoBar}));}}/> Usa barra de reação
                  </label>
                  <label style={{display:'flex',gap:5,alignItems:'center',fontSize:11,cursor:'pointer'}}>
                    <input type="checkbox" checked={!!form.movimentaEstacao} onChange={function(){setForm(Object.assign({},form,{movimentaEstacao:!form.movimentaEstacao}));}}/> Move de estação
                  </label>
                  <label style={{display:'flex',gap:5,alignItems:'center',fontSize:11,cursor:'pointer'}}>
                    <input type="checkbox" checked={!!form.trocaFerramenta} onChange={function(){setForm(Object.assign({},form,{trocaFerramenta:!form.trocaFerramenta}));}}/> Troca de ferramenta
                  </label>
                </div>
                <div style={{fontSize:10,fontWeight:700,color:'#60A5FA',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>Work Place</div>
                <div className="grid-4" style={{marginBottom:8}}>
                  <div className="field"><label>Altura mín. (mm)</label><input type="number" value={form.alturaMin||''} onChange={function(e){setForm(Object.assign({},form,{alturaMin:e.target.value}));}} style={inp}/></div>
                  <div className="field"><label>Altura máx. (mm)</label><input type="number" value={form.alturaMax||''} onChange={function(e){setForm(Object.assign({},form,{alturaMax:e.target.value}));}} style={inp}/></div>
                  <div className="field"><label>Alcance (mm)</label><input type="number" value={form.alcance||''} onChange={function(e){setForm(Object.assign({},form,{alcance:e.target.value}));}} style={inp}/></div>
                  <div className="field">
                    <label>Montagem</label>
                    <select value={form.montagem||'bottom'} onChange={function(e){setForm(Object.assign({},form,{montagem:e.target.value}));}} style={inp}>
                      <option value="top">Top mount</option>
                      <option value="bottom">Bottom mount</option>
                    </select>
                  </div>
                </div>
                <div style={{display:'flex',gap:16,marginBottom:8,flexWrap:'wrap'}}>
                  <label style={{display:'flex',gap:5,alignItems:'center',fontSize:11,cursor:'pointer'}}>
                    <input type="checkbox" checked={!!form.fotos} onChange={function(){setForm(Object.assign({},form,{fotos:!form.fotos}));}}/> Pode fornecer fotos/sketch
                  </label>
                </div>
              </div>
            )}

            {/* Campos específicos LÜBBERING */}
            {isLub && (
              <div>
                <div style={{fontSize:10,fontWeight:700,color:'#60A5FA',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>LÜBBERING — Dados Técnicos (Technical Details)</div>
                <div className="grid-4" style={{marginBottom:8}}>
                  <div className="field">
                    <label>Min / Max</label>
                    <select value={form.lubMinMax||'min'} onChange={function(e){setForm(Object.assign({},form,{lubMinMax:e.target.value}));}} style={inp}>
                      <option value="min">Mínimo</option>
                      <option value="max">Máximo</option>
                    </select>
                  </div>
                  <div className="field"><label>Torque (Nm)</label><input type="number" value={form.lubTorque||''} onChange={function(e){setForm(Object.assign({},form,{lubTorque:e.target.value}));}} style={inp}/></div>
                  <div className="field"><label>Precisão</label><input value={form.lubPrecisao||''} onChange={function(e){setForm(Object.assign({},form,{lubPrecisao:e.target.value}));}} style={inp} placeholder="±5%"/></div>
                  <div className="field"><label>Tamanho soquete (mm)</label><input value={form.lubSocket||''} onChange={function(e){setForm(Object.assign({},form,{lubSocket:e.target.value}));}} style={inp}/></div>
                </div>
                <div className="grid-2" style={{marginBottom:8}}>
                  <div className="field">
                    <label>Tipo de output (saída)</label>
                    <select value={form.lubOutput||''} onChange={function(e){setForm(Object.assign({},form,{lubOutput:e.target.value}));}} style={inp}>
                      <option value="">Selecione...</option>
                      <option value="closed_offset_1">Closed offset (tipo 1)</option>
                      <option value="closed_offset_2">Closed offset (tipo 2)</option>
                      <option value="open_offset">Open offset</option>
                    </select>
                  </div>
                  <div className="field">
                    <label>Tipo de adaptação</label>
                    <select value={form.lubAdaptacao||''} onChange={function(e){setForm(Object.assign({},form,{lubAdaptacao:e.target.value}));}} style={inp}>
                      <option value="">Selecione...</option>
                      <option value="90">Angle head 90°</option>
                      <option value="110">Angle head 110°</option>
                      <option value="reto">Straight spindle</option>
                      <option value="pistola">Pistol grip</option>
                    </select>
                  </div>
                </div>
              </div>
            )}

            {/* Campos genéricos (todos os fornecedores) */}
            <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',marginBottom:6,marginTop:10,textTransform:'uppercase',letterSpacing:'.06em'}}>Processo e Aplicação</div>
            <div className="grid-3" style={{marginBottom:10}}>
              <div className="field"><label>Descrição do processo</label><input value={form.descProcesso||''} onChange={function(e){setForm(Object.assign({},form,{descProcesso:e.target.value}));}} style={inp} placeholder="Montagem de rodas, flange, etc."/></div>
              <div className="field"><label>Volume / turno</label><input value={form.volumeProd||''} onChange={function(e){setForm(Object.assign({},form,{volumeProd:e.target.value}));}} style={inp}/></div>
              <div className="field"><label>Ciclo (min)</label><input value={form.cicloMin||''} onChange={function(e){setForm(Object.assign({},form,{cicloMin:e.target.value}));}} style={inp}/></div>
            </div>
            <div className="grid-2" style={{marginBottom:10}}>
              <div className="field"><label>Ergonomia / fadiga atual</label><input value={form.ergonomia||''} onChange={function(e){setForm(Object.assign({},form,{ergonomia:e.target.value}));}} style={inp}/></div>
              <div className="field"><label>Risco / problema atual</label><input value={form.risco||''} onChange={function(e){setForm(Object.assign({},form,{risco:e.target.value}));}} style={inp}/></div>
            </div>
            <div className="field" style={{marginBottom:10}}>
              <label>Observações / Notes</label>
              <textarea value={form.obs||''} onChange={function(e){setForm(Object.assign({},form,{obs:e.target.value}));}} style={{width:'100%',height:60,resize:'vertical'}}/>
            </div>

            {/* Upload de mídias */}
            <div style={{marginBottom:14}}>
              <label style={{display:'block',fontSize:10,fontWeight:600,color:'var(--text2)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>
                Imagens e vídeos do processo
              </label>
              <label className="btn btn-secondary" style={{cursor:'pointer',display:'inline-flex',gap:6,marginBottom:8}}>
                📎 Adicionar mídia
                <input type="file" accept="image/*,video/*" multiple style={{display:'none'}} onChange={handleImages}/>
              </label>
              {form.imagens&&form.imagens.length>0 && (
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {form.imagens.map(function(img,i){
                    const isVid = img.type&&img.type.startsWith('video/');
                    return (
                      <div key={i} style={{position:'relative',borderRadius:6,overflow:'hidden',border:'1px solid var(--border)',width:90,height:70,background:'var(--bg3)'}}>
                        {isVid
                          ? <video src={img.data} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                          : <img src={img.data} alt={img.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>}
                        <button onClick={function(){removeImagem(i);}} style={{position:'absolute',top:2,right:2,width:16,height:16,borderRadius:'50%',background:'rgba(0,0,0,.7)',border:'none',color:'#fff',fontSize:9,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>✕</button>
                        {isVid&&<div style={{position:'absolute',bottom:2,left:2,fontSize:8,color:'#fff',background:'rgba(0,0,0,.5)',borderRadius:3,padding:'1px 3px'}}>▶ vídeo</div>}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={saveForm} style={{flex:1}}>💾 Salvar</button>
              <button className="btn btn-secondary" onClick={function(){setModal(false);}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── VIEW: ORÇAMENTO ─────────────────────────────────────────
function ViewOrcamento({ session, isGestor }) {
  const [orcs,    setOrcs]    = useState(function(){ return load('crm_orcs_v1', []); });
  const [modal,   setModal]   = useState(false);
  const [form,    setForm]    = useState(null);
  const [search,  setSearch]  = useState('');
  const [selOrc,  setSelOrc]  = useState(null);
  const [cliSearch,  setCliSearch]   = useState('');
  const [showCliDrop,setShowCliDrop] = useState(false);

  function saveOrcs(list){ setOrcs(list); save('crm_orcs_v1', list); }

  const EMPTY_ORC = {
    id:'', numero:'', cliente:'', _cliApelido:'', contato:'', email:'',
    supplier:'', descricao:'', oppId:'',
    itens:[{item:1,posto:'',subposto:'',torque:'',qtd:1,descricao:'',codigo:'',sigma:'',ncm:'',entrega:'',origem:'0 - NACIONAL',unitario:0,icms:0.12,pis:0.0065,cofins:0.03,ipi:0,st:0}],
    status:'rascunho', data:'', validade:'', obs:'',
    pagamento:'30 DDL', prazoEntrega:'', baseCambial:'', localEntrega:'CIF',
    garantia:'12 meses', termosGarantia:'', cidadeUf:'', email:'',
  };

  function openNew(){
    var num = String(orcs.length+1).padStart(5,'0');
    setForm(Object.assign({},EMPTY_ORC,{id:'orc_'+Date.now(),numero:'RB'+num+'/'+CUR_YEAR}));
    setCliSearch(''); setShowCliDrop(false);
    setModal(true);
  }
  function openEdit(o){ setForm(Object.assign({},o)); setCliSearch(''); setShowCliDrop(false); setModal(true); }
  function deleteOrc(id){ if(confirm('Excluir?')) saveOrcs(orcs.filter(function(o){return o.id!==id;})); }

  function calcItem(it){
    var u  = parseFloat(it.unitario)||0;
    var q  = parseFloat(it.qtd)||1;
    var total = u*q;
    var semIcms = u*(1-(parseFloat(it.icms)||0)-(parseFloat(it.pis)||0)-(parseFloat(it.cofins)||0));
    var comIpi  = u+(parseFloat(it.ipi)||0);
    var comSt   = comIpi+(parseFloat(it.st)||0);
    return {total:total.toFixed(2), semIcms:semIcms.toFixed(2), comIpi:comIpi.toFixed(2), comSt:comSt.toFixed(2), totalIpi:(comIpi*q).toFixed(2), totalSt:(comSt*q).toFixed(2)};
  }

  function totais(itens){
    return itens.reduce(function(acc,it){
      var c = calcItem(it);
      return {
        totalBruto: acc.totalBruto + parseFloat(c.total),
        totalIpi:   acc.totalIpi   + parseFloat(c.totalIpi),
        totalSt:    acc.totalSt    + parseFloat(c.totalSt),
      };
    },{totalBruto:0,totalIpi:0,totalSt:0});
  }

  function saveForm(){
    if(!form.cliente.trim()){alert('Informe o cliente.');return;}
    var exists = orcs.find(function(o){return o.id===form.id;});
    var updated = Object.assign({},form,{
      totalBruto: totais(form.itens||[]).totalBruto,
      totalIpi:   totais(form.itens||[]).totalIpi,
    });
    if(exists) saveOrcs(orcs.map(function(o){return o.id===form.id?updated:o;}));

    setModal(false);
  }

    var css = '*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,Helvetica,sans-serif;font-size:9pt;color:#222;}@page{margin:15mm 12mm;size:A4;}@media print{.noprint{display:none!important;}}.page{max-width:210mm;margin:0 auto;padding:10mm 12mm;}.header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:10px;border-bottom:2px solid #E8E8E8;margin-bottom:14px;}.logo-box{font-size:18pt;font-weight:900;letter-spacing:.08em;color:#1A1A2E;}.logo-sub{font-size:7pt;color:#888;letter-spacing:.15em;margin-top:2px;}.supplier-badge{padding:4px 12px;border-radius:4px;background:#F5F5F5;border:1px solid #DDD;font-size:8pt;font-weight:700;color:#444;}.cliente-block{background:#F8F9FA;border-left:3px solid #1A1A2E;padding:10px 14px;margin-bottom:14px;}.cliente-nome{font-size:13pt;font-weight:700;color:#1A1A2E;margin-bottom:4px;}.ref-line{font-size:8pt;color:#555;margin-bottom:2px;}.ref-num{font-weight:700;font-size:10pt;}table{width:100%;border-collapse:collapse;margin-bottom:12px;}th{background:#1A1A2E;color:#fff;padding:6px 8px;font-size:8pt;text-align:left;border:1px solid #1A1A2E;}td{padding:6px 8px;border:1px solid #D0D0D0;vertical-align:top;font-size:8.5pt;}tr:nth-child(even) td{background:#FAFAFA;}.cc-table{width:100%;border-collapse:collapse;margin-bottom:16px;}.cc-table td{padding:5px 8px;border:1px solid #D0D0D0;font-size:8.5pt;}.cc-table td:first-child{font-weight:700;background:#F0F0F0;width:30%;}.cc-header{background:#1A1A2E;color:#fff;font-weight:700;padding:6px 10px;font-size:9pt;margin-bottom:0;}.sig-block{display:flex;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid #DDD;}.sig{text-align:center;width:45%;}.sig-line{border-top:1px solid #333;padding-top:4px;font-size:8pt;margin-top:30px;}.footer-bar{margin-top:16px;padding-top:8px;border-top:1px solid #CCC;font-size:7pt;color:#888;display:flex;justify-content:space-between;align-items:center;}';
    var hdr = '<div class="header"><div><div class="logo-box">⚡ FORGE B2B</div><div class="logo-sub">TORQUE + CONTROLE · SOLUÇÕES INDUSTRIAIS</div></div>'+(o.supplier?'<div class="supplier-badge">'+o.supplier+'</div>':'')+'</div>';

    var tbl = '<table><thead><tr><th style="width:40px">ITEM</th><th style="width:45px">QDE</th><th>DESCRIÇÃO</th><th style="width:100px">CÓDIGO</th><th style="width:70px">IMAGEM</th></tr></thead><tbody>'+rows+'</tbody></table>';
    var cc  = '<div class="cc-header">CONDIÇÕES COMERCIAIS</div><table class="cc-table"><tr><td>VALOR TOTAL:</td><td><strong>'+totalFmt+'</strong></td></tr>'+(o.pagamento?'<tr><td>PAGAMENTO:</td><td>'+o.pagamento+'</td></tr>':'')+(o.prazoEntrega?'<tr><td>PRAZO DE ENTREGA:</td><td>'+o.prazoEntrega+'</td></tr>':'')+(o.baseCambial?'<tr><td>BASE CAMBIAL:</td><td>'+o.baseCambial+'</td></tr>':'')+'<tr><td>IMPOSTOS:</td><td>ICMS: '+icmsPct+'% &nbsp;|&nbsp; IPI: '+ipiPct+'% &nbsp;|&nbsp; ST: '+stPct+'%</td></tr>'+(o.localEntrega?'<tr><td>LOCAL DE ENTREGA:</td><td>'+o.localEntrega+'</td></tr>':'')+(o.garantia?'<tr><td>PRAZO DE GARANTIA:</td><td>'+o.garantia+'</td></tr>':'')+'<tr><td>TERMOS DE GARANTIA:</td><td>'+(o.termosGarantia||'A garantia cobrirá exclusivamente defeitos de fabricação, de material e de montagem na fábrica, não incluindo defeitos causados por operação e manutenção inadequadas, desgastes normais ou acidentes.')+'</td></tr><tr><td>VALIDADE DA PROPOSTA:</td><td>'+(o.validade||'15')+' dias</td></tr>'+(o.obs?'<tr><td>OBSERVAÇÕES:</td><td>'+o.obs+'</td></tr>':'')+'</table>';
    var sig = '<div class="sig-block"><div style="font-size:8pt;color:#555">Atenciosamente,</div><div class="sig"><div class="sig-line"><strong>'+vendNome+'</strong>'+(vendFone?'<br/>☎ '+vendFone:'')+(vendEmail?'<br/>✉ '+vendEmail:'')+'</div></div></div>';
    var ftr = '<div class="footer-bar"><span>SINUELO SERVICE LTDA &nbsp;|&nbsp; Rua Antônio Kaminski, 190 – Curitiba/PR – CEP 81200-402</span><span>+55 41 3335-5005 &nbsp;|&nbsp; crm@sinuelo.com</span></div>';
    return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+o.numero+'</title><style>'+css+'</style></head><body><div class="page">'+hdr+cli+tbl+cc+sig+ftr+'</div></body></html>';

  function importXLSX(e){
    var file = e.target.files[0]; if(!file) return;
    var fileName = file.name.replace(/\.xlsx?$/i,'');
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var wb = XLSX.read(ev.target.result,{type:'binary'});
        var ws = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

        // ── Extrair info do nome do arquivo ──────────────────────────────────
        // Padrão: RB_CLIENTE_CONTATO_RBnnnnn_AnoEF_sigmas
        // Ex: RB_JACTO3_THIAGO_ALBERTIN_RB19827_25EF_10648286...
        var orcNum = '', cliNomeArq = '', contNomeArq = '';
        var partes = fileName.split(/[_\-]/);
        // Número RB (ex: RB19827)
        var rbMatch = fileName.match(/RB(\d{4,})/i);
        if(rbMatch) orcNum = 'RB'+rbMatch[1]+'/'+CUR_YEAR;
        // Primeiro token após RB_ é o cliente, segundo é o contato (primeiro nome), terceiro sobrenome
        if(partes.length>=2 && partes[0].toUpperCase()==='RB'){
          cliNomeArq  = partes[1]||'';   // ex: JACTO3 → vai buscar "JACTO"
          contNomeArq = (partes[2]||'') + (partes[3]?' '+partes[3]:''); // ex: THIAGO ALBERTIN
        }
        // Limpar número do final do nome do cliente (JACTO3 → JACTO)
        cliNomeArq = cliNomeArq.replace(/\d+$/,'');

        // ── Cruzar cliente com cadastro ───────────────────────────────────────
        var clientsData = load(KEYS.clients,[]);
        var cliMatch = clientsData.find(function(c){
          var q = cliNomeArq.toLowerCase();
          return (c.apelido&&c.apelido.toLowerCase().includes(q))
              || (c.nome&&c.nome.toLowerCase().includes(q));
        });

        // ── Cruzar contato ────────────────────────────────────────────────────
        var ctMatch = null;
        if(cliMatch && cliMatch.contatos && contNomeArq){
          var cn = contNomeArq.toLowerCase();
          ctMatch = cliMatch.contatos.find(function(ct){
            return ct.nome&&ct.nome.toLowerCase().includes(cn.split(' ')[0]);
          });
        }

        // ── Encontrar linha de header na planilha ─────────────────────────────
        var hdr = -1, headers = [];
        for(var ri=0;ri<Math.min(20,rows.length);ri++){
          var r = (rows[ri]||[]).map(function(c){return String(c||'').trim().toUpperCase().replace(/\n/g,' ');});
          if(r.indexOf('ITEM')>=0 && (r.indexOf('DESCRIÇÃO')>=0||r.indexOf('DESCRICAO')>=0)){hdr=ri;headers=r;break;}
          if(r.indexOf('ITEM')>=0 && r.indexOf('SIGMA')>=0){hdr=ri;headers=r;break;}
        }
        if(hdr<0){ alert('Formato não reconhecido.\n\nA planilha deve ter uma linha com ITEM e DESCRIÇÃO.'); return; }

        // ── Mapear índices das colunas ────────────────────────────────────────
        var iItem = headers.indexOf('ITEM');
        var iDesc = Math.max(headers.indexOf('DESCRIÇÃO'), headers.indexOf('DESCRICAO'));
        var iCod  = Math.max(headers.indexOf('CÓDIGO'), headers.indexOf('CODIGO'));
        var iSig  = headers.indexOf('SIGMA');
        var iNcm  = headers.indexOf('NCM');
        var iQde  = Math.max(headers.indexOf('QDE'), headers.indexOf('QTD'));
        var iUni  = Math.max(headers.indexOf('UNITÁRIO'), headers.indexOf('UNITARIO'));
        var iPosto= headers.indexOf('POSTOS');
        var iSub  = headers.indexOf('SUBPOSTOS');
        var iTorq = headers.findIndex(function(h){return h.startsWith('TORQUES');});
        var iEnt  = headers.indexOf('ENTREGA');
        var iOri  = headers.indexOf('ORIGEM MATERIAL');
        var iIcms = headers.indexOf('ICMS');
        var iPis  = headers.indexOf('PIS');
        var iCof  = headers.indexOf('COFINS');
        var iIpi  = Math.max(headers.indexOf('I.P.I. / I.S.S.'), headers.indexOf('I.P.I./I.S.S.'));
        var iSt   = headers.findIndex(function(h){return h.startsWith('ST');});

        // ── Ler itens ─────────────────────────────────────────────────────────
        var itens = [];
        for(var ri3=hdr+1;ri3<rows.length;ri3++){
          var row3 = rows[ri3]||[];
          var itemN = String(row3[iItem]||'').trim();
          if(!itemN || isNaN(parseInt(itemN))) continue;
          var desc = iDesc>=0?String(row3[iDesc]||'').trim():'';
          if(!desc) continue;
          var uni = iUni>=0?parseFloat(row3[iUni])||0:0;
          itens.push({
            item:     parseInt(itemN)||itens.length+1,
            posto:    iPosto>=0?String(row3[iPosto]||''):'',
            subposto: iSub>=0?String(row3[iSub]||''):'',
            torque:   iTorq>=0?String(row3[iTorq]||''):'',
            qtd:      iQde>=0?parseFloat(row3[iQde])||1:1,
            descricao:desc,
            codigo:   iCod>=0?String(row3[iCod]||''):'',
            sigma:    iSig>=0?String(row3[iSig]||''):'',
            ncm:      iNcm>=0?String(row3[iNcm]||''):'',
            entrega:  iEnt>=0?String(row3[iEnt]||''):'',
            origem:   iOri>=0?String(row3[iOri]||''):'0 - NACIONAL',
            unitario: uni,
            icms:     iIcms>=0?parseFloat(row3[iIcms])||0.12:0.12,
            pis:      iPis>=0?parseFloat(row3[iPis])||0.0065:0.0065,
            cofins:   iCof>=0?parseFloat(row3[iCof])||0.03:0.03,
            ipi:      iIpi>=0?parseFloat(row3[iIpi])||0:0,
            st:       iSt>=0?parseFloat(row3[iSt])||0:0,
          });
        }
        if(!itens.length){alert('Nenhum item encontrado na planilha.\nVerifique se há linhas com ITEM e DESCRIÇÃO preenchidos.');return;}

        var num2 = String(orcs.length+1).padStart(5,'0');
        var novoOrc = Object.assign({},EMPTY_ORC,{
          id:          'orc_'+Date.now(),
          numero:      orcNum||'RB'+num2+'/'+CUR_YEAR,
          // Cliente do cadastro (ou do nome do arquivo)
          _cliApelido: cliMatch?cliMatch.apelido:'',
          cliente:     cliMatch?cliMatch.apelido:cliNomeArq,
          // Endereço e dados do cliente
          cnpj:        cliMatch?cliMatch.cnpj:'',
          cidadeUf:    cliMatch?(cliMatch.cidade&&cliMatch.estado?cliMatch.cidade+' / '+cliMatch.estado:''):'',
          cep:         cliMatch?cliMatch.cep:'',
          endereco:    cliMatch?cliMatch.endereco:'',
          // Contato encontrado
          contato:     ctMatch?ctMatch.nome:(contNomeArq||''),
          email:       ctMatch?ctMatch.email:'',
          fone:        ctMatch?ctMatch.tel||ctMatch.cel:'',
          // Itens e totais
          itens:       itens,
          totalBruto:  totais(itens).totalBruto,
          totalIpi:    totais(itens).totalIpi,
          status:      'rascunho',
        });

        setForm(novoOrc);
        setCliSearch(''); setShowCliDrop(false);
        setModal(true);

        var msg = itens.length+' itens importados';
        if(cliMatch) msg += '\n✅ Cliente: '+cliMatch.apelido;
        else if(cliNomeArq) msg += '\n⚠️ Cliente "'+cliNomeArq+'" não encontrado no cadastro — verifique';
        if(ctMatch) msg += '\n✅ Contato: '+ctMatch.nome;
        alert(msg+'\n\nRevise e salve o orçamento.');
      }catch(err){alert('Erro ao importar: '+err.message);}
    };
    reader.readAsBinaryString(file);
    e.target.value='';
  }

  var clientsData = load(KEYS.clients,[]);
  var cliFiltered = cliSearch.length>=1 ? clientsData.filter(function(c){var q=cliSearch.toLowerCase();return (c.apelido&&c.apelido.toLowerCase().includes(q))||(c.nome&&c.nome.toLowerCase().includes(q));}).slice(0,8) : [];
  var fcOpps = load(KEYS.forecast,[]);

  var statusColor = {rascunho:'#64748B',enviado:'#2563EB',aprovado:'#16A34A',reprovado:'#DC2626'};
  var statusLabel = {rascunho:'Rascunho',enviado:'Enviado',aprovado:'Aprovado',reprovado:'Reprovado'};

  var filtered = orcs.filter(function(o){
    if(!search.trim()) return true;
    var q=search.toLowerCase();
    return (o.cliente&&o.cliente.toLowerCase().includes(q))||(o.numero&&o.numero.toLowerCase().includes(q))||(o.supplier&&o.supplier.toLowerCase().includes(q));
  });

  var inp = {width:'100%'};
  var SUPPLIERS = ['BOSCH IW','BOSCH PT','HS-T','LÜBBERING','MILWAUKEE','MOMENTO','NORBAR','ENERPAC','PANASONIC','STAHLWILLE','STURTEVANT','3ARM','KISTLER','SCHATZ','TECNA','JAGER','NOMUDA','VESSEL','OUTROS'];

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,height:'100%'}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Buscar por nº, cliente, fornecedor..." style={{flex:1,minWidth:180}}/>
        <button className="btn btn-primary" onClick={openNew}>+ Novo orçamento</button>
        <label className="btn btn-blue" style={{cursor:'pointer'}}>
          📥 Importar Excel
          <input type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importXLSX}/>
        </label>
      </div>

      {orcs.length===0 ? (
        <div className="card" style={{textAlign:'center',padding:'60px 20px',color:'var(--text3)'}}>
          <div style={{fontSize:32,marginBottom:12}}>📝</div>
          <div style={{fontWeight:600,marginBottom:6}}>Nenhum orçamento</div>
          <div>Clique em <b>+ Novo orçamento</b> para criar</div>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {filtered.map(function(o){
            var sc = statusColor[o.status]||'#888';
            var t  = totais(o.itens||[]);
            return (
              <div key={o.id} className="card" style={{display:'flex',gap:12,alignItems:'center',borderLeft:'3px solid '+sc}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:8,alignItems:'baseline',flexWrap:'wrap',marginBottom:2}}>
                    <span style={{fontWeight:700,fontSize:12,fontFamily:'monospace',color:'#60A5FA'}}>{o.numero}</span>
                    <span style={{fontWeight:600,fontSize:13}}>{o.cliente}</span>
                    {o.supplier && <span style={{fontSize:11,padding:'1px 7px',borderRadius:5,background:'rgba(37,99,235,0.15)',color:'#60A5FA'}}>{o.supplier}</span>}
                    <span style={{fontSize:10,padding:'1px 7px',borderRadius:5,background:sc+'22',color:sc,fontWeight:600}}>{statusLabel[o.status]||o.status}</span>
                  </div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>
                    {o.data&&o.data+' · '}
                    {(o.itens||[]).length} iten(s) ·
                    <b style={{color:'#4ADE80'}}> R${t.totalBruto.toFixed(0)}</b> bruto /
                    <b style={{color:'#60A5FA'}}> R${t.totalIpi.toFixed(0)}</b> c/ IPI
                    {o.descricao && ' · '+o.descricao}
                  </div>
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  <button className="btn btn-secondary" style={{padding:'5px 10px',fontSize:11}} onClick={function(){openEdit(o);}}>✏️</button>
                  <button className="btn btn-green" style={{padding:'5px 10px',fontSize:11}} onClick={function(){exportPDF(o);}}>📄 PDF</button>
                  <button className="btn btn-blue" style={{padding:'5px 10px',fontSize:11}} onClick={function(){enviarEmailOutlook(o);}} title="Enviar via Outlook">📧 E-mail</button>
                  <button onClick={function(){deleteOrc(o.id);}} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:13,opacity:.4}} onMouseEnter={function(ev){ev.target.style.opacity=1;}} onMouseLeave={function(ev){ev.target.style.opacity=.4;}}>✕</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* MODAL ORÇAMENTO */}
      {modal && form && (
        <div className="modal-bg">
          <div className="modal" style={{maxWidth:900}}>
            <div className="modal-hd">
              <h2>📝 {form.numero}</h2>
              <button className="modal-close" onClick={function(){setModal(false);}}>✕</button>
            </div>
            <div className="grid-4" style={{marginBottom:10}}>
              <div className="field"><label>Nº Orçamento</label><input value={form.numero||''} onChange={function(e){setForm(Object.assign({},form,{numero:e.target.value}));}} style={inp}/></div>
              <div className="field"><label>Data</label><input type="date" value={form.data||''} onChange={function(e){setForm(Object.assign({},form,{data:e.target.value}));}} style={inp}/></div>
              <div className="field"><label>Validade</label><input type="date" value={form.validade||''} onChange={function(e){setForm(Object.assign({},form,{validade:e.target.value}));}} style={inp}/></div>
              <div className="field">
                <label>Status</label>
                <select value={form.status||'rascunho'} onChange={function(e){setForm(Object.assign({},form,{status:e.target.value}));}} style={inp}>
                  <option value="rascunho">Rascunho</option>
                  <option value="enviado">Enviado</option>
                  <option value="aprovado">Aprovado</option>
                  <option value="reprovado">Reprovado</option>
                </select>
              </div>
            </div>
            <div className="grid-3" style={{marginBottom:10}}>
              {/* Cliente autocomplete */}
              <div className="field" style={{position:'relative'}}>
                <label>Cliente *</label>
                {!form._cliApelido ? (
                  <div>
                    <input value={cliSearch} onChange={function(e){setCliSearch(e.target.value);setShowCliDrop(true);}} onFocus={function(){setShowCliDrop(true);}} placeholder="Buscar empresa..." style={inp}/>
                    {showCliDrop && cliFiltered.length>0 && (
                      <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:50,background:'var(--bg3)',border:'1px solid var(--blue)',borderRadius:'0 0 8px 8px',maxHeight:200,overflowY:'auto',boxShadow:'0 8px 24px rgba(0,0,0,.5)'}}>
                        {cliFiltered.map(function(c){
                          return <div key={c.id||c.apelido} onClick={function(){
                            setForm(Object.assign({},form,{_cliApelido:c.apelido,cliente:c.apelido,contato:(c.contatos&&c.contatos[0]?c.contatos[0].nome:''),email:(c.contatos&&c.contatos[0]?c.contatos[0].email:'')}));
                            setCliSearch(''); setShowCliDrop(false);
                          }} style={{padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--border2)'}} onMouseEnter={function(ev){ev.currentTarget.style.background='rgba(37,99,235,.15)';}} onMouseLeave={function(ev){ev.currentTarget.style.background='transparent';}}>
                            <div style={{fontWeight:600,fontSize:12}}>{c.apelido}</div>
                            <div style={{fontSize:10,color:'var(--text3)'}}>{c.nome}</div>
                          </div>;
                        })}
                      </div>
                    )}
                  </div>
                ) : (
                  <div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(37,99,235,.1)',border:'1px solid rgba(37,99,235,.3)',borderRadius:8,padding:'7px 10px'}}>
                    <span style={{flex:1,fontWeight:600,fontSize:12}}>{form.cliente}</span>
                    <button onClick={function(){setForm(Object.assign({},form,{_cliApelido:'',cliente:''}));setCliSearch('');}} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14}}>✕</button>
                  </div>
                )}
              </div>
              <div className="field"><label>Contato</label><input value={form.contato||''} onChange={function(e){setForm(Object.assign({},form,{contato:e.target.value}));}} style={inp}/></div>
              <div className="field">
                <label>Fornecedor / Marca</label>
                <select value={form.supplier||''} onChange={function(e){setForm(Object.assign({},form,{supplier:e.target.value}));}} style={inp}>
                  <option value="">Selecione...</option>
                  {SUPPLIERS.map(function(s){return <option key={s} value={s}>{s}</option>;})}
                </select>
              </div>
            </div>
            <div className="field" style={{marginBottom:10}}>
              <label>Descrição geral / Projeto</label>
              <input value={form.descricao||''} onChange={function(e){setForm(Object.assign({},form,{descricao:e.target.value}));}} style={inp}/>
            </div>

            {/* Condições comerciais */}
            <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>Condições comerciais</div>
            <div className="grid-4" style={{marginBottom:10}}>
              <div className="field"><label>Pagamento</label><input value={form.pagamento||''} onChange={function(e){setForm(Object.assign({},form,{pagamento:e.target.value}));}} style={inp} placeholder="30 DDL"/></div>
              <div className="field"><label>Prazo entrega</label><input value={form.prazoEntrega||''} onChange={function(e){setForm(Object.assign({},form,{prazoEntrega:e.target.value}));}} style={inp} placeholder="120 dias"/></div>
              <div className="field"><label>Local entrega</label><input value={form.localEntrega||''} onChange={function(e){setForm(Object.assign({},form,{localEntrega:e.target.value}));}} style={inp} placeholder="CIF"/></div>
              <div className="field"><label>Garantia</label><input value={form.garantia||''} onChange={function(e){setForm(Object.assign({},form,{garantia:e.target.value}));}} style={inp} placeholder="12 meses"/></div>
            </div>
            <div className="grid-2" style={{marginBottom:10}}>
              <div className="field"><label>Base cambial</label><input value={form.baseCambial||''} onChange={function(e){setForm(Object.assign({},form,{baseCambial:e.target.value}));}} style={inp} placeholder="€ 1,00 = R$ 5,70"/></div>
              <div className="field"><label>E-mail do contato</label><input type="email" value={form.email||''} onChange={function(e){setForm(Object.assign({},form,{email:e.target.value}));}} style={inp} placeholder="contato@empresa.com"/></div>
            </div>

            {/* Itens */}
            <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>Itens do orçamento</div>
            <div style={{overflowX:'auto',marginBottom:8}}>
              <table className="tbl" style={{minWidth:900,fontSize:11}}>
                <thead>
                  <tr>
                    <th style={{width:24}}>IT</th><th style={{width:55}}>POSTO</th><th style={{width:55}}>SUBP.</th>
                    <th style={{width:65}}>TORQUE (Nm)</th><th style={{width:45}}>QDE</th>
                    <th style={{minWidth:160}}>DESCRIÇÃO</th><th style={{width:100}}>CÓDIGO</th>
                    <th style={{width:90}}>SIGMA</th><th style={{width:90}}>NCM</th>
                    <th style={{width:100}}>ENTREGA</th><th style={{width:80}}>V.UNIT R$</th>
                    <th style={{width:70}}>TOTAL</th><th style={{width:24}}></th>
                  </tr>
                </thead>
                <tbody>
                  {(form.itens||[]).map(function(it,i){
                    var c = calcItem(it);
                    function updIt(field,val){var ni=[...form.itens];ni[i]=Object.assign({},it,{[field]:val});setForm(Object.assign({},form,{itens:ni}));}
                    return (
                      <tr key={i}>
                        <td style={{textAlign:'center',color:'var(--text3)'}}>{i+1}</td>
                        <td><input value={it.posto||''} onChange={function(e){updIt('posto',e.target.value);}} style={{width:'100%',padding:'2px 4px',fontSize:10}}/></td>
                        <td><input value={it.subposto||''} onChange={function(e){updIt('subposto',e.target.value);}} style={{width:'100%',padding:'2px 4px',fontSize:10}}/></td>
                        <td><input value={it.torque||''} onChange={function(e){updIt('torque',e.target.value);}} style={{width:'100%',padding:'2px 4px',fontSize:10}}/></td>
                        <td><input type="number" value={it.qtd||1} onChange={function(e){updIt('qtd',e.target.value);}} style={{width:'100%',padding:'2px 4px',fontSize:10}}/></td>
                        <td><input value={it.descricao||''} onChange={function(e){updIt('descricao',e.target.value);}} style={{width:'100%',padding:'2px 4px',fontSize:10}}/></td>
                        <td><input value={it.codigo||''} onChange={function(e){updIt('codigo',e.target.value);}} style={{width:'100%',padding:'2px 4px',fontSize:10,fontFamily:'monospace'}}/></td>
                        <td><input value={it.sigma||''} onChange={function(e){updIt('sigma',e.target.value);}} style={{width:'100%',padding:'2px 4px',fontSize:10,fontFamily:'monospace'}}/></td>
                        <td><input value={it.ncm||''} onChange={function(e){updIt('ncm',e.target.value);}} style={{width:'100%',padding:'2px 4px',fontSize:10}}/></td>
                        <td><input value={it.entrega||''} onChange={function(e){updIt('entrega',e.target.value);}} style={{width:'100%',padding:'2px 4px',fontSize:10}}/></td>
                        <td><input type="number" value={it.unitario||''} onChange={function(e){updIt('unitario',e.target.value);}} style={{width:'100%',padding:'2px 4px',fontSize:10}}/></td>
                        <td style={{textAlign:'right',fontWeight:600,color:'#4ADE80',whiteSpace:'nowrap'}}>R${c.total}</td>
                        <td><button onClick={function(){setForm(Object.assign({},form,{itens:form.itens.filter(function(_,xi){return xi!==i;})}));}} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:12}}>✕</button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <button className="btn btn-secondary" style={{fontSize:11,marginBottom:12}} onClick={function(){
              setForm(Object.assign({},form,{itens:[...(form.itens||[]),{item:(form.itens||[]).length+1,posto:'',subposto:'',torque:'',qtd:1,descricao:'',codigo:'',sigma:'',ncm:'',entrega:'',origem:'0 - NACIONAL',unitario:0,icms:0.12,pis:0.0065,cofins:0.03,ipi:0,st:0}]}));
            }}>+ Adicionar item</button>

            {/* Totais */}
            {(function(){
              var t = totais(form.itens||[]);
              return (
                <div style={{background:'var(--bg3)',borderRadius:8,padding:'10px 14px',marginBottom:12,display:'flex',gap:20,justifyContent:'flex-end'}}>
                  {[
                    {l:'Total bruto (c/ ICMS)', v:'R$'+t.totalBruto.toFixed(2), c:'var(--text)'},
                    {l:'Total com IPI',         v:'R$'+t.totalIpi.toFixed(2),   c:'#60A5FA'},
                    {l:'Total com IPI/ST',      v:'R$'+t.totalSt.toFixed(2),    c:'#4ADE80'},
                  ].map(function(m,i){
                    return (
                      <div key={i} style={{textAlign:'right'}}>
                        <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>{m.l}</div>
                        <div style={{fontSize:15,fontWeight:700,color:m.c}}>{m.v}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            <div className="field" style={{marginBottom:12}}>
              <label>Observações</label>
              <textarea value={form.obs||''} onChange={function(e){setForm(Object.assign({},form,{obs:e.target.value}));}} style={{width:'100%',height:50,resize:'vertical'}}/>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={saveForm} style={{flex:1}}>💾 Salvar</button>
              <button className="btn btn-green" onClick={function(){saveForm();exportPDF(form);}} style={{flex:1}}>💾 Salvar + 📄 PDF</button>
              <button className="btn btn-blue" onClick={function(){saveForm();setTimeout(function(){enviarEmailOutlook(form);},200);}} style={{flex:1}}>📧 Enviar e-mail</button>
              <button className="btn btn-secondary" onClick={function(){setModal(false);}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── VIEW: DASHBOARD ─────────────────────────────────────────
function ViewDashboard({ session }) {
  var PERIODOS = [{id:'ano',label:'Ano inteiro'},{id:'semestre',label:'Semestre'},{id:'trimestre',label:'Trimestre'},{id:'mes',label:'Mês'}];
  var [periodo, setPeriodo] = useState('ano');

  var fcOpps   = load(KEYS.forecast, []);
  var budget   = load(KEYS.budget,   {});
  var orcs     = load('crm_orcs_v1', []);

  var CLIENTS_COL = ['CATERPILLAR','HONDA','HYUNDAI','JACTO','RUMO','EMBRAER','AÇÚCAR & ÁLCOOL','IMPLEMENTOS AGRÍCOLAS'];
  var ALL_SUPPS = ['BOSCH IW','BOSCH PT','HS-T','LÜBBERING','MILWAUKEE','MOMENTO','NORBAR','ENERPAC','PANASONIC','STAHLWILLE','STURTEVANT','3ARM','BOSCH IW (REP)','BOSCH REXROTH','STURTEVANT (REP)','OUTROS','SERVIÇOS','KISTLER','SCHATZ'];

  // Filtrar oportunidades por período
  var now = new Date();
  var mos = now.getMonth();
  var filterMonths = [];
  if(periodo==='mes')      filterMonths = [MONTHS[mos]];
  else if(periodo==='trimestre') filterMonths = [MONTHS[mos],MONTHS[(mos+1)%12],MONTHS[(mos+2)%12]];
  else if(periodo==='semestre')  filterMonths = MONTHS.slice(mos>5?6:0, mos>5?12:6);
  else filterMonths = MONTHS;

  var fcFiltered = filterMonths.length===12 ? fcOpps : fcOpps.filter(function(o){
    return filterMonths.some(function(m){return (o.months||{})[m];});
  });

  // Métricas gerais
  var totalFc     = fcFiltered.reduce(function(s,o){return s+amtNum(o.amount)*parseFloat(o.confidence||0);},0);
  var totalBruto  = fcFiltered.reduce(function(s,o){return s+amtNum(o.amount);},0);
  var conf100     = fcFiltered.filter(function(o){return parseFloat(o.confidence||0)>=1;}).length;
  var totalTarget = ALL_SUPPS.reduce(function(s,sup){ return s+CLIENTS_COL.reduce(function(ss,cli){return ss+((budget[sup]&&budget[sup][cli])?budget[sup][cli].target:0);},0);},0);
  var totalRealiz = ALL_SUPPS.reduce(function(s,sup){ return s+CLIENTS_COL.reduce(function(ss,cli){return ss+((budget[sup]&&budget[sup][cli])?budget[sup][cli].realiz:0);},0);},0);
  var totalOrcs   = orcs.filter(function(o){return o.status==='aprovado';}).reduce(function(s,o){return s+(o.totalBruto||0);},0);
  var pctBudget   = totalTarget>0?Math.round(totalRealiz/totalTarget*100):0;

  // SVG Bar Chart util
  function BarChart(props){
    var bars=props.bars; var h=props.h||160; var w=props.w||400;
    var max=Math.max.apply(null,bars.map(function(b){return b.value||0;}));
    if(max===0) max=1;
    var barW = Math.floor((w-60)/bars.length)-8;
    var pad=36;
    return (
      <svg width={w} height={h+50} style={{overflow:'visible'}}>
        {[0,0.25,0.5,0.75,1].map(function(pct,i){
          var y=pad+(1-pct)*(h-pad);
          return <g key={i}><line x1={40} y1={y} x2={w} y2={y} stroke="rgba(148,163,184,0.1)" strokeWidth={1}/><text x={35} y={y+3} fontSize={8} fill="rgba(148,163,184,.5)" textAnchor="end">{fmtAmt(max*pct)}</text></g>;
        })}
        {bars.map(function(bar,i){
          var x=44+i*(barW+8);
          var bh=Math.max(2,(bar.value/max)*(h-pad));
          var y=pad+(h-pad)-bh;
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={bh} rx={3} fill={bar.color||'#2563EB'} opacity={.85}/>
              <text x={x+barW/2} y={y-4} textAnchor="middle" fontSize={8} fill="#fff" fontWeight="600">{fmtAmt(bar.value)}</text>
              <text x={x+barW/2} y={h+pad+10} textAnchor="middle" fontSize={8} fill="rgba(148,163,184,.7)">{bar.label}</text>
              {bar.sub&&<text x={x+barW/2} y={h+pad+20} textAnchor="middle" fontSize={7} fill={bar.subColor||'rgba(148,163,184,.5)'}>{bar.sub}</text>}
            </g>
          );
        })}
      </svg>
    );
  }

  // Por supplier (budget vs forecast)
  var suppData = ALL_SUPPS.map(function(sup){
    var tgt = CLIENTS_COL.reduce(function(s,c){return s+((budget[sup]&&budget[sup][c])?budget[sup][c].target:0);},0);
    var rlz = CLIENTS_COL.reduce(function(s,c){return s+((budget[sup]&&budget[sup][c])?budget[sup][c].realiz:0);},0);
    var fc  = fcFiltered.filter(function(o){return o.supplier&&o.supplier.toUpperCase()===sup.toUpperCase();}).reduce(function(s,o){return s+amtNum(o.amount)*parseFloat(o.confidence||0);},0);
    return {sup,tgt,rlz,fc};
  }).filter(function(d){return d.tgt>0||d.fc>0;});

  // Por cliente (budget vs forecast)
  var cliData = CLIENTS_COL.map(function(cli){
    var tgt = ALL_SUPPS.reduce(function(s,sup){return s+((budget[sup]&&budget[sup][cli])?budget[sup][cli].target:0);},0);
    var rlz = ALL_SUPPS.reduce(function(s,sup){return s+((budget[sup]&&budget[sup][cli])?budget[sup][cli].realiz:0);},0);
    var fc  = fcFiltered.filter(function(o){return o.customer&&o.customer.toUpperCase().includes(cli.split(' ')[0].toUpperCase());}).reduce(function(s,o){return s+amtNum(o.amount)*parseFloat(o.confidence||0);},0);
    return {cli,tgt,rlz,fc};
  }).filter(function(d){return d.tgt>0||d.fc>0;});

  return (
    <div style={{overflowY:'auto',height:'100%'}}>
      {/* Seletor de período */}
      <div style={{display:'flex',gap:6,marginBottom:16,background:'var(--bg3)',borderRadius:10,padding:4,maxWidth:400,border:'1px solid var(--border)'}}>
        {PERIODOS.map(function(p){
          return (
            <button key={p.id} onClick={function(){setPeriodo(p.id);}}
              style={{flex:1,padding:'7px 0',fontSize:12,fontWeight:periodo===p.id?700:500,borderRadius:7,border:'none',background:periodo===p.id?'var(--card)':'transparent',color:periodo===p.id?'var(--text)':'var(--text3)',cursor:'pointer',boxShadow:periodo===p.id?'0 1px 4px rgba(0,0,0,.2)':'none',transition:'all .15s'}}>
              {p.label}
            </button>
          );
        })}
      </div>

      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10,marginBottom:20}}>
        {[
          {l:'Meta (Budget)',      v:fmtAmt(totalTarget), c:'#60A5FA'},
          {l:'Realizado',         v:fmtAmt(totalRealiz), c:'#4ADE80'},
          {l:'Atingimento',       v:pctBudget+'%',       c:pctBudget>=100?'#4ADE80':pctBudget>=60?'#CA8A04':'#F87171'},
          {l:'Forecast ponderado',v:fmtAmt(totalFc),     c:'#FBBF24'},
          {l:'Pipeline bruto',    v:fmtAmt(totalBruto),  c:'var(--text)'},
          {l:'Orç. aprovados',    v:fmtAmt(totalOrcs),   c:'#A78BFA'},
          {l:'Conf. 100%',        v:conf100+' opp',      c:'#4ADE80'},
          {l:'Opp no período',    v:fcFiltered.length,   c:'var(--text)'},
        ].map(function(m,i){
          return (
            <div key={i} className="metric">
              <div className="metric-val" style={{fontSize:18,color:m.c}}>{m.v}</div>
              <div className="metric-lbl">{m.l}</div>
            </div>
          );
        })}
      </div>

      {/* Gráfico Budget vs Realizado vs Forecast por Supplier */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,marginBottom:12,color:'var(--text2)'}}>📊 Budget × Realizado × Forecast — por Fornecedor</div>
        <div style={{overflowX:'auto'}}>
          {suppData.length===0 ? (
            <div style={{color:'var(--text3)',padding:'20px 0',textAlign:'center'}}>Importe o Budget para ver os dados</div>
          ) : (
            <svg width={Math.max(600,suppData.length*120+60)} height={240} style={{overflow:'visible'}}>
              {(function(){
                var max = Math.max.apply(null, suppData.map(function(d){return Math.max(d.tgt,d.rlz,d.fc);}));
                if(max===0) max=1;
                var bW=32; var grpW=bW*3+14; var padL=44; var padT=30; var h=170;
                return suppData.map(function(d,gi){
                  var gx = padL+gi*(grpW+18);
                  var pctRlz = d.tgt>0?Math.round(d.rlz/d.tgt*100):0;
                  var pctFc  = d.tgt>0?Math.round(d.fc/d.tgt*100):0;
                  return (
                    <g key={d.sup}>
                      {gi===0 && [0,0.25,0.5,0.75,1].map(function(p,pi){
                        var y=padT+(1-p)*(h-padT);
                        return <g key={pi}><line x1={40} y1={y} x2={suppData.length*(grpW+18)+padL} y2={y} stroke="rgba(148,163,184,.08)" strokeWidth={1}/><text x={35} y={y+3} fontSize={7} fill="rgba(148,163,184,.4)" textAnchor="end">{fmtAmt(max*p)}</text></g>;
                      })}
                      {[{v:d.tgt,c:'#2563EB',lbl:'T'},{v:d.rlz,c:'#16A34A',lbl:'R'},{v:d.fc,c:'#CA8A04',lbl:'F'}].map(function(bar,bi){
                        var bh=Math.max(3,(bar.v/max)*(h-padT));
                        var y=padT+(h-padT)-bh;
                        var x=gx+bi*(bW+3);
                        return (
                          <g key={bi}>
                            <rect x={x} y={y} width={bW} height={bh} rx={3} fill={bar.c} opacity={.88}/>
                            <text x={x+bW/2} y={y-4} textAnchor="middle" fontSize={7} fill={bar.c} fontWeight="700">{fmtAmt(bar.v)}</text>
                          </g>
                        );
                      })}
                      <text x={gx+grpW/2} y={h+padT+14} textAnchor="middle" fontSize={8} fill="rgba(200,210,220,.85)" fontWeight="600">{d.sup.slice(0,12)}</text>
                      <text x={gx+grpW/2} y={h+padT+25} textAnchor="middle" fontSize={7} fill={pctRlz>=100?'#4ADE80':pctRlz>=60?'#CA8A04':'#F87171'}>{'Rlz: '+pctRlz+'% | FC: '+pctFc+'%'}</text>
                    </g>
                  );
                });
              })()}
              {/* Legenda */}
              {[{c:'#2563EB',l:'Target'},{c:'#16A34A',l:'Realizado'},{c:'#CA8A04',l:'Forecast'}].map(function(leg,i){
                return <g key={i}><rect x={10+i*80} y={222} width={10} height={10} rx={2} fill={leg.c}/><text x={24+i*80} y={231} fontSize={8} fill="rgba(148,163,184,.7)">{leg.l}</text></g>;
              })}
            </svg>
          )}
        </div>
      </div>

      {/* Gráfico por Cliente */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,marginBottom:12,color:'var(--text2)'}}>🏢 Budget × Realizado × Forecast — por Cliente</div>
        <div style={{overflowX:'auto'}}>
          {cliData.length===0 ? (
            <div style={{color:'var(--text3)',padding:'20px 0',textAlign:'center'}}>Importe o Budget para ver os dados</div>
          ) : (
            <svg width={Math.max(500,cliData.length*120+60)} height={240} style={{overflow:'visible'}}>
              {(function(){
                var max=Math.max.apply(null,cliData.map(function(d){return Math.max(d.tgt,d.rlz,d.fc);}));
                if(max===0) max=1;
                var bW=32; var grpW=bW*3+14; var padL=44; var padT=30; var h=170;
                return cliData.map(function(d,gi){
                  var gx=padL+gi*(grpW+18);
                  var pctRlz=d.tgt>0?Math.round(d.rlz/d.tgt*100):0;
                  var pctFc=d.tgt>0?Math.round(d.fc/d.tgt*100):0;
                  return (
                    <g key={d.cli}>
                      {gi===0 && [0,.25,.5,.75,1].map(function(p,pi){
                        var y=padT+(1-p)*(h-padT);
                        return <g key={pi}><line x1={40} y1={y} x2={cliData.length*(grpW+18)+padL} y2={y} stroke="rgba(148,163,184,.08)" strokeWidth={1}/><text x={35} y={y+3} fontSize={7} fill="rgba(148,163,184,.4)" textAnchor="end">{fmtAmt(max*p)}</text></g>;
                      })}
                      {[{v:d.tgt,c:'#2563EB'},{v:d.rlz,c:'#16A34A'},{v:d.fc,c:'#CA8A04'}].map(function(bar,bi){
                        var bh=Math.max(3,(bar.v/max)*(h-padT));
                        var y=padT+(h-padT)-bh;
                        var x=gx+bi*(bW+3);
                        return <g key={bi}><rect x={x} y={y} width={bW} height={bh} rx={3} fill={bar.c} opacity={.88}/><text x={x+bW/2} y={y-4} textAnchor="middle" fontSize={7} fill={bar.c} fontWeight="700">{fmtAmt(bar.v)}</text></g>;
                      })}
                      <text x={gx+grpW/2} y={h+padT+14} textAnchor="middle" fontSize={8} fill="rgba(200,210,220,.85)" fontWeight="600">{d.cli.slice(0,12)}</text>
                      <text x={gx+grpW/2} y={h+padT+25} textAnchor="middle" fontSize={7} fill={pctRlz>=100?'#4ADE80':pctRlz>=60?'#CA8A04':'#F87171'}>{'Rlz: '+pctRlz+'% | FC: '+pctFc+'%'}</text>
                    </g>
                  );
                });
              })()}
              {[{c:'#2563EB',l:'Target'},{c:'#16A34A',l:'Realizado'},{c:'#CA8A04',l:'Forecast'}].map(function(leg,i){
                return <g key={i}><rect x={10+i*80} y={222} width={10} height={10} rx={2} fill={leg.c}/><text x={24+i*80} y={231} fontSize={8} fill="rgba(148,163,184,.7)">{leg.l}</text></g>;
              })}
            </svg>
          )}
        </div>
      </div>

      {/* Orçamentos vs Realizado */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,marginBottom:12,color:'var(--text2)'}}>📝 Orçados × Aprovados × Realizados</div>
        <div style={{display:'flex',gap:20,flexWrap:'wrap',alignItems:'center'}}>
          <BarChart w={360} h={120} bars={[
            {label:'Orçados',   value:orcs.reduce(function(s,o){return s+(o.totalBruto||0);},0),        color:'#7C3AED', sub:orcs.length+'u'},
            {label:'Aprovados', value:totalOrcs,                                                          color:'#16A34A', sub:orcs.filter(function(o){return o.status==='aprovado';}).length+'u'},
            {label:'Realizado', value:totalRealiz,                                                        color:'#2563EB', sub:pctBudget+'%'},
            {label:'Forecast',  value:totalFc,                                                            color:'#CA8A04', sub:fcFiltered.length+'u'},
          ]}/>
          <div style={{flex:1,minWidth:180}}>
            {[
              {l:'Total orçado',   v:fmtAmt(orcs.reduce(function(s,o){return s+(o.totalBruto||0);},0)), c:'#A78BFA'},
              {l:'Aprovados',      v:fmtAmt(totalOrcs), c:'#4ADE80'},
              {l:'Tx aprovação',   v:orcs.length>0?Math.round(orcs.filter(function(o){return o.status==='aprovado';}).length/orcs.length*100)+'%':'—', c:'#4ADE80'},
              {l:'Budget meta',    v:fmtAmt(totalTarget), c:'#60A5FA'},
              {l:'Budget realiz.', v:fmtAmt(totalRealiz)+' ('+pctBudget+'%)', c:pctBudget>=100?'#4ADE80':pctBudget>=60?'#CA8A04':'#F87171'},
            ].map(function(m,i){
              return (
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid var(--border2)'}}>
                  <span style={{fontSize:11,color:'var(--text3)'}}>{m.l}</span>
                  <span style={{fontSize:12,fontWeight:700,color:m.c}}>{m.v}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── VIEW: RELATÓRIO ─────────────────────────────────────────
function ViewRelatorio({ session, isGestor, isConsultor }) {
  var fcOpps   = load(KEYS.forecast,  []);
  var clients  = load(KEYS.clients,   []);
  var orcs     = load('crm_orcs_v1',  []);
  var budget   = load(KEYS.budget,    {});

  var TIPOS = [
    {id:'oportunidade', label:'📊 Oportunidade', desc:'Perfil completo com Forecast, histórico de visitas e próximos passos 5W2H'},
  ];
  var [tipo,    setTipo]    = useState('oportunidade');
  var [selIds,  setSelIds]  = useState([]);
  var [periodo, setPeriodo] = useState('todos');
  var [relText, setRelText] = useState('');
  var [relHtml, setRelHtml] = useState('');
  var [loading, setLoading] = useState(false);

  // Visibilidade por role
  var visOpps = (isGestor||isConsultor) ? fcOpps : fcOpps.filter(function(o){ return (o.resp||'').toUpperCase()===(session.code||'').toUpperCase(); });

  function toggleSel(id){ setSelIds(function(prev){ return prev.includes(id)?prev.filter(function(x){return x!==id;}):[...prev,id]; }); }
  function selectAll(list){ setSelIds(list.map(function(o){return o.id;})); }

  // ── GERADORES ──────────────────────────────────────────────
  function gerarRelatorio(){
    setLoading(true); setRelText(''); setRelHtml('');
    var lines = [];
    var sep1 = '═'.repeat(65);
    var sep2 = '─'.repeat(65);

    if(tipo==='oportunidade'){
      var selecionadas = fcOpps.filter(function(o){return selIds.includes(o.id);});
      if(!selecionadas.length){ alert('Selecione ao menos uma oportunidade.'); setLoading(false); return; }

      // Paleta de cores do Forecast
      var FC_BG   = '#0F1C3A';  // fundo das células do forecast
      var FC_HDR  = '#1A2D55';  // fundo do cabeçalho das células
      var FC_BDR  = '#2A4070';  // borda
      var FC_TEXT = '#A8C4F0';  // texto cabeçalho
      var FC_VAL  = '#E8F0FF';  // texto valor

      function cell(title, value, w){
        return '<td style="border:1px solid '+FC_BDR+';padding:0;vertical-align:top;'+(w?'width:'+w+';':'')+'"><div style="background:'+FC_HDR+';color:'+FC_TEXT+';font-size:9px;font-weight:700;padding:3px 7px;letter-spacing:.05em;text-transform:uppercase;">'+title+'</div><div style="background:'+FC_BG+';color:'+FC_VAL+';font-size:11px;padding:5px 7px;min-height:22px;">'+value+'</div></td>';
      }

      function bulletList(text){
        if(!text) return '<em style="color:#666">—</em>';
        var items = text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
        return '<ul style="margin:0;padding-left:16px;list-style:disc;">'+items.map(function(l){return '<li style="margin-bottom:3px;">'+l.replace(/^[•\-\*]\s*/,'')+'</li>';}).join('')+'</ul>';
      }

      var html = '<div style="font-family:Segoe UI,Arial,sans-serif;font-size:12px;color:#1a1a1a;">';

      selecionadas.forEach(function(opp,oi){
        if(oi>0) html += '<div style="height:24px;border-top:3px solid #2563EB;margin:20px 0;"></div>';
        var meses = Object.keys(opp.months||{}).filter(function(m){return (opp.months||{})[m];}).join(', ')||'—';
        var confC = parseFloat(opp.confidence||0)>=1?'#16A34A':parseFloat(opp.confidence||0)>=0.5?'#2563EB':'#CA8A04';
        var hist  = opp.history||[];

        // Cabeçalho
        html += '<div style="background:#1E2D4A;border:1px solid #2A4070;border-radius:6px 6px 0 0;padding:10px 14px;margin-bottom:0;">';
        html += '<div style="font-size:16px;font-weight:800;color:#E8F0FF;">'+opp.customer+'</div>';
        html += '<div style="font-size:12px;color:#A8C4F0;margin-top:2px;">'+(opp.description||'—')+'</div>';
        html += '</div>';

        // Linha do Forecast (células)
        html += '<div style="background:'+FC_BG+';border:1px solid '+FC_BDR+';border-top:none;border-radius:0 0 0 0;">';
        html += '<div style="padding:4px 8px;background:#142040;font-size:9px;font-weight:700;color:'+FC_TEXT+';letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid '+FC_BDR+';">FORECAST</div>';
        html += '<table style="width:100%;border-collapse:collapse;"><tr>';
        html += cell('TIPO',opp.neg||'D','60px');
        html += cell('RESP.',opp.resp||'—','70px');
        html += cell('SUPPLIER',opp.supplier||'—','120px');
        html += cell('UF',opp.uf||'—','50px');
        html += cell('AMOUNT',fmtAmt(opp.amount),'90px');
        html += cell('CONFIDENCE','<span style="color:'+confC+';font-weight:700;">'+fmtConf(opp.confidence)+'</span>','90px');
        html += cell('MESES',meses,'');
        html += cell('CONTATOS',opp.contatos||'—','');
        html += '</tr></table>';
        html += '</div>';

        // Follow-up
        if(opp.followup){
          html += '<div style="margin-top:10px;">';
          html += '<div style="font-weight:700;font-size:11px;color:#334155;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;">FOLLOW-UP</div>';
          html += '<div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:4px;padding:8px 10px;font-size:11px;color:#334155;line-height:1.6;">'+bulletList(opp.followup)+'</div>';
          html += '</div>';
        }

        // Histórico de visitas — todos juntos, próximo passo ao final
        if(hist.length){
          html += '<div style="margin-top:12px;">';
          html += '<div style="font-weight:700;font-size:11px;color:#334155;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;padding-bottom:4px;border-bottom:2px solid #E2E8F0;">HISTÓRICO DE VISITAS ('+hist.length+')</div>';

          // Coletar todos os próximos passos — só o mais recente vai ao final
          var ultimoProximo = '';

          hist.forEach(function(h,hi){
            html += '<div style="margin-bottom:10px;border:1px solid #E2E8F0;border-radius:6px;overflow:hidden;">';
            // Header da visita
            html += '<div style="background:#F1F5F9;padding:6px 10px;display:flex;gap:10px;align-items:center;border-bottom:1px solid #E2E8F0;">';
            html += '<span style="background:#1E3A5F;color:#fff;font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;">'+(hi+1)+'</span>';
            if(h.date) html += '<span style="font-weight:700;font-size:11px;">'+h.date+'</span>';
            if(h.time) html += '<span style="font-size:10px;color:#64748B;">🕐 '+h.time+'</span>';
            if(h.resp) html += '<span style="font-size:10px;padding:1px 8px;border-radius:10px;background:#FEE2E2;color:#991B1B;font-weight:600;">'+h.resp+'</span>';
            if(h.processo) html += '<span style="font-size:10px;color:#2563EB;font-style:italic;">'+h.processo+'</span>';
            html += '</div>';
            // Resumo em bullets
            html += '<div style="padding:8px 10px;font-size:11px;color:#334155;">'+bulletList(h.resumo)+'</div>';
            html += '</div>';

            // Guardar o próximo passo mais recente (índice 0 = mais recente)
            if(hi===0 && h.proximo) ultimoProximo = h.proximo;
          });

          html += '</div>';

          // Próximo passo — SEMPRE ao final do relatório
          if(ultimoProximo){
            html += '<div style="margin-top:16px;border:2px solid #2563EB;border-radius:8px;overflow:hidden;">';
            html += '<div style="background:#1E3A5F;padding:8px 12px;">';
            html += '<div style="font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.08em;">📋 PRÓXIMO PASSO (5W2H)</div>';
            html += '</div>';
            html += '<div style="padding:10px 14px;background:#EFF6FF;">';
            // Formatar pipe-separated como itens visuais
            var w5items = ultimoProximo.split(' | ');
            w5items.forEach(function(item){
              if(!item.trim()) return;
              var parts = item.split(': ');
              var label = parts[0]||'';
              var value = parts.slice(1).join(': ')||'';
              html += '<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:5px;">';
              html += '<span style="background:#2563EB;color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:1px;">'+label+'</span>';
              html += '<span style="font-size:11px;color:#1E3A5F;line-height:1.5;">'+value+'</span>';
              html += '</div>';
            });
            html += '</div>';
            html += '</div>';
          }
        }

        html += '<div style="height:8px;"></div>';
      });

      html += '</div>';
      setRelHtml(html);
      setRelText(''); // limpar text mode
      setLoading(false);
      return;
    }

    else if(tipo==='cliente'){
      var cliSel = clients.filter(function(c){return selIds.includes(c.id);});
      if(!cliSel.length){ alert('Selecione ao menos um cliente.'); setLoading(false); return; }
      cliSel.forEach(function(c,ci){
        if(ci>0) lines.push('',''+sep1,'');
        lines.push('FORGE B2B — RELATÓRIO DE CLIENTE');
        lines.push(sep2);
        lines.push(''+c.apelido+' — '+c.nome);
        lines.push('CNPJ: '+(c.cnpj||'—')+'  |  Segmento: '+(c.segmento||'—')+'  |  Região: '+(c.regiao||'—'));
        lines.push('Cidade: '+(c.cidade||'—')+'/'+(c.estado||'—')+'  |  Vendedor: '+(c.vendedor||'—'));
        lines.push(sep2);
        // Contatos
        if(c.contatos&&c.contatos.length){
          lines.push('CONTATOS ('+c.contatos.length+'):');
          c.contatos.forEach(function(ct){
            lines.push('  '+ct.nome+(ct.dpto?' — '+ct.dpto:'')+(ct.cel?' | '+ct.cel:'')+(ct.email?' | '+ct.email:''));
          });
        }
        // Oportunidades do cliente
        var cliOpps = fcOpps.filter(function(o){return o.customer&&c.apelido&&o.customer.toLowerCase().includes(c.apelido.toLowerCase().slice(0,8));});
        if(cliOpps.length){
          lines.push(''); lines.push('OPORTUNIDADES ('+cliOpps.length+'):');
          cliOpps.forEach(function(o){
            lines.push('  ['+fmtConf(o.confidence)+'] '+fmtAmt(o.amount)+' — '+(o.supplier||'?')+' — '+(o.description||'—'));
          });
          var totFC = cliOpps.reduce(function(s,o){return s+amtNum(o.amount)*parseFloat(o.confidence||0);},0);
          lines.push('  Pipeline ponderado: '+fmtAmt(totFC));
        }
      });
    }

    else if(tipo==='pipeline'){
      lines.push('FORGE B2B — RELATÓRIO DE PIPELINE');
      lines.push('Gerado em: '+new Date().toLocaleDateString('pt-BR'));
      lines.push(sep2);
      var filtrados = periodo==='todos'?visOpps:visOpps.filter(function(o){
        var meses=o.months||{};
        if(periodo==='mes') return meses[MONTHS[new Date().getMonth()]];
        if(periodo==='trimestre') return [MONTHS[new Date().getMonth()],MONTHS[(new Date().getMonth()+1)%12],MONTHS[(new Date().getMonth()+2)%12]].some(function(m){return meses[m];});
        return true;
      });
      var totalPond = filtrados.reduce(function(s,o){return s+amtNum(o.amount)*parseFloat(o.confidence||0);},0);
      var totalBrut = filtrados.reduce(function(s,o){return s+amtNum(o.amount);},0);

                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.company}</div>
                          <div style={{fontSize:"10px",color:"var(--text-secondary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.title}</div>
                        </div>
                        <div style={{display:"flex",gap:"4px",alignItems:"center",flexShrink:0}}>
                          {hasHistory&&<span style={{fontSize:"9px",color:"var(--text-blue)"}} title={`${o.visitHistory.length} visita(s) registrada(s)`}>📝</span>}
                          <span style={{fontSize:"9px",padding:"1px 5px",borderRadius:"6px",background:(stage?.color||"#888")+"22",color:stage?.color||"#888",fontWeight:600}}>{stage?.tag||"—"}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {relSelected.length===1&&(
                  <button onClick={gerarRelatorio} disabled={relLoading}
                    style={{width:"100%",marginTop:"12px",padding:"10px",fontSize:"13px",borderRadius:"6px",border:"none",background:!relLoading?"#8C1A1A":"#4A2A2A",color:!relLoading?"#FFD0D0":"#7A5050",cursor:!relLoading?"pointer":"default",fontWeight:600}}>
                    {relLoading?"Gerando relatório...":"Gerar relatório"}
                  </button>
                )}
              </div>
            </div>
            {/* Coluna direita: relatório gerado */}
            <div style={{flex:1,minWidth:"300px"}}>
              {relText&&(
                <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",flexWrap:"wrap",gap:"8px"}}>
                    <div style={{fontSize:"13px",fontWeight:600,color:"var(--text-primary)"}}>Relatório de oportunidade</div>
                    <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                      <button onClick={()=>{navigator.clipboard.writeText(relText); alert("Texto copiado para a área de transferência.");}}
                        style={{fontSize:"11px",padding:"6px 12px",borderRadius:"6px",border:"1px solid #185FA5",background:"rgba(24,95,165,0.12)",color:"#185FA5",cursor:"pointer",fontWeight:600}}>📋 Copiar texto</button>
                      <button onClick={()=>window.print()}
                        style={{fontSize:"11px",padding:"6px 12px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-card2)",color:"var(--text-secondary)",cursor:"pointer"}}>🖨 Imprimir</button>
                      <button onClick={exportRelPDF}
                        style={{fontSize:"11px",padding:"6px 12px",borderRadius:"6px",border:"1px solid #E24B4A",background:"rgba(226,75,74,0.12)",color:"#E24B4A",cursor:"pointer",fontWeight:600}}>📄 PDF</button>
                      <button onClick={exportRelDOCX}
                        style={{fontSize:"11px",padding:"6px 12px",borderRadius:"6px",border:"1px solid #185FA5",background:"rgba(24,95,165,0.12)",color:"#185FA5",cursor:"pointer",fontWeight:600}}>📝 DOCX</button>
                      <button onClick={exportRelXLSX}
                        style={{fontSize:"11px",padding:"6px 12px",borderRadius:"6px",border:"1px solid #1D9E75",background:"rgba(29,158,117,0.12)",color:"#1D9E75",cursor:"pointer",fontWeight:600}}>📊 XLSX</button>
                    </div>
                  </div>
                  <pre style={{fontSize:"12px",color:"var(--text-primary)",lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",margin:0}}>{relText}</pre>
                </div>
              )}
              {!relText&&relSelected.length===0&&(
                <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text-muted)"}}>
                  <div style={{fontSize:"32px",marginBottom:"12px"}}>📋</div>
                  <div style={{fontSize:"13px"}}>Selecione uma oportunidade à esquerda e clique em <b>Gerar relatório</b></div>
                </div>
              )}
              {!relText&&relSelected.length===1&&!relLoading&&(
                <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text-muted)"}}>
                  <div style={{fontSize:"13px"}}>1 oportunidade selecionada. Clique em <b>Gerar relatório</b>.</div>
                </div>
              )}
              {relLoading&&(
                <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text-secondary)"}}>
                  <div style={{fontSize:"13px"}}>Gerando relatório...</div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ===== PERFIL ===== */}
        
        {/* ===== BUDGET ===== */}
        {view==="budget" && (
          <div style={{flex:1,minWidth:0}}>

            {/* Toolbar */}
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"14px",flexWrap:"wrap"}}>
              <div style={{fontSize:"15px",fontWeight:700,color:"var(--text-primary)",flex:1}}>Budget {CUR_YEAR}</div>
              <div style={{display:"flex",gap:"2px",background:"rgba(128,128,128,0.12)",borderRadius:"8px",padding:"3px"}}>
                {[["client","Por Cliente"],["supplier","Por Fornecedor"],["matrix","Matriz"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setBudgetView(v)} style={{padding:"4px 12px",fontSize:"11px",borderRadius:"6px",border:"none",cursor:"pointer",background:budgetView===v?"#8C1A1A":"transparent",color:budgetView===v?"#fff":"var(--text-secondary)",fontWeight:budgetView===v?700:400,whiteSpace:"nowrap"}}>{l}</button>
                ))}
              </div>
              <button onClick={()=>setBudgetModal(true)} style={{padding:"5px 14px",fontSize:"12px",borderRadius:"6px",border:"1px solid #8C1A1A",background:"rgba(140,26,26,0.2)",color:"var(--text-accent)",cursor:"pointer",fontWeight:600}}>+ Nova meta</button>
            </div>

            {/* KPIs globais */}
            {(()=>{
              const yr = budgets.filter(b=>b.year===CUR_YEAR);
              const metaTotal = yr.reduce((s,b)=>s+totalMeta(b),0);
              const realTotal = yr.reduce((s,b)=>s+totalRealizado(b),0);
              const autoTotal = yr.reduce((s,b)=>s+autoRealizado(b),0);
              const pct = metaTotal>0?Math.round(realTotal/metaTotal*100):0;
              const pc  = pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";
              return (
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"16px"}}>
                  {[
                    ["Meta total","R$ "+(metaTotal/1000).toFixed(0)+"k","var(--bg-card2)","var(--border)","var(--text-secondary)","var(--text-primary)"],
                    ["Realizado","R$ "+(realTotal/1000).toFixed(0)+"k","rgba(29,158,117,0.08)","rgba(29,158,117,0.3)","#1D9E75","#1D9E75"],
                    ["Pipeline auto","R$ "+(autoTotal/1000).toFixed(0)+"k","rgba(24,95,165,0.08)","rgba(24,95,165,0.3)","#185FA5","#185FA5"],
                    ["Atingimento",pct+"%",`rgba(${pc==="1D9E75"?"29,158,117":pc==="#EF9F27"?"239,159,39":"226,75,74"},0.08)`,pc+"44",pc,pc],
                  ].map(([l,v,bg,bc,lc,vc])=>(
                    <div key={l} style={{background:bg,border:`1px solid ${bc}`,borderRadius:"8px",padding:"10px 14px"}}>
                      <div style={{fontSize:"10px",color:lc,opacity:.8,marginBottom:"4px",textTransform:"uppercase",letterSpacing:".06em"}}>{l}</div>
                      <div style={{fontSize:"22px",fontWeight:700,color:vc}}>{v}</div>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* ── MATRIZ FORNECEDOR × CLIENTE ── */}
            {budgetView==="matrix" && (()=>{
              const yr = budgets.filter(b=>b.year===CUR_YEAR);
              const suppliers = [...new Set(yr.map(b=>b.supplier))].sort();
              const clients   = [...new Set(yr.map(b=>b.client))].sort();
              function getB(sup,cli){ return yr.filter(b=>b.supplier===sup&&b.client===cli); }
              function cellMeta(sup,cli){ return getB(sup,cli).reduce((s,b)=>s+totalMeta(b),0); }
              function cellReal(sup,cli){ return getB(sup,cli).reduce((s,b)=>s+totalRealizado(b),0); }
              function rowTotal(sup){ return yr.filter(b=>b.supplier===sup).reduce((s,b)=>s+totalMeta(b),0); }
              function colTotal(cli){ return yr.filter(b=>b.client===cli).reduce((s,b)=>s+totalMeta(b),0); }
              const grand = yr.reduce((s,b)=>s+totalMeta(b),0);
              return (
                <div style={{overflowX:"auto"}}>
                  <table style={{borderCollapse:"collapse",fontSize:"11px",minWidth:"700px",width:"100%"}}>
                    <thead>
                      <tr style={{background:"var(--bg-card2)"}}>
                        <th style={{padding:"8px 10px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,borderBottom:"1px solid var(--border)",position:"sticky",left:0,background:"var(--bg-card2)",minWidth:"110px"}}>Fornecedor</th>
                        {clients.map(c=>(
                          <th key={c} style={{padding:"8px 8px",textAlign:"center",color:"var(--text-secondary)",fontWeight:600,borderBottom:"1px solid var(--border)",whiteSpace:"nowrap",fontSize:"10px"}}>{c}</th>
                        ))}
                        <th style={{padding:"8px 8px",textAlign:"right",color:"var(--text-accent)",fontWeight:700,borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>TOTAL</th>
                      </tr>
                    </thead>
                    <tbody>
                      {suppliers.map(sup=>{
                        const rt = rowTotal(sup);
                        return (
                          <tr key={sup} style={{borderBottom:"1px solid var(--border2)"}}>
                            <td style={{padding:"8px 10px",fontWeight:600,color:"var(--text-primary)",position:"sticky",left:0,background:"var(--bg-card)",whiteSpace:"nowrap"}}>{sup}</td>
                            {clients.map(cli=>{
                              const m = cellMeta(sup,cli);
                              const r = cellReal(sup,cli);
                              const p = m>0?Math.round(r/m*100):0;
                              const pc2 = p>=80?"#1D9E75":p>=50?"#EF9F27":"#E24B4A";
                              return (
                                <td key={cli} style={{padding:"6px 8px",textAlign:"center",verticalAlign:"middle"}}>
                                  {m>0?(
                                    <div style={{display:"inline-block",minWidth:"64px"}}>
                                      <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-primary)"}}>R$ {(m/1000).toFixed(0)}k</div>
                                      <div style={{height:"3px",background:"var(--bg-card2)",borderRadius:"2px",margin:"2px 0",overflow:"hidden"}}>
                                        <div style={{height:"100%",width:Math.min(p,100)+"%",background:pc2,borderRadius:"2px"}}/>
                                      </div>
                                      {r>0&&<div style={{fontSize:"9px",color:pc2,fontWeight:600}}>{p}%</div>}
                                    </div>
                                  ):<span style={{color:"var(--text-muted)"}}>—</span>}
                                </td>
                              );
                            })}
                            <td style={{padding:"8px",textAlign:"right",fontWeight:700,color:"var(--text-accent)"}}>R$ {(rt/1000).toFixed(0)}k</td>
                          </tr>
                        );
                      })}
                      {/* Linha de totais */}
                      <tr style={{background:"var(--bg-card2)",borderTop:"2px solid var(--border)"}}>
                        <td style={{padding:"8px 10px",fontWeight:700,color:"var(--text-accent)",position:"sticky",left:0,background:"var(--bg-card2)"}}>TOTAL</td>
                        {clients.map(cli=>(
                          <td key={cli} style={{padding:"8px",textAlign:"center",fontWeight:700,color:"var(--text-primary)"}}>R$ {(colTotal(cli)/1000).toFixed(0)}k</td>
                        ))}
                        <td style={{padding:"8px",textAlign:"right",fontWeight:700,color:"var(--text-accent)"}}>R$ {(grand/1000).toFixed(0)}k</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              );
            })()}

            {/* ── POR FORNECEDOR ── */}
            {budgetView==="supplier" && (()=>{
              const yr = budgets.filter(b=>b.year===CUR_YEAR);
              const suppliers = [...new Set(yr.map(b=>b.supplier))].sort();
              return (
                <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                  {suppliers.map(sup=>{
                    const entries = yr.filter(b=>b.supplier===sup);
                    const meta = entries.reduce((s,b)=>s+totalMeta(b),0);
                    const real = entries.reduce((s,b)=>s+totalRealizado(b),0);
                    const auto = entries.reduce((s,b)=>s+autoRealizado(b),0);
                    const pct  = meta>0?Math.round(real/meta*100):0;
                    const pc   = pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";
                    return (
                      <div key={sup} style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)"}}>{sup}</div>
                            <div style={{fontSize:"10px",color:"var(--text-secondary)",marginTop:"1px"}}>{entries.length} cliente(s) com meta</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:"18px",fontWeight:700,color:pc}}>{pct}%</div>
                            <div style={{fontSize:"10px",color:"var(--text-secondary)"}}>R$ {(real/1000).toFixed(0)}k / R$ {(meta/1000).toFixed(0)}k</div>
                          </div>
                        </div>
                        <div style={{height:"5px",background:"var(--bg-card2)",borderRadius:"3px",marginBottom:"10px",overflow:"hidden"}}>
                          <div style={{height:"100%",width:Math.min(pct,100)+"%",background:pc,borderRadius:"3px",transition:"width .4s"}}/>
                        </div>
                        {/* Detalhamento por cliente */}
                        <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                          {entries.map(b=>{
                            const bm=totalMeta(b), br=totalRealizado(b);
                            const bp=bm>0?Math.round(br/bm*100):0;
                            const bpc=bp>=80?"#1D9E75":bp>=50?"#EF9F27":"#E24B4A";
                            return (
                              <div key={b.id} style={{background:"var(--bg-card2)",borderRadius:"7px",padding:"7px 10px",minWidth:"120px",flex:1,cursor:"pointer",border:"1px solid transparent",transition:"border-color .15s"}}
                                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--border)"}
                                onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
                                <div onClick={()=>setSelBudget(b)} style={{fontSize:"10px",fontWeight:600,color:"var(--text-primary)",marginBottom:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.client} 🔍</div>
                                <div style={{fontSize:"12px",fontWeight:700,color:"var(--text-accent)"}}>R$ {(bm/1000).toFixed(0)}k</div>
                                <div style={{height:"3px",background:"var(--bg-card)",borderRadius:"2px",margin:"4px 0",overflow:"hidden"}}>
                                  <div style={{height:"100%",width:Math.min(bp,100)+"%",background:bpc,borderRadius:"2px"}}/>
                                </div>
                                <div style={{display:"flex",alignItems:"center",gap:"4px",marginTop:"4px"}}>
                                  <input type="number" value={b.realized1s||""} onChange={e=>updateBudget({...b,realized1s:Number(e.target.value)||0})}
                                    style={{...inp,width:"60px",fontSize:"10px",padding:"2px 5px"}} placeholder="1S"/>
                                  <input type="number" value={b.realized2s||""} onChange={e=>updateBudget({...b,realized2s:Number(e.target.value)||0})}
                                    style={{...inp,width:"60px",fontSize:"10px",padding:"2px 5px"}} placeholder="2S"/>
                                </div>
                                {autoRealizado(b)>0&&<div style={{fontSize:"9px",color:"var(--text-blue)",marginTop:"3px"}}>🔄 R$ {(autoRealizado(b)/1000).toFixed(0)}k auto</div>}
                                <button onClick={()=>delBudget(b.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"9px",marginTop:"3px",padding:0}}>excluir</button>
                              </div>
                            );
                          })}
                        </div>
                        {auto>0&&<div style={{marginTop:"8px",fontSize:"10px",color:"var(--text-blue)",background:"rgba(24,95,165,0.08)",borderRadius:"5px",padding:"5px 8px"}}>🔄 Pipeline (fechadas): R$ {auto.toLocaleString("pt-BR")}</div>}
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* ── POR CLIENTE ── */}
            {budgetView==="client" && (()=>{
              const yr = budgets.filter(b=>b.year===CUR_YEAR);
              const clients = [...new Set(yr.map(b=>b.client))].sort();
              return (
                <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                  {clients.map(cli=>{
                    const entries = yr.filter(b=>b.client===cli);
                    const meta = entries.reduce((s,b)=>s+totalMeta(b),0);
                    const real = entries.reduce((s,b)=>s+totalRealizado(b),0);
                    const auto = entries.reduce((s,b)=>s+autoRealizado(b),0);
                    const pct  = meta>0?Math.round(real/meta*100):0;
                    const pc   = pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";
                    return (
                      <div key={cli} style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)"}}>{cli}</div>
                            <div style={{fontSize:"10px",color:"var(--text-secondary)",marginTop:"1px"}}>{entries.length} fornecedor(es) com meta</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:"18px",fontWeight:700,color:pc}}>{pct}%</div>
                            <div style={{fontSize:"10px",color:"var(--text-secondary)"}}>R$ {(real/1000).toFixed(0)}k / R$ {(meta/1000).toFixed(0)}k</div>
                          </div>
                        </div>
                        <div style={{height:"5px",background:"var(--bg-card2)",borderRadius:"3px",marginBottom:"10px",overflow:"hidden"}}>
                          <div style={{height:"100%",width:Math.min(pct,100)+"%",background:pc,borderRadius:"3px",transition:"width .4s"}}/>
                        </div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                          {entries.map(b=>{
                            const bm=totalMeta(b), br=totalRealizado(b);
                            const bp=bm>0?Math.round(br/bm*100):0;
                            const bpc=bp>=80?"#1D9E75":bp>=50?"#EF9F27":"#E24B4A";
                            return (
                              <div key={b.id} style={{background:"var(--bg-card2)",borderRadius:"7px",padding:"7px 10px",minWidth:"110px",flex:1,cursor:"pointer",border:"1px solid transparent",transition:"border-color .15s"}}
                                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--border)"}
                                onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
                                <div onClick={()=>setSelBudget(b)} style={{fontSize:"10px",fontWeight:600,color:"var(--text-primary)",marginBottom:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.supplier} 🔍</div>
                                <div style={{fontSize:"12px",fontWeight:700,color:"var(--text-accent)"}}>R$ {(bm/1000).toFixed(0)}k</div>
                                <div style={{height:"3px",background:"var(--bg-card)",borderRadius:"2px",margin:"4px 0",overflow:"hidden"}}>
                                  <div style={{height:"100%",width:Math.min(bp,100)+"%",background:bpc,borderRadius:"2px"}}/>
                                </div>
                                <div style={{display:"flex",gap:"4px",marginTop:"4px"}}>
                                  <input type="number" value={b.realized1s||""} onChange={e=>updateBudget({...b,realized1s:Number(e.target.value)||0})}
                                    style={{...inp,width:"60px",fontSize:"10px",padding:"2px 5px"}} placeholder="1S"/>
                                  <input type="number" value={b.realized2s||""} onChange={e=>updateBudget({...b,realized2s:Number(e.target.value)||0})}
                                    style={{...inp,width:"60px",fontSize:"10px",padding:"2px 5px"}} placeholder="2S"/>
                                </div>
                                {autoRealizado(b)>0&&<div style={{fontSize:"9px",color:"var(--text-blue)",marginTop:"3px"}}>🔄 R$ {(autoRealizado(b)/1000).toFixed(0)}k auto</div>}
                                <button onClick={()=>delBudget(b.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"9px",marginTop:"3px",padding:0}}>excluir</button>
                              </div>
                            );
                          })}
                        </div>
                        {auto>0&&<div style={{marginTop:"8px",fontSize:"10px",color:"var(--text-blue)",background:"rgba(24,95,165,0.08)",borderRadius:"5px",padding:"5px 8px"}}>🔄 Pipeline: R$ {auto.toLocaleString("pt-BR")}</div>}
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* MODAL NOVA META */}
            {budgetModal && (
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:60}}>
                <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"12px",padding:"20px",width:"400px",maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
                    <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)"}}>Nova meta</div>
                    <button onClick={()=>setBudgetModal(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"18px"}}>✕</button>
                  </div>
                  <div style={{marginBottom:"10px"}}>
                    <label style={lbl}>Fornecedor *</label>
                    <input value={budgetForm.supplier} onChange={e=>setBudgetForm({...budgetForm,supplier:e.target.value})} style={inp} placeholder="ex: Norbar"/>
                  </div>
                  <div style={{marginBottom:"10px"}}>
                    <label style={lbl}>Cliente *</label>
                    <input value={budgetForm.client} onChange={e=>setBudgetForm({...budgetForm,client:e.target.value})} style={inp} placeholder="ex: Caterpillar"/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                    {[["targetAnual",`Meta Anual (R$)`],["target1s",`Meta 1S`],["target2s",`Meta 2S`],["realized1s","Realizado 1S"],["realized2s","Realizado 2S"]].map(([k,l])=>(
                      <div key={k}>
                        <label style={lbl}>{l}</label>
                        <input type="number" value={budgetForm[k]||""} onChange={e=>setBudgetForm({...budgetForm,[k]:e.target.value})} style={inp} placeholder="0"/>
                      </div>
                    ))}
                  </div>
                  <div style={{marginBottom:"14px"}}>
                    <label style={lbl}>Notas</label>
                    <textarea value={budgetForm.notes} onChange={e=>setBudgetForm({...budgetForm,notes:e.target.value})} style={{...inp,height:"44px"}}/>
                  </div>

                        <button key={p} onClick={()=>updateOpp({...sel,priority:p})} style={{flex:1,padding:"5px",fontSize:"11px",borderRadius:"6px",border:`1px solid ${sel.priority===p?PRI_TXT[p]:"var(--border)"}`,background:sel.priority===p?"rgba(140,26,26,0.25)":"transparent",color:sel.priority===p?"var(--text-accent)":"var(--text-secondary)",cursor:"pointer",fontWeight:sel.priority===p?600:400,textTransform:"capitalize"}}>{p}</button>
                      ))}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:"5px"}}>
                    <button onClick={()=>openAI(`Analise a oportunidade "${sel.title}" da ${sel.company} na etapa ${STAGES.find(s=>s.id===sel.stage)?.label}. Próximos passos com 3S+M?`)} style={{flex:1,padding:"7px",fontSize:"11px",borderRadius:"6px",border:"1px solid #6B3A3A",background:"rgba(140,26,26,0.2)",color:"var(--text-accent)",cursor:"pointer",fontWeight:600}}>Analisar com IA</button>

                  </div>
                </div>
              )}

              {/* ABA HISTÓRICO */}
              {detailTab==="historico" && (
                <div>

                  <button onClick={()=>openVisita(sel)}

                  <div style={{display:"flex",gap:"6px",marginBottom:"10px",alignItems:"center"}}>
                    <input type="date" value={histPeriodFrom} onChange={e=>setHistPeriodFrom(e.target.value)}

                    <span style={{fontSize:"10px",color:"var(--text-muted)"}}>até</span>
                    <input type="date" value={histPeriodTo} onChange={e=>setHistPeriodTo(e.target.value)}
                      style={{...inp,fontSize:"10px",padding:"4px 6px",flex:1}} title="Data final"/>
                    {(histPeriodFrom||histPeriodTo)&&<button onClick={()=>{setHistPeriodFrom("");setHistPeriodTo("");}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"12px",padding:"0 2px"}}>✕</button>}
                  </div>
                  {/* Lista de visitas */}
                  {(()=>{
                    let visits = [...(sel.visitHistory||[])].sort((a,b)=>(b.date||b.createdAt||"").localeCompare(a.date||a.createdAt||""));
                    if(histPeriodFrom) visits = visits.filter(v=>(v.date||v.createdAt||"")>=histPeriodFrom);
                    if(histPeriodTo)   visits = visits.filter(v=>(v.date||v.createdAt||"")<=histPeriodTo);
                    if(visits.length===0) return (
                      <div style={{textAlign:"center",padding:"24px 0",color:"var(--text-muted)",fontSize:"12px"}}>
                        {(sel.visitHistory||[]).length===0?"Nenhuma visita registrada ainda.":"Nenhuma visita no período selecionado."}
                      </div>
                    );
                    return visits.map((v,i)=>(
                      <div key={v.id||i} style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"10px 12px",marginBottom:"8px",borderLeft:"3px solid #185FA5"}}>

                        </div>
                        {/* Resumo */}
                        {v.summary&&(
                          <div style={{fontSize:"11px",color:"var(--text-primary)",lineHeight:1.5,marginBottom:"6px",whiteSpace:"pre-line"}}>{v.summary}</div>

                        {(v.what||v.why||v.where||v.how||v.howMuch)&&(

                                <span style={{color:"var(--text-primary)",lineHeight:1.4}}>{val}</span>

                            ):null)}
                          </div>
                        )}
                        {/* Próximo passo */}
                        {v.nextStep&&(
                          <div style={{background:"rgba(140,26,26,0.08)",borderRadius:"5px",padding:"5px 8px",borderLeft:"2px solid #8C1A1A"}}>

                          </div>

                        <button onClick={()=>{
                          const newHist = (sel.visitHistory||[]).filter(h=>h.id!==v.id);
                          updateOpp({...sel,visitHistory:newHist});
                        }} style={{marginTop:"6px",background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"10px",padding:0}}>excluir registro</button>

                </div>
              )}
            </div>
          </div>
        )}
      </div>

      {/* PAINEL IA */}
      {aiOpen && (
        <div style={{position:"fixed",bottom:0,right:"16px",width:"330px",background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"12px 12px 0 0",display:"flex",flexDirection:"column",maxHeight:"480px",boxShadow:"0 -4px 24px rgba(0,0,0,0.09)",zIndex:50}}>

              <div style={{width:"26px",height:"26px",borderRadius:"50%",background:"#8C1A1A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",color:"#fff",fontWeight:700,flexShrink:0}}>IA</div>
              <span style={{fontSize:"13px",fontWeight:700,flex:1,color:"var(--text-primary)"}}>Gestor IA</span>
              {sel&&<span style={{fontSize:"10px",color:"var(--text-accent)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"80px"}}>{sel.company}</span>}
              <button onClick={()=>setAiOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"16px",lineHeight:1}}>✕</button>
            </div>
            {/* Atalhos de contexto */}
            <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
              {[
                ["📅 Planejar semana", `Hoje é ${new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})}. Tenho estas oportunidades em aberto: ${opps.filter(o=>o.stage!=="fechado").slice(0,12).map(o=>`${o.company}/${o.supplier}(${o.stage})`).join(", ")}. Com base na metodologia 3S+M, me ajude a priorizar a semana: quais clientes visitar, o que oferecer a cada um e qual o argumento comercial mais forte. Organize por dia da semana.`],
                ["🎯 Priorizar hoje", `São ${new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}. Tarefas de hoje: ${tasks.filter(t=>!t.done&&t.date===today).map(t=>t.title+" ("+t.company+")").join(", ")||"nenhuma cadastrada"}. Oportunidades quentes: ${opps.filter(o=>["proposta","negociacao"].includes(o.stage)).map(o=>o.company+" - "+o.title.slice(0,30)).join("; ")||"nenhuma"}. O que devo focar agora?`],
                ["💡 O que oferecer", sel?`Para ${sel.company} (${sel.title}, etapa ${sel.stage}), com base no histórico: ${sel.nextAction}. Qual produto/solução Sinuelo devo apresentar? Qual argumento técnico e comercial usar com ${sel.contact}? Use 3S+M.`:`Selecione uma oportunidade primeiro para análise específica.`],
                ["📊 Pipeline crítico", `Analise meu pipeline atual. Oportunidades acima de R$50k: ${opps.filter(o=>o.value>50000&&o.stage!=="fechado").map(o=>`${o.company}(R$${(o.value/1000).toFixed(0)}k,${o.stage})`).join(", ")}. Quais estão em risco? O que fazer para avançar cada uma?`],
              ].map(([label, prompt])=>(
                <button key={label} onClick={()=>chat(prompt)}
                  style={{fontSize:"9px",padding:"3px 7px",borderRadius:"5px",border:"1px solid var(--border)",background:"var(--bg-card2)",color:"var(--text-secondary)",cursor:"pointer",whiteSpace:"nowrap"}}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px",display:"flex",flexDirection:"column",gap:"8px",background:"var(--bg-card2)"}}>
            {aiMsgs.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"88%",padding:"8px 11px",borderRadius:m.role==="user"?"10px 10px 0 10px":"10px 10px 10px 0",background:m.role==="user"?"rgba(140,26,26,0.3)":"#2A2A2A",fontSize:"12px",lineHeight:1.55,color:m.role==="user"?"#FFBBBB":"#D0C0C0",whiteSpace:"pre-wrap"}}>{m.content}</div>
              </div>
            ))}
            {aiLoading && <div style={{display:"flex"}}><div style={{padding:"8px 12px",borderRadius:"10px 10px 10px 0",background:"var(--bg-header)",fontSize:"12px",color:"var(--text-secondary)"}}>Analisando...</div></div>}
            <div ref={aiEnd}/>
          </div>
          <div style={{padding:"6px 8px 4px",borderTop:"1px solid #333",display:"flex",flexWrap:"wrap",gap:"4px",flexShrink:0}}>

              <button key={q} onClick={()=>chat(q)} style={{fontSize:"10px",padding:"3px 8px",borderRadius:"10px",border:"1px solid var(--border)",background:"transparent",cursor:"pointer",color:"var(--text-secondary)"}}>{q}</button>
            ))}
          </div>
          <div style={{padding:"6px 8px 8px",display:"flex",gap:"6px",flexShrink:0,background:"#252525"}}>
            <input value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&chat()} placeholder="Pergunte ao gestor IA..." style={{flex:1,fontSize:"12px",padding:"7px 10px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-input)",color:"var(--text-primary)"}}/>
            <button onClick={()=>chat()} disabled={aiLoading} style={{padding:"7px 14px",fontSize:"13px",borderRadius:"6px",border:"none",background:aiLoading?"#5A2A2A":"#8C1A1A",color:aiLoading?"#7A5050":"#FFDDDD",cursor:aiLoading?"default":"pointer",fontWeight:600}}>→</button>
          </div>
        </div>
      )}

      {/* MODAL API KEY */}
      {showKey && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fff",borderRadius:"12px",padding:"20px",width:"380px",maxWidth:"90vw",border:"1px solid #e8e8e8"}}>
            <div style={{fontSize:"14px",fontWeight:600,marginBottom:"8px",color:"var(--text-primary)"}}>Chave da API Anthropic</div>
            <p style={{fontSize:"12px",color:"var(--text-secondary)",marginBottom:"14px",lineHeight:1.6}}>Necessária para o Gestor IA funcionar. Obtenha em{" "}

              {" "}A chave fica salva apenas neste navegador, nunca é enviada para terceiros.

              <button onClick={saveKey} style={{flex:1,padding:"9px",fontSize:"13px",borderRadius:"6px",border:"none",background:"#8C1A1A",color:"#FFD0D0",cursor:"pointer",fontWeight:600}}>Salvar</button>
              <button onClick={()=>setShowKey(false)} style={{padding:"9px 16px",fontSize:"13px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

              {l:"Empresa (Customer) *",k:"company",    t:"text"},
              {l:"Fornecedor (Supplier)",k:"supplier",  t:"text"},
              {l:"Responsável (RESP.)", k:"resp",       t:"text"},
              {l:"Contato / decisor",   k:"contact",    t:"text"},
              {l:"Valor estimado R$",   k:"value",      t:"number"},
              {l:"Próxima ação / follow-up", k:"nextAction", t:"text"},
              {l:"Data do follow-up",   k:"nextDate",   t:"date"},
            ].map(f=>(
              <div key={f.k} style={{marginBottom:"8px"}}>

                <input type={f.t} value={form[f.k]} onChange={e=>setForm({...form,[f.k]:e.target.value})} style={inp}/>
              </div>
            ))}
            <div style={{marginBottom:"8px"}}>
              <label style={lbl}>Notas</label>
              <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={{...inp,height:"56px"}}/>
            </div>
            <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
              <div style={{flex:1}}>
                <label style={lbl}>Etapa inicial</label>
                <select value={form.stage} onChange={e=>setForm({...form,stage:e.target.value})} style={inp}>
                  {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                </select>
              </div>
              <div style={{flex:1}}>
                <label style={lbl}>Prioridade</label>
                <select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})} style={inp}>
                  <option value="alta">Alta</option>
                  <option value="media">Média</option>
                  <option value="baixa">Baixa</option>
                </select>
              </div>
            </div>
            <div style={{marginBottom:"8px"}}>
              <label style={lbl}>Tipo negociação (NEG.)</label>
              <div style={{display:"flex",gap:"6px",marginTop:"4px"}}>
                {[["D","D — Distribuição","#185FA5"],["R","R — Representação","#854F0B"],["S","S — Serviço","#0F6E56"]].map(([v,l,c])=>(
                  <button key={v} onClick={()=>setForm({...form,negType:v})} style={{flex:1,padding:"5px 4px",fontSize:"11px",borderRadius:"6px",border:`1px solid ${(form.negType||"D")===v?c:"var(--border)"}`,background:(form.negType||"D")===v?c+"22":"transparent",color:(form.negType||"D")===v?c:"var(--text-secondary)",cursor:"pointer",fontWeight:(form.negType||"D")===v?700:400}}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{marginBottom:"12px"}}>
              <label style={lbl}>Cor forecast</label>
              <div style={{display:"flex",gap:"6px",marginTop:"4px"}}>
                {[["none","— Padrão","#888"],["yellow","🟡 Devemos ao cliente","#CCCC00"],["red","🔴 Negociação ativa","#FF0000"],["gray","⚫ Perdido","#D9D9D9"]].map(([v,l,c])=>(
                  <button key={v} onClick={()=>setForm({...form,forecastColor:v})} style={{flex:1,padding:"5px 4px",fontSize:"10px",borderRadius:"6px",border:`1px solid ${form.forecastColor===v?c:"var(--border)"}`,background:form.forecastColor===v?c+"22":"transparent",color:form.forecastColor===v?c:"var(--text-secondary)",cursor:"pointer",fontWeight:form.forecastColor===v?700:400}}>{l}</button>
                ))}
              </div>
            </div>
            <button onClick={addOpp} disabled={!form.title||!form.company}
              style={{width:"100%",padding:"10px",fontSize:"13px",borderRadius:"6px",border:"none",background:form.title&&form.company?"#8C1A1A":"#4A2A2A",color:form.title&&form.company?"#FFD0D0":"#7A5050",cursor:form.title&&form.company?"pointer":"default",fontWeight:600}}>
              Criar oportunidade
            </button>
          </div>
        </div>
      )}

      {/* MODAL PERFIL */}
      {showProfile && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:70,padding:"16px"}}>
          <div style={{background:"var(--bg-card)",borderRadius:"12px",border:"1px solid var(--border)",padding:"20px",width:"420px",maxWidth:"100%",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
              <div style={{fontSize:"15px",fontWeight:700,color:"var(--text-primary)"}}>Meu Perfil</div>
              <button onClick={()=>setShowProfile(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"18px"}}>✕</button>
            </div>
            {!profileEdit ? (
              <div>
                <div style={{display:"flex",gap:"16px",alignItems:"center",marginBottom:"18px"}}>
                  <div style={{width:"72px",height:"72px",borderRadius:"50%",background:"#8C1A1A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",fontWeight:700,color:"#FFD0D0",flexShrink:0,overflow:"hidden"}}>

                  </div>
                  <div>
                    <div style={{fontSize:"17px",fontWeight:700,color:"var(--text-primary)"}}>{profile.userName||"—"}</div>
                    <div style={{fontSize:"12px",color:"var(--text-accent)"}}>{profile.role||"—"}</div>
                    <div style={{fontSize:"12px",color:"var(--text-secondary)"}}>{profile.companyName||"—"}</div>

                    <span style={{fontSize:"12px",color:"var(--text-secondary)",width:"80px",flexShrink:0}}>{k}</span>
                    <span style={{fontSize:"12px",color:"var(--text-primary)"}}>{v||"—"}</span>
                  </div>

                <button onClick={()=>{setProfileDraft({...profile});setProfileEdit(true);}}
                  style={{width:"100%",marginTop:"16px",padding:"9px",fontSize:"13px",borderRadius:"6px",border:"1px solid #8C1A1A",background:"rgba(140,26,26,0.15)",color:"var(--text-accent)",cursor:"pointer",fontWeight:600}}>Editar perfil</button>
              </div>
            ) : (
              <div>
                {[["companyName","Empresa"],["userName","Nome"],["role","Cargo"],["email","E-mail"],["phone","Telefone"],["linkedin","LinkedIn"],["region","Região"]].map(([k,label])=>(
                  <div key={k} style={{marginBottom:"10px"}}>
                    <label style={lbl}>{label}</label>
                    <input value={profileDraft[k]||""} onChange={e=>setProfileDraft({...profileDraft,[k]:e.target.value})} style={inp}/>
                  </div>
                ))}
                <div style={{marginBottom:"10px"}}>
                  <label style={lbl}>Foto (URL ou base64)</label>
                  <input value={profileDraft.photo||""} onChange={e=>setProfileDraft({...profileDraft,photo:e.target.value})} style={inp} placeholder="https://..."/>
                </div>
                <div style={{display:"flex",gap:"8px",marginTop:"14px"}}>
                  <button onClick={()=>{saveProfile(profileDraft);setProfileEdit(false);}} style={{flex:1,padding:"9px",fontSize:"13px",borderRadius:"6px",border:"none",background:"#8C1A1A",color:"#FFD0D0",cursor:"pointer",fontWeight:600}}>Salvar</button>
                  <button onClick={()=>setProfileEdit(false)} style={{padding:"9px 16px",fontSize:"13px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
                </div>
              </div>
            )}
          </div>
        </div>

        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:70,padding:"16px"}}>
          <div style={{background:"var(--bg-card)",borderRadius:"12px",border:"1px solid var(--border)",padding:"20px",width:"520px",maxWidth:"100%",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}}>
              <div style={{fontSize:"15px",fontWeight:700,color:"var(--text-primary)"}}>⚙ Configurações</div>
              <button onClick={()=>setShowSettings(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"18px"}}>✕</button>
            </div>

            {/* Tema */}
            <div style={{marginBottom:"20px"}}>

                </div>
                <div style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"2px"}}>
                    <span style={{fontSize:"12px",fontWeight:600,color:"var(--text-primary)"}}>Budget × Orçamentos</span>
                    <span style={{fontSize:"13px",fontWeight:700,color:"#EF9F27"}}>{pctOrc}%</span>
                  </div>
                  {bar(pctOrc,"#EF9F27")}
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"var(--text-secondary)",marginTop:"4px"}}>
                    <span>Orçamentos abertos: {fmt(orcTotal)}</span><span>Meta: {fmt(meta)}</span>
                  </div>
                </div>
                <div style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"2px"}}>
                    <span style={{fontSize:"12px",fontWeight:600,color:"var(--text-primary)"}}>Budget × Realizado</span>
                    <span style={{fontSize:"13px",fontWeight:700,color:pctReal>=100?"#1D9E75":pctReal>=60?"#EF9F27":"#E24B4A"}}>{pctReal}%</span>
                  </div>
                  {bar(pctReal,pctReal>=100?"#1D9E75":pctReal>=60?"#EF9F27":"#E24B4A")}
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"var(--text-secondary)",marginTop:"4px"}}>
                    <span>Realizado: {fmt(realizado)}</span><span>Meta: {fmt(meta)}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      })()}
      </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

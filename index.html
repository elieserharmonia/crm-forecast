<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM · Sinuelo</title>
<script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0F1117;
  --bg2:#171B26;
  --bg3:#1E2333;
  --card:#1A1F2E;
  --border:#2A3045;
  --border2:#222840;
  --text:#E2E8F0;
  --text2:#94A3B8;
  --text3:#64748B;
  --accent:#8C1A1A;
  --accent2:#B91C1C;
  --blue:#2563EB;
  --green:#16A34A;
  --yellow:#CA8A04;
  --red:#DC2626;
  --radius:8px;
  --shadow:0 2px 8px rgba(0,0,0,0.4);
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;height:100vh;overflow:hidden;}
button{cursor:pointer;font-family:inherit;font-size:13px;}
input,select,textarea{font-family:inherit;font-size:13px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
select option{background:var(--bg3);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:40px 36px;width:360px;box-shadow:var(--shadow);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo h1{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.02em;}
.login-logo p{color:var(--text3);font-size:12px;margin-top:4px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.login-field input{width:100%;}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#FFD0D0;font-weight:700;font-size:14px;border:none;border-radius:var(--radius);margin-top:8px;transition:background .15s;}
.login-btn:hover{background:var(--accent2);}
.login-err{color:#FCA5A5;font-size:12px;text-align:center;margin-top:10px;}

/* LAYOUT */
.crm{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:52px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;overflow-x:hidden;overflow-y:auto;transition:width .2s;flex-shrink:0;}
.sidebar:hover{width:200px;}
.sidebar::-webkit-scrollbar{width:0;}
.sb-btn{width:calc(100% - 8px);min-height:34px;padding:0 8px;display:flex;align-items:center;gap:10px;border:none;background:transparent;border-radius:var(--radius);color:var(--text3);font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;overflow:hidden;flex-shrink:0;margin:0 4px;}
.sb-btn:hover{background:rgba(255,255,255,0.06);color:var(--text2);}
.sb-btn.active{background:rgba(37,99,235,0.2);color:#60A5FA;}
.sb-btn .icon{font-size:16px;flex-shrink:0;width:18px;text-align:center;}
.sb-btn .label{opacity:0;transition:opacity .15s;font-size:12px;}
.sidebar:hover .label{opacity:1;}
.sb-divider{width:32px;height:1px;background:var(--border);margin:4px 0;flex-shrink:0;}
.sidebar:hover .sb-divider{width:calc(100% - 16px);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}

/* TOPBAR */
.topbar{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;}
.topbar-title{flex:1;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-align:center;color:var(--text2);}
.topbar-brand{font-size:11px;font-weight:700;color:var(--text3);opacity:.3;letter-spacing:.12em;}
.topbar-right{display:flex;align-items:center;gap:6px;}
.tb-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.tb-btn:hover{background:var(--bg3);color:var(--text);}
.avatar-btn{width:30px;height:30px;border-radius:50%;background:var(--accent);border:2px solid var(--border);color:#FFD0D0;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:16px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}

/* METRICS */
.metrics{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;min-width:110px;}
.metric-val{font-size:20px;font-weight:700;}
.metric-lbl{font-size:10px;color:var(--text3);margin-top:2px;}

/* TABLE */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.tbl{width:100%;border-collapse:collapse;font-size:11px;}
.tbl thead{position:sticky;top:0;z-index:2;background:var(--bg3);}
.tbl th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
.tbl td{padding:6px 10px;border-bottom:1px solid var(--border2);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,0.02);}
.tbl tr.selected td{background:rgba(37,99,235,0.08);}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-weight:600;font-size:12px;border:none;transition:all .15s;cursor:pointer;}
.btn-primary{background:var(--accent);color:#FFD0D0;}
.btn-primary:hover{background:var(--accent2);}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-green{background:rgba(22,163,74,.15);color:#4ADE80;border:1px solid rgba(22,163,74,.3);}
.btn-blue{background:rgba(37,99,235,.15);color:#60A5FA;border:1px solid rgba(37,99,235,.3);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:16px;overflow-y:auto;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:680px;padding:24px;margin-top:8px;}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-hd h2{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;line-height:1;}
.modal-close:hover{color:var(--text);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.field input,.field select,.field textarea{width:100%;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback} = React;

// ─── CONSTANTES ────────────────────────────────────────────────
const KEYS = {
  session:  'crm_session_v1',
  users:    'crm_users_v1',
  forecast: 'crm_forecast_v1',
  clients:  'crm_clients_v1',
  budget:   'crm_budget_v1',
  settings: 'crm_settings_v1',
};

const ROLES = {
  gestor:    { label: 'Gestor Comercial',      color: '#8C1A1A' },
  consultor: { label: 'Consultor',             color: '#1D4ED8' },
  vendedor:  { label: 'Vendedor',              color: '#15803D' },
  especialista: { label: 'Especialista',       color: '#7C3AED' },
};

const MONTHS = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const CUR_YEAR = new Date().getFullYear();
const CUR_MONTH = new Date().getMonth();

// Usuários padrão
const DEFAULT_USERS = [
  { id:'u1', name:'Administrador',  code:'ADM', email:'adm@sinuelo.com.br',    password:'sinuelo2026', role:'gestor',       active:true,  pending:false },
  { id:'u2', name:'Elieser Fernandes', code:'EF', email:'ef@sinuelo.com.br',  password:'ef2026',      role:'vendedor',     active:true,  pending:false },
  { id:'u3', name:'Consultor',      code:'CS',  email:'cs@sinuelo.com.br',    password:'cs2026',      role:'consultor',    active:true,  pending:false },
  { id:'u4', name:'Especialista',   code:'ESP', email:'esp@sinuelo.com.br',   password:'esp2026',     role:'especialista', active:true,  pending:false },
];

// ─── STORAGE HELPERS ───────────────────────────────────────────
function load(key, def) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : def; }
  catch(e) { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}
function initUsers() {
  const existing = load(KEYS.users, null);
  if (!existing) save(KEYS.users, DEFAULT_USERS);
  return load(KEYS.users, DEFAULT_USERS);
}

// ─── HELPERS ──────────────────────────────────────────────────
function fmtAmt(v) {
  const n = parseFloat(String(v||'0').replace(/[^0-9.]/g,''))||0;
  if (n === 0) return '—';
  if (n >= 1000000) return 'R$'+(n/1000000).toFixed(1)+'M';
  if (n >= 1000) return 'R$'+(n/1000).toFixed(0)+'k';
  return 'R$'+n.toFixed(0);
}
function fmtConf(v) {
  return Math.round(parseFloat(v||0)*100)+'%';
}
function confColor(v) {
  const n = parseFloat(v||0);
  if (n >= 1)   return '#16A34A';
  if (n >= 0.5) return '#2563EB';
  if (n >= 0.3) return '#CA8A04';
  return '#64748B';
}
function amtNum(v) {
  return parseFloat(String(v||'0').replace(/[^0-9.]/g,''))||0;
}
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(' ');
  if (parts.length >= 2) return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
  return parts[0][0].toUpperCase();
}

// ─── COMPONENTE LOGIN ─────────────────────────────────────────
function Login({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pass,  setPass]  = useState('');
  const [err,   setErr]   = useState('');

  function handleLogin() {
    const users = load(KEYS.users, DEFAULT_USERS);
    const user  = users.find(function(u) { return u.email === email.trim().toLowerCase(); });
    if (!user) { setErr('E-mail não encontrado.'); return; }
    if (user.password !== pass) { setErr('Senha incorreta.'); return; }
    if (user.pending) { setErr('Conta aguardando ativação pelo gestor.'); return; }
    if (!user.active) { setErr('Conta desativada.'); return; }
    save(KEYS.session, user);
    onLogin(user);
  }

  function onKey(e) { if (e.key === 'Enter') handleLogin(); }

  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">
          <h1>CRM · Sinuelo</h1>
          <p>Torque + Controle · Gestão Comercial</p>
        </div>
        <div className="login-field">
          <label>E-mail</label>
          <input type="email" value={email} onChange={function(e){setEmail(e.target.value);setErr('');}}
            onKeyDown={onKey} placeholder="seu@email.com.br" autoFocus/>
        </div>
        <div className="login-field">
          <label>Senha</label>
          <input type="password" value={pass} onChange={function(e){setPass(e.target.value);setErr('');}}
            onKeyDown={onKey} placeholder="••••••••"/>
        </div>
        <button className="login-btn" onClick={handleLogin}>Entrar</button>
        {err && <div className="login-err">{err}</div>}
      </div>
    </div>
  );
}

// ─── COMPONENTE TOPBAR ────────────────────────────────────────
function Topbar({ session, view, views, onSettings, onProfile }) {
  const title = (views.find(function(v){return v.id===view;})||{}).label||view;
  return (
    <div className="topbar">
      <span className="topbar-brand">CRM · SINUELO</span>
      <span className="topbar-title">{title}</span>
      <div className="topbar-right">
        <button className="tb-btn" onClick={onSettings} title="Configurações">⚙</button>
        <button className="avatar-btn" onClick={onProfile} title={session.name}>
          {initials(session.name)}
        </button>
      </div>
    </div>
  );
}

// ─── COMPONENTE SIDEBAR ───────────────────────────────────────
function Sidebar({ view, setView, items }) {
  return (
    <div className="sidebar">
      {items.map(function(item) {
        if (item.divider) return <div key={item.id} className="sb-divider"/>;
        return (
          <button key={item.id}
            className={'sb-btn'+(view===item.id?' active':'')}
            onClick={function(){setView(item.id);}}>
            <span className="icon">{item.icon}</span>
            <span className="label">{item.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─── VIEW: FORECAST ──────────────────────────────────────────
function ViewForecast({ session, isGestor, isConsultor }) {
  const [opps, setOpps] = useState(function(){ return load(KEYS.forecast, []); });
  const [search, setSearch] = useState('');
  const [modalOpen, setModalOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [perfil, setPerfil] = useState(null);
  const [perfilTab, setPerfilTab] = useState('dados');

  const MONTHS_VIS = [
    MONTHS[CUR_MONTH % 12],
    MONTHS[(CUR_MONTH+1) % 12],
    MONTHS[(CUR_MONTH+2) % 12],
  ];

  const EMPTY = {
    id:'', neg:'D', resp:'', customer:'', supplier:'', description:'',
    amount:'', uf:'SP', confidence:'0.1', months:{}, followup:'', contatos:'',
    rowColor:'', history:[]
  };

  // Filtro por role
  function visibleOpps(list) {
    if (isGestor || isConsultor) return list;
    return list.filter(function(o){ return (o.resp||'').toUpperCase() === (session.code||'').toUpperCase(); });
  }

  const filtered = visibleOpps(opps).filter(function(o) {
    if (!search.trim()) return true;
    const q = search.toLowerCase();
    return (o.customer&&o.customer.toLowerCase().includes(q))
      ||(o.supplier&&o.supplier.toLowerCase().includes(q))
      ||(o.description&&o.description.toLowerCase().includes(q))
      ||(o.resp&&o.resp.toLowerCase().includes(q));
  });

  // Métricas
  const total   = visibleOpps(opps).length;
  const pipeline = visibleOpps(opps).reduce(function(s,o){ return s+amtNum(o.amount)*parseFloat(o.confidence||0); },0);
  const conf100 = visibleOpps(opps).filter(function(o){ return parseFloat(o.confidence||0)>=1; }).length;
  const highPri = visibleOpps(opps).filter(function(o){ return parseFloat(o.confidence||0)>=0.5; }).length;

  function saveOpps(list) { setOpps(list); save(KEYS.forecast, list); }

  function openNew() {
    setEditing({...EMPTY, id:'fc_'+Date.now(), resp:session.code||''});
    setModalOpen(true);
  }
  function openEdit(o) { setEditing({...o}); setModalOpen(true); }
  function openPerfil(o) { setPerfil({...o}); setPerfilTab('dados'); }

  function saveEdit() {
    if (!editing.customer.trim()) { alert('CUSTOMER obrigatório.'); return; }
    const exists = opps.find(function(o){ return o.id===editing.id; });
    if (exists) {
      saveOpps(opps.map(function(o){ return o.id===editing.id ? editing : o; }));
    } else {
      saveOpps([...opps, editing]);
    }
    setModalOpen(false);
  }

  function deleteOpp(id) {
    if (!confirm('Excluir esta oportunidade?')) return;
    saveOpps(opps.filter(function(o){ return o.id!==id; }));
    setPerfil(null);
  }

  function toggleMonth(id, mon) {
    const o = opps.find(function(x){ return x.id===id; });
    if (!o) return;
    const is100 = parseFloat(o.confidence||0)>=1;
    const nm = Object.assign({}, o.months||{});
    if (!is100) {
      Object.keys(nm).forEach(function(k){ delete nm[k]; });
      if (!nm[mon]) nm[mon] = true; else delete nm[mon];
    } else {
      if (nm[mon]) delete nm[mon]; else nm[mon] = true;
    }
    const updated = opps.map(function(x){ return x.id===id ? Object.assign({},x,{months:nm}) : x; });
    saveOpps(updated);
    if (perfil && perfil.id===id) setPerfil(Object.assign({},perfil,{months:nm}));
  }

  function setRowColor(color) {
    if (!perfil) return;
    const updated = opps.map(function(o){ return o.id===perfil.id ? Object.assign({},o,{rowColor:color}) : o; });
    saveOpps(updated);
    setPerfil(Object.assign({},perfil,{rowColor:color}));
  }

  function importXLSX(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const wb = XLSX.read(ev.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
        let hdr = -1, headers = [];
        for (let i=0; i<Math.min(5,rows.length); i++) {
          const r = rows[i].map(function(c){ return String(c||'').trim(); });
          if (r.indexOf('CUSTOMER')>=0) { hdr=i; headers=r; break; }
        }
        if (hdr<0) { alert('Header CUSTOMER não encontrado.'); return; }
        const iNeg=0, iResp=headers.indexOf('RESP.'), iCust=headers.indexOf('CUSTOMER');
        const iSupp=headers.indexOf('SUPPLIER'), iDesc=headers.indexOf('DESCRIPTION');
        const iAmt=headers.indexOf('AMOUNT'), iUf=headers.indexOf('UF');
        const iConf=headers.findIndex(function(h){ return h.toLowerCase()==='confidence'; });
        const iFup=headers.indexOf('FOLLOW-UP'), iCont=headers.indexOf('CONTATOS');
        const mCols = {};
        MONTHS.forEach(function(m){
          const ci = headers.findIndex(function(h){ return h.toUpperCase()===m; });
          if (ci>=0) mCols[m]=ci;
        });
        const imported = [];
        for (let ri=hdr+1; ri<rows.length; ri++) {
          const row = rows[ri];
          if (!row || !row.some(function(c){ return c!==null&&c!==''; })) continue;
          const cust = String(row[iCust]||'').trim();
          if (!cust) continue;
          const months = {};
          Object.keys(mCols).forEach(function(m){
            const v = String(row[mCols[m]]||'').trim().toLowerCase();
            if (v==='x'||v==='1') months[m]=true;
          });
          imported.push({
            id:'fc_'+Date.now()+'_'+ri,
            neg:    String(row[iNeg]||'D').trim()||'D',
            resp:   iResp>=0?String(row[iResp]||'').trim():'',
            customer: cust,
            supplier: iSupp>=0?String(row[iSupp]||'').trim():'',
            description: iDesc>=0?String(row[iDesc]||'').trim():'',
            amount: iAmt>=0&&row[iAmt]!=null?String(row[iAmt]).replace(/[^0-9.]/g,''):'',
            uf:     iUf>=0?String(row[iUf]||'SP').trim():'SP',
            confidence: iConf>=0&&row[iConf]!=null?String(parseFloat(row[iConf])||0):'0.1',
            months,
            followup: iFup>=0?String(row[iFup]||'').trim():'',
            contatos: iCont>=0?String(row[iCont]||'').trim():'',
            rowColor:'', history:[],
          });
        }
        if (!imported.length) { alert('Nenhuma oportunidade encontrada.'); return; }
        const replace = !opps.length || confirm(imported.length+' oportunidades encontradas.\nOK = Substituir tudo\nCancelar = Mesclar');
        saveOpps(replace ? imported : [...opps,...imported]);
        alert((replace?'Importadas: ':'Mescladas: ')+imported.length+' oportunidades.');
      } catch(err) { alert('Erro ao importar: '+err.message); }
    };
    reader.readAsBinaryString(file);
    e.target.value='';
  }

  const inp = {width:'100%'};
  const CONF_OPTS = [['0','0%'],['0.1','10%'],['0.2','20%'],['0.3','30%'],['0.5','50%'],['0.75','75%'],['1','100%']];

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,height:'100%'}}>
      {/* Métricas */}
      <div className="metrics">
        {[
          {l:'Oportunidades', v:total,          c:'var(--text)'},
          {l:'Pipeline pond.', v:fmtAmt(pipeline), c:'#60A5FA'},
          {l:'Alta prioridade', v:highPri,       c:'#CA8A04'},
          {l:'Conf. 100%',     v:conf100,        c:'#4ADE80'},
        ].map(function(m,i){
          return (
            <div key={i} className="metric">
              <div className="metric-val" style={{color:m.c}}>{m.v}</div>
              <div className="metric-lbl">{m.l}</div>
            </div>
          );
        })}
      </div>

      {/* Controles */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}}
          placeholder="Buscar customer, supplier, descrição, resp..."
          style={{flex:1,minWidth:200}}/>
        <button className="btn btn-primary" onClick={openNew}>+ Nova</button>

                  const marked = (editing.months||{})[mon];

                  const cntMrk = Object.values(editing.months||{}).filter(Boolean).length;
                  const isContr = is100&&cntMrk>1;
                  return (
                    <button key={mon} onClick={function(){
                      const nm = Object.assign({}, editing.months||{});

                      else { if (nm[mon]) delete nm[mon]; else nm[mon]=true; }
                      setEditing(Object.assign({},editing,{months:nm}));
                    }} style={{padding:'3px 9px',borderRadius:5,border:'1px solid '+(marked?(isContr?'#16A34A':'var(--accent)'):'var(--border)'),background:marked?(isContr?'rgba(22,163,74,.15)':'rgba(140,26,26,.12)'):'transparent',color:marked?(isContr?'#4ADE80':'#FCA5A5'):'var(--text3)',fontSize:11,fontWeight:marked?700:400}}>
                      {mon}
                    </button>
                  );
                })}
              </div>
            </div>
            <div className="grid-2" style={{marginBottom:14}}>
              <div className="field">
                <label>FOLLOW-UP</label>
                <textarea value={editing.followup||''} onChange={function(e){setEditing(Object.assign({},editing,{followup:e.target.value}));}}
                  style={{height:72,resize:'vertical',lineHeight:1.5}} placeholder={'08.04.26 - FUP\n01.04.26 - Proposta enviada'}/>
              </div>
              <div className="field">
                <label>CONTATOS</label>
                <textarea value={editing.contatos||''} onChange={function(e){setEditing(Object.assign({},editing,{contatos:e.target.value}));}}

              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={saveEdit} style={{flex:1}}>💾 Salvar</button>
              <button className="btn btn-secondary" onClick={function(){setModalOpen(false);}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL PERFIL DA OPORTUNIDADE */}
      {perfil && (
        <PerfilOportunidade
          opp={perfil}
          opps={opps}
          session={session}
          onClose={function(){setPerfil(null);}}
          onSave={function(updated){
            saveOpps(opps.map(function(o){ return o.id===updated.id?updated:o; }));
            setPerfil(updated);
          }}
          onDelete={deleteOpp}
          onEdit={function(o){ setPerfil(null); setEditing({...o}); setModalOpen(true); }}
          setRowColor={setRowColor}
          toggleMonth={toggleMonth}
          MONTHS_VIS={MONTHS_VIS}
          confColor={confColor}
          fmtConf={fmtConf}
          fmtAmt={fmtAmt}
        />
      )}
    </div>
  );
}

// ─── PERFIL DA OPORTUNIDADE ──────────────────────────────────
function PerfilOportunidade(props) {
  const {opp, opps, session, onClose, onSave, onDelete, onEdit, setRowColor, toggleMonth, MONTHS_VIS, confColor, fmtConf, fmtAmt} = props;
  const [tab, setTab] = useState('dados');
  const [hForm, setHForm] = useState({date:'', time:'', resp:session.code||'', processo:'', resumo:'', proximo:''});
  const [addingH, setAddingH] = useState(false);

  // Sincronizar opp atual com opps (para refletir toggleMonth)
  const current = opps.find(function(o){ return o.id===opp.id; }) || opp;
  const hist = current.history || [];
  const months = current.months || {};
  const conf = parseFloat(current.confidence||0);
  const is100 = conf>=1;
  const anoMarked = is100 && Object.values(months).some(Boolean);
  const isContrato = is100 && Object.values(months).filter(Boolean).length>1;

  function saveHistEntry() {
    if (!hForm.resumo.trim()) { alert('Preencha o resumo.'); return; }
    const entry = Object.assign({}, hForm, {id:'h_'+Date.now(), criadoEm:new Date().toISOString()});
    const newHist = [entry, ...hist];
    const updated = Object.assign({}, current, {history:newHist});
    onSave(updated);
    setHForm({date:'', time:'', resp:session.code||'', processo:'', resumo:'', proximo:''});
    setAddingH(false);
  }

  function deleteHEntry(hid) {
    const newHist = hist.filter(function(h){ return h.id!==hid; });
    onSave(Object.assign({}, current, {history:newHist}));
  }

  const COLORS = [
    {c:'#FFFF99', title:'Devendo algo ao cliente'},

        </div>

        {/* Tabs */}
        <div style={{display:'flex',gap:4,marginBottom:14,background:'rgba(0,0,0,.15)',borderRadius:var_radius,padding:3}}>
          {[['dados','📋 Dados'],['historico','📅 Histórico ('+hist.length+')']].map(function(t){

function ViewClientes({ session }) {

  function importXLSX(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const wb = XLSX.read(ev.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
        const hdrRow = rows[0] || [];
        const iCnpj=0, iNome=3, iApelido=4, iEnd=5, iCep=6, iCid=7, iEst=8;
        const iReg=9, iSeg=10, iVend=11, iCtc=12, iDpto=13, iTel=14, iCel=15, iMail=16;
        const clientMap = {};
        for (let ri=1; ri<rows.length; ri++) {
          const row = rows[ri];
          if (!row||!row[iNome]) continue;
          const nome = String(row[iNome]||'').trim();
          const apelido = String(row[iApelido]||nome).trim();
          if (!clientMap[apelido]) {
            clientMap[apelido] = {
              id:'cli_'+Date.now()+'_'+ri,
              cnpj:    String(row[iCnpj]||'').trim(),
              nome,
              apelido,
              endereco:String(row[iEnd]||'').trim(),
              cep:     String(row[iCep]||'').trim(),
              cidade:  String(row[iCid]||'').trim(),
              estado:  String(row[iEst]||'').trim(),
              regiao:  String(row[iReg]||'').trim(),
              segmento:String(row[iSeg]||'').trim(),
              vendedor:String(row[iVend]||'').trim(),
              contatos:[],
            };
          }
          const ctcNome = String(row[iCtc]||'').trim();
          if (ctcNome) {
            clientMap[apelido].contatos.push({
              nome:  ctcNome,
              dpto:  String(row[iDpto]||'').trim(),
              tel:   String(row[iTel]||'').trim(),
              cel:   String(row[iCel]||'').trim(),
              email: String(row[iMail]||'').trim(),
            });
          }
        }
        const list = Object.values(clientMap);
        saveClients(list);
        alert(list.length+' clientes importados.');
      } catch(err) { alert('Erro: '+err.message); }

      ||(c.nome&&c.nome.toLowerCase().includes(q))
      ||(c.cidade&&c.cidade.toLowerCase().includes(q))

// ─── VIEW: BUDGET ────────────────────────────────────────────
function ViewBudget({ session, isGestor }) {
  const CLIENTS_COL = ['CATERPILLAR','HONDA','HYUNDAI','JACTO','RUMO','EMBRAER','AÇÚCAR & ÁLCOOL','IMPLEMENTOS AGRÍCOLAS'];
  const SUPPLIERS = {
    TT:  ['BOSCH IW','BOSCH PT','HS-T','LÜBBERING','MILWAUKEE','MOMENTO','NORBAR','ENERPAC','PANASONIC','STAHLWILLE','STURTEVANT','3ARM'],
    REP: ['BOSCH IW (REP)','BOSCH REXROTH','STURTEVANT (REP)','OUTROS'],
    SV:  ['SERVIÇOS','KISTLER','SCHATZ'],
  };
  const ALL_SUPPS = [].concat(SUPPLIERS.TT, SUPPLIERS.REP, SUPPLIERS.SV);

  const [budget,  setBudget]  = useState(function(){ return load(KEYS.budget, {}); });
  const [selCli,  setSelCli]  = useState(null);   // perfil do cliente
  const [editing, setEditing] = useState(null);   // {sup, cli} sendo editado
  const [editVal, setEditVal] = useState({target:'', realiz:''});
  const [selSupp, setSelSupp] = useState(null);   // supplier dentro do perfil — abre gráfico

  function saveB(b) { setBudget(b); save(KEYS.budget, b); }

  // Valor de uma célula
  function cell(sup, cli) {
    return (budget[sup] && budget[sup][cli]) ? budget[sup][cli] : {realiz:0, target:0};
  }

  function startEdit(sup, cli) {
    const c = cell(sup, cli);
    setEditing({sup, cli});
    setEditVal({target:c.target||'', realiz:c.realiz||''});
  }

  function saveEdit() {
    if (!editing) return;
    const {sup, cli} = editing;
    const nb = JSON.parse(JSON.stringify(budget));
    if (!nb[sup]) nb[sup] = {};
    nb[sup][cli] = {
      target: parseFloat(editVal.target)||0,
      realiz: parseFloat(editVal.realiz)||0,
    };
    saveB(nb);
    setEditing(null);
  }

  function importXLSX(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const wb = XLSX.read(ev.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
        const b = {};
        const cliRow = rows[2] || [];
        const cliCols = {};
        cliRow.forEach(function(v,i){ if(v&&typeof v==='string'&&v.trim()&&v.trim()!=='2026') cliCols[v.trim()]=i; });
        for (var ri=5; ri<rows.length; ri++) {
          const row = rows[ri] || [];
          const supp = String(row[1]||'').trim();
          if (!supp || supp==='TOTAL' || supp==='TOTAL D + R') continue;
          b[supp] = b[supp] || {};
          Object.keys(cliCols).forEach(function(cli){
            const ci = cliCols[cli];
            b[supp][cli] = {realiz:parseFloat(row[ci])||0, target:parseFloat(row[ci+1])||0};
          });
        }
        saveB(b);
        alert('Budget importado.');
      } catch(err) { alert('Erro: '+err.message); }
    };
    reader.readAsBinaryString(file);
    e.target.value='';
  }

  // Totais
  const totTarget = ALL_SUPPS.reduce(function(s,sup){
    return s + CLIENTS_COL.reduce(function(ss,cli){ return ss+cell(sup,cli).target; },0);
  },0);
  const totRealiz = ALL_SUPPS.reduce(function(s,sup){
    return s + CLIENTS_COL.reduce(function(ss,cli){ return ss+cell(sup,cli).realiz; },0);
  },0);
  const pctGeral = totTarget>0?Math.round(totRealiz/totTarget*100):0;

  // Para o perfil do cliente: forecast das oportunidades
  const fcOpps = load(KEYS.forecast, []);

  // Gráfico simples em SVG
  function MiniBar(props) {
    var target = props.target;
    var realiz = props.realiz;
    var forecast = props.forecast;
    var w = props.w || 280;
    var h = 120;
    var max = Math.max(target, realiz, forecast, 1);
    var pad = 32;
    var barW = 38;
    var gap  = 20;
    var bars = [
      {v:target,   label:'Target',    color:'#2563EB'},
      {v:forecast, label:'Forecast',  color:'#CA8A04'},
      {v:realiz,   label:'Realizado', color:'#16A34A'},
    ];
    var totalW = bars.length*(barW+gap);
    var startX = (w - totalW) / 2;
    return (
      <svg width={w} height={h+40} style={{overflow:'visible'}}>
        {/* Grid lines */}
        {[0,0.25,0.5,0.75,1].map(function(pct,i){
          var y = pad + (1-pct)*(h-pad);
          return (
            <g key={i}>
              <line x1={0} y1={y} x2={w} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth={1}/>
              <text x={2} y={y+3} fontSize={8} fill="rgba(255,255,255,0.25)">{fmtAmt(max*pct)}</text>
            </g>
          );
        })}
        {bars.map(function(bar,i){
          var x    = startX + i*(barW+gap);
          var barH = max>0 ? Math.max(2,(bar.v/max)*(h-pad)) : 2;
          var y    = pad + (h-pad) - barH;
          var pct  = target>0 ? Math.round(bar.v/target*100) : 0;
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={barH} rx={4} fill={bar.color} opacity={.85}/>
              <text x={x+barW/2} y={y-5} textAnchor="middle" fontSize={9} fill="#fff" fontWeight="600">{fmtAmt(bar.v)}</text>
              <text x={x+barW/2} y={h+pad+6} textAnchor="middle" fontSize={9} fill="rgba(255,255,255,0.5)">{bar.label}</text>
              {bar.label!=='Target' && <text x={x+barW/2} y={h+pad+17} textAnchor="middle" fontSize={8} fill={bar.color}>{pct}%</text>}
            </g>
          );
        })}
      </svg>
    );
  }

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,height:'100%'}}>
      {/* Métricas */}
      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <div className="metric">
          <div className="metric-val" style={{color:'#60A5FA'}}>{fmtAmt(totTarget)}</div>
          <div className="metric-lbl">Meta total {CUR_YEAR}</div>
        </div>
        <div className="metric">
          <div className="metric-val" style={{color:'#4ADE80'}}>{fmtAmt(totRealiz)}</div>
          <div className="metric-lbl">Realizado</div>
        </div>
        <div className="metric">
          <div className="metric-val" style={{color:pctGeral>=100?'#4ADE80':pctGeral>=60?'#CA8A04':'#F87171'}}>{pctGeral}%</div>
          <div className="metric-lbl">Atingimento</div>
        </div>
        <div style={{flex:1}}/>
        {isGestor && (
          <label className="btn btn-blue" style={{cursor:'pointer'}}>
            📥 Importar Excel
            <input type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importXLSX}/>
          </label>
        )}
      </div>

      {/* Clientes — cards clicáveis */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {CLIENTS_COL.map(function(cli){
          const cliTarget = ALL_SUPPS.reduce(function(s,sup){ return s+cell(sup,cli).target; },0);
          const cliRealiz = ALL_SUPPS.reduce(function(s,sup){ return s+cell(sup,cli).realiz; },0);
          const pct = cliTarget>0?Math.round(cliRealiz/cliTarget*100):0;
          const color = pct>=100?'#16A34A':pct>=60?'#CA8A04':'#DC2626';
          return (
            <div key={cli} onClick={function(){setSelCli(cli);}}
              style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',cursor:'pointer',minWidth:120,transition:'border-color .15s',borderTop:'3px solid '+color}}
              onMouseEnter={function(ev){ev.currentTarget.style.borderColor=color;}}
              onMouseLeave={function(ev){ev.currentTarget.style.borderColor='var(--border)';}}>
              <div style={{fontSize:11,fontWeight:700,marginBottom:4}}>{cli}</div>
              <div style={{fontSize:15,fontWeight:700,color:'#60A5FA'}}>{fmtAmt(cliTarget)}</div>
              <div style={{fontSize:10,color:'#4ADE80'}}>{fmtAmt(cliRealiz)} <span style={{color:color,fontWeight:700}}>({pct}%)</span></div>
            </div>
          );
        })}
      </div>

      {/* Tabela */}
      {Object.keys(budget).length===0 ? (
        <div className="card" style={{textAlign:'center',padding:'60px 20px',color:'var(--text3)'}}>
          <div style={{fontSize:32,marginBottom:12}}>💰</div>
          <div style={{fontWeight:600,marginBottom:6}}>Nenhum budget carregado</div>
          <div>Importe o arquivo <b>BUDGET_2026_EF.xlsx</b> ou edite os valores clicando nas células.</div>
        </div>
      ) : (
        <div className="tbl-wrap" style={{flex:1,overflowX:'auto',overflowY:'auto'}}>
          <table className="tbl" style={{minWidth:900}}>
            <thead>
              <tr>
                <th style={{width:24}}></th>
                <th style={{minWidth:140}}>SUPPLIER</th>
                {CLIENTS_COL.map(function(c){ return <th key={c} style={{textAlign:'right',minWidth:100,fontSize:9}}>{c}</th>; })}
                <th style={{textAlign:'right',minWidth:80}}>TOTAL</th>
              </tr>
            </thead>
            <tbody>
              {Object.entries(SUPPLIERS).map(function(entry){
                const grupo = entry[0];
                const supps = entry[1];
                const grupoLabel = grupo==='TT'?'TORQUE TOOLS':grupo==='REP'?'REPRESENTAÇÃO':'SERVIÇOS';
                return [
                  <tr key={'g_'+grupo}>

                        {CLIENTS_COL.map(function(cli){
                          const c = cell(sup, cli);
                          const isEditing = editing && editing.sup===sup && editing.cli===cli;
                          const pct = c.target>0?Math.round(c.realiz/c.target*100):0;
                          return (
                            <td key={cli} style={{textAlign:'right',padding:'4px 8px'}}>
                              {isEditing ? (
                                <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:90}}>
                                  <input value={editVal.target} onChange={function(e){setEditVal(Object.assign({},editVal,{target:e.target.value}));}}
                                    placeholder="Target" type="number" style={{width:'100%',padding:'3px 6px',fontSize:10,textAlign:'right'}} autoFocus/>
                                  <input value={editVal.realiz} onChange={function(e){setEditVal(Object.assign({},editVal,{realiz:e.target.value}));}}
                                    placeholder="Realizado" type="number" style={{width:'100%',padding:'3px 6px',fontSize:10,textAlign:'right'}}/>
                                  <div style={{display:'flex',gap:3}}>
                                    <button onClick={saveEdit} style={{flex:1,padding:'2px 0',fontSize:9,background:'var(--accent)',color:'#FFD0D0',border:'none',borderRadius:4,cursor:'pointer'}}>✓</button>
                                    <button onClick={function(){setEditing(null);}} style={{flex:1,padding:'2px 0',fontSize:9,background:'var(--bg3)',color:'var(--text3)',border:'1px solid var(--border)',borderRadius:4,cursor:'pointer'}}>✕</button>
                                  </div>
                                </div>
                              ) : (
                                <div onClick={function(){if(isGestor)startEdit(sup,cli);}}
                                  style={{cursor:isGestor?'pointer':'default',borderRadius:4,padding:'3px 5px',transition:'background .1s'}}
                                  onMouseEnter={function(ev){if(isGestor)ev.currentTarget.style.background='rgba(255,255,255,0.05)';}}
                                  onMouseLeave={function(ev){ev.currentTarget.style.background='transparent';}}>
                                  {c.target>0 ? (
                                    <div>
                                      <div style={{fontSize:11,fontWeight:600,color:'var(--text)'}}>{fmtAmt(c.target)}</div>
                                      {c.realiz>0 && <div style={{fontSize:9,color:'#4ADE80'}}>{fmtAmt(c.realiz)} <span style={{color:pct>=100?'#4ADE80':pct>=60?'#CA8A04':'#F87171',fontWeight:700}}>({pct}%)</span></div>}
                                    </div>
                                  ) : (
                                    <span style={{color:'var(--border)',fontSize:11}}>{isGestor?'+ meta':'—'}</span>
                                  )}
                                </div>
                              )}
                            </td>
                          );
                        })}
                        <td style={{textAlign:'right',fontWeight:700,color:'#60A5FA'}}>{rowTotal>0?fmtAmt(rowTotal):'—'}</td>
                      </tr>
                    );
                  })
                ];
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* MODAL PERFIL DO CLIENTE */}
      {selCli && (
        <div className="modal-bg" onClick={function(){setSelCli(null);setSelSupp(null);}}>
          <div className="modal" style={{maxWidth:780}} onClick={function(e){e.stopPropagation();}}>
            <div className="modal-hd">
              <div>
                <h2>{selCli}</h2>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Budget {CUR_YEAR} — metas por fornecedor</div>
              </div>
              <button className="modal-close" onClick={function(){setSelCli(null);setSelSupp(null);}}>✕</button>
            </div>

            {/* Totais do cliente */}
            {(function(){
              const cliTarget = ALL_SUPPS.reduce(function(s,sup){ return s+cell(sup,selCli).target; },0);
              const cliRealiz = ALL_SUPPS.reduce(function(s,sup){ return s+cell(sup,selCli).realiz; },0);
              const cliFc     = fcOpps.filter(function(o){ return o.customer&&o.customer.toUpperCase().includes(selCli.split(' ')[0].toUpperCase()); })
                .reduce(function(s,o){ return s+amtNum(o.amount)*parseFloat(o.confidence||0); },0);
              const pct = cliTarget>0?Math.round(cliRealiz/cliTarget*100):0;
              return (
                <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
                  {[
                    {l:'Meta total', v:fmtAmt(cliTarget), c:'#60A5FA'},
                    {l:'Realizado',  v:fmtAmt(cliRealiz), c:'#4ADE80'},
                    {l:'Atingimento',v:pct+'%', c:pct>=100?'#4ADE80':pct>=60?'#CA8A04':'#F87171'},
                    {l:'Forecast pond.',v:fmtAmt(cliFc), c:'#FBBF24'},
                  ].map(function(m,i){
                    return (
                      <div key={i} className="metric" style={{flex:1,minWidth:100}}>
                        <div className="metric-val" style={{color:m.c}}>{m.v}</div>
                        <div className="metric-lbl">{m.l}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* Lista de suppliers */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:8,marginBottom:selSupp?12:0}}>
              {ALL_SUPPS.filter(function(sup){ return cell(sup,selCli).target>0||cell(sup,selCli).realiz>0; }).map(function(sup){
                const c = cell(sup, selCli);
                const oppsFc = fcOpps.filter(function(o){
                  return o.supplier&&o.supplier.toUpperCase()===sup.toUpperCase()&&o.customer&&o.customer.toUpperCase().includes(selCli.split(' ')[0].toUpperCase());
                });
                const fcVal = oppsFc.reduce(function(s,o){ return s+amtNum(o.amount)*parseFloat(o.confidence||0); },0);
                const pct = c.target>0?Math.round(c.realiz/c.target*100):0;
                const color = pct>=100?'#16A34A':pct>=60?'#CA8A04':'#DC2626';
                const isSelected = selSupp===sup;
                return (
                  <div key={sup} onClick={function(){ setSelSupp(isSelected?null:sup); }}
                    style={{background:isSelected?'rgba(37,99,235,0.15)':'var(--bg3)',border:'1px solid '+(isSelected?'#2563EB':'var(--border)'),borderRadius:8,padding:'10px 12px',cursor:'pointer',borderLeft:'3px solid '+color,transition:'all .15s'}}>
                    <div style={{fontSize:11,fontWeight:700,marginBottom:5,color:isSelected?'#60A5FA':'var(--text)'}}>{sup}</div>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{fmtAmt(c.target)}</div>
                    <div style={{fontSize:10,color:'#4ADE80',marginTop:2}}>{fmtAmt(c.realiz)} <span style={{color,fontWeight:700}}>({pct}%)</span></div>
                    {fcVal>0 && <div style={{fontSize:9,color:'#FBBF24',marginTop:2}}>FC: {fmtAmt(fcVal)}</div>}
                  </div>
                );
              })}
            </div>

            {/* Card com gráfico quando supplier selecionado */}
            {selSupp && (function(){
              const c = cell(selSupp, selCli);
              const oppsFc = fcOpps.filter(function(o){
                return o.supplier&&o.supplier.toUpperCase()===selSupp.toUpperCase()&&o.customer&&o.customer.toUpperCase().includes(selCli.split(' ')[0].toUpperCase());
              });
              const fcVal = oppsFc.reduce(function(s,o){ return s+amtNum(o.amount)*parseFloat(o.confidence||0); },0);
              const pct = c.target>0?Math.round(c.realiz/c.target*100):0;
              const pctFc = c.target>0?Math.round(fcVal/c.target*100):0;
              return (
                <div className="card" style={{borderTop:'2px solid #2563EB'}}>
                  <div style={{display:'flex',gap:16,alignItems:'flex-start',flexWrap:'wrap'}}>
                    <div style={{flex:'0 0 auto'}}>
                      <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>{selSupp} × {selCli}</div>
                      <MiniBar target={c.target} realiz={c.realiz} forecast={fcVal} w={300}/>
                    </div>
                    <div style={{flex:1,minWidth:180}}>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
                        {[
                          {l:'Target',    v:fmtAmt(c.target),   c:'#60A5FA'},
                          {l:'Realizado', v:fmtAmt(c.realiz),   c:'#4ADE80'},
                          {l:'Ating.',    v:pct+'%',             c:pct>=100?'#4ADE80':pct>=60?'#CA8A04':'#F87171'},
                          {l:'Forecast',  v:fmtAmt(fcVal),      c:'#FBBF24'},
                          {l:'FC/Target', v:pctFc+'%',          c:pctFc>=100?'#4ADE80':pctFc>=60?'#CA8A04':'#F87171'},
                        ].map(function(m,i){
                          return (
                            <div key={i} style={{background:'var(--bg3)',borderRadius:6,padding:'7px 10px'}}>
                              <div style={{fontSize:9,color:'var(--text3)',marginBottom:2,textTransform:'uppercase',letterSpacing:'.05em'}}>{m.l}</div>
                              <div style={{fontSize:14,fontWeight:700,color:m.c}}>{m.v}</div>
                            </div>
                          );
                        })}
                      </div>
                      {/* Oportunidades no Forecast */}
                      {oppsFc.length>0 && (
                        <div>
                          <div style={{fontSize:10,fontWeight:600,color:'var(--text2)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>Oportunidades no Forecast</div>
                          {oppsFc.map(function(o,i){
                            return (
                              <div key={i} style={{background:'var(--bg3)',borderRadius:5,padding:'5px 8px',marginBottom:4,fontSize:10}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                                  <span style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.description}</span>
                                  <span style={{color:confColor(o.confidence),fontWeight:700,flexShrink:0}}>{fmtConf(o.confidence)}</span>
                                </div>
                                <div style={{color:'var(--text3)',marginTop:2}}>{fmtAmt(amtNum(o.amount))} pond. → {fmtAmt(amtNum(o.amount)*parseFloat(o.confidence||0))}</div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── VIEW: CONFIGURAÇÕES ─────────────────────────────────────
function ViewSettings({ session, isGestor, onClose }) {
  const [users, setUsers] = useState(function(){ return load(KEYS.users, DEFAULT_USERS); });
  const [tab, setTab] = useState('usuarios');
  const [settings, setSettings] = useState(function(){ return load(KEYS.settings, {specialistLabel:'Especialista'}); });
  const [newUser, setNewUser] = useState({name:'',code:'',email:'',password:'',role:'vendedor'});

  function saveUsers(list) { setUsers(list); save(KEYS.users, list); }
  function saveSettings(s) { setSettings(s); save(KEYS.settings, s); }

  function addUser() {
    if (!newUser.name||!newUser.email||!newUser.password) { alert('Preencha nome, e-mail e senha.'); return; }
    if (users.find(function(u){return u.email===newUser.email;})) { alert('E-mail já cadastrado.'); return; }
    const u = Object.assign({}, newUser, {id:'u_'+Date.now(), active:true, pending:false});
    saveUsers([...users, u]);
    setNewUser({name:'',code:'',email:'',password:'',role:'vendedor'});
  }

  function toggleActive(id) {
    saveUsers(users.map(function(u){ return u.id===id?Object.assign({},u,{active:!u.active}):u; }));
  }

  const roleColors = {gestor:'#8C1A1A',consultor:'#1D4ED8',vendedor:'#15803D',especialista:'#7C3AED'};

  return (
    <div className="modal-bg">
      <div className="modal" style={{maxWidth:720}}>
        <div className="modal-hd">
          <h2>⚙ Configurações</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {/* Tabs */}
        <div style={{display:'flex',gap:4,marginBottom:16,borderBottom:'1px solid var(--border)',paddingBottom:8}}>
          {[['usuarios','👥 Usuários'],['sistema','🔧 Sistema']].map(function(t){
            return (
              <button key={t[0]} onClick={function(){setTab(t[0]);}}
                style={{padding:'5px 14px',borderRadius:6,border:'none',background:tab===t[0]?'var(--bg3)':'transparent',color:tab===t[0]?'var(--text)':'var(--text3)',cursor:'pointer',fontWeight:tab===t[0]?600:400,fontSize:12}}>
                {t[1]}
              </button>
            );
          })}
        </div>

        {tab==='usuarios' && (
          <div>
            {/* Lista de usuários */}
            <table className="tbl" style={{marginBottom:14}}>
              <thead>
                <tr><th>NOME</th><th>CÓDIGO</th><th>E-MAIL</th><th>PERFIL</th><th>STATUS</th><th></th></tr>
              </thead>
              <tbody>
                {users.map(function(u){
                  return (
                    <tr key={u.id}>
                      <td style={{fontWeight:600}}>{u.name}</td>
                      <td style={{color:'var(--text3)',fontSize:10}}>{u.code}</td>
                      <td style={{color:'var(--text3)',fontSize:10}}>{u.email}</td>
                      <td>
                        <span className="badge" style={{background:ROLES[u.role]?ROLES[u.role].color+'22':'rgba(100,100,100,.2)',color:ROLES[u.role]?ROLES[u.role].color:'var(--text3)'}}>
                          {u.role==='especialista'?settings.specialistLabel:(ROLES[u.role]?ROLES[u.role].label:u.role)}
                        </span>
                      </td>
                      <td>
                        {u.pending
                          ? <span style={{color:'#CA8A04',fontSize:11}}>⏳ Pendente</span>
                          : u.active
                            ? <span style={{color:'#4ADE80',fontSize:11}}>✅ Ativo</span>
                            : <span style={{color:'var(--text3)',fontSize:11}}>❌ Inativo</span>}
                      </td>
                      <td>
                        {isGestor && u.id!==session.id && (
                          <button onClick={function(){toggleActive(u.id);}} className="btn btn-secondary" style={{padding:'3px 8px',fontSize:10}}>
                            {u.active?'Desativar':'Ativar'}
                          </button>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>

            {/* Adicionar usuário */}
            {isGestor && (
              <div style={{background:'var(--bg3)',borderRadius:8,padding:12,border:'1px solid var(--border)'}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:10}}>Novo usuário</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 80px 1fr 1fr',gap:8,marginBottom:8}}>
                  {[
                    {k:'name',     l:'Nome completo', ph:'João Silva'},
                    {k:'code',     l:'Código',        ph:'JS'},
                    {k:'email',    l:'E-mail',        ph:'joao@empresa.com'},
                    {k:'password', l:'Senha inicial', ph:'••••••'},
                  ].map(function(f){
                    return (
                      <div key={f.k}>
                        <label style={{display:'block',fontSize:9,color:'var(--text3)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}}>{f.l}</label>
                        <input value={newUser[f.k]||''} onChange={function(e){setNewUser(Object.assign({},newUser,{[f.k]:e.target.value}));}} placeholder={f.ph} type={f.k==='password'?'password':'text'} style={{width:'100%',padding:'6px 8px',fontSize:11}}/>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
                  <div style={{flex:1}}>
                    <label style={{display:'block',fontSize:9,color:'var(--text3)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}}>Perfil</label>
                    <select value={newUser.role} onChange={function(e){setNewUser(Object.assign({},newUser,{role:e.target.value}));}} style={{width:'100%',padding:'6px 8px',fontSize:11}}>
                      <option value="vendedor">Vendedor</option>
                      <option value="gestor">Gestor Comercial</option>
                      <option value="consultor">Consultor</option>
                      <option value="especialista">{settings.specialistLabel}</option>
                    </select>
                  </div>
                  <button className="btn btn-primary" onClick={addUser}>Adicionar</button>
                </div>
              </div>
            )}
          </div>
        )}

        {tab==='sistema' && (
          <div>
            <div className="field">
              <label>Nome do perfil "Especialista"</label>
              <input value={settings.specialistLabel||'Especialista'} onChange={function(e){saveSettings(Object.assign({},settings,{specialistLabel:e.target.value}));}}
                placeholder="Engenheiro de Aplicação"/>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Este é o nome exibido para o perfil de especialista técnico em toda a plataforma.</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MODAL PERFIL DO USUÁRIO ──────────────────────────────────
function ModalPerfil({ session, onClose, onLogout }) {
  const settings = load(KEYS.settings, {specialistLabel:'Especialista'});
  const roleLabel = session.role==='especialista'
    ? settings.specialistLabel
    : (ROLES[session.role]?ROLES[session.role].label:session.role);

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{maxWidth:340,marginTop:60}} onClick={function(e){e.stopPropagation();}}>
        <div style={{textAlign:'center',padding:'20px 0 16px'}}>
          <div style={{width:60,height:60,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,color:'#FFD0D0',margin:'0 auto 12px'}}>
            {initials(session.name)}
          </div>
          <div style={{fontSize:16,fontWeight:700}}>{session.name}</div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>{session.email}</div>
          <span className="badge" style={{marginTop:8,background:ROLES[session.role]?ROLES[session.role].color+'22':'rgba(100,100,100,.2)',color:ROLES[session.role]?ROLES[session.role].color:'var(--text3)'}}>
            {roleLabel}
          </span>
        </div>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:12,display:'flex',gap:8}}>
          <button className="btn btn-secondary" onClick={onClose} style={{flex:1}}>Fechar</button>
          <button onClick={onLogout} style={{flex:1,padding:'7px 14px',borderRadius:'var(--radius)',border:'1px solid #DC2626',background:'rgba(220,38,38,.08)',color:'#FCA5A5',fontWeight:600,fontSize:12}}>
            Sair
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── APP PRINCIPAL ────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(function(){ return load(KEYS.session, null); });
  const [view, setView] = useState('forecast');
  const [showSettings, setShowSettings] = useState(false);
  const [showPerfil, setShowPerfil] = useState(false);

  useEffect(function(){ initUsers(); }, []);

  if (!session) {
    return <Login onLogin={function(u){ setSession(u); save(KEYS.session, u); }}/>;
  }

  const isGestor    = session.role === 'gestor';
  const isConsultor = session.role === 'consultor';
  const isVendedor  = session.role === 'vendedor';

  const settings = load(KEYS.settings, {specialistLabel:'Especialista'});

  const NAV = [
    {id:'forecast', icon:'📊', label:'Forecast'},
    {id:'clientes', icon:'👥', label:'Clientes'},
    {id:'budget',   icon:'💰', label:'Budget'},
  ];

  function handleLogout() {
    localStorage.removeItem(KEYS.session);
    setSession(null);
    setShowPerfil(false);
  }

  function renderView() {
    if (view==='forecast') return <ViewForecast session={session} isGestor={isGestor} isConsultor={isConsultor}/>;
    if (view==='clientes') return <ViewClientes session={session}/>;
    if (view==='budget')   return <ViewBudget   session={session} isGestor={isGestor}/>;
    return <div style={{padding:20,color:'var(--text3)'}}>Em desenvolvimento...</div>;
  }

  return (
    <div className="crm">
      <Sidebar view={view} setView={setView} items={NAV}/>
      <div className="main">
        <Topbar session={session} view={view} views={NAV}
          onSettings={function(){setShowSettings(true);}}
          onProfile={function(){setShowPerfil(true);}}/>
        <div className="content">
          {renderView()}
        </div>
      </div>
      {showSettings && (
        <ViewSettings session={session} isGestor={isGestor} onClose={function(){setShowSettings(false);}}/>
      )}
      {showPerfil && (
        <ModalPerfil session={session} onClose={function(){setShowPerfil(false);}} onLogout={handleLogout}/>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:background .25s,color .25s}
    input,select,textarea,button{font-family:inherit}
    textarea{resize:vertical}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{border-radius:3px}
    body.theme-dark{
      --bg-app:#0F1117;--bg-header:#161B27;--bg-card:#1C2333;--bg-card2:#151C2D;
      --bg-input:#0F1117;--bg-sidebar:#111827;
      --border:#2A3450;--border2:#1E2A40;
      --text-primary:#E8EDF5;--text-secondary:#8B97B0;--text-muted:#4A5568;
      --text-accent:#F87171;--text-green:#34D399;--text-blue:#60A5FA;
      --accent:#2563EB;--accent-soft:rgba(37,99,235,0.12);
      --sinuelo:#C0392B;--sinuelo-soft:rgba(192,57,43,0.12);
      --sinuelo:#8C1A1A;--sinuelo-light:rgba(140,26,26,0.25);--sinuelo-text:#FFAAAA;
      --scrollbar:#444;
    }
    body.theme-light{
      --bg-app:#F4F6F9;--bg-header:#FFFFFF;--bg-card:#FFFFFF;--bg-card2:#F8FAFB;
      --bg-input:#F4F6F9;--bg-sidebar:#1E293B;
      --border:#E2E8F0;--border2:#EEF2F7;
      --text-primary:#0F172A;--text-secondary:#64748B;--text-muted:#94A3B8;
      --text-accent:#DC2626;--text-green:#059669;--text-blue:#2563EB;
      --accent:#2563EB;--accent-soft:rgba(37,99,235,0.08);
      --sinuelo:#DC2626;--sinuelo-soft:rgba(220,38,38,0.08);
      --sinuelo:#8C1A1A;--sinuelo-light:rgba(140,26,26,0.10);--sinuelo-text:#8C1A1A;
      --scrollbar:#ccc;
    }
    body{background:var(--bg-app);color:var(--text-primary)}
    /* === NOVO DESIGN SINUELO CRM === */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * { box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    
    /* Sidebar */
    .crm-sidebar {
      width: 56px; height: 100vh; background: var(--bg-sidebar);
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 0; gap: 4px; position: fixed; left: 0; top: 0;
      z-index: 100; border-right: 1px solid rgba(255,255,255,0.06);
      overflow: hidden; transition: width .2s ease;
    }
    .crm-sidebar:hover { width: 200px; }
    .crm-sidebar .sb-logo {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px; flex-shrink: 0; overflow: hidden;
      background: rgba(255,255,255,0.08);
    }
    .crm-sidebar .sb-logo img { width: 28px; height: 28px; object-fit: contain; }
    .crm-sidebar-btn {
      width: 100%; min-height: 36px; padding: 0 10px;
      display: flex; align-items: center; gap: 10px;
      border: none; background: transparent; cursor: pointer;
      border-radius: 8px; margin: 0 6px; width: calc(100% - 12px);
      color: rgba(255,255,255,0.45); font-size: 13px; font-weight: 500;
      transition: all .15s ease; white-space: nowrap; overflow: hidden;
    }
    .crm-sidebar-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
    .crm-sidebar-btn.active { background: rgba(37,99,235,0.25); color: #60A5FA; }
    .crm-sidebar-btn svg { flex-shrink: 0; }
    .crm-sidebar-btn .sb-label { opacity: 0; transition: opacity .15s ease; pointer-events: none; font-size: 12px; }
    .crm-sidebar:hover .sb-label { opacity: 1; }
    .crm-sidebar .sb-badge {
      margin-left: auto; background: #EF4444; color: white;
      border-radius: 10px; padding: 1px 5px; font-size: 9px;
      font-weight: 700; flex-shrink: 0;
    }
    
    /* Layout wrapper */
    .crm-layout { margin-left: 56px; display: flex; flex-direction: column; min-height: 100vh; }
    
    /* Topbar */
    .crm-topbar {
      height: 54px; background: var(--bg-header); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 12px;
      position: sticky; top: 0; z-index: 50;
    }
    .crm-topbar .topbar-title { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -.01em; }
    .crm-topbar .topbar-search {
      flex: 1; max-width: 420px; height: 34px;
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-card2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0 12px; color: var(--text-muted); font-size: 12px; cursor: text;
    }
    .crm-topbar .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    
    /* Nav tabs */
    .crm-navtabs {
      background: var(--bg-header); border-bottom: 1px solid var(--border);
      padding: 0 20px; display: flex; align-items: center; gap: 2px;
      overflow-x: auto; white-space: nowrap; scroll-behavior: smooth;
    }
    .crm-navtabs::-webkit-scrollbar { height: 0; }
    .crm-navtab {
      height: 40px; padding: 0 14px; border: none; background: transparent;
      font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all .15s ease; position: relative;
      white-space: nowrap; flex-shrink: 0;
    }
    .crm-navtab:hover { color: var(--text-primary); }
    .crm-navtab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .crm-navtab .tab-badge {
      position: absolute; top: 6px; right: 6px;
      background: #EF4444; color: white; border-radius: 50%;
      width: 14px; height: 14px; font-size: 8px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    
    /* Metric bar */
    .crm-metrics {
      background: var(--bg-header); border-bottom: 1px solid var(--border);
      padding: 8px 20px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
    }
    .crm-metric { display: flex; align-items: baseline; gap: 5px; }
    .crm-metric-val { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .crm-metric-val.warn { color: #EF4444; }
    .crm-metric-lbl { font-size: 11px; color: var(--text-muted); }
    
    /* Content area */
    .crm-content { padding: 16px 20px; flex: 1; overflow-y: auto; }
    
    /* Cards */
    .crm-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    
    /* Kanban column header */
    .kanban-stage-header {
      padding: 10px 12px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border2);
    }
    
    /* Opp card */
    .opp-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 13px; cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
      border-left-width: 3px;
    }
    .opp-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); border-color: var(--accent); }
    
    /* Buttons */
    .btn-primary {
      height: 34px; padding: 0 14px; border: none; border-radius: 8px;
      background: var(--sinuelo); color: white; font-size: 12px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-secondary {
      height: 34px; padding: 0 12px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-card); color: var(--text-secondary); font-size: 12px;
      cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap;
      transition: all .15s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* Toggle SIM/NAO */
    .radar-toggle {
      width: 36px; height: 20px; border-radius: 10px; border: none; cursor: pointer;
      position: relative; transition: background .2s; flex-shrink: 0;
    }
    .radar-toggle::after {
      content: ''; position: absolute; top: 2px; width: 16px; height: 16px;
      border-radius: 50%; background: white; transition: left .2s;
    }
    .radar-toggle.on { background: #10B981; }
    .radar-toggle.off { background: #CBD5E1; }
    .radar-toggle.on::after { left: 18px; }
    .radar-toggle.off::after { left: 2px; }
    
    /* Score badge */
    .score-badge {
      font-size: 12px; font-weight: 700; padding: 2px 7px; border-radius: 6px;
    }
    .score-pos { color: #059669; background: rgba(5,150,105,.1); }
    .score-neg { color: #DC2626; background: rgba(220,38,38,.1); }
    .score-neu { color: var(--text-muted); background: var(--bg-card2); }
    
    /* Freq badge */
    .freq-semanal    { background: rgba(5,150,105,.1);  color: #059669; }
    .freq-quinzenal  { background: rgba(37,99,235,.1);  color: #2563EB; }
    .freq-mensal     { background: rgba(245,158,11,.1); color: #D97706; }
    .freq-bimestral  { background: rgba(239,68,68,.1);  color: #DC2626; }
    
    @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: translateY(0); } }
    .fade-in { animation: fadeIn .2s ease; }

    ::-webkit-scrollbar-thumb{background:var(--scrollbar)}
  </style>

      const ok = onLogin(email, password);

      setLoading(false);

function App() {

  const AUTH_KEY = "crm_session_v1";
  const USERS_KEY = "crm_users_v1";

  const DEFAULT_USERS = [
    {id:"gestor1", name:"Elieser Fernandes",   code:"EF", email:"ef@sinuelo.com.br",  role:"gestor",     password:"sinuelo2026", active:true},
    {id:"consul1", name:"Consultor",            code:"CS", email:"cs@sinuelo.com.br",  role:"consultor",  password:"consul2026",  active:true, team:["EF","CS"]},
    {id:"vend1",   name:"Vendedor",             code:"VD", email:"vd@sinuelo.com.br",  role:"vendedor",   password:"vend2026",    active:true},
    {id:"eng1",    name:"Engenheiro Aplic.",    code:"EA", email:"ea@sinuelo.com.br",  role:"engenheiro", password:"eng2026",     active:true},
  ];

  const [users, setUsers] = React.useState(()=>{
    try{ const r=localStorage.getItem(USERS_KEY); return r?JSON.parse(r):DEFAULT_USERS; }catch(e){ return DEFAULT_USERS; }
  });
  function saveUsers(u){ setUsers(u); try{ localStorage.setItem(USERS_KEY,JSON.stringify(u)); }catch(e){} }

  const [session, setSession] = React.useState(()=>{
    try{ const r=localStorage.getItem(AUTH_KEY); return r?JSON.parse(r):null; }catch(e){ return null; }
  });

  function doLogin(email, password){
    const emailLower = (email||"").trim().toLowerCase();
    const user = users.find(u=>
      (u.email||"").toLowerCase()===emailLower &&
      u.password===password &&
      u.active
    );
    if(!user) return false;
    const s = {userId:user.id, role:user.role, code:user.code, name:user.name, email:user.email||"", team:user.team||[user.code]};
    setSession(s);
    try{ localStorage.setItem(AUTH_KEY,JSON.stringify(s)); }catch(e){}
    return true;
  }

  function doCreateAccount(newUser){
    if(newUser._reset){
      // Reset de senha — atualizar usuário existente
      const upd = users.map(u=>u.id===newUser.id ? {...u, password:newUser.password} : u);
      saveUsers(upd);
      return;
    }
    // Nova conta criada como INATIVA — gestor precisa ativar
    const u = {...newUser, active:false, pendente:true};
    saveUsers([...users, u]);
  }

  function doLogout(){
    setSession(null);
    try{ localStorage.removeItem(AUTH_KEY); }catch(e){}
  }

  // Tela de login
  if(!session){
    return <LoginScreen users={users} onLogin={doLogin} onCreateAccount={doCreateAccount}/>;
  }

  // Função principal: executa a análise diária de inteligência comercial
  async function runIntelAnalysis(){
    // SEM API KEY — usa Google News RSS via proxy CORS gratuito (allorigins.win)
    const clientesMonitor = [...new Set(
      clientsData.filter(c=>c.monitorar_pesquisa==="SIM").map(c=>c.alias)
    )];

    if(clientesMonitor.length===0){
      setIntelError("Nenhum cliente marcado para monitorar. Acesse Clientes → clique num cliente → ative 🧠 NAO → SIM.");
      return;
    }
    if(clientesMonitor.length > 20){
      setIntelError("Limite de 20 clientes por rodada. Desmarque alguns em Clientes.");
      return;
    }

    setIntelLoading(true);
    setIntelError("");

    // Buscar notícias RSS do Google News para cada cliente
    async function fetchRSS(query){
      const q = encodeURIComponent(query);
      const rssUrl = `https://news.google.com/rss/search?q=${q}&hl=pt-BR&gl=BR&ceid=BR:pt-419`;
      const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
      try{
        const res = await fetch(proxy, {signal: AbortSignal.timeout(8000)});
        if(!res.ok) return [];
        const data = await res.json();
        const xml = data.contents||"";
        // Parsear itens do RSS
        const items = [];
        const itemRegex = /<item>([\s\S]*?)<\/item>/g;
        let m;
        while((m = itemRegex.exec(xml)) !== null){
          const item = m[1];
          const _tm=item.match(/<title><!\[CDATA\[(.*?)\]\]><\/title>/)||item.match(/<title>(.*?)<\/title>/);const title=_tm?_tm[1]:"";
          const _lm=item.match(/<link>(.*?)<\/link>/)||item.match(/<link\/>(.*?)<\/link>/);const _hm=item.match(/href="(https?:\/\/[^"]+)"/);const link=_lm?_lm[1]:(_hm?_hm[1]:"");
          const _pm=item.match(/<pubDate>(.*?)<\/pubDate>/);const pub=_pm?_pm[1]:"";
          const _sm=item.match(/<source[^>]*>(.*?)<\/source>/);const src=_sm?_sm[1]:"";
          if(title) items.push({title, link, pub, src});
          if(items.length>=5) break;
        }
        return items;
      }catch(e){ return []; }
    }

    const results = {};
    for(const alias of clientesMonitor){
      const cli = clientsData.find(c=>c.alias===alias);
      const setor = (cli?cli.segment:"—");
      // Query 1: nome da empresa + termos positivos
      const q1 = `"${alias}" OR "${((cli?cli.name:alias)).split(" ").slice(0,3).join(" ")}" investimento expansão produção Brasil 2025 2026`;
      // Query 2: setor industrial (notícias do mercado)
      const q2 = `${setor} Brasil mercado indústria 2025 2026`;
      const [news1, news2] = await Promise.all([fetchRSS(q1), fetchRSS(q2)]);
      results[alias] = {
        alias, setor,
        city: (cli?cli.city:""), state: (cli?cli.state:""),
        newsEmpresa: news1,
        newsSetor: news2,
      };
      // Pausa curta para não sobrecarregar o proxy
      await new Promise(r=>setTimeout(r,400));
    }

    // Montar relatório estruturado sem IA
    const gerado_em = new Date().toLocaleString("pt-BR");
    const clientesReport = clientesMonitor.map(alias=>{
      const r = results[alias];
      const totalNews = r.newsEmpresa.length + r.newsSetor.length;
      return {
        alias,
        setor: r.setor,
        city: r.city,
        newsEmpresa: r.newsEmpresa,
        newsSetor: r.newsSetor,
        totalNews,
      };
    });

    const report = {
      gerado_em,
      total_clientes: clientesMonitor.length,
      modo: "rss_gratuito",
      clientes: clientesReport,
    };
    saveIntelReport(report);
    setIntelLoading(false);
  }

  // IMPORTAR ORÇAMENTO VIA XLSX
  async function importOrcamentoXLSX(e) {
    const file = e.target.files[0];
    if (!file) return;
    const XLSX = window.XLSX;
    if (!XLSX) { alert("Aguarde o carregamento do leitor de planilhas."); return; }
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true});

    // Estrutura da planilha Sinuelo:
    // Linha 14 (idx 13): cabeçalhos de grupo
    // Linha 15 (idx 14): cabeçalhos de coluna
    // Linhas 17+ (idx 16+): itens (col A=item, E=qtd, F=desc, G=codigo, H=sigma, J=entrega, L=preco_unit, T=val_liq_unit)
    // Linha TOTAL: L="Valor total com ICMS", M=valor

    // Detectar itens (coluna A = número sequencial)
    const items = [];
    let totalComICMS = 0;
    let totalComIPI  = 0;
    let foundTotal   = false;

    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      if (!row || !row.length) continue;

      // Linha de item: col A é número 1-99
      const itemNum = row[0];
      if (typeof itemNum === 'number' && itemNum >= 1 && itemNum <= 99) {
        const qtd         = Number(row[4])  || 1;
        const desc        = String(row[5]  || '').trim();
        const codigo      = String(row[6]  || '').trim();
        const sigma       = String(row[7]  || '').trim();
        const entrega     = String(row[9]  || '').trim();
        const preco_unit  = Number(row[11]) || 0;
        const val_liq_unit= Number(row[19]) || 0;  // coluna T (índice 19)
        const total_liq   = val_liq_unit * qtd;
        items.push({item:itemNum, qtd, desc, codigo, sigma, entrega, preco_unit:+preco_unit.toFixed(2), val_liq_unit:+val_liq_unit.toFixed(2), total_liq:+total_liq.toFixed(2)});
      }

      // Linha de totais: col L = "Valor total com ICMS"
      const colL = String(row[11] || '').toLowerCase();
      if (colL.includes('valor total com icms')) {
        totalComICMS = Number(row[12]) || 0;
        foundTotal = true;
      }
      if (colL.includes('valor total com ipi') && !colL.includes('difal')) {
        totalComIPI = Number(row[12]) || 0;
      }
      // Também captura totais das colunas W/X (índices 22/23)
      if (typeof row[22] === 'number' && row[22] > 0 && !totalComIPI) totalComIPI  = row[22];
      if (typeof row[23] === 'number' && row[23] > 0) totalComIPI = Math.max(totalComIPI, row[23]);
    }

    if (items.length === 0) {
      alert("Nenhum item encontrado na planilha. Verifique se o formato é o padrão Sinuelo.");
      e.target.value = "";
      return;
    }

    // Usar valor com ICMS como valor do pipeline (célula amarela padrão)
    const valorPipeline = totalComICMS || items.reduce((s,it)=>s+(it.total_liq||0),0);

    // Extrair número do orçamento do nome do arquivo
    // Ex: MO_JACTO5LUCAS_SIQUEIRA_MO21790_26EF.xlsx → MO21790_26EF
    const fname = file.name.replace('.xlsx','').replace('.xls','');
    const orcNum = fname.split('_').slice(-2).join('_') || fname;

    // Tentar deduzir cliente e contato do nome do arquivo
    // Formato: MO_CLIENTE_CONTATO_NUMERO.xlsx
    const parts = fname.split('_');
    const clienteGuess = parts[1] || '';
    const contatoGuess = parts.slice(2, parts.length-2).join(' ') || '';

    const newOrc = {
      id: Date.now().toString(),
      number: orcNum,
      client: clienteGuess,
      contact: contatoGuess,
      supplier: 'Momento',
      value: +valorPipeline.toFixed(2),
      valueComIPI: +totalComIPI.toFixed(2),
      valueComICMS: +totalComICMS.toFixed(2),
      date: new Date().toISOString().slice(0,10),
      status: 'aberto',
      oppId: '',
      notes: `${items.length} itens importados. Valor pipeline = R$ ${valorPipeline.toLocaleString('pt-BR',{minimumFractionDigits:2})} (com ICMS).`,
      fileName: file.name,
      items
    };

    // Abrir modal pré-preenchido para o usuário confirmar/ajustar antes de salvar
    setOrcForm(newOrc);
    setOrcModal(true);
    e.target.value = "";
  }

  // ===== FOLLOW-UPS =====
  // Detecta se uma linha começa com data DD.MM.YY (ou DD/MM/YY ou DD-MM-YY)
  const FOLLOWUP_DATE_RE = /^\s*(\d{2}[.\/\-]\d{2}[.\/\-]\d{2,4})\b/;

  // Migra uma string de notes para array de followUps
  function parseFollowUpsFromNotes(notes){
    if(!notes) return [];
    const lines = String(notes).split(/\r?\n/);
    const out = [];
    let cur = null;
    for(const ln of lines){
      const m = ln.match(FOLLOWUP_DATE_RE);
      if(m){
        if(cur) out.push(cur);
        const date = m[1].replace(/\//g,".").replace(/-/g,".");
        const text = ln.replace(FOLLOWUP_DATE_RE,"").replace(/^\s*[-–—:]\s*/,"").trim();
        cur = {id:Date.now()+Math.random(), date, text};
      } else if(ln.trim() && cur){
        // continuação da linha anterior — concatena (até 60 chars total da entrada incluindo data)
        cur.text = (cur.text + " " + ln.trim()).trim();
      } else if(ln.trim() && !cur){
        // linha sem data no início — cria entrada sem data
        cur = {id:Date.now()+Math.random(), date:"", text:ln.trim()};
      }
    }
    if(cur) out.push(cur);
    return out;
  }

  // Helper: monta o objeto de relatório a partir de uma oportunidade
  function buildRelatorioData(opp){
    const stage = STAGES.find(s=>s.id===opp.stage);
    const stageLabel = (stage?stage.label:null) || opp.stage;
    const stageTag   = (stage?stage.tag:null)   || "";
    const negType    = opp.negType||"D";
    const resp       = opp.resp||"EF";
    const supplier   = opp.supplier||"—";
    const valor      = opp.value?`R$ ${(opp.value).toLocaleString("pt-BR")}`:"—";
    const confPct    = opp.stage==="fechado"?"100%":opp.stage==="po_recebido"?"90%":opp.stage==="neg"||opp.stage==="negociacao"?"80%":opp.stage==="proposta"?"50%":opp.stage==="diagnostico"?"30%":"10%";
    const months     = opp.months||{};
    const now = new Date();
    const MONTH_PT = ["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
    const semLabel = now.getMonth()<6 ? `1S/${now.getFullYear()}` : `2S/${now.getFullYear()}`;
    const timeCols = [
      { key:"m0",  label: MONTH_PT[now.getMonth()]            },
      { key:"m1",  label: MONTH_PT[(now.getMonth()+1)%12]     },
      { key:"m2",  label: MONTH_PT[(now.getMonth()+2)%12]     },
      { key:"sem", label: semLabel                            },
    ];
    const monthsMarked = timeCols.map(tc=>({label:tc.label, marked: !!months[tc.key]}));
    return {opp, stageLabel, stageTag, negType, resp, supplier, valor, confPct, monthsMarked};
  }

  // Relatório baseado nas oportunidades do FORECAST (oppFc)
  function buildRelatorioFc(opp){
    const linha = "─".repeat(55);
    const conf = Math.round(parseFloat(opp.confidence||0)*100)+"%";
    const months = opp.months||{};
    const FC_ALL = ["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
    const monthsTxt = FC_ALL.filter(m=>months[m]).join(" · ")||"—";
    const forecastHeader = ["NEG","RESP.","CUSTOMER","SUPPLIER","DESCRIPTION","AMOUNT","CONF%","MESES"].join("\t");
    const amt = parseFloat(String(opp.amount||"0").replace(/[^0-9.]/g,""))||0;
    const amtFmt = amt>0?"R$"+(amt>=1000?(amt/1000).toFixed(1)+"k":amt.toFixed(2)):"—";
    const forecastValues = [opp.neg||"D", opp.resp||"—", opp.customer||"—", opp.supplier||"—", opp.description||"—", amtFmt, conf, monthsTxt].join("\t");

    // Histórico de visitas (campo history do oppFc)
    const hist = Array.isArray(opp.history)?opp.history:[];
    const histTxt = hist.length
      ? hist.map(h=>{
          const data = h.date||"—";
          const hora = h.time?` ${h.time}`:"";
          const resp = h.resp?` [${h.resp}]`:"";
          const proc = h.processo?` · ${h.processo}`:"";
          return `[${data}${hora}${resp}${proc}]\n${h.resumo||""}`;
        }).join("\n\n")
      : "Sem visitas registradas.";

    return [
      `${opp.customer||"—"} · ${opp.contatos||"—"}`,
      `Oportunidade: ${opp.description||"—"}`,
      linha,
      `FORECAST:`,
      forecastHeader,
      forecastValues,
      linha,
      `HISTÓRICO:`,
      histTxt,
      linha,
      `FOLLOW-UP:`,
      opp.followup||"—",
      linha,
      `PRÓXIMA AÇÃO: —`,
    ].join("\n");
  }

      doc.setFont("helvetica","bold");

      doc.autoTable({
        startY: y,
        head: [headerRow],
        body: [dataRow],

        styles: {fontSize:8, cellPadding:3, lineColor:[150,150,150], lineWidth:0.4},
        headStyles: {fillColor:[140,26,26], textColor:[255,255,255], fontStyle:"bold"},
        margin: {left:M, right:M},
      });
      y = doc.lastAutoTable.finalY + 8;
      // Previsão de meses
      doc.autoTable({
        startY: y,
        head: [d.monthsMarked.map(m=>m.label)],
        body: [d.monthsMarked.map(m=>m.marked?"X":"")],
        theme: "grid",
        styles: {fontSize:9, cellPadding:4, halign:"center", lineColor:[150,150,150], lineWidth:0.4},
        headStyles: {fillColor:[200,200,200], textColor:[40,40,40], fontStyle:"bold"},
        bodyStyles: {textColor:[140,26,26], fontStyle:"bold"},
        margin: {left:M, right:M},
        tableWidth: W-2*M
      });
      y = doc.lastAutoTable.finalY + 14;

      // Linha
      doc.setDrawColor(140,26,26); doc.line(M, y, W-M, y); y += 18;

      // HISTÓRICO
      doc.setFont("helvetica","bold"); doc.setFontSize(11);
      doc.text("HISTÓRICO:", M, y); y += 14;
      doc.setFont("helvetica","normal"); doc.setFontSize(9);
      const hist = (opp.visitHistory||[]).slice().reverse();
      if(hist.length===0){
        doc.text("Sem visitas registradas.", M, y); y += 14;
      } else {
        hist.forEach(h=>{
          if(y > 780){ doc.addPage(); y = M; }
          const data = h.date||h.createdAt||"—";
          doc.setFont("helvetica","bold");
          doc.text(`[${data}]`, M, y); y += 12;
          doc.setFont("helvetica","normal");
          const fields = [
            ["Resumo", h.summary],
            ["O quê", h.what],["Por quê", h.why],
            ["Quem", h.who],["Onde", h.where],["Quando", h.when],
            ["Como", h.how],["Quanto", h.howMuch],
            ["Próximo passo", h.nextStep],
          ];
          fields.forEach(([k,v])=>{
            if(!v) return;
            const line = doc.splitTextToSize(`${k}: ${v}`, W-2*M-12);
            if(y + line.length*11 > 800){ doc.addPage(); y = M; }
            doc.text(line, M+12, y);
            y += line.length*11;
          });
          y += 4;
        });
      }
      y += 6;
      // Linha
      if(y > 760){ doc.addPage(); y = M; }
      doc.setDrawColor(140,26,26); doc.line(M, y, W-M, y); y += 18;

      // FOLLOW-UP
      doc.setFont("helvetica","bold"); doc.setFontSize(11);
      doc.text("FOLLOW-UP:", M, y); y += 14;
      doc.setFont("helvetica","normal"); doc.setFontSize(9);
      const followText = opp.nextAction||"—";
      const followLines = doc.splitTextToSize(followText, W-2*M);
      followLines.forEach(l=>{
        if(y > 800){ doc.addPage(); y = M; }
        doc.text(l, M, y); y += 11;
      });
      y += 8;
      if(y > 760){ doc.addPage(); y = M; }
      doc.setDrawColor(140,26,26); doc.line(M, y, W-M, y); y += 18;

      // PRÓXIMA AÇÃO
      doc.setFont("helvetica","bold"); doc.setFontSize(11);
      doc.text("PRÓXIMA AÇÃO:", M, y); y += 14;
      doc.setFont("helvetica","normal"); doc.setFontSize(9);
      const nextLines = doc.splitTextToSize(opp.notes||"—", W-2*M);
      nextLines.forEach(l=>{
        if(y > 800){ doc.addPage(); y = M; }
        doc.text(l, M, y); y += 11;
      });

      // Rodapé
      const total = doc.internal.getNumberOfPages();
      for(let i=1;i<=total;i++){
        doc.setPage(i);
        doc.setFontSize(7); doc.setTextColor(120,120,120);
        doc.text(`Sinuelo Torque+Controle · ${new Date().toLocaleDateString("pt-BR")} ${new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}`, M, 825);
        doc.text(`${i} / ${total}`, W-M, 825, {align:"right"});

      const safeName = (opp.company||"Oportunidade").replace(/[^\w\-]+/g,"_");
      doc.save(`Relatorio_${safeName}_${new Date().toISOString().slice(0,10)}.pdf`);
    } catch(e){ alert("Erro ao gerar PDF: "+e.message); }
  }

  async function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const XLSX = window.XLSX;
    if (!XLSX) { alert("Aguarde o carregamento do leitor de planilhas."); return; }
    const fname = file.name.toLowerCase();
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const sheetName = wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true});

    // Detectar tipo de planilha pelo nome do arquivo e conteúdo
    const isClientes = fname.includes("cadastro") || fname.includes("cliente") || sheetName.toLowerCase().includes("cliente");
    const isForecast = fname.includes("forecast") || sheetName.toLowerCase().includes("forecast") || sheetName.toLowerCase().includes("pipeline");
    const isBudget   = fname.includes("budget") || sheetName.toLowerCase().includes("budget");

    if (isClientes) {
      // Importar clientes — mesmo parser do botão dedicado
      const dict = {};
      for (let i=1; i<rows.length; i++) {
        const row = rows[i]; if (!row || !row.length) continue;
        const cliente=String(row[3]||"").trim(), apelido=String(row[4]||"").trim()||cliente;
        if (!apelido) continue;
        if (!dict[apelido]) dict[apelido]={alias:apelido,name:cliente,cnpj:String(row[0]||"").trim(),address:String(row[5]||"").trim(),cep:String(row[6]||"").trim(),city:String(row[7]||"").trim(),state:String(row[8]||"").trim(),region:String(row[9]||"").trim(),segment:String(row[10]||"").trim(),contacts:[]};
        const contato=String(row[12]||"").trim();
        if(contato) dict[apelido].contacts.push({name:contato,role:String(row[13]||"").trim(),tel:String(row[14]||"").trim(),cel:String(row[15]||"").trim(),email:String(row[16]||"").trim()});
      }
      const list = Object.values(dict);
      saveClients(list);
      alert(list.length+" clientes importados com sucesso!");
    } else if (isForecast) {
      // Importar forecast — colunas: NEGOCIAÇÃO|RESP.|CUSTOMER|SUPPLIER|DESCRIPTION|AMOUNT|UF|Confidence|...
      const newOpps = [];
      for (let i=1; i<rows.length; i++) {
        const row = rows[i]; if (!row || !row.length || !row[2]) continue;
        newOpps.push({
          id: Date.now().toString()+i,
          negType: String(row[0]||"D").trim(),
          resp: String(row[1]||"").trim(),
          company: String(row[2]||"").trim(),
          supplier: String(row[3]||"").trim(),
          title: String(row[4]||"").trim(),
          value: Number(row[5])||0,
          stage: "qualificacao",
          priority: "media",
          forecastColor: "none",
          nextAction: String(row[12]||"").trim(),
          nextDate: "", nextTime: "",
          contact: String(row[13]||"").trim(),
          notes: "",
          months: {},
          history: [], visitHistory: [],
          createdAt: new Date().toISOString().slice(0,10)
        });
      }
      if(window.confirm("Importar "+newOpps.length+" oportunidades? Isso substituirá o pipeline atual.")) {
        setAndSave(newOpps);
        alert(newOpps.length+" oportunidades importadas!");
      }
    } else {
      alert("Planilha nao reconhecida. Nomeie com clientes, forecast ou budget. Arquivo: "+file.name);
    }
    e.target.value="";
  }

  async function chat(msg) {
    const m = msg||aiInput;
    if (!m.trim()||aiLoading) return;
    if (!apiKey) { setKeyDraft(""); setShowKey(true); return; }
    const ctx = sel
      ? `Oportunidade: "${sel.title}" | Empresa: ${sel.company} | Etapa: ${(STAGES.find(s=>s.id===sel.stage)||{label:""}).label} | Valor: R$ ${(sel.value||0).toLocaleString("pt-BR")} | Próxima ação: ${sel.nextAction} | Notas: ${sel.notes}`
      : "Nenhuma oportunidade selecionada.";
    const msgs = [...aiMsgs, {role:"user",content:m}];
    setAiMsgs(msgs);
    setAiInput("");
    setAiLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":(apiKey||"").trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:SYS_PROMPT,
          messages:[...msgs.slice(0,-1),{role:"user",content:`${m}\n\nContexto: ${ctx}`}]
        })
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error.message);
      const reply = (d.content?d.content.map(c=>c.text||"").join(""):"")||"Sem resposta."
      setAiMsgs([...msgs,{role:"assistant",content:reply}]);
    } catch(err) {
      setAiMsgs([...msgs,{role:"assistant",content:`Erro: ${err.message}`}]);
    }
    setAiLoading(false);
  }

          </button>
          <button onClick={()=>setShowProfile(true)} title={userName}
            style={{width:"30px",height:"30px",borderRadius:"50%",border:"2px solid rgba(140,26,26,0.4)",background:"var(--sinuelo)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",padding:0,flexShrink:0}}>

              ?<img src={profile.photo} style={{width:"30px",height:"30px",objectFit:"cover"}} alt=""/>

      {/* CONTENT */}
      <div className="crm-content">
      {/* CORPO (mantido para compatibilidade) */}
      <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>

        {/* KANBAN */}
        {/* ===== OPORTUNIDADES ===== */}
        {view==="oportunidades" && (()=>{
          const CONF_OPTS = [["0","0%"],["0.1","10%"],["0.2","20%"],["0.3","30%"],["0.5","50%"],["0.75","75%"],["1","100%"]];
          const NEG_OPTS  = [["D","D"],["R","R"],["S","S"]];
          const curYr = OFC_YEAR;

          const q = oppFcSearch.trim().toLowerCase();
          const filtered = oppFc.filter(o=>!q||
            (o.customer&&o.customer.toLowerCase().includes(q))||
            (o.supplier&&o.supplier.toLowerCase().includes(q))||
            (o.description&&o.description.toLowerCase().includes(q))||
            (o.resp&&o.resp.toLowerCase().includes(q))
          );

          // Pipeline ponderado
          const totalPond = oppFc.reduce((s,o)=>{
            const a = parseFloat(String(o.amount||"0").replace(/[^0-9.]/g,""))||0;
            const c = parseFloat(o.confidence||0);
            return s + a*c;
          },0);
          const totalAmt = oppFc.reduce((s,o)=>{
            return s+(parseFloat(String(o.amount||"0").replace(/[^0-9.]/g,""))||0);
          },0);

          function fmtAmt(a){
            const n = parseFloat(String(a||"0").replace(/[^0-9.]/g,""))||0;
            if(n===0) return "";
            return n>=1000?"R$"+(n/1000).toFixed(0)+"k":"R$"+n.toFixed(0);
          }
          function confPct(c){ return Math.round(parseFloat(c||0)*100)+"%"; }
          function confColor(c){
            const n=parseFloat(c||0);
            return n>=1?"#1D9E75":n>=0.5?"#185FA5":n>=0.3?"#EF9F27":n>0?"var(--text-muted)":"#888";
          }

          function openNew(){
            setOppFcForm({...emptyOppFc,id:"ofc_"+Date.now(),resp:(session&&session.code)||""});
            setOppFcEdit("new"); setOppFcModal(true);
          }
          function openEdit(o){ setOppFcForm({...o}); setOppFcEdit(o.id); setOppFcModal(true); }
          function doSave(){
            if(!oppFcForm.customer.trim()){ alert("CUSTOMER é obrigatório."); return; }
            if(oppFcEdit==="new"){ saveOppFc([...oppFc, oppFcForm]); }
            else{ saveOppFc(oppFc.map(o=>o.id===oppFcEdit?oppFcForm:o)); }
            setOppFcModal(false);
          }
          function doDelete(id){
            if(!confirm("Excluir esta oportunidade?")) return;
            saveOppFc(oppFc.filter(o=>o.id!==id));
          }
          function toggleMonth(id, mon){
            const o = oppFc.find(x=>x.id===id);
            if(!o) return;
            const isConf100 = parseFloat(o.confidence||0)>=1;
            const nm = {...(o.months||{})};
            if(!isConf100){
              // 1 mês por vez quando conf < 100%
              const wasMarked = nm[mon];
              Object.keys(nm).forEach(k=>{ delete nm[k]; });
              if(!wasMarked) nm[mon]=true;
            } else {
              nm[mon] ? delete nm[mon] : (nm[mon]=true);
            }
            saveOppFc(oppFc.map(x=>x.id===id?{...x,months:nm}:x));
          }

          const inp = {padding:"7px 10px",fontSize:"12px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-input)",color:"var(--text-primary)",width:"100%",boxSizing:"border-box"};

          // Exportar Excel idêntico ao FORECAST_2026_EF.xlsx
          // Importar Excel — lê apenas a aba mais recente (primeira aba do arquivo)
          async function importXLSX(e){
            const file = e.target.files[0];
            if(!file) return;
            try{
              const XLSX = window.XLSX;
              const buf = await file.arrayBuffer();
              const wb = XLSX.read(buf);

              // Usar apenas a primeira aba (mais recente)
              const sheetName = wb.SheetNames[0];
              const ws = wb.Sheets[sheetName];
              const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});

              // Detectar linha do header (contém CUSTOMER)
              let headerRow = -1;
              let headers = [];
              for(let i=0;i<Math.min(5,rows.length);i++){
                const r = rows[i].map(c=>String(c||"").trim());
                if(r.includes("CUSTOMER")){
                  headerRow = i;
                  headers = r;
                  break;
                }
              }
              if(headerRow<0){
                alert("Header não encontrado. Verifique se o arquivo tem a coluna CUSTOMER.");
                e.target.value="";
                return;
              }

              // Índices das colunas
              const iNeg  = 0;
              const iResp = headers.indexOf("RESP.");
              const iCust = headers.indexOf("CUSTOMER");
              const iSupp = headers.indexOf("SUPPLIER");
              const iDesc = headers.indexOf("DESCRIPTION");
              const iAmt  = headers.indexOf("AMOUNT");
              const iUf   = headers.indexOf("UF");
              const iConf = headers.findIndex(h=>h.toLowerCase()==="confidence");
              const iAnno = headers.findIndex(h=>/^\d{4}$/.test(h)); // coluna do ano
              const monthCols = {};
              ALL_MONTHS.forEach(m=>{
                const ci = headers.findIndex(h=>h.toUpperCase()===m);
                if(ci>=0) monthCols[m]=ci;
              });
              const iFup  = headers.indexOf("FOLLOW-UP");
              const iCont = headers.indexOf("CONTATOS");

              // Processar apenas linhas com CUSTOMER preenchido
              const imported = [];
              for(let ri=headerRow+1;ri<rows.length;ri++){
                const row = rows[ri];
                if(!row||!row.some(c=>c!==null&&c!=="")) continue;
                const customer = String(row[iCust]||"").trim();
                if(!customer) continue; // pular linhas sem customer

                const months = {};
                Object.entries(monthCols).forEach(([m,ci])=>{
                  const v = String(row[ci]||"").trim().toLowerCase();
                  if(v==="x"||v==="1"||v==="true") months[m]=true;
                });

                imported.push({
                  id:        "ofc_"+Date.now()+"_"+ri,
                  neg:       String(row[iNeg]||"D").trim()||"D",
                  resp:      iResp>=0?String(row[iResp]||"").trim():"",
                  customer,
                  supplier:  iSupp>=0?String(row[iSupp]||"").trim():"",
                  description: iDesc>=0?String(row[iDesc]||"").trim():"",
                  amount:    iAmt>=0&&row[iAmt]!=null?String(row[iAmt]).replace(/[^0-9.]/g,""):"",
                  uf:        iUf>=0?String(row[iUf]||"SP").trim():"SP",
                  confidence:iConf>=0&&row[iConf]!=null?String(parseFloat(row[iConf])||0):"0.1",
                  months,
                  followup:  iFup>=0?String(row[iFup]||"").trim():"",
                  contatos:  iCont>=0?String(row[iCont]||"").trim():"",
                  rowColor:  "",
                  history:   [],
                });
              }

              if(imported.length===0){
                alert("Nenhuma oportunidade encontrada. Verifique se há linhas com CUSTOMER preenchido.");
                e.target.value=""; return;
              }

              const msg = oppFc.length>0
                ? `Aba importada: "${sheetName}" com ${imported.length} oportunidades.\n\nOK = Substituir tudo\nCancelar = Mesclar (adicionar às existentes)`
                : `Aba "${sheetName}": ${imported.length} oportunidades encontradas. Importar?`;

              const replace = oppFc.length===0 || confirm(msg);
              saveOppFc(replace ? imported : [...oppFc, ...imported]);
              alert(`✅ ${imported.length} oportunidades importadas da aba "${sheetName}".`);
            }catch(err){
              alert("Erro ao importar: "+err.message);
            }
            e.target.value="";
          }

          function exportXLSX(){
            const XLSX = window.XLSX;
            const months3 = FC_VIS_MONTHS;
            const hdr = [null,"RESP.","CUSTOMER","SUPPLIER","DESCRIPTION","AMOUNT","UF","Confidence",...months3,curYr,"FOLLOW-UP","CONTATOS",null];
            const rows = filtered.map(o=>{
              const a = parseFloat(String(o.amount||"0").replace(/[^0-9.]/g,""))||0;
              const months = o.months||{};
              const isConf100 = parseFloat(o.confidence||0)>=1;
              const m3vals = months3.map(m=>months[m]?"x":null);
              const anoVal = isConf100&&Object.values(months).some(Boolean)?"x":null;
              return [o.neg||"D", o.resp, o.customer, o.supplier, o.description, a||null, o.uf, parseFloat(o.confidence||0), ...m3vals, anoVal, o.followup||null, o.contatos||null, null];
            });
            const ws = XLSX.utils.aoa_to_sheet([hdr,...rows]);
            // Larguras fiéis ao original
            ws["!cols"]=[{wch:3.2},{wch:7.6},{wch:16.2},{wch:8.6},{wch:42},{wch:15.4},{wch:4},{wch:5.4},{wch:4},{wch:4},{wch:4},{wch:5},{wch:37.4},{wch:30.7},{wch:4}];
            const wb = XLSX.utils.book_new();
            const sheetName = (months3[0]||"").slice(0,2)+"."+(curYr+"").slice(-4);
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
            XLSX.writeFile(wb, "FORECAST_"+curYr+"_"+((session&&session.code)||"EF")+".xlsx");
          }

          return (
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:"10px",minWidth:0}}>

              {/* Métricas */}
              <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
                {[
                  {l:"Oportunidades",   v:oppFc.length,                            c:"var(--text-primary)"},
                  {l:"Pipeline pond.",  v:"R$"+(totalPond/1000).toFixed(0)+"k",    c:"#2563EB"},
                  {l:"Valor total",     v:"R$"+(totalAmt/1000).toFixed(0)+"k",     c:"var(--text-secondary)"},
                  {l:"Conf. 100%",      v:oppFc.filter(o=>parseFloat(o.confidence||0)>=1).length, c:"#1D9E75"},
                ].map((m,i)=>(
                  <div key={i} style={{padding:"8px 14px",borderRadius:"8px",background:"var(--bg-card)",border:"1px solid var(--border)",minWidth:"110px"}}>
                    <div style={{fontSize:"17px",fontWeight:700,color:m.c}}>{m.v}</div>
                    <div style={{fontSize:"10px",color:"var(--text-muted)",marginTop:"2px"}}>{m.l}</div>
                  </div>
                ))}
              </div>

              {/* Controles */}
              <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
                <input value={oppFcSearch} onChange={e=>setOppFcSearch(e.target.value)}
                  placeholder="Buscar CUSTOMER, SUPPLIER, DESCRIPTION, RESP..."
                  style={{...inp,flex:1,minWidth:"180px",padding:"8px 12px"}}/>
                <button onClick={openNew}
                  style={{padding:"8px 16px",fontSize:"12px",fontWeight:700,borderRadius:"7px",border:"none",background:"#8C1A1A",color:"#FFD0D0",cursor:"pointer",whiteSpace:"nowrap"}}>
                  + Add
                </button>
                <button onClick={exportXLSX}
                  style={{padding:"8px 12px",fontSize:"12px",fontWeight:600,borderRadius:"7px",border:"1px solid #1D9E75",background:"rgba(29,158,117,0.1)",color:"#1D9E75",cursor:"pointer",whiteSpace:"nowrap"}}>
                  📊 Export Excel
                </button>
                <label style={{padding:"8px 12px",fontSize:"12px",fontWeight:600,borderRadius:"7px",border:"1px solid #185FA5",background:"rgba(24,95,165,0.1)",color:"#185FA5",cursor:"pointer",whiteSpace:"nowrap"}}>
                  📥 Import Excel
                  <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={importXLSX}/>
                </label>
              </div>

              {/* Tabela */}
              {oppFc.length===0?(
                <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text-muted)"}}>
                  <div style={{fontSize:"32px",marginBottom:"12px"}}>📊</div>
                  <div style={{fontSize:"14px",fontWeight:600,color:"var(--text-secondary)",marginBottom:"6px"}}>No opportunities yet</div>
                  <div style={{fontSize:"12px",color:"var(--text-muted)",lineHeight:1.6}}>Click <b>+ Add</b> to create your first opportunity.<br/>Columns match FORECAST_2026_EF.xlsx exactly.</div>
                </div>
              ):(
                <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"10px",overflow:"hidden",flex:1,maxHeight:"calc(100vh - 270px)",overflowY:"auto",overflowX:"auto"}}>
                  <table style={{borderCollapse:"collapse",fontSize:"11px",tableLayout:"auto",minWidth:"780px",width:"100%"}}>
                    <thead style={{position:"sticky",top:0,zIndex:2,background:"var(--bg-card2)"}}>
                      <tr>
                        {/* Col A — sem header */}
                        <th style={{padding:"7px 5px",width:"24px",borderBottom:"1px solid var(--border)"}}></th>
                        <th style={{padding:"7px 6px",textAlign:"left",borderBottom:"1px solid var(--border)",width:"52px",color:"var(--text-muted)",fontSize:"9px",fontWeight:600,letterSpacing:".04em"}}>RESP.</th>
                        <th style={{padding:"7px 8px",textAlign:"left",borderBottom:"1px solid var(--border)",minWidth:"110px",color:"var(--text-secondary)",fontSize:"9px",fontWeight:600,letterSpacing:".04em"}}>CUSTOMER</th>
                        <th style={{padding:"7px 8px",textAlign:"left",borderBottom:"1px solid var(--border)",minWidth:"70px",color:"var(--text-secondary)",fontSize:"9px",fontWeight:600,letterSpacing:".04em"}}>SUPPLIER</th>
                        <th style={{padding:"7px 8px",textAlign:"left",borderBottom:"1px solid var(--border)",minWidth:"200px",color:"var(--text-secondary)",fontSize:"9px",fontWeight:600,letterSpacing:".04em"}}>DESCRIPTION</th>
                        <th style={{padding:"7px 6px",textAlign:"right",borderBottom:"1px solid var(--border)",width:"72px",color:"var(--text-secondary)",fontSize:"9px",fontWeight:600,letterSpacing:".04em"}}>AMOUNT</th>
                        <th style={{padding:"7px 5px",textAlign:"center",borderBottom:"1px solid var(--border)",width:"28px",color:"var(--text-muted)",fontSize:"9px",fontWeight:600}}>UF</th>
                        <th style={{padding:"7px 5px",textAlign:"center",borderBottom:"1px solid var(--border)",width:"44px",color:"var(--text-secondary)",fontSize:"9px",fontWeight:600,letterSpacing:".04em"}}>Confidence</th>
                        {/* 3 meses correntes */}
                        {FC_VIS_MONTHS.map(mon=>(
                          <th key={mon} style={{padding:"7px 3px",textAlign:"center",borderBottom:"1px solid var(--border)",borderLeft:"1px solid var(--border2)",width:"30px",color:"var(--text-secondary)",fontSize:"9px",fontWeight:600}}>{mon}</th>
                        ))}
                        {/* Coluna ano */}
                        <th style={{padding:"7px 3px",textAlign:"center",borderBottom:"1px solid var(--border)",borderLeft:"1px solid var(--border2)",width:"34px",color:"var(--text-secondary)",fontSize:"9px",fontWeight:700}}>{curYr}</th>
                        <th style={{padding:"7px 8px",textAlign:"left",borderBottom:"1px solid var(--border)",borderLeft:"1px solid var(--border2)",minWidth:"180px",color:"var(--text-secondary)",fontSize:"9px",fontWeight:600,letterSpacing:".04em"}}>FOLLOW-UP</th>
                        <th style={{padding:"7px 8px",textAlign:"left",borderBottom:"1px solid var(--border)",minWidth:"120px",color:"var(--text-secondary)",fontSize:"9px",fontWeight:600,letterSpacing:".04em"}}>CONTATOS</th>
                        <th style={{width:"24px",borderBottom:"1px solid var(--border)"}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map((o,i)=>{
                        const conf = parseFloat(o.confidence||0);
                        const isConf100 = conf>=1;
                        const months = o.months||{};
                        const markedMonths = FC_VIS_MONTHS.filter(m=>months[m]);
                        const anoMarked = isConf100 && Object.values(months).some(Boolean);
                        const isContrato = isConf100 && Object.values(months).filter(Boolean).length > 1;
                        const bgRow = o.rowColor||( i%2===0?"transparent":"rgba(255,255,255,0.013)" );
                        return (
                          <tr key={o.id} style={{borderBottom:"1px solid var(--border2)",background:bgRow}}
                            onMouseEnter={e=>e.currentTarget.style.background="rgba(37,99,235,0.05)"}
                            onMouseLeave={e=>e.currentTarget.style.background=bgRow}>
                            {/* Col A: tipo negociação */}
                            <td style={{padding:"5px 5px",textAlign:"center",cursor:"pointer"}} onClick={()=>openEdit(o)}>
                              <span style={{fontSize:"10px",fontWeight:700,color:o.neg==="R"?"#185FA5":o.neg==="S"?"#7F77DD":"var(--text-secondary)"}}>{o.neg||"D"}</span>
                            </td>
                            <td style={{padding:"5px 6px",color:"var(--text-muted)",fontSize:"10px",cursor:"pointer"}} onClick={()=>openEdit(o)}>{o.resp}</td>
                            <td style={{padding:"5px 8px",fontWeight:600,color:"var(--text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"140px",cursor:"pointer"}} title={o.customer} onClick={()=>openEdit(o)}>{o.customer}</td>
                            <td style={{padding:"5px 8px",color:"var(--text-secondary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"90px",cursor:"pointer"}} title={o.supplier} onClick={()=>openEdit(o)}>{o.supplier}</td>
                            <td style={{padding:"5px 8px",color:"var(--text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"240px",cursor:"pointer"}} title={o.description} onClick={()=>openEdit(o)}>{o.description}</td>
                            <td style={{padding:"5px 6px",textAlign:"right",color:"var(--text-secondary)",fontWeight:600,whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>openEdit(o)}>{fmtAmt(o.amount)}</td>
                            <td style={{padding:"5px 5px",textAlign:"center",color:"var(--text-muted)",fontSize:"10px",cursor:"pointer"}} onClick={()=>openEdit(o)}>{o.uf}</td>
                            <td style={{padding:"5px 4px",textAlign:"center",cursor:"pointer"}} onClick={()=>openEdit(o)}>
                              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"1px"}}>
                                <span style={{fontSize:"10px",fontWeight:700,color:confColor(o.confidence),padding:"1px 4px",borderRadius:"5px",background:confColor(o.confidence)+"18",whiteSpace:"nowrap"}}>{confPct(o.confidence)}</span>
                                {isContrato&&<span style={{fontSize:"8px",color:"#1D9E75",lineHeight:1}}>🏆</span>}
                              </div>
                            </td>
                            {/* 3 meses clicáveis */}
                            {FC_VIS_MONTHS.map(mon=>{
                              const marked = months[mon];
                              return (
                                <td key={mon} onClick={()=>toggleMonth(o.id,mon)}
                                  style={{padding:"4px 3px",textAlign:"center",borderLeft:"1px solid var(--border2)",cursor:"pointer",background:isContrato&&marked?"rgba(29,158,117,0.07)":"transparent"}}>
                                  {marked
                                    ?<div style={{width:"14px",height:"14px",borderRadius:"3px",background:isContrato?"#1D9E75":"#8C1A1A",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                      <span style={{color:"#fff",fontSize:"8px",fontWeight:700,lineHeight:1}}>x</span>
                                    </div>
                                    :<div style={{width:"14px",height:"14px",borderRadius:"3px",border:`1px dashed ${isConf100?"rgba(29,158,117,0.35)":"var(--border)"}`,margin:"0 auto"}}/>
                                  }
                                </td>
                              );
                            })}
                            {/* Coluna ano */}
                            <td style={{padding:"4px 3px",textAlign:"center",borderLeft:"1px solid var(--border2)"}}>
                              {anoMarked&&(
                                <div style={{width:"14px",height:"14px",borderRadius:"3px",background:"#1D9E75",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                  <span style={{color:"#fff",fontSize:"8px",fontWeight:700,lineHeight:1}}>x</span>
                                </div>
                              )}
                            </td>
                            {/* FOLLOW-UP — clicável para expandir */}
                            <td style={{padding:"5px 8px",borderLeft:"1px solid var(--border2)",maxWidth:"200px",cursor:"pointer"}} onClick={()=>openEdit(o)}>
                              {(o.followup||"").split("\n").slice(0,2).map((line,li)=>(
                                <div key={li} style={{fontSize:"10px",color:li===0?"var(--text-primary)":"var(--text-muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.4}} title={o.followup}>{line}</div>
                              ))}
                              {(o.followup||"").split("\n").length > 2 && (
                                <div style={{fontSize:"9px",color:"var(--text-muted)"}}>+{(o.followup||"").split("\n").length-2} more</div>
                              )}
                            </td>
                            {/* CONTATOS */}
                            <td style={{padding:"5px 8px",color:"var(--text-secondary)",fontSize:"10px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"140px",cursor:"pointer"}} title={o.contatos} onClick={()=>openEdit(o)}>{o.contatos}</td>
                            {/* Excluir */}
                            <td style={{padding:"5px 4px",textAlign:"center"}}>
                              <button onClick={()=>doDelete(o.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"12px",padding:"2px 4px",opacity:.5}} title="Delete" onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=.5}>✕</button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}

              {/* Modal */}
              {oppFcModal&&(
                <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:90,padding:"12px",overflowY:"auto"}}>
                  <div style={{background:"var(--bg-card)",borderRadius:"14px",border:"1px solid var(--border)",width:"100%",maxWidth:"720px",padding:"22px",marginTop:"8px"}}>

                    {/* Header */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"}}>
                      <div>
                        <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)"}}>
                          {oppFcEdit==="new"?"Nova oportunidade":"Perfil da Oportunidade"}
                        </div>
                        {oppFcEdit!=="new"&&<div style={{fontSize:"11px",color:"var(--text-muted)",marginTop:"2px"}}>{oppFcForm.customer}{oppFcForm.supplier?" · "+oppFcForm.supplier:""}</div>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                        {/* Botões de cor da linha */}
                        {oppFcEdit!=="new"&&(
                          <div style={{display:"flex",gap:"4px",alignItems:"center"}}>
                            <span style={{fontSize:"9px",color:"var(--text-muted)",marginRight:"2px"}}>Linha:</span>
                            {[
                              {color:"#FFFF99",title:"Devendo algo ao cliente"},
                              {color:"#D9D9D9",title:"Oportunidade perdida"},
                              {color:"#FF9999",title:"Em negociação (>50%)"},
                              {color:"",title:"Sem cor (padrão)"},
                            ].map(({color,title})=>(
                              <button key={color} onClick={()=>setOppFcForm(f=>({...f,rowColor:color}))}
                                title={title}
                                style={{width:"18px",height:"18px",borderRadius:"3px",border:`2px solid ${oppFcForm.rowColor===color?"#333":"rgba(0,0,0,0.15)"}`,background:color||"var(--bg-card2)",cursor:"pointer",padding:0,flexShrink:0,boxShadow:oppFcForm.rowColor===color?"0 0 0 1px #333":"none"}}>
                                {!color&&<span style={{fontSize:"9px",color:"var(--text-muted)",lineHeight:1}}>✕</span>}
                              </button>
                            ))}
                          </div>
                        )}
                        <button onClick={()=>setOppFcModal(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"20px",lineHeight:1}}>✕</button>
                      </div>
                    </div>

                    {/* Tabs — só aparece ao editar (não novo) */}
                    {oppFcEdit!=="new"&&(
                      <div style={{display:"flex",gap:"4px",marginBottom:"14px",background:"rgba(0,0,0,0.06)",borderRadius:"8px",padding:"3px"}}>
                        {[["dados","📋 Dados"],["historico","📅 Histórico"]].map(([t,l])=>(
                          <button key={t} onClick={()=>setOppFcTab(t)}
                            style={{flex:1,padding:"6px",fontSize:"12px",fontWeight:oppFcTab===t?700:500,borderRadius:"6px",border:"none",background:oppFcTab===t?"var(--bg-card)":"transparent",color:oppFcTab===t?"var(--text-primary)":"var(--text-muted)",cursor:"pointer",boxShadow:oppFcTab===t?"0 1px 3px rgba(0,0,0,0.12)":"none"}}>
                            {l}
                          </button>
                        ))}
                      </div>
                    )}

                    {/* TAB DADOS */}
                    {(oppFcEdit==="new"||oppFcTab==="dados")&&(
                      <React.Fragment>
                        {/* Row 1: neg, RESP, UF, Confidence */}
                        <div style={{display:"grid",gridTemplateColumns:"70px 80px 55px 100px",gap:"8px",marginBottom:"10px"}}>
                          {[
                            {k:"neg",l:"",type:"select",opts:NEG_OPTS},
                            {k:"resp",l:"RESP.",ph:"EF"},
                            {k:"uf",l:"UF",ph:"SP"},
                            {k:"confidence",l:"Confidence",type:"select",opts:CONF_OPTS},
                          ].map(({k,l,type,ph,opts})=>(
                            <div key={k}>
                              <label style={{fontSize:"9px",color:"var(--text-muted)",display:"block",marginBottom:"3px",textTransform:"uppercase",letterSpacing:".06em"}}>{l||"\u00a0"}</label>
                              {type==="select"
                                ?<select value={oppFcForm[k]} onChange={e=>setOppFcForm(f=>({...f,[k]:e.target.value}))} style={{...inp,cursor:"pointer"}}>
                                  {opts.map(([v,lb])=><option key={v} value={v}>{lb}</option>)}
                                </select>
                                :<input value={oppFcForm[k]||""} onChange={e=>setOppFcForm(f=>({...f,[k]:e.target.value}))} style={inp} placeholder={ph}/>
                              }
                            </div>
                          ))}
                        </div>

                        {/* Row 2: CUSTOMER, SUPPLIER, AMOUNT */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 110px",gap:"8px",marginBottom:"10px"}}>
                          {[{k:"customer",l:"CUSTOMER"},{k:"supplier",l:"SUPPLIER"},{k:"amount",l:"AMOUNT",type:"number"}].map(({k,l,type})=>(
                            <div key={k}>
                              <label style={{fontSize:"9px",color:"var(--text-muted)",display:"block",marginBottom:"3px",textTransform:"uppercase",letterSpacing:".06em"}}>{l}</label>
                              <input value={oppFcForm[k]||""} onChange={e=>setOppFcForm(f=>({...f,[k]:e.target.value}))} style={inp} type={type||"text"}/>
                            </div>
                          ))}
                        </div>

                        {/* DESCRIPTION */}
                        <div style={{marginBottom:"10px"}}>
                          <label style={{fontSize:"9px",color:"var(--text-muted)",display:"block",marginBottom:"3px",textTransform:"uppercase",letterSpacing:".06em"}}>DESCRIPTION</label>
                          <input value={oppFcForm.description||""} onChange={e=>setOppFcForm(f=>({...f,description:e.target.value}))} style={inp}/>
                        </div>

                        {/* Meses */}
                        <div style={{marginBottom:"10px"}}>
                          <label style={{fontSize:"9px",color:"var(--text-muted)",display:"block",marginBottom:"6px",textTransform:"uppercase",letterSpacing:".06em"}}>
                            Months
                            {parseFloat(oppFcForm.confidence||0)>=1&&<span style={{color:"#1D9E75",marginLeft:"8px",fontSize:"9px"}}>🏆 100% — multiple months allowed</span>}
                          </label>
                          <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
                            {ALL_MONTHS.map(mon=>{
                              const marked = (oppFcForm.months||{})[mon];
                              const isConf100 = parseFloat(oppFcForm.confidence||0)>=1;
                              const markedCount = Object.values(oppFcForm.months||{}).filter(Boolean).length;
                              const isContrato = isConf100&&markedCount>1;
                              return (
                                <button key={mon} onClick={()=>{
                                  const nm={...(oppFcForm.months||{})};
                                  if(!isConf100){Object.keys(nm).forEach(k=>delete nm[k]);if(!marked)nm[mon]=true;}
                                  else{marked?delete nm[mon]:(nm[mon]=true);}
                                  setOppFcForm(f=>({...f,months:nm}));
                                }} style={{padding:"4px 9px",borderRadius:"5px",border:`1px solid ${marked?(isContrato?"#1D9E75":"#8C1A1A"):"var(--border)"}`,background:marked?(isContrato?"rgba(29,158,117,0.15)":"rgba(140,26,26,0.12)"):"transparent",color:marked?(isContrato?"#1D9E75":"#8C1A1A"):"var(--text-muted)",cursor:"pointer",fontSize:"11px",fontWeight:marked?700:400}}>
                                  {mon}
                                </button>
                              );
                            })}
                          </div>
                        </div>

                        {/* FOLLOW-UP e CONTATOS */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"14px"}}>
                          {[{k:"followup",l:"FOLLOW-UP",ph:"08.04.26 - FUP retorno\n01.04.26 - Proposta enviada"},{k:"contatos",l:"CONTATOS",ph:"Nome / Departamento"}].map(({k,l,ph})=>(
                            <div key={k}>
                              <label style={{fontSize:"9px",color:"var(--text-muted)",display:"block",marginBottom:"3px",textTransform:"uppercase",letterSpacing:".06em"}}>{l}</label>
                              <textarea value={oppFcForm[k]||""} onChange={e=>setOppFcForm(f=>({...f,[k]:e.target.value}))}
                                style={{...inp,height:"72px",resize:"vertical",fontFamily:"inherit",lineHeight:1.5}} placeholder={ph}/>
                            </div>
                          ))}
                        </div>

                        <div style={{display:"flex",gap:"8px"}}>
                          <button onClick={doSave} style={{flex:1,padding:"10px",fontSize:"13px",fontWeight:700,borderRadius:"8px",border:"none",background:"#8C1A1A",color:"#FFD0D0",cursor:"pointer"}}>
                            {oppFcEdit==="new"?"Add opportunity":"Save changes"}
                          </button>
                          <button onClick={()=>setOppFcModal(false)} style={{padding:"10px 14px",fontSize:"13px",borderRadius:"8px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancel</button>
                        </div>
                      </React.Fragment>
                    )}

                    {/* TAB HISTÓRICO */}
                    {oppFcTab==="historico"&&oppFcEdit!=="new"&&(()=>{
                      const hist = oppFcForm.history||[];
                      const [hForm, setHForm] = useState({date:"",time:"",resp:"",processo:"",resumo:""});
                      const [addingH, setAddingH] = useState(false);

                      function saveHist(){
                        if(!hForm.resumo.trim()){ alert("Preencha o resumo da visita."); return; }
                        const entry = {...hForm, id:"h_"+Date.now(), createdAt:new Date().toISOString()};
                        const newHist = [entry, ...hist];
                        setOppFcForm(f=>({...f,history:newHist}));
                        // Salvar imediatamente
                        const updated = oppFc.map(o=>o.id===oppFcEdit?{...o,history:newHist}:o);
                        saveOppFc(updated);
                        setHForm({date:"",time:"",resp:"",processo:"",resumo:""});
                        setAddingH(false);
                      }

                      function deleteHist(hid){
                        const newHist = hist.filter(h=>h.id!==hid);
                        setOppFcForm(f=>({...f,history:newHist}));
                        saveOppFc(oppFc.map(o=>o.id===oppFcEdit?{...o,history:newHist}:o));
                      }

                      return (
                        <div>
                          {/* Botão adicionar entrada */}
                          {!addingH&&(
                            <button onClick={()=>{ setHForm({date:new Date().toLocaleDateString("pt-BR"),time:"",resp:(session&&session.code)||"",processo:"",resumo:""}); setAddingH(true); }}
                              style={{width:"100%",padding:"9px",fontSize:"12px",fontWeight:600,borderRadius:"8px",border:"1px dashed var(--border)",background:"transparent",color:"#185FA5",cursor:"pointer",marginBottom:"12px"}}>
                              + Registrar visita
                            </button>
                          )}

                          {/* Formulário nova entrada */}
                          {addingH&&(
                            <div style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"12px",marginBottom:"12px",border:"1px solid var(--border)"}}>
                              <div style={{display:"grid",gridTemplateColumns:"100px 80px 80px 1fr",gap:"8px",marginBottom:"8px"}}>
                                {[{k:"date",l:"Data",ph:"08.04.26"},{k:"time",l:"Horário",ph:"09:30"},{k:"resp",l:"Responsável",ph:"EF"},{k:"processo",l:"Processo visitado",ph:"Montagem / Qualidade / Manutenção"}].map(({k,l,ph})=>(
                                  <div key={k}>
                                    <label style={{fontSize:"9px",color:"var(--text-muted)",display:"block",marginBottom:"2px",textTransform:"uppercase",letterSpacing:".06em"}}>{l}</label>
                                    <input value={hForm[k]||""} onChange={e=>setHForm(f=>({...f,[k]:e.target.value}))} style={{...inp,padding:"5px 8px",fontSize:"11px"}} placeholder={ph}/>
                                  </div>
                                ))}
                              </div>
                              <div style={{marginBottom:"8px"}}>
                                <label style={{fontSize:"9px",color:"var(--text-muted)",display:"block",marginBottom:"2px",textTransform:"uppercase",letterSpacing:".06em"}}>Resumo da visita</label>
                                <textarea value={hForm.resumo||""} onChange={e=>setHForm(f=>({...f,resumo:e.target.value}))}
                                  style={{...inp,height:"64px",resize:"vertical",fontFamily:"inherit",fontSize:"12px",lineHeight:1.5}}
                                  placeholder="Descreva o que foi discutido, decisões tomadas, próximos passos..."/>
                              </div>
                              <div style={{display:"flex",gap:"6px"}}>
                                <button onClick={saveHist} style={{padding:"7px 14px",fontSize:"12px",fontWeight:700,borderRadius:"6px",border:"none",background:"#8C1A1A",color:"#FFD0D0",cursor:"pointer"}}>Salvar</button>
                                <button onClick={()=>setAddingH(false)} style={{padding:"7px 12px",fontSize:"12px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
                              </div>
                            </div>
                          )}

                          {/* Lista do histórico */}
                          {hist.length===0&&!addingH&&(
                            <div style={{textAlign:"center",padding:"40px 20px",color:"var(--text-muted)"}}>
                              <div style={{fontSize:"24px",marginBottom:"8px"}}>📅</div>
                              <div style={{fontSize:"12px"}}>Nenhuma visita registrada ainda.<br/>Clique em <b>+ Registrar visita</b> para começar.</div>
                            </div>
                          )}
                          {hist.map(h=>(
                            <div key={h.id} style={{borderBottom:"1px solid var(--border2)",paddingBottom:"12px",marginBottom:"12px"}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"5px"}}>
                                <div style={{display:"flex",gap:"10px",alignItems:"center",flexWrap:"wrap"}}>
                                  {h.date&&<span style={{fontSize:"11px",fontWeight:700,color:"var(--text-primary)"}}>{h.date}</span>}
                                  {h.time&&<span style={{fontSize:"10px",color:"var(--text-muted)"}}>🕐 {h.time}</span>}
                                  {h.resp&&<span style={{fontSize:"10px",padding:"1px 7px",borderRadius:"5px",background:"rgba(140,26,26,0.1)",color:"#8C1A1A",fontWeight:600}}>{h.resp}</span>}
                                  {h.processo&&<span style={{fontSize:"10px",color:"#185FA5",fontStyle:"italic"}}>{h.processo}</span>}
                                </div>
                                <button onClick={()=>deleteHist(h.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"12px",opacity:.5,padding:"0 4px"}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=.5}>✕</button>
                              </div>
                              <div style={{fontSize:"12px",color:"var(--text-secondary)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{h.resumo}</div>
                            </div>
                          ))}
                        </div>
                      );
                    })()}
                  </div>
                </div>
              )}
            </div>
          );
        })()}

        {view==="tasks" && (
          <div style={{flex:1,minWidth:0}}>
            {/* Toolbar */}
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"12px",flexWrap:"wrap"}}>
              <div style={{fontSize:"15px",fontWeight:700,color:"var(--text-primary)",flex:1}}>
                Tarefas
                {tasks.filter(t=>!t.done&&t.date===today).length>0&&
                  <span style={{marginLeft:"8px",fontSize:"11px",padding:"2px 8px",borderRadius:"8px",background:"rgba(226,75,74,0.15)",color:"#E24B4A",fontWeight:600}}>{tasks.filter(t=>!t.done&&t.date===today).length} para hoje</span>}
              </div>
              <input value={taskSearch} onChange={e=>setTaskSearch(e.target.value)} placeholder="Buscar tarefa..."
                style={{...inp,maxWidth:"200px"}}/>

              <button onClick={()=>{setTaskForm(emptyTask);setTaskModal(true);}} style={{padding:"5px 14px",fontSize:"12px",borderRadius:"6px",border:"1px solid #8C1A1A",background:"rgba(140,26,26,0.2)",color:"var(--text-accent)",cursor:"pointer",fontWeight:600}}>+ Nova tarefa</button>
            </div>

            {/* Alerta campaninha */}
            {bellAlert&&(
              <div style={{background:"rgba(239,159,39,0.15)",border:"1px solid #EF9F27",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"20px"}}>🔔</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"13px",fontWeight:600,color:"#EF9F27"}}>Tarefa em {notifSettings.minutesBefore} min ou menos!</div>
                  <div style={{fontSize:"12px",color:"var(--text-primary)"}}>{bellAlert.title} — {bellAlert.company} · {bellAlert.date} {bellAlert.time}</div>
                </div>
                <button onClick={()=>setBellAlert(null)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"16px"}}>✕</button>
              </div>
            )}

            {/* Configurações de notificação */}
            <div style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",gap:"16px",alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:"11px",color:"var(--text-secondary)",fontWeight:600}}>🔔 Notificações:</span>
              <label style={{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"var(--text-secondary)",cursor:"pointer"}}>
                <input type="checkbox" checked={notifSettings.bellEnabled} onChange={e=>saveNotifSettings({...notifSettings,bellEnabled:e.target.checked})}/>
                Campaninha ativa
              </label>
              <label style={{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"var(--text-secondary)"}}>
                Alertar com
                <input type="number" value={notifSettings.minutesBefore} onChange={e=>saveNotifSettings({...notifSettings,minutesBefore:Number(e.target.value)||60})}
                  style={{...inp,width:"52px",fontSize:"11px",padding:"2px 6px"}} min="5" max="1440"/>
                min de antecedência
              </label>
            </div>

            {/* Lista de tarefas */}
            {(()=>{
              const tFiltered = tasks
                .filter(t=>!taskSearch||t.title.toLowerCase().includes(taskSearch.toLowerCase())||(t.company&&t.company.toLowerCase().includes(taskSearch.toLowerCase())))
                .sort((a,b)=>{
                  if(a.done!==b.done) return a.done?1:-1;
                  const da=(a.date||"9999")+(a.time||"");
                  const db=(b.date||"9999")+(b.time||"");
                  return da.localeCompare(db);
                });
              const groups = {};
              tFiltered.forEach(t=>{
                const key = t.done?"✓ Concluídas":(t.date===today?"📅 Hoje":t.date<today&&t.date?"⚠ Atrasadas":"📆 Próximas");
                if(!groups[key]) groups[key]=[];
                groups[key].push(t);
              });
              if(tFiltered.length===0) return <div style={{textAlign:"center",padding:"40px",color:"var(--text-muted)",fontSize:"13px"}}>Nenhuma tarefa cadastrada. Clique em "+ Nova tarefa" para começar.</div>;
              return Object.entries(groups).map(([grp,gtasks])=>(
                <div key={grp} style={{marginBottom:"14px"}}>
                  <div style={{fontSize:"11px",fontWeight:700,color:"var(--text-secondary)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"6px",paddingBottom:"4px",borderBottom:"1px solid var(--border2)"}}>{grp} ({gtasks.length})</div>
                  {gtasks.map(t=>{
                    const isLate = t.date&&t.date<today&&!t.done;
                    const isToday2 = t.date===today;
                    const priC = {alta:"#E24B4A",media:"#EF9F27",baixa:"#1D9E75"}[t.priority]||"#888";
                    const opp = oppFc.find(o=>o.id===t.oppId);
                    return (
                      <div key={t.id} style={{background:"var(--bg-card)",border:`1px solid ${isLate?"#E24B4A33":isToday2?"#EF9F2733":"var(--border)"}`,borderLeft:`3px solid ${isLate?"#E24B4A":isToday2?"#EF9F27":priC}`,borderRadius:"8px",padding:"10px 12px",marginBottom:"6px",opacity:t.done?0.6:1}}>
                        <div style={{display:"flex",alignItems:"flex-start",gap:"10px"}}>
                          <input type="checkbox" checked={t.done} onChange={()=>toggleTaskDone(t.id)} style={{marginTop:"2px",cursor:"pointer",flexShrink:0}}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"2px",flexWrap:"wrap"}}>
                              <span style={{fontSize:"13px",fontWeight:600,color:t.done?"var(--text-muted)":"var(--text-primary)",textDecoration:t.done?"line-through":"none"}}>{t.title}</span>
                              <span style={{fontSize:"10px",padding:"1px 6px",borderRadius:"6px",background:priC+"22",color:priC,fontWeight:600}}>{t.priority}</span>
                              {isLate&&<span style={{fontSize:"10px",color:"#E24B4A",fontWeight:600}}>ATRASADO</span>}

                              {t.result==="cancelada"&&<span style={{fontSize:"10px",padding:"1px 6px",borderRadius:"6px",background:"rgba(226,75,74,0.15)",color:"#E24B4A",fontWeight:600}}>✕ Cancelada</span>}
                              {t.result==="postergada"&&<span style={{fontSize:"10px",padding:"1px 6px",borderRadius:"6px",background:"rgba(239,159,39,0.15)",color:"#EF9F27",fontWeight:600}}>⏩ Postergada{t.postponedTo?" → "+t.postponedTo:""}</span>}
                            </div>
                            <div style={{display:"flex",gap:"10px",fontSize:"11px",color:"var(--text-secondary)",flexWrap:"wrap"}}>

          ? (o.supplier&&o.supplier.toLowerCase().includes((b.supplier||"").toLowerCase()))
          : (o.customer&&o.customer.toLowerCase().includes((b.client||"").toLowerCase())));

        const orcRelated = orcamentos.filter(o=>b.type==="supplier"
          ? (o.supplier&&o.supplier.toLowerCase().includes((b.supplier||"").toLowerCase()))
          : (o.client&&o.client.toLowerCase().includes((b.client||"").toLowerCase())));

        const forecastTotal = forecast.reduce((s,o)=>{const a=parseFloat(String(o.amount||'0').replace(/[^0-9.]/g,''))||0;return s+a;},0);
        const orcTotal = orcRelated.reduce((s,o)=>s+(o.value||0),0);
        const realizado = totalRealizado(b);
        const meta = totalMeta(b);
        const pctForecast = meta>0?Math.round(forecastTotal/meta*100):0;
        const pctOrc = meta>0?Math.round(orcTotal/meta*100):0;
        const pctReal = meta>0?Math.round(realizado/meta*100):0;
        const bar = (pct,color) => (
          <div style={{height:"8px",borderRadius:"4px",background:"var(--bg-card2)",overflow:"hidden",marginTop:"4px"}}>
            <div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:color,borderRadius:"4px"}}/>
          </div>
        );
        const fmt = v => `R$ ${(v||0).toLocaleString("pt-BR")}`;
        const [editB, setEditB] = React.useState({...b});
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:70,padding:"16px"}}>
            <div style={{background:"var(--bg-card)",borderRadius:"14px",border:"1px solid var(--border)",padding:"24px",width:"520px",maxWidth:"100%",maxHeight:"90vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
                <div style={{fontSize:"15px",fontWeight:700,color:"var(--text-primary)"}}>Perfil da meta</div>
                <button onClick={()=>setSelBudget(null)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"18px"}}>✕</button>
              </div>
              <div style={{fontSize:"12px",color:"var(--text-accent)",marginBottom:"16px",fontWeight:600}}>
                {b.supplier} · {b.client} · {b.year}
              </div>

              {/* Edição das metas */}
              <div style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"12px",marginBottom:"16px"}}>
                <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-secondary)",marginBottom:"8px",textTransform:"uppercase",letterSpacing:".06em"}}>Metas</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
                  {[["targetAnual","Meta Anual"],["target1s","Meta 1S"],["target2s","Meta 2S"]].map(([k,l])=>(
                    <div key={k}>
                      <label style={{fontSize:"10px",color:"var(--text-muted)",display:"block",marginBottom:"2px"}}>{l}</label>
                      <input type="number" value={editB[k]||0} onChange={e=>setEditB(p=>({...p,[k]:Number(e.target.value)}))}
                        style={{width:"100%",padding:"5px 8px",fontSize:"12px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-input)",color:"var(--text-primary)"}}/>
                    </div>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginTop:"8px"}}>
                  {[["realized1s","Realizado 1S"],["realized2s","Realizado 2S"],["realizedManual","Realizado extra"]].map(([k,l])=>(
                    <div key={k}>
                      <label style={{fontSize:"10px",color:"var(--text-muted)",display:"block",marginBottom:"2px"}}>{l}</label>
                      <input type="number" value={editB[k]||0} onChange={e=>setEditB(p=>({...p,[k]:Number(e.target.value)}))}
                        style={{width:"100%",padding:"5px 8px",fontSize:"12px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-input)",color:"var(--text-primary)"}}/>
                    </div>
                  ))}
                </div>
                <button onClick={()=>{updateBudget({...b,...editB});setSelBudget({...b,...editB});}}
                  style={{marginTop:"10px",padding:"7px 18px",fontSize:"12px",borderRadius:"6px",border:"none",background:"#8C1A1A",color:"#FFD0D0",cursor:"pointer",fontWeight:600}}>Salvar metas</button>
              </div>

              {/* Comparativos */}
              <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-secondary)",marginBottom:"10px",textTransform:"uppercase",letterSpacing:".06em"}}>Comparativos</div>
              <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
                <div style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"2px"}}>
                    <span style={{fontSize:"12px",fontWeight:600,color:"var(--text-primary)"}}>Budget × Forecast</span>
                    <span style={{fontSize:"13px",fontWeight:700,color:"#185FA5"}}>{pctForecast}%</span>
                  </div>
                  {bar(pctForecast,"#185FA5")}
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"var(--text-secondary)",marginTop:"4px"}}>
                    <span>Forecast pipeline: {fmt(forecastTotal)}</span><span>Meta: {fmt(meta)}</span>
                  </div>
                  {forecast.length>0&&(
                    <div style={{marginTop:"6px",borderTop:"1px solid var(--border2)",paddingTop:"5px"}}>
                      {forecast.slice(0,4).map(o=>(
                        <div key={o.id} style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"var(--text-muted)",padding:"1px 0"}}>
                          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"300px"}}>{o.customer} · {o.title.slice(0,32)}</span>
                          <span style={{flexShrink:0,marginLeft:"8px"}}>{fmt(o.value)}</span>
                        </div>
                      ))}
                      {forecast.length>4&&<div style={{fontSize:"10px",color:"var(--text-muted)",marginTop:"2px"}}>+{forecast.length-4} oportunidades</div>}
                    </div>
                  )}
                </div>
                <div style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"2px"}}>
                    <span style={{fontSize:"12px",fontWeight:600,color:"var(--text-primary)"}}>Budget × Orçamentos</span>
                    <span style={{fontSize:"13px",fontWeight:700,color:"#EF9F27"}}>{pctOrc}%</span>
                  </div>
                  {bar(pctOrc,"#EF9F27")}
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"var(--text-secondary)",marginTop:"4px"}}>
                    <span>Orçamentos abertos: {fmt(orcTotal)}</span><span>Meta: {fmt(meta)}</span>
                  </div>
                </div>
                <div style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"2px"}}>
                    <span style={{fontSize:"12px",fontWeight:600,color:"var(--text-primary)"}}>Budget × Realizado</span>
                    <span style={{fontSize:"13px",fontWeight:700,color:pctReal>=100?"#1D9E75":pctReal>=60?"#EF9F27":"#E24B4A"}}>{pctReal}%</span>
                  </div>
                  {bar(pctReal,pctReal>=100?"#1D9E75":pctReal>=60?"#EF9F27":"#E24B4A")}
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"var(--text-secondary)",marginTop:"4px"}}>
                    <span>Realizado: {fmt(realizado)}</span><span>Meta: {fmt(meta)}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      })()}
      </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

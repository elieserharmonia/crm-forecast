                              {t.date&&<span>📅 {t.date}{t.time?" "+t.time:""}</span>}
                              {opp&&<span style={{color:"var(--text-blue)",cursor:"pointer"}} onClick={()=>{setSel(opp);setView("oportunidades");}}>🔗 {opp.title.slice(0,30)}</span>}
                            </div>
                            {t.notes&&<div style={{fontSize:"11px",color:"var(--text-secondary)",marginTop:"4px",lineHeight:1.4}}>{t.notes}</div>}
                            {t.cancelReason&&<div style={{fontSize:"11px",color:"#E24B4A",marginTop:"2px"}}>Motivo: {t.cancelReason}</div>}
                            {(t.history||[]).length>1&&(
                              <div style={{marginTop:"4px",borderTop:"1px solid var(--border2)",paddingTop:"3px"}}>
                                {(t.history||[]).map((h,hi)=>(
                                  <div key={hi} style={{fontSize:"10px",color:"var(--text-muted)"}}>
                                    {h.date} · <span style={{color:{concluida:"#1D9E75",cancelada:"#E24B4A",postergada:"#EF9F27"}[h.status]||"var(--text-secondary)"}}>{h.status}</span>
                                    {h.postponedTo&&` → ${h.postponedTo}`}{h.cancelReason&&` — ${h.cancelReason}`}
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                          <div style={{display:"flex",gap:"4px",flexShrink:0}}>
                            {!t.done&&<button onClick={()=>openTaskResult(t)} style={{background:"none",border:"1px solid var(--border)",borderRadius:"4px",cursor:"pointer",color:"var(--text-secondary)",fontSize:"11px",padding:"2px 7px"}} title="Registrar resultado">📋</button>}
                            <button onClick={()=>delTask(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"13px",padding:"2px"}}>✕</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ));
            })()}

            {/* MODAL NOVA TAREFA */}
            {taskModal&&(
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:60}}>
                <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"12px",padding:"20px",width:"420px",maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                    <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)"}}>Nova tarefa</div>
                    <button onClick={()=>setTaskModal(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"18px"}}>✕</button>
                  </div>
                  <div style={{marginBottom:"8px"}}>
                    <label style={lbl}>Título *</label>
                    <input value={taskForm.title} onChange={e=>setTaskForm({...taskForm,title:e.target.value})} style={inp} placeholder="Ex: Visita Caterpillar, Enviar proposta Norbar..."/>
                  </div>
                  <div style={{marginBottom:"8px"}}>
                    <label style={lbl}>Cliente / Empresa</label>
                    <input value={taskForm.company} onChange={e=>setTaskForm({...taskForm,company:e.target.value})} style={inp} placeholder="Ex: Caterpillar"/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
                    <div>
                      <label style={lbl}>Data</label>
                      <input type="date" value={taskForm.date} onChange={e=>setTaskForm({...taskForm,date:e.target.value})} style={inp}/>

                    <div>
                      <label style={lbl}>Horário</label>
                      <input type="time" value={taskForm.time} onChange={e=>setTaskForm({...taskForm,time:e.target.value})} style={inp}/>
                    </div>
                  </div>
                  <div style={{marginBottom:"8px"}}>
                    <label style={lbl}>Vincular oportunidade</label>
                    <select value={taskForm.oppId} onChange={e=>setTaskForm({...taskForm,oppId:e.target.value,company:e.target.value?(oppFc.find(o=>o.id===e.target.value)||{}).customer||taskForm.company:taskForm.company})} style={{...inp}}>
                      <option value="">— Nenhuma —</option>
                      {oppFc.filter(o=>o.stage!=="fechado").map(o=><option key={o.id} value={o.id}>{o.customer} · {o.title.slice(0,35)}</option>)}
                    </select>
                  </div>
                  <div style={{marginBottom:"8px"}}>
                    <label style={lbl}>Prioridade</label>
                    <div style={{display:"flex",gap:"6px"}}>

                        <button key={v} onClick={()=>setTaskForm({...taskForm,priority:v})}
                          style={{flex:1,padding:"6px",fontSize:"11px",borderRadius:"6px",border:`1px solid ${taskForm.priority===v?c:"var(--border)"}`,background:taskForm.priority===v?c+"22":"transparent",color:taskForm.priority===v?c:"var(--text-secondary)",cursor:"pointer",fontWeight:taskForm.priority===v?600:400}}>{l}</button>
                      ))}
                    </div>
                  </div>
                  <div style={{marginBottom:"14px"}}>
                    <label style={lbl}>Notas / O que oferecer</label>
                    <textarea value={taskForm.notes} onChange={e=>setTaskForm({...taskForm,notes:e.target.value})} style={{...inp,height:"60px"}} placeholder="Produtos a apresentar, contexto, objetivo da visita..."/>
                  </div>
                  <div style={{display:"flex",gap:"8px"}}>
                    <button onClick={addTask} disabled={!taskForm.title}
                      style={{flex:1,padding:"10px",fontSize:"13px",borderRadius:"6px",border:"none",background:taskForm.title?"#8C1A1A":"#4A2A2A",color:taskForm.title?"#FFD0D0":"#7A5050",cursor:taskForm.title?"pointer":"default",fontWeight:600}}>Salvar tarefa</button>
                    <button onClick={()=>setTaskModal(false)} style={{padding:"10px 14px",fontSize:"13px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ===== CLIENTES ===== */}
        {view==="clients" && (
          <div style={{flex:1,minWidth:0}}>
            {/* Toolbar */}
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"12px",flexWrap:"wrap"}}>
              <input value={clientSearch} onChange={e=>setClientSearch(e.target.value)}
                placeholder="Buscar cliente, cidade, segmento..."
                style={{...inp,maxWidth:"280px",flex:1}}/>
              <div style={{display:"flex",gap:"2px",background:"rgba(128,128,128,0.12)",borderRadius:"8px",padding:"3px"}}>
                {[["list","≡ Lista"],["kanban","⊞ Kanban"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setClientView2(v)} style={{padding:"4px 12px",fontSize:"11px",borderRadius:"6px",border:"none",cursor:"pointer",background:clientView2===v?"#8C1A1A":"transparent",color:clientView2===v?"#fff":"var(--text-secondary)",fontWeight:clientView2===v?700:400}}>{l}</button>
                ))}
              </div>
              <label style={{padding:"5px 12px",fontSize:"11px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-card)",color:"var(--text-secondary)",cursor:"pointer",fontWeight:500}} title="Importar planilha XLSX de clientes">
                ↑ Importar planilha
                <input type="file" accept=".xlsx,.xls" onChange={importClientsXLSX} style={{display:"none"}}/>
              </label>
              <span style={{fontSize:"11px",color:"var(--text-muted)"}}>
                {clientsData.filter(c=>!clientSearch||((c.alias&&c.alias.toLowerCase().includes(clientSearch.toLowerCase()))||(c.city&&c.city.toLowerCase().includes(clientSearch.toLowerCase()))||(c.segment&&c.segment.toLowerCase().includes(clientSearch.toLowerCase())))).length} clientes
              </span>
            </div>

            {(()=>{
              const filtered = clientsData.filter(c=>!clientSearch||(
                (c.alias&&c.alias.toLowerCase().includes(clientSearch.toLowerCase()))||
                (c.name&&c.name.toLowerCase().includes(clientSearch.toLowerCase()))||
                (c.city&&c.city.toLowerCase().includes(clientSearch.toLowerCase()))||
                (c.segment&&c.segment.toLowerCase().includes(clientSearch.toLowerCase()))||
                (c.contacts&&c.contacts.some(ct=>ct.name&&ct.name.toLowerCase().includes(clientSearch.toLowerCase())))
              ));

              if (clientView2==="list") return (
                <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
                  {/* Lista de clientes */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",overflow:"hidden"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}>
                        <thead><tr style={{background:"var(--bg-card2)"}}>
                          {["Cliente","Cidade/UF","Segmento","Radar","Contatos","Opp. abertas"].map(h=>(
                            <th key={h} style={{padding:"8px 10px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:"10px",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>{h}</th>
                          ))}
                        </tr></thead>
                        <tbody>
                          {filtered.map(c=>{
                            const oppCount = oppFc.filter(o=>(o.customer&&c.alias&&o.customer.toLowerCase().includes(c.alias.toLowerCase()))||o.customer===c.alias).length;
                            const sel2 = (selClient?selClient.alias:null)===c.alias;
                            return (
                              <tr key={c.alias} onClick={()=>setSelClient(sel2?null:c)}
                                style={{borderBottom:"1px solid var(--border2)",cursor:"pointer",background:sel2?"rgba(140,26,26,0.08)":"transparent"}}>
                                <td style={{padding:"8px 10px"}}>
                                  <div style={{fontWeight:600,color:"var(--text-primary)",fontSize:"12px"}}>{c.alias}</div>
                                  <div style={{fontSize:"10px",color:"var(--text-secondary)"}}>{c.name?c.name.slice(0,40):""}</div>
                                </td>
                                <td style={{padding:"8px 10px",color:"var(--text-secondary)",whiteSpace:"nowrap"}}>{c.city}/{c.state}</td>
                                <td style={{padding:"8px 10px"}}><span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"8px",background:"var(--bg-card2)",color:"var(--text-secondary)"}}>{c.segment}</span></td>
                                <td style={{padding:"8px 10px",textAlign:"center"}}>
                                  {c.monitorar_pesquisa==="SIM"
                                    ?<span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"8px",background:"rgba(29,158,117,0.15)",color:"#1D9E75",fontWeight:700}}>🧠 SIM</span>
                                    :<span style={{fontSize:"9px",color:"var(--text-muted)"}}>—</span>}
                                </td>
                                <td style={{padding:"8px 10px",color:"var(--text-secondary)",textAlign:"center"}}>{c.contacts?c.contacts.length:0}</td>
                                <td style={{padding:"8px 10px",textAlign:"center"}}>
                                  {oppCount>0?<span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"8px",background:"rgba(140,26,26,0.15)",color:"var(--text-accent)",fontWeight:600}}>{oppCount}</span>:"—"}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                  {/* Painel detalhe cliente */}
                  {selClient && (
                    <div style={{width:"300px",flexShrink:0,background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"14px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
                        <div>
                          <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)",marginBottom:"2px"}}>{selClient.alias}</div>
                          <div style={{fontSize:"10px",color:"var(--text-secondary)"}}>{selClient.segment}</div>
                        </div>
                        <button onClick={()=>setSelClient(null)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"16px"}}>✕</button>
                      </div>

                      {/* Logo + Site + LinkedIn */}
                      <div style={{display:"flex",gap:"8px",alignItems:"flex-start",marginBottom:"10px"}}>
                        <label style={{cursor:"pointer",flexShrink:0}} title="Clique para adicionar/alterar logo">
                          <div style={{width:"44px",height:"44px",borderRadius:"8px",border:"1px dashed var(--border)",background:"var(--bg-card2)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                            {selClient.logo
                              ?<img src={selClient.logo} alt={selClient.alias} style={{width:"100%",height:"100%",objectFit:"contain"}}/>
                              :<span style={{fontSize:"18px",fontWeight:700,color:"var(--text-accent)"}}>{selClient.alias?selClient.alias[0]:"?"}</span>}
                          </div>
                          <div style={{fontSize:"8px",color:"var(--text-muted)",textAlign:"center",marginTop:"2px"}}>📷 logo</div>
                          <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                            const f=e.target.files[0]; if(!f) return;
                            const rd=new FileReader();
                            rd.onload=ev=>{
                              const upd=clientsData.map(cl=>cl.alias===selClient.alias?{...cl,logo:ev.target.result}:cl);
                              saveClients(upd); setSelClient({...selClient,logo:ev.target.result});
                            };
                            rd.readAsDataURL(f); e.target.value="";
                          }}/>
                        </label>
                        <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:"4px"}}>
                          <input value={selClient.site||""} onChange={e=>{const upd=clientsData.map(cl=>cl.alias===selClient.alias?{...cl,site:e.target.value}:cl);saveClients(upd);setSelClient({...selClient,site:e.target.value});}}
                            style={{...inp,fontSize:"10px",padding:"4px 7px"}} placeholder="🌐 Site (ex: www.empresa.com.br)"/>
                          <input value={selClient.linkedin||""} onChange={e=>{const upd=clientsData.map(cl=>cl.alias===selClient.alias?{...cl,linkedin:e.target.value}:cl);saveClients(upd);setSelClient({...selClient,linkedin:e.target.value});}}
                            style={{...inp,fontSize:"10px",padding:"4px 7px"}} placeholder="💼 LinkedIn URL ou nome"/>
                          <div style={{display:"flex",gap:"4px"}}>
                            {selClient.site&&<a href={selClient.site.startsWith("http")?selClient.site:`https://${selClient.site}`} target="_blank" rel="noopener noreferrer" style={{fontSize:"9px",color:"#2563EB",textDecoration:"none"}}>🌐 abrir site</a>}
                            {selClient.linkedin&&<a href={selClient.linkedin.startsWith("http")?selClient.linkedin:`https://linkedin.com/company/${selClient.linkedin}`} target="_blank" rel="noopener noreferrer" style={{fontSize:"9px",color:"#0A66C2",textDecoration:"none",marginLeft:selClient.site?"6px":"0"}}>💼 LinkedIn</a>}
                          </div>
                        </div>
                      </div>

                      {/* Monitorar pesquisa toggle */}
                      {(()=>{
                        const isSIM = selClient.monitorar_pesquisa==="SIM";
                        const totalSIM = clientsData.filter(c=>c.monitorar_pesquisa==="SIM").length;
                        return (
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",borderRadius:"8px",background:isSIM?"rgba(29,158,117,0.12)":"var(--bg-card2)",border:`1px solid ${isSIM?"rgba(29,158,117,0.4)":"var(--border)"}`,marginBottom:"10px"}}>
                            <div>
                              <div style={{fontSize:"11px",fontWeight:700,color:isSIM?"#1D9E75":"var(--text-secondary)"}}>
                                🧠 Radar de Inteligência
                              </div>
                              <div style={{fontSize:"9px",color:"var(--text-muted)",marginTop:"1px"}}>
                                {isSIM?"Monitorado · pesquisado no radar diário":"Não monitorado"}
                                {" · "}{totalSIM}/20 clientes ativos
                              </div>
                            </div>
                            <button onClick={()=>{
                              if(!isSIM && totalSIM>=20){ alert("Limite de 20 clientes no radar atingido. Desmarque outro cliente antes de adicionar."); return; }
                              const updated = clientsData.map(c=>c.alias===selClient.alias?{...c,monitorar_pesquisa:isSIM?"NAO":"SIM"}:c);
                              saveClients(updated);
                              setSelClient({...selClient,monitorar_pesquisa:isSIM?"NAO":"SIM"});
                            }} style={{padding:"4px 12px",fontSize:"11px",borderRadius:"6px",border:`1px solid ${isSIM?"#1D9E75":"var(--border)"}`,background:isSIM?"#1D9E75":"transparent",color:isSIM?"#fff":"var(--text-secondary)",cursor:"pointer",fontWeight:600,flexShrink:0}}>
                              {isSIM?"SIM ✓":"NAO"}
                            </button>
                          </div>
                        );
                      })()}
                      <div style={{background:"var(--bg-card2)",borderRadius:"6px",padding:"8px 10px",marginBottom:"10px",fontSize:"11px"}}>
                        {[["CNPJ",selClient.cnpj],["Endereço",selClient.address],["Cidade",`${selClient.city}/${selClient.state}`],["CEP",selClient.cep],["Região",selClient.region]].map(([k,v])=>v?(
                          <div key={k} style={{display:"flex",gap:"8px",padding:"3px 0",borderBottom:"1px solid var(--border2)"}}>
                            <span style={{color:"var(--text-secondary)",width:"60px",flexShrink:0}}>{k}</span>
                            <span style={{color:"var(--text-primary)",wordBreak:"break-all"}}>{v}</span>
                          </div>
                        ):null)}
                      </div>
                      {/* Oportunidades abertas */}
                      {(()=>{
                        const clientOpps = oppFc.filter(o=>(o.customer&&selClient.alias&&o.customer.toLowerCase().includes(selClient.alias.toLowerCase()))||o.customer===selClient.alias)
                        if (clientOpps.length===0) return null;
                        return (
                          <div style={{marginBottom:"10px"}}>
                            <div style={{fontSize:"10px",fontWeight:600,color:"var(--text-secondary)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"6px"}}>Oportunidades ({clientOpps.length})</div>
                            {clientOpps.slice(0,4).map(o=>{
                              const stg = STAGES.find(s=>s.id===o.stage);
                              return (
                                <div key={o.id} onClick={()=>{setSel(o);setView("oportunidades");}} style={{display:"flex",gap:"6px",alignItems:"center",padding:"5px 7px",borderRadius:"5px",background:"var(--bg-card2)",marginBottom:"3px",cursor:"pointer",borderLeft:`2px solid ${(stg?stg.color:"—")}`}}>
                                  <div style={{flex:1,minWidth:0}}>
                                    <div style={{fontSize:"10px",fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.title}</div>
                                    <div style={{fontSize:"9px",color:"var(--text-secondary)"}}>{o.supplier} · {stg?stg.tag:"—"}</div>
                                  </div>
                                  {o.value>0&&<span style={{fontSize:"9px",color:"var(--text-accent)",fontWeight:600,flexShrink:0}}>R${(o.value/1000).toFixed(0)}k</span>}
                                </div>
                              );
                            })}
                            {clientOpps.length>4&&<div style={{fontSize:"10px",color:"var(--text-muted)",textAlign:"right"}}>+{clientOpps.length-4} mais</div>}
                          </div>
                        );
                      })()}
                      {/* Contatos */}
                      <div>
                        <div style={{fontSize:"10px",fontWeight:600,color:"var(--text-secondary)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"6px"}}>Contatos ({(selClient.contacts?selClient.contacts.length:0)} — clique para abrir perfil</div>
                        <div style={{maxHeight:"260px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"4px"}}>
                          {(selClient.contacts||[]).map((ct,i)=>(
                            <div key={i} onClick={()=>setSelContact({...ct,_clientAlias:selClient.alias,_idx:i})}
                              style={{background:"var(--bg-card2)",borderRadius:"6px",padding:"7px 9px",cursor:"pointer",border:"1px solid transparent",transition:"border-color .15s"}}
                              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--border)"}
                              onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
                              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                                {ct.photo?(
                                  <img src={ct.photo} alt={ct.name} style={{width:"32px",height:"32px",borderRadius:"50%",objectFit:"cover",flexShrink:0}}/>
                                ):(
                                  <div style={{width:"32px",height:"32px",borderRadius:"50%",background:"rgba(140,26,26,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:0}}>👤</div>
                                )}
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-primary)",marginBottom:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ct.name}</div>
                                  {ct.role&&<div style={{fontSize:"10px",color:"var(--text-accent)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ct.role}</div>}
                                  <div style={{fontSize:"10px",color:"var(--text-secondary)",display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"1px"}}>
                                    {ct.cel&&<span>{ct.cel}</span>}
                                    {ct.email&&<span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"160px"}}>{ct.email}</span>}
                                  </div>
                                </div>
                                <div style={{display:"flex",gap:"4px",flexShrink:0}}>
                                  {ct.cel&&(
                                    <a href={`https://wa.me/55${ct.cel.replace(/\D/g,"")}`} target="_blank" rel="noopener noreferrer"
                                      onClick={e=>e.stopPropagation()}
                                      style={{width:"26px",height:"26px",borderRadius:"50%",background:"#25D366",display:"flex",alignItems:"center",justifyContent:"center",textDecoration:"none"}} title="WhatsApp">
                                      <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                    </a>
                                  )}
                                  {ct.email&&(
                                    <a href={`mailto:${ct.email}`} onClick={e=>e.stopPropagation()}
                                      style={{width:"26px",height:"26px",borderRadius:"50%",background:"rgba(0,120,212,0.15)",display:"flex",alignItems:"center",justifyContent:"center",textDecoration:"none"}} title="E-mail">
                                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="4" width="22" height="16" rx="2" fill="#0078D4"/><path d="M1 6l9.5 6.5a2 2 0 0 0 3 0L23 6" stroke="white" stroke-width="1.5" stroke-linecap="round"/><path d="M1 4h10.5L14 7l2.5-3H23" fill="none"/></svg>
                                    </a>
                                  )}
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );

              // KANBAN VIEW
              return (
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"12px"}}>
                  {filtered.map(c=>{
                    const oppCount = oppFc.filter(o=>(o.customer&&c.alias&&o.customer.toLowerCase().includes(c.alias.toLowerCase()))||o.customer===c.alias).length
                    const oppVal = oppFc.filter(o=>(o.customer&&c.alias&&o.customer.toLowerCase().includes(c.alias.toLowerCase()))||o.customer===c.alias).reduce((s,o)=>{const a=parseFloat(String(o.amount||'0').replace(/[^0-9.]/g,''))||0;return s+a;},0)
                    const mainContact = (c.contacts?c.contacts[0]:null);
                    return (
                      <div key={c.alias} onClick={()=>setSelClient(c)}
                        style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"12px",padding:"14px",cursor:"pointer",transition:"transform .15s, box-shadow .15s, border-color .15s",position:"relative",overflow:"hidden"}}
                        onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 6px 20px rgba(0,0,0,0.25)";e.currentTarget.style.borderColor="#8C1A1A";}}
                        onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";e.currentTarget.style.borderColor="var(--border)";}}>
                        {/* Faixa de cor lateral por segmento */}
                        <div style={{position:"absolute",left:0,top:0,bottom:0,width:"3px",background:(c.segment&&c.segment.toLowerCase().includes("auto")||c.segment&&c.segment.toLowerCase().includes("veíc")?"#185FA5":c.segment&&c.segment.toLowerCase().includes("agro")?"#1D9E75":c.segment&&c.segment.toLowerCase().includes("aero")?"#7F77DD":"#8C1A1A"),borderRadius:"12px 0 0 12px"}}/>
                        <div style={{paddingLeft:"6px"}}>
                          {/* Logo clicável para upload */}
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
                            <label style={{cursor:"pointer"}} title="Clique para adicionar logo">
                              <div style={{width:"36px",height:"36px",borderRadius:"8px",background:"rgba(140,26,26,0.1)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",border:"1px dashed var(--border)",flexShrink:0}}>
                                {c.logo
                                  ?<img src={c.logo} alt={c.alias} style={{width:"100%",height:"100%",objectFit:"contain"}}/>
                                  :<span style={{fontSize:"15px",fontWeight:700,color:"var(--text-accent)"}}>{c.alias&&c.alias[0]?c.alias[0].toUpperCase():"?"}</span>}
                              </div>
                              <input type="file" accept="image/*" style={{display:"none"}} onClick={e=>e.stopPropagation()} onChange={e=>{
                                e.stopPropagation();
                                const f=e.target.files[0]; if(!f) return;
                                const rd=new FileReader();
                                rd.onload=ev=>{
                                  const upd=clientsData.map(cl=>cl.alias===c.alias?{...cl,logo:ev.target.result}:cl);
                                  saveClients(upd);
                                };
                                rd.readAsDataURL(f);
                                e.target.value="";
                              }}/>
                            </label>
                            {oppCount>0&&(
                              <div style={{textAlign:"right"}}>
                                <div style={{fontSize:"10px",color:"var(--text-accent)",fontWeight:700}}>{oppCount} opp</div>
                                {oppVal>0&&<div style={{fontSize:"9px",color:"var(--text-muted)"}}>R${(oppVal/1000).toFixed(0)}k</div>}
                              </div>
                            )}
                          </div>
                          {/* Nome */}
                          <div style={{fontSize:"13px",fontWeight:700,color:"var(--text-primary)",marginBottom:"2px",lineHeight:1.2}}>{c.alias}</div>
                          <div style={{fontSize:"10px",color:"var(--text-secondary)",marginBottom:"3px"}}>{c.segment||"—"}</div>
                          {/* Site e LinkedIn */}
                          <div style={{display:"flex",gap:"5px",marginBottom:"5px",flexWrap:"wrap"}}>
                            {c.site&&<a href={c.site.startsWith("http")?c.site:`https://${c.site}`} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:"9px",color:"#2563EB",textDecoration:"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"90px"}} title={c.site}>🌐 {c.site.replace(/^https?:\/\//,"").split("/")[0]}</a>}
                            {c.linkedin&&<a href={c.linkedin.startsWith("http")?c.linkedin:`https://linkedin.com/company/${c.linkedin}`} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:"9px",color:"#0A66C2",textDecoration:"none"}} title="LinkedIn">💼 LinkedIn</a>}
                          </div>
                          {/* Localização */}
                          <div style={{fontSize:"10px",color:"var(--text-muted)",marginBottom:"6px"}}>📍 {c.city||"—"}/{c.state||"—"}</div>
                          {/* Contato principal */}
                          {mainContact&&(
                            <div style={{display:"flex",alignItems:"center",gap:"5px",padding:"4px 6px",borderRadius:"6px",background:"var(--bg-card2)"}}>
                              {mainContact.photo
                                ?<img src={mainContact.photo} style={{width:"18px",height:"18px",borderRadius:"50%",objectFit:"cover",flexShrink:0}} alt=""/>
                                :<div style={{width:"18px",height:"18px",borderRadius:"50%",background:"rgba(140,26,26,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",flexShrink:0}}>👤</div>}
                              <span style={{fontSize:"9px",color:"var(--text-secondary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mainContact.name.split(" ").slice(0,2).join(" ")}</span>
                            </div>
                          )}
                          {/* Radar toggle + hint */}
                          <div style={{marginTop:"8px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"6px"}} onClick={e=>e.stopPropagation()}>
                            <span style={{fontSize:"9px",color:"var(--text-muted)",opacity:.6}}>clique para ver perfil</span>
                            {(()=>{
                              const isSIM = c.monitorar_pesquisa==="SIM";
                              const totalSIM = clientsData.filter(cl=>cl.monitorar_pesquisa==="SIM").length;
                              return (
                                <button onClick={e=>{
                                  e.stopPropagation();
                                  if(!isSIM && totalSIM>=20){ alert("Limite de 20 clientes no radar atingido."); return; }
                                  const upd=clientsData.map(cl=>cl.alias===c.alias?{...cl,monitorar_pesquisa:isSIM?"NAO":"SIM"}:cl);
                                  saveClients(upd);
                                }} title={isSIM?"Remover do Radar":"Adicionar ao Radar"}
                                  style={{display:"flex",alignItems:"center",gap:"3px",padding:"2px 7px",borderRadius:"8px",border:`1px solid ${isSIM?"#10B981":"var(--border)"}`,background:isSIM?"rgba(16,185,129,0.12)":"transparent",cursor:"pointer",fontSize:"9px",fontWeight:700,color:isSIM?"#10B981":"var(--text-muted)",whiteSpace:"nowrap",flexShrink:0}}>
                                  <span style={{fontSize:"10px"}}>🧠</span>
                                  {isSIM?"SIM":"NAO"}
                                </button>
                              );
                            })()}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        )}

  
        {/* ===== RELATÓRIO SEMANAL ===== */}
        {view==="relatorio" && (
          <div style={{flex:1,display:"flex",gap:"14px",flexWrap:"wrap"}}>

            {/* Coluna esquerda: seleção */}
            <div style={{width:"300px",flexShrink:0}}>
              <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"12px",marginBottom:"10px"}}>

                {/* Modo de seleção */}
                <div style={{display:"flex",gap:"4px",marginBottom:"10px"}}>
                  {[["single","📋 Único"],["multi","📧 E-mail Outlook"]].map(([m,l])=>(
                    <button key={m} onClick={()=>{setRelMode(m);setRelSelected([]);setRelText("");}}
                      style={{flex:1,padding:"5px 8px",fontSize:"11px",borderRadius:"6px",border:`1px solid ${relMode===m?"#8C1A1A":"var(--border)"}`,background:relMode===m?"rgba(140,26,26,0.12)":"transparent",color:relMode===m?"#8C1A1A":"var(--text-secondary)",cursor:"pointer",fontWeight:relMode===m?700:400}}>
                      {l}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:"10px",color:"var(--text-muted)",marginBottom:"8px"}}>
                  {relMode==="single"?"Selecione 1 oportunidade":"Selecione várias → gera relatório consolidado para Outlook"}
                </div>

                {/* Lista */}
                <div style={{display:"flex",flexDirection:"column",gap:"3px",maxHeight:"440px",overflowY:"auto"}}>
                  {oppFc.map(o=>{
                    const isSel = relSelected.includes(o.id);
                    const stage = STAGES.find(s=>s.id===o.stage);
                    const confColor = parseFloat(o.confidence||0)>=1?"#1D9E75":parseFloat(o.confidence||0)>=0.5?"#185FA5":parseFloat(o.confidence||0)>=0.3?"#EF9F27":"#888";
                    const hasHistory = (o.history||[]).length>0;
                    return (
                      <div key={o.id} onClick={()=>{
                        if(relMode==="single") setRelSelected(s=>s.includes(o.id)?[]:[o.id]);
                        else setRelSelected(s=>s.includes(o.id)?s.filter(x=>x!==o.id):[...s,o.id]);
                        setRelText("");
                      }} style={{display:"flex",alignItems:"center",gap:"7px",padding:"6px 8px",borderRadius:"6px",background:isSel?"rgba(140,26,26,0.1)":"var(--bg-card2)",border:`1px solid ${isSel?"#8C1A1A":"var(--border)"}`,cursor:"pointer"}}>
                        <div style={{width:"14px",height:"14px",borderRadius:relMode==="single"?"50%":"3px",border:`2px solid ${isSel?"#8C1A1A":"var(--border)"}`,background:isSel?"#8C1A1A":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {isSel&&<div style={{width:"5px",height:"5px",borderRadius:relMode==="single"?"50%":"1px",background:"#fff"}}/>}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.customer}</div>
                          <div style={{fontSize:"10px",color:"var(--text-secondary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.description}</div>
                        </div>
                        <div style={{display:"flex",gap:"3px",alignItems:"center",flexShrink:0}}>
                          {hasHistory&&<span style={{fontSize:"9px",color:"var(--text-blue)"}}>📝</span>}
                          <span style={{fontSize:"9px",padding:"1px 5px",borderRadius:"6px",background:confColor+"22",color:confColor,fontWeight:600}}>{Math.round(parseFloat(o.confidence||0)*100)+"%"}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {relSelected.length>0&&(
                  <button onClick={gerarRelatorio} disabled={relLoading}
                    style={{width:"100%",marginTop:"10px",padding:"9px",fontSize:"12px",borderRadius:"6px",border:"none",background:!relLoading?"#8C1A1A":"#4A2A2A",color:!relLoading?"#FFD0D0":"#7A5050",cursor:!relLoading?"pointer":"default",fontWeight:600}}>
                    {relLoading?"Gerando...":relMode==="single"?"Gerar relatório":`Gerar relatório (${relSelected.length})`}
                  </button>
                )}
              </div>
            </div>

            {/* Coluna direita: relatório */}
            <div style={{flex:1,minWidth:"300px"}}>
              {relText&&(
                <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px",flexWrap:"wrap",gap:"6px"}}>
                    <div style={{fontSize:"12px",fontWeight:600,color:"var(--text-primary)"}}>
                      {relSelected.length>1?`${relSelected.length} oportunidades`:"Relatório"} · {new Date().toLocaleDateString("pt-BR")}
                    </div>
                    <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
                      <button onClick={()=>navigator.clipboard.writeText(relText)}
                        style={{fontSize:"11px",padding:"5px 10px",borderRadius:"6px",border:"1px solid #185FA5",background:"rgba(24,95,165,0.12)",color:"#185FA5",cursor:"pointer",fontWeight:600}}>📋 Copiar</button>
                      <button onClick={()=>window.print()}
                        style={{fontSize:"11px",padding:"5px 10px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-card2)",color:"var(--text-secondary)",cursor:"pointer"}}>🖨 Imprimir</button>
                      <button onClick={exportRelPDF}
                        style={{fontSize:"11px",padding:"5px 10px",borderRadius:"6px",border:"1px solid #E24B4A",background:"rgba(226,75,74,0.12)",color:"#E24B4A",cursor:"pointer",fontWeight:600}}>📄 PDF</button>
                      <button onClick={exportRelDOCX}
                        style={{fontSize:"11px",padding:"5px 10px",borderRadius:"6px",border:"1px solid #185FA5",background:"rgba(24,95,165,0.12)",color:"#185FA5",cursor:"pointer",fontWeight:600}}>📝 DOCX</button>
                      <button onClick={exportRelXLSX}
                        style={{fontSize:"11px",padding:"5px 10px",borderRadius:"6px",border:"1px solid #1D9E75",background:"rgba(29,158,117,0.12)",color:"#1D9E75",cursor:"pointer",fontWeight:600}}>📊 XLSX</button>
                      <button onClick={()=>{
                        const selOpps = relSelected.map(id=>oppFc.find(o=>o.id===id)).filter(Boolean);
                        const subject = encodeURIComponent(selOpps.length>1
                          ? `Relatório de Oportunidades Sinuelo (${selOpps.length})`
                          : `Oportunidade: ${(selOpps[0]&&selOpps[0].customer)||""} · ${(selOpps[0]&&selOpps[0].description?selOpps[0].description.slice(0,40):"")}`);

                        const bodyRaw = relText;
                        // Outlook suporta ~2000 chars no mailto body
                        const bodyEnc = encodeURIComponent(bodyRaw.length>1900?bodyRaw.slice(0,1890)+"\n\n[relatório truncado — copie o texto completo do CRM]":bodyRaw);
                        window.location.href = "mailto:?subject="+subject+"&body="+bodyEnc;
                      }} style={{fontSize:"11px",padding:"5px 10px",borderRadius:"6px",border:"1px solid #0078D4",background:"rgba(0,120,212,0.12)",color:"#0078D4",cursor:"pointer",fontWeight:700,display:"flex",alignItems:"center",gap:"4px"}}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="1" y="4" width="22" height="16" rx="2" fill="#0078D4"/><path d="M1 6l9.5 6.5a2 2 0 0 0 3 0L23 6" stroke="white" strokeWidth="1.5" strokeLinecap="round"/></svg>
                        Outlook
                      </button>
                    </div>
                  </div>
                  <pre style={{fontSize:"11px",color:"var(--text-primary)",lineHeight:1.45,whiteSpace:"pre-wrap",fontFamily:"'Courier New',monospace",margin:0}}>{relText}</pre>
                </div>
              )}
              {!relText&&relSelected.length===0&&(
                <div style={{textAlign:"center",padding:"50px 20px",color:"var(--text-muted)"}}>
                  <div style={{fontSize:"28px",marginBottom:"10px"}}>📋</div>
                  <div style={{fontSize:"12px",lineHeight:1.6}}>
                    <b>📋 Único</b> → relatório detalhado de 1 oportunidade<br/>
                    <b>📧 E-mail Outlook</b> → selecione várias e envie direto
                  </div>
                </div>
              )}
              {!relText&&relSelected.length>0&&!relLoading&&(
                <div style={{textAlign:"center",padding:"40px 20px",color:"var(--text-muted)",fontSize:"12px"}}>
                  {relSelected.length} oportunidade{relSelected.length>1?"s":""} selecionada{relSelected.length>1?"s":""}. Clique em <b>Gerar relatório</b>.
                </div>
              )}
              {relLoading&&<div style={{textAlign:"center",padding:"40px 20px",color:"var(--text-secondary)",fontSize:"12px"}}>Gerando relatório...</div>}
            </div>
          </div>
        )}

        {/* ===== PERFIL ===== */}
        
        {/* ===== BUDGET ===== */}
        {view==="budget" && (
          <div style={{flex:1,minWidth:0}}>

            {/* Toolbar */}
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"14px",flexWrap:"wrap"}}>
              <div style={{fontSize:"15px",fontWeight:700,color:"var(--text-primary)",flex:1}}>Budget {CUR_YEAR}</div>
              <div style={{display:"flex",gap:"2px",background:"rgba(128,128,128,0.12)",borderRadius:"8px",padding:"3px"}}>
                {[["client","Por Cliente"],["supplier","Por Fornecedor"],["matrix","Matriz"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setBudgetView(v)} style={{padding:"4px 12px",fontSize:"11px",borderRadius:"6px",border:"none",cursor:"pointer",background:budgetView===v?"#8C1A1A":"transparent",color:budgetView===v?"#fff":"var(--text-secondary)",fontWeight:budgetView===v?700:400,whiteSpace:"nowrap"}}>{l}</button>
                ))}
              </div>
              <button onClick={()=>setBudgetModal(true)} style={{padding:"5px 14px",fontSize:"12px",borderRadius:"6px",border:"1px solid #8C1A1A",background:"rgba(140,26,26,0.2)",color:"var(--text-accent)",cursor:"pointer",fontWeight:600}}>+ Nova meta</button>
            </div>

            {/* KPIs globais */}
            {(()=>{
              const yr = budgets.filter(b=>b.year===CUR_YEAR);
              const metaTotal = yr.reduce((s,b)=>s+totalMeta(b),0);
              const realTotal = yr.reduce((s,b)=>s+totalRealizado(b),0);
              const autoTotal = yr.reduce((s,b)=>s+autoRealizado(b),0);
              const pct = metaTotal>0?Math.round(realTotal/metaTotal*100):0;
              const pc  = pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";
              return (
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"16px"}}>
                  {[
                    ["Meta total","R$ "+(metaTotal/1000).toFixed(0)+"k","var(--bg-card2)","var(--border)","var(--text-secondary)","var(--text-primary)"],
                    ["Realizado","R$ "+(realTotal/1000).toFixed(0)+"k","rgba(29,158,117,0.08)","rgba(29,158,117,0.3)","#1D9E75","#1D9E75"],
                    ["Pipeline auto","R$ "+(autoTotal/1000).toFixed(0)+"k","rgba(24,95,165,0.08)","rgba(24,95,165,0.3)","#185FA5","#185FA5"],
                    ["Atingimento",pct+"%",`rgba(${pc==="1D9E75"?"29,158,117":pc==="#EF9F27"?"239,159,39":"226,75,74"},0.08)`,pc+"44",pc,pc],
                  ].map(([l,v,bg,bc,lc,vc])=>(
                    <div key={l} style={{background:bg,border:`1px solid ${bc}`,borderRadius:"8px",padding:"10px 14px"}}>
                      <div style={{fontSize:"10px",color:lc,opacity:.8,marginBottom:"4px",textTransform:"uppercase",letterSpacing:".06em"}}>{l}</div>
                      <div style={{fontSize:"22px",fontWeight:700,color:vc}}>{v}</div>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* ── MATRIZ FORNECEDOR × CLIENTE ── */}
            {budgetView==="matrix" && (()=>{
              const yr = budgets.filter(b=>b.year===CUR_YEAR);
              const suppliers = [...new Set(yr.map(b=>b.supplier))].sort();
              const clients   = [...new Set(yr.map(b=>b.client))].sort();
              function getB(sup,cli){ return yr.filter(b=>b.supplier===sup&&b.client===cli); }
              function cellMeta(sup,cli){ return getB(sup,cli).reduce((s,b)=>s+totalMeta(b),0); }
              function cellReal(sup,cli){ return getB(sup,cli).reduce((s,b)=>s+totalRealizado(b),0); }
              function rowTotal(sup){ return yr.filter(b=>b.supplier===sup).reduce((s,b)=>s+totalMeta(b),0); }
              function colTotal(cli){ return yr.filter(b=>b.client===cli).reduce((s,b)=>s+totalMeta(b),0); }
              const grand = yr.reduce((s,b)=>s+totalMeta(b),0);
              return (
                <div style={{overflowX:"auto"}}>
                  <table style={{borderCollapse:"collapse",fontSize:"11px",minWidth:"700px",width:"100%"}}>
                    <thead>
                      <tr style={{background:"var(--bg-card2)"}}>
                        <th style={{padding:"8px 10px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,borderBottom:"1px solid var(--border)",position:"sticky",left:0,background:"var(--bg-card2)",minWidth:"110px"}}>Fornecedor</th>
                        {clients.map(c=>(
                          <th key={c} style={{padding:"8px 8px",textAlign:"center",color:"var(--text-secondary)",fontWeight:600,borderBottom:"1px solid var(--border)",whiteSpace:"nowrap",fontSize:"10px"}}>{c}</th>
                        ))}
                        <th style={{padding:"8px 8px",textAlign:"right",color:"var(--text-accent)",fontWeight:700,borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>TOTAL</th>
                      </tr>
                    </thead>
                    <tbody>
                      {suppliers.map(sup=>{
                        const rt = rowTotal(sup);
                        return (
                          <tr key={sup} style={{borderBottom:"1px solid var(--border2)"}}>
                            <td style={{padding:"8px 10px",fontWeight:600,color:"var(--text-primary)",position:"sticky",left:0,background:"var(--bg-card)",whiteSpace:"nowrap"}}>{sup}</td>
                            {clients.map(cli=>{
                              const m = cellMeta(sup,cli);
                              const r = cellReal(sup,cli);
                              const p = m>0?Math.round(r/m*100):0;
                              const pc2 = p>=80?"#1D9E75":p>=50?"#EF9F27":"#E24B4A";
                              return (
                                <td key={cli} style={{padding:"6px 8px",textAlign:"center",verticalAlign:"middle"}}>
                                  {m>0?(
                                    <div style={{display:"inline-block",minWidth:"64px"}}>
                                      <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-primary)"}}>R$ {(m/1000).toFixed(0)}k</div>
                                      <div style={{height:"3px",background:"var(--bg-card2)",borderRadius:"2px",margin:"2px 0",overflow:"hidden"}}>
                                        <div style={{height:"100%",width:Math.min(p,100)+"%",background:pc2,borderRadius:"2px"}}/>
                                      </div>
                                      {r>0&&<div style={{fontSize:"9px",color:pc2,fontWeight:600}}>{p}%</div>}
                                    </div>
                                  ):<span style={{color:"var(--text-muted)"}}>—</span>}
                                </td>
                              );
                            })}
                            <td style={{padding:"8px",textAlign:"right",fontWeight:700,color:"var(--text-accent)"}}>R$ {(rt/1000).toFixed(0)}k</td>
                          </tr>
                        );
                      })}
                      {/* Linha de totais */}
                      <tr style={{background:"var(--bg-card2)",borderTop:"2px solid var(--border)"}}>
                        <td style={{padding:"8px 10px",fontWeight:700,color:"var(--text-accent)",position:"sticky",left:0,background:"var(--bg-card2)"}}>TOTAL</td>
                        {clients.map(cli=>(
                          <td key={cli} style={{padding:"8px",textAlign:"center",fontWeight:700,color:"var(--text-primary)"}}>R$ {(colTotal(cli)/1000).toFixed(0)}k</td>
                        ))}
                        <td style={{padding:"8px",textAlign:"right",fontWeight:700,color:"var(--text-accent)"}}>R$ {(grand/1000).toFixed(0)}k</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              );
            })()}

            {/* ── POR FORNECEDOR ── */}
            {budgetView==="supplier" && (()=>{
              const yr = budgets.filter(b=>b.year===CUR_YEAR);
              const suppliers = [...new Set(yr.map(b=>b.supplier))].sort();
              return (
                <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                  {suppliers.map(sup=>{
                    const entries = yr.filter(b=>b.supplier===sup);
                    const meta = entries.reduce((s,b)=>s+totalMeta(b),0);
                    const real = entries.reduce((s,b)=>s+totalRealizado(b),0);
                    const auto = entries.reduce((s,b)=>s+autoRealizado(b),0);
                    const pct  = meta>0?Math.round(real/meta*100):0;
                    const pc   = pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";
                    return (
                      <div key={sup} style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)"}}>{sup}</div>
                            <div style={{fontSize:"10px",color:"var(--text-secondary)",marginTop:"1px"}}>{entries.length} cliente(s) com meta</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:"18px",fontWeight:700,color:pc}}>{pct}%</div>
                            <div style={{fontSize:"10px",color:"var(--text-secondary)"}}>R$ {(real/1000).toFixed(0)}k / R$ {(meta/1000).toFixed(0)}k</div>
                          </div>
                        </div>
                        <div style={{height:"5px",background:"var(--bg-card2)",borderRadius:"3px",marginBottom:"10px",overflow:"hidden"}}>
                          <div style={{height:"100%",width:Math.min(pct,100)+"%",background:pc,borderRadius:"3px",transition:"width .4s"}}/>
                        </div>
                        {/* Detalhamento por cliente */}
                        <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                          {entries.map(b=>{
                            const bm=totalMeta(b), br=totalRealizado(b);
                            const bp=bm>0?Math.round(br/bm*100):0;
                            const bpc=bp>=80?"#1D9E75":bp>=50?"#EF9F27":"#E24B4A";
                            return (
                              <div key={b.id} style={{background:"var(--bg-card2)",borderRadius:"7px",padding:"7px 10px",minWidth:"120px",flex:1,cursor:"pointer",border:"1px solid transparent",transition:"border-color .15s"}}
                                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--border)"}
                                onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
                                <div onClick={()=>setSelBudget(b)} style={{fontSize:"10px",fontWeight:600,color:"var(--text-primary)",marginBottom:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.client} 🔍</div>
                                <div style={{fontSize:"12px",fontWeight:700,color:"var(--text-accent)"}}>R$ {(bm/1000).toFixed(0)}k</div>
                                <div style={{height:"3px",background:"var(--bg-card)",borderRadius:"2px",margin:"4px 0",overflow:"hidden"}}>
                                  <div style={{height:"100%",width:Math.min(bp,100)+"%",background:bpc,borderRadius:"2px"}}/>
                                </div>
                                <div style={{display:"flex",alignItems:"center",gap:"4px",marginTop:"4px"}}>
                                  <input type="number" value={b.realized1s||""} onChange={e=>updateBudget({...b,realized1s:Number(e.target.value)||0})}
                                    style={{...inp,width:"60px",fontSize:"10px",padding:"2px 5px"}} placeholder="1S"/>
                                  <input type="number" value={b.realized2s||""} onChange={e=>updateBudget({...b,realized2s:Number(e.target.value)||0})}
                                    style={{...inp,width:"60px",fontSize:"10px",padding:"2px 5px"}} placeholder="2S"/>
                                </div>
                                {autoRealizado(b)>0&&<div style={{fontSize:"9px",color:"var(--text-blue)",marginTop:"3px"}}>🔄 R$ {(autoRealizado(b)/1000).toFixed(0)}k auto</div>}
                                <button onClick={()=>delBudget(b.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"9px",marginTop:"3px",padding:0}}>excluir</button>
                              </div>
                            );
                          })}
                        </div>
                        {auto>0&&<div style={{marginTop:"8px",fontSize:"10px",color:"var(--text-blue)",background:"rgba(24,95,165,0.08)",borderRadius:"5px",padding:"5px 8px"}}>🔄 Pipeline (fechadas): R$ {auto.toLocaleString("pt-BR")}</div>}
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* ── POR CLIENTE ── */}
            {budgetView==="client" && (()=>{
              const yr = budgets.filter(b=>b.year===CUR_YEAR);
              const clients = [...new Set(yr.map(b=>b.client))].sort();
              return (
                <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                  {clients.map(cli=>{
                    const entries = yr.filter(b=>b.client===cli);
                    const meta = entries.reduce((s,b)=>s+totalMeta(b),0);
                    const real = entries.reduce((s,b)=>s+totalRealizado(b),0);
                    const auto = entries.reduce((s,b)=>s+autoRealizado(b),0);
                    const pct  = meta>0?Math.round(real/meta*100):0;
                    const pc   = pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";
                    return (
                      <div key={cli} style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)"}}>{cli}</div>
                            <div style={{fontSize:"10px",color:"var(--text-secondary)",marginTop:"1px"}}>{entries.length} fornecedor(es) com meta</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:"18px",fontWeight:700,color:pc}}>{pct}%</div>
                            <div style={{fontSize:"10px",color:"var(--text-secondary)"}}>R$ {(real/1000).toFixed(0)}k / R$ {(meta/1000).toFixed(0)}k</div>
                          </div>
                        </div>
                        <div style={{height:"5px",background:"var(--bg-card2)",borderRadius:"3px",marginBottom:"10px",overflow:"hidden"}}>
                          <div style={{height:"100%",width:Math.min(pct,100)+"%",background:pc,borderRadius:"3px",transition:"width .4s"}}/>
                        </div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                          {entries.map(b=>{
                            const bm=totalMeta(b), br=totalRealizado(b);
                            const bp=bm>0?Math.round(br/bm*100):0;
                            const bpc=bp>=80?"#1D9E75":bp>=50?"#EF9F27":"#E24B4A";
                            return (
                              <div key={b.id} style={{background:"var(--bg-card2)",borderRadius:"7px",padding:"7px 10px",minWidth:"110px",flex:1,cursor:"pointer",border:"1px solid transparent",transition:"border-color .15s"}}
                                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--border)"}
                                onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
                                <div onClick={()=>setSelBudget(b)} style={{fontSize:"10px",fontWeight:600,color:"var(--text-primary)",marginBottom:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.supplier} 🔍</div>
                                <div style={{fontSize:"12px",fontWeight:700,color:"var(--text-accent)"}}>R$ {(bm/1000).toFixed(0)}k</div>
                                <div style={{height:"3px",background:"var(--bg-card)",borderRadius:"2px",margin:"4px 0",overflow:"hidden"}}>
                                  <div style={{height:"100%",width:Math.min(bp,100)+"%",background:bpc,borderRadius:"2px"}}/>
                                </div>
                                <div style={{display:"flex",gap:"4px",marginTop:"4px"}}>
                                  <input type="number" value={b.realized1s||""} onChange={e=>updateBudget({...b,realized1s:Number(e.target.value)||0})}
                                    style={{...inp,width:"60px",fontSize:"10px",padding:"2px 5px"}} placeholder="1S"/>
                                  <input type="number" value={b.realized2s||""} onChange={e=>updateBudget({...b,realized2s:Number(e.target.value)||0})}
                                    style={{...inp,width:"60px",fontSize:"10px",padding:"2px 5px"}} placeholder="2S"/>
                                </div>
                                {autoRealizado(b)>0&&<div style={{fontSize:"9px",color:"var(--text-blue)",marginTop:"3px"}}>🔄 R$ {(autoRealizado(b)/1000).toFixed(0)}k auto</div>}
                                <button onClick={()=>delBudget(b.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"9px",marginTop:"3px",padding:0}}>excluir</button>
                              </div>
                            );
                          })}
                        </div>
                        {auto>0&&<div style={{marginTop:"8px",fontSize:"10px",color:"var(--text-blue)",background:"rgba(24,95,165,0.08)",borderRadius:"5px",padding:"5px 8px"}}>🔄 Pipeline: R$ {auto.toLocaleString("pt-BR")}</div>}
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* MODAL NOVA META */}
            {budgetModal && (
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:60}}>
                <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"12px",padding:"20px",width:"400px",maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
                    <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)"}}>Nova meta</div>
                    <button onClick={()=>setBudgetModal(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"18px"}}>✕</button>
                  </div>
                  <div style={{marginBottom:"10px"}}>
                    <label style={lbl}>Fornecedor *</label>
                    <input value={budgetForm.supplier} onChange={e=>setBudgetForm({...budgetForm,supplier:e.target.value})} style={inp} placeholder="ex: Norbar"/>
                  </div>
                  <div style={{marginBottom:"10px"}}>
                    <label style={lbl}>Cliente *</label>
                    <input value={budgetForm.client} onChange={e=>setBudgetForm({...budgetForm,client:e.target.value})} style={inp} placeholder="ex: Caterpillar"/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                    {[["targetAnual",`Meta Anual (R$)`],["target1s",`Meta 1S`],["target2s",`Meta 2S`],["realized1s","Realizado 1S"],["realized2s","Realizado 2S"]].map(([k,l])=>(
                      <div key={k}>
                        <label style={lbl}>{l}</label>
                        <input type="number" value={budgetForm[k]||""} onChange={e=>setBudgetForm({...budgetForm,[k]:e.target.value})} style={inp} placeholder="0"/>
                      </div>
                    ))}
                  </div>
                  <div style={{marginBottom:"14px"}}>
                    <label style={lbl}>Notas</label>
                    <textarea value={budgetForm.notes} onChange={e=>setBudgetForm({...budgetForm,notes:e.target.value})} style={{...inp,height:"44px"}}/>
                  </div>
                  <div style={{display:"flex",gap:"8px"}}>
                    <button onClick={addBudget} disabled={!budgetForm.supplier||!budgetForm.client}
                      style={{flex:1,padding:"10px",fontSize:"13px",borderRadius:"6px",border:"none",background:(budgetForm.supplier&&budgetForm.client)?"#8C1A1A":"#4A2A2A",color:(budgetForm.supplier&&budgetForm.client)?"#FFD0D0":"#7A5050",cursor:(budgetForm.supplier&&budgetForm.client)?"pointer":"default",fontWeight:600}}>
                      Salvar
                    </button>
                    <button onClick={()=>setBudgetModal(false)} style={{padding:"10px 14px",fontSize:"13px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
        {/* ===== PÓS VENDA ===== */}
        {view==="posvendas" && (
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
              <div style={{fontSize:"14px",fontWeight:600,color:"var(--text-primary)"}}>Pós-venda</div>
              <button onClick={()=>setPosModal(true)} style={{padding:"5px 14px",fontSize:"12px",borderRadius:"6px",border:"1px solid #8C1A1A",background:"rgba(140,26,26,0.2)",color:"var(--text-accent)",cursor:"pointer"}}>+ Novo registro</button>
            </div>
            {/* status summary */}
            {(()=>{
              const st={"pendente":"Pendente","em_transito":"Em trânsito","entregue_total":"Entregue total","entregue_parcial":"Parcial","reclamacao":"Reclamação","manutencao":"Manutenção"};
              const colors={"pendente":"#EF9F27","em_transito":"#378ADD","entregue_total":"#1D9E75","entregue_parcial":"#5DCAA5","reclamacao":"#E24B4A","manutencao":"#7F77DD"};
              return (
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"12px"}}>
                  {Object.entries(st).map(([k,v])=>{
                    const cnt=posVendas.filter(p=>p.status===k).length;
                    return <span key={k} style={{fontSize:"11px",padding:"3px 10px",borderRadius:"10px",background:colors[k]+"22",color:colors[k],fontWeight:600}}>{v}: {cnt}</span>;
                  })}
                </div>
              );
            })()}
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {posVendas.length===0 && <div style={{fontSize:"13px",color:"var(--text-muted)",textAlign:"center",padding:"30px 0"}}>Nenhum registro de pós-venda</div>}
              {posVendas.map(p=>{
                const stColors={"pendente":"#EF9F27","em_transito":"#378ADD","entregue_total":"#1D9E75","entregue_parcial":"#5DCAA5","reclamacao":"#E24B4A","manutencao":"#7F77DD"};
                const stLabels={"pendente":"Pendente","em_transito":"Em trânsito","entregue_total":"Entregue total","entregue_parcial":"Parcial","reclamacao":"Reclamação","manutencao":"Manutenção"};
                const c=stColors[p.status]||"#888";
                return (
                  <div key={p.id} style={{background:"#252525",border:`1px solid #3A3A3A`,borderLeft:`3px solid ${c}`,borderRadius:"8px",padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
                      <div>
                        <div style={{fontSize:"13px",fontWeight:600,color:"var(--text-primary)"}}>{p.client}</div>
                        <div style={{fontSize:"11px",color:"var(--text-secondary)"}}>{p.contact||"—"}</div>
                      </div>
                      <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                        <span style={{fontSize:"10px",padding:"2px 8px",borderRadius:"8px",background:c+"22",color:c,fontWeight:600}}>{stLabels[p.status]}</span>
                        <button onClick={()=>delPosVenda(p.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#5A3030",fontSize:"12px"}}>✕</button>
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"6px",marginBottom:"6px"}}>
                      {[["NF",p.nf],["PO",p.po],["Orç.",p.orcamento],["Entrega",p.deliveryDate],["Tipo entrega",p.deliveryType==="total"?"Total":"Parcial"],["Valor","R$ "+(p.value||0).toLocaleString("pt-BR")]].map(([k,v])=>(
                        <div key={k} style={{background:"var(--bg-card2)",borderRadius:"5px",padding:"5px 7px"}}>
                          <div style={{fontSize:"9px",color:"var(--text-secondary)",marginBottom:"2px"}}>{k}</div>
                          <div style={{fontSize:"11px",color:"var(--text-primary)",fontWeight:600}}>{v||"—"}</div>
                        </div>

                ["📊 Pipeline crítico", `Analise meu pipeline atual. Oportunidades acima de R$50k: ${oppFc.filter(o=>o.value>50000&&o.stage!=="fechado").map(o=>`${o.customer}(R$${(o.value/1000).toFixed(0)}k,${o.stage})`).join(", ")}. Quais estão em risco? O que fazer para avançar cada uma?`],
              ].map(([label, prompt])=>(
                <button key={label} onClick={()=>chat(prompt)}

      {/* MODAL API KEY */}

                  <button key={v} onClick={()=>setForm({...form,negType:v})} style={{flex:1,padding:"5px 4px",fontSize:"11px",borderRadius:"6px",border:`1px solid ${(form.negType||"D")===v?c:"var(--border)"}`,background:(form.negType||"D")===v?c+"22":"transparent",color:(form.negType||"D")===v?c:"var(--text-secondary)",cursor:"pointer",fontWeight:(form.negType||"D")===v?700:400}}>{l}</button>

            <div style={{marginBottom:"12px"}}>

                  <button onClick={()=>setProfileEdit(false)} style={{padding:"9px 16px",fontSize:"13px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
                </div>
              </div>
            )}
          </div>
        </div>

      {/* MODAL CONFIGURAÇÕES */}

        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:70,padding:"16px"}}>

                {[["light","☀ Claro","#FFF8F0","#8C1A1A"],["dark","☾ Escuro","#1a1a1a","#FFAAAA"],["system","⊙ Sistema","var(--bg-card2)","var(--text-secondary)"]].map(([t,l,bg,tc])=>(
                  <button key={t} onClick={()=>setThemePref(t)}

                  </div>

        {view==="estoque" && (()=>{
          async function importEstoque(e){
            const file = e.target.files[0]; if(!file) return;
            setEstoqueLoading(true);
            try{
              const XLSX = window.XLSX;
              const buf = await file.arrayBuffer();
              const wb = XLSX.read(buf);
              const ws = wb.Sheets[wb.SheetNames[0]];
              const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
              const items = [];
              let grupoAtual = null;
              for(const row of rows){
                const r = row.map(c=>String(c||"").trim());
                if(!r.some(x=>x)) continue;
                if(/^\d+$/.test(r[0]) && r[1] && !r[2] && !r[3]){
                  grupoAtual = {gc:r[0], gn:r[1]};
                } else if(r[0].length>=6 && /^[\d.]+$/.test(r[0]) && r[1] && grupoAtual){
                  try{
                    const sf = parseFloat(r[5])||0;
                    const sd = parseFloat(r[6])||0;
                    const sigma = r[2]||r[3]||"";
                    items.push({gc:grupoAtual.gc, gn:grupoAtual.gn, cod:r[0], desc:r[1], sigma, sf:Math.round(sf), sd:Math.round(sd)});
                  }catch(ex){}
                }
              }
              saveEstoque(items);
              alert(`Estoque importado: ${items.length} itens em ${new Set(items.map(i=>i.gc)).size} grupos.`);
            }catch(err){ alert("Erro ao importar: "+err.message); }
            setEstoqueLoading(false);
            e.target.value="";
          }

          const q = estoqueSearch.trim().toLowerCase();
          const filtered = q.length>=2 ? estoqueData.filter(it=>
            (estoqueFilter?it.gc===estoqueFilter:true) &&
            (it.cod.toLowerCase().includes(q)||it.sigma.toLowerCase().includes(q)||it.desc.toLowerCase().includes(q))
          ).slice(0,100) : [];

          const grupos = [...new Map(estoqueData.map(it=>[it.gc,{gc:it.gc,gn:it.gn}])).values()].sort((a,b)=>a.gn.localeCompare(b.gn));

            navigator.clipboard.writeText(linhas.join("\n"));
            alert("Tabela copiada! Cole com Ctrl+V no e-mail ou Excel.");

                  <div style={{fontSize:"12px",color:"var(--text-muted)",lineHeight:1.6}}>Clique em <b>📥 Importar planilha</b> e selecione o arquivo <b>estoque.xlsx</b></div>

                if(desc.includes(q)||cod.includes(q)||sigma.includes(q)){

                }
              }
            }
            return Object.values(matches).map(m=>{
